<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Global Route — Updating...</title>
<style>body{background:#0f0a1a;color:#d4af37;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;}
h2{margin-bottom:20px;}.spinner{border:4px solid #333;border-top:4px solid #d4af37;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
async function nuke(){
  document.getElementById('status').textContent='Clearing old data...';
  // Clear ALL caches
  if('caches' in window){
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  // Unregister ALL service workers for charter scope
  if('serviceWorker' in navigator){
    const regs = await navigator.serviceWorker.getRegistrations();
    for(const r of regs) await r.unregister();
  }
  document.getElementById('status').textContent='Redirecting to v53...';
  // Small delay then redirect
  setTimeout(()=>{
    window.location.href='./charter/index.html?fresh='+Date.now();
  }, 1500);
}
window.onload = nuke;
</script>
</head><body>
<h2>🧭 Global Route</h2>
<div class="spinner"></div>
<p id="status">Preparing update...</p>
</body></html>
