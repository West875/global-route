    <button class="draw-btn" onclick="startDraw('buried')"><div class="swatch" style="background:#cc6600;"></div>Buried</button>
    <button class="draw-btn" onclick="startDraw('bore')"><div class="swatch" style="background:#9933cc;"></div>Bore</button>
    <button class="draw-btn" onclick="startDraw('drop')"><div class="swatch" style="background:#cc0000;"></div>Drop</button>
    <button class="draw-btn" onclick="cancelDraw()" style="border-color:#cc0000;color:#cc0000;margin-top:4px;">✕ Cancel</button>
  `;
  L.DomEvent.disableClickPropagation(d);
  return d;
};
drawControl.addTo(map);

let drawMode = null;
let drawPoints = [];
let drawPreview = null;

function startDraw(type) {
  drawMode = type;
  drawPoints = [];
  document.querySelectorAll('.draw-btn').forEach(b => b.classList.remove('active'));
  event.target.closest('.draw-btn').classList.add('active');
  map.getContainer().style.cursor = 'crosshair';
}

function cancelDraw() {
  drawMode = null;
  drawPoints = [];
  if (drawPreview) { map.removeLayer(drawPreview); drawPreview = null; }
  document.querySelectorAll('.draw-btn').forEach(b => b.classList.remove('active'));
  map.getContainer().style.cursor = '';
}

map.on('click', function(e) {
  if (!drawMode) return;
  drawPoints.push([e.latlng.lat, e.latlng.lng]);
  if (drawPreview) map.removeLayer(drawPreview);
  const style = cableStyle[drawMode] || cableStyle.strand;
  drawPreview = L.polyline(drawPoints, { ...style }).addTo(map);
});

map.on('dblclick', function(e) {
  if (!drawMode || drawPoints.length < 2) return;
  // Finalize
  const style = cableStyle[drawMode] || cableStyle.strand;
  drawCableGlow(drawPoints, style.color, style.weight || 3);
  L.polyline(drawPoints, { ...style }).addTo(map);
  // Calculate distance
  let totalFt = 0;
  for (let i = 1; i < drawPoints.length; i++) {
    const d = map.distance(L.latLng(drawPoints[i-1]), L.latLng(drawPoints[i]));
    totalFt += d * 3.28084;
  }
  // Add distance label at midpoint
  const mid = drawPoints[Math.floor(drawPoints.length/2)];
  L.marker(mid, {
    icon: L.divIcon({ className:'dist-label', html: Math.round(totalFt) + "'", iconSize:[60,16], iconAnchor:[30,8] })
  }).addTo(map);

  const drawnEl = document.getElementById('fDrawn');
  if (drawnEl) drawnEl.textContent = (parseInt(drawnEl.textContent.replace(/,/g,'')) || 0) + Math.round(totalFt) + "'";

  cancelDraw();
});

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Populate sidebar
const sbContent = document.getElementById('sidebarContent');
let aerials = TERMINALS.filter(t => t.type === 'AERIAL');
let burieds = TERMINALS.filter(t => t.type === 'BURIED');

let html = '<div class="sidebar-section"><div class="sidebar-section-title">📡 Aerial Terminals (' + aerials.length + ')</div>';
aerials.forEach(t => {
  html += `<div class="term-item" onclick="map.setView([${t.lat},${t.lon}],18)">
    <span class="tid">${t.id}</span><span class="tinfo">${t.signal}</span>
  </div>`;
});
html += '</div>';

html += '<div class="sidebar-section"><div class="sidebar-section-title">📦 Buried Terminals (' + burieds.length + ')</div>';
burieds.forEach(t => {
  html += `<div class="term-item" onclick="map.setView([${t.lat},${t.lon}],18)">
    <span class="tid">${t.id}</span><span class="tinfo">${t.signal}</span>
  </div>`;
});
html += '</div>';

html += '<div class="sidebar-section"><div class="sidebar-section-title">⚡ Splice Points (' + SPLICES.length + ')</div>';
SPLICES.forEach(s => {
  html += `<div class="term-item" onclick="map.setView([${s.lat},${s.lon}],18)">
    <span class="tid">${s.id}</span><span class="tinfo">${s.fibers}F — ${s.type}</span>
  </div>`;
});
html += '</div>';

html += '<div class="sidebar-section"><div class="sidebar-section-title">📐 Cable Summary</div>';
html += `<div class="term-item"><span class="tid">Strand</span><span class="tinfo">3,840'</span></div>`;
html += `<div class="term-item"><span class="tid">Fiber</span><span class="tinfo">4,840'</span></div>`;
html += `<div class="term-item"><span class="tid">Buried</span><span class="tinfo">4,230'</span></div>`;
html += `<div class="term-item"><span class="tid">Bore</span><span class="tinfo">312'</span></div>`;
html += `<div class="term-item"><span class="tid">Drops</span><span class="tinfo">43 total</span></div>`;
html += '</div>';

sbContent.innerHTML = html;

// Fit map to all data
const allPts = TERMINALS.map(t => [t.lat, t.lon])
  .concat([[FDH.lat, FDH.lon], [REMOTE.lat, REMOTE.lon]])
  .concat(SPLICES.map(s => [s.lat, s.lon]));
map.fitBounds(L.latLngBounds(allPts).pad(0.1));
</script>
