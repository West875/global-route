<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fiber As-Built — Tic Mark Tracking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0a0e17; color:#e0e0e0; overflow:hidden; height:100vh; }

/* ─── HEADER ─── */
.header {
  background: linear-gradient(135deg, #1a1040 0%, #0d1a2d 50%, #0a1628 100%);
  border-bottom: 2px solid #7c3aed;
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 1000; position: relative;
  box-shadow: 0 4px 20px rgba(124,58,237,0.3);
}
.header-left { display:flex; align-items:center; gap:10px; }
.logo { font-size:14px; font-weight:800; letter-spacing:1px; }
.logo span:first-child { color:#fbbf24; }
.logo span:last-child { color:#a78bfa; }
.job-info { font-size:11px; color:#94a3b8; }
.job-id { color:#fbbf24; font-weight:600; }
.header-right { display:flex; gap:8px; align-items:center; }
.header-btn {
  padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 11px; font-weight: 600; font-family: inherit;
  transition: all 0.2s;
}
.btn-export { background: linear-gradient(135deg,#059669,#10b981); color:white; }
.btn-export:hover { transform:scale(1.05); box-shadow:0 0 12px rgba(16,185,129,0.4); }
.btn-undo { background: linear-gradient(135deg,#dc2626,#ef4444); color:white; }
.btn-undo:hover { transform:scale(1.05); }
.btn-view { background: linear-gradient(135deg,#7c3aed,#a78bfa); color:white; }
.btn-view:hover { transform:scale(1.05); }

/* ─── MAP ─── */
#map { height: calc(100vh - 52px - 48px); width: 100%; }

/* ─── FOOTER STATS ─── */
.footer {
  background: linear-gradient(135deg, #1a1040, #0d1a2d);
  border-top: 2px solid #7c3aed;
  padding: 8px 16px;
  display: flex; justify-content: space-around; align-items: center;
  height: 48px;
}
.stat { text-align:center; }
.stat-val { font-size:16px; font-weight:800; }
.stat-label { font-size:9px; color:#94a3b8; text-transform:uppercase; letter-spacing:0.5px; }
.stat-strand .stat-val { color:#fbbf24; }
.stat-fiber .stat-val { color:#3b82f6; }
.stat-buried .stat-val { color:#f97316; }
.stat-poles .stat-val { color:#a78bfa; }
.stat-progress .stat-val { color:#10b981; }

/* ─── POLE POPUP ─── */
.pole-popup { min-width: 280px; }
.pole-popup h3 {
  font-size: 14px; font-weight: 700; margin-bottom: 8px;
  padding-bottom: 6px; border-bottom: 2px solid #7c3aed;
  color: #1a1040; display:flex; align-items:center; gap:6px;
}
.pole-popup .status-badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; margin-left:auto;
}
.status-pending { background:#fef3c7; color:#92400e; }
.status-done { background:#d1fae5; color:#065f46; }
.pole-form label {
  display:block; font-size:11px; font-weight:600; color:#374151;
  margin: 6px 0 2px;
}
.pole-form input, .pole-form select, .pole-form textarea {
  width:100%; padding:6px 8px; border:1.5px solid #d1d5db; border-radius:6px;
  font-size:13px; font-family:inherit; background:white;
}
.pole-form input:focus, .pole-form select:focus {
  border-color:#7c3aed; outline:none; box-shadow:0 0 0 3px rgba(124,58,237,0.15);
}
.tic-row { display:flex; gap:6px; align-items:flex-end; }
.tic-row > div { flex:1; }
.pole-form .btn-row { display:flex; gap:6px; margin-top:10px; }
.pole-form .btn-save {
  flex:1; padding:8px; border:none; border-radius:8px; cursor:pointer;
  font-weight:700; font-size:12px; font-family:inherit; color:white;
  background: linear-gradient(135deg,#7c3aed,#a78bfa);
  transition: all 0.2s;
}
.pole-form .btn-save:hover { transform:scale(1.02); box-shadow:0 4px 12px rgba(124,58,237,0.4); }
.pole-form .btn-photo {
  padding:8px 12px; border:none; border-radius:8px; cursor:pointer;
  font-weight:700; font-size:12px; font-family:inherit; color:white;
  background: linear-gradient(135deg,#ec4899,#f472b6);
}
.pole-form .btn-clear {
  padding:8px 12px; border:none; border-radius:8px; cursor:pointer;
  font-weight:600; font-size:11px; font-family:inherit; color:#6b7280;
  background: #f3f4f6; border:1px solid #d1d5db;
}
.cable-calc {
  background: #f0fdf4; border:1px solid #86efac; border-radius:6px;
  padding:6px 8px; margin-top:6px; font-size:11px; color:#065f46;
}
.cable-calc strong { font-size:14px; }
.saved-data {
  background:#f0f9ff; border:1px solid #93c5fd; border-radius:6px;
  padding:8px; margin-top:6px;
}
.saved-data .tic-display {
  font-size:20px; font-weight:900; color:#1e40af; text-align:center;
  padding:4px 0;
}
.saved-data .detail-row {
  display:flex; justify-content:space-between; font-size:11px;
  padding:2px 0; color:#374151;
}

/* ─── TIC MARK LABELS ON MAP ─── */
.tic-label {
  background: rgba(30,64,175,0.9); color:white; padding:2px 6px;
  border-radius:4px; font-size:11px; font-weight:700; font-family:'Inter',sans-serif;
  border:1.5px solid #60a5fa; white-space:nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.tic-label-strand {
  background: rgba(180,130,0,0.9); border-color:#fbbf24;
}
.tic-label-fiber {
  background: rgba(30,64,175,0.9); border-color:#60a5fa;
}

/* ─── COMPLETED LINE GLOW ─── */
.leaflet-interactive { filter: drop-shadow(0 0 3px currentColor); }

/* ─── MODAL ─── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000;
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.active { display:flex; }
.modal {
  background:#fff; border-radius:16px; padding:24px; max-width:500px; width:90%;
  max-height:80vh; overflow-y:auto; color:#1a1040;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal h2 { font-size:18px; font-weight:800; margin-bottom:16px; color:#1a1040;
  display:flex; align-items:center; gap:8px; }
.modal table { width:100%; border-collapse:collapse; font-size:12px; }
.modal th { background:#f3f0ff; color:#5b21b6; padding:8px; text-align:left; font-weight:700; }
.modal td { padding:6px 8px; border-bottom:1px solid #e5e7eb; }
.modal .row-done { background:#f0fdf4; }
.modal .row-pending { background:#fffbeb; }
.modal .close-btn {
  position:absolute; top:12px; right:16px; background:none; border:none;
  font-size:24px; cursor:pointer; color:#6b7280;
}

/* ─── LEGEND OVERLAY ─── */
.legend-panel {
  position: absolute; bottom: 60px; left: 12px; z-index: 1000;
  background: rgba(10,14,23,0.92); border:1px solid #7c3aed; border-radius:12px;
  padding: 12px; min-width: 180px;
  backdrop-filter:blur(8px);
}
.legend-title { font-size:11px; font-weight:700; color:#a78bfa; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
.legend-item { display:flex; align-items:center; gap:8px; padding:3px 0; font-size:11px; }
.legend-line { width:24px; height:3px; border-radius:2px; }
.legend-dot { width:12px; height:12px; border-radius:50%; border:2px solid; }

/* ─── PROGRESS OVERLAY ─── */
.progress-ring-wrap {
  position:absolute; top:60px; right:12px; z-index:1000;
  background:rgba(10,14,23,0.92); border:1px solid #7c3aed; border-radius:16px;
  padding:16px; text-align:center; backdrop-filter:blur(8px);
}
.progress-ring-wrap svg { width:80px; height:80px; }
.progress-text { font-size:20px; font-weight:900; fill:#10b981; }
.progress-label { font-size:10px; fill:#94a3b8; }
.progress-track { fill:none; stroke:#1e293b; stroke-width:6; }
.progress-fill { fill:none; stroke:#10b981; stroke-width:6; stroke-linecap:round;
  transition: stroke-dashoffset 0.8s ease; }

/* ─── INSTRUCTION TOAST ─── */
.toast {
  position:absolute; top:60px; left:50%; transform:translateX(-50%); z-index:1000;
  background:rgba(124,58,237,0.95); color:white; padding:10px 20px;
  border-radius:10px; font-size:12px; font-weight:600;
  box-shadow:0 4px 20px rgba(124,58,237,0.4);
  animation: fadeInDown 0.3s ease;
  pointer-events:none;
}
@keyframes fadeInDown { from { opacity:0; transform:translateX(-50%) translateY(-10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2) !important;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo"><span>GLOBAL </span><span>ROUTE</span></div>
    <div class="job-info">
      Job <span class="job-id">#704253808</span> · SEFH9384 · Hickory Flat Hwy
    </div>
  </div>
  <div class="header-right">
    <button class="header-btn btn-view" onclick="showReport()">📋 Report</button>
    <button class="header-btn btn-undo" onclick="undoLast()">↩️ Undo</button>
    <button class="header-btn btn-export" onclick="exportCSV()">📥 Export</button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- LEGEND -->
<div class="legend-panel">
  <div class="legend-title">Cable Legend</div>
  <div class="legend-item"><div class="legend-line" style="background:#fbbf24;"></div> Strand</div>
  <div class="legend-item"><div class="legend-line" style="background:#3b82f6;"></div> Fiber Cable</div>
  <div class="legend-item"><div class="legend-line" style="background:#f97316; border-top:2px dashed #f97316; height:0;"></div> Buried</div>
  <div class="legend-item"><div class="legend-line" style="background:#a855f7; border-top:2px dashed #a855f7; height:0;"></div> Bore/Conduit</div>
  <div class="legend-item"><div class="legend-line" style="background:#ef4444; border-top:2px dashed #ef4444; height:0;"></div> Drop Cable</div>
  <div class="legend-title" style="margin-top:8px;">Equipment</div>
  <div class="legend-item"><div class="legend-dot" style="background:#059669; border-color:#34d399;"></div> Pole (completed)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#374151; border-color:#9ca3af;"></div> Pole (pending)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed; border-color:#a78bfa; border-radius:4px; width:14px; height:14px;"></div> FDH / Terminal</div>
</div>

<!-- PROGRESS RING -->
<div class="progress-ring-wrap">
  <svg viewBox="0 0 44 44">
    <circle class="progress-track" cx="22" cy="22" r="18"/>
    <circle class="progress-fill" id="progressCircle" cx="22" cy="22" r="18"
            stroke-dasharray="113.1" stroke-dashoffset="113.1"
            transform="rotate(-90 22 22)"/>
    <text class="progress-text" x="22" y="23" text-anchor="middle" dominant-baseline="middle" id="progressText">0%</text>
    <text class="progress-label" x="22" y="33" text-anchor="middle" id="progressLabel">0/37 poles</text>
  </svg>
</div>

<!-- FOOTER STATS -->
<div class="footer">
  <div class="stat stat-strand"><div class="stat-val" id="strandFt">0'</div><div class="stat-label">Strand</div></div>
  <div class="stat stat-fiber"><div class="stat-val" id="fiberFt">0'</div><div class="stat-label">Fiber</div></div>
  <div class="stat stat-buried"><div class="stat-val" id="buriedFt">0'</div><div class="stat-label">Buried</div></div>
  <div class="stat stat-poles"><div class="stat-val" id="polesDone">0/37</div><div class="stat-label">Poles</div></div>
  <div class="stat stat-progress"><div class="stat-val" id="progressPct">0%</div><div class="stat-label">Complete</div></div>
</div>

<!-- REPORT MODAL -->
<div class="modal-overlay" id="reportModal">
  <div class="modal" style="position:relative;">
    <button class="close-btn" onclick="closeReport()">✕</button>
    <h2>📋 As-Built Report</h2>
    <div id="reportContent"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// REAL POLE DATA FROM WINDSTREAM WORK PRINT
// Route along Hickory Flat Hwy, Canton GA
// ═══════════════════════════════════════════
const FDH = { lat: 34.15974, lon: -84.415808, name: 'FDH SEFH9384', type: 'fdh' };
const REMOTE = { lat: 34.154887, lon: -84.406247, name: 'REMOTE PRKC/WDSTGAU0001', type: 'remote' };

// Poles along the route — realistic positions along Hickory Flat Hwy
// Each pole has: id, lat, lon, designStrand (footage from design), designFiber
const POLES = [
  { id:'P-001', lat:34.15960, lon:-84.41555, designStrand:'0-176', designFiber:'0-176', cableType:'aerial', road:'Hickory Flat Hwy', span:'FDH → P-001' },
  { id:'P-002', lat:34.15945, lon:-84.41510, designStrand:'176-221', designFiber:'176-221', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-001 → P-002' },
  { id:'P-003', lat:34.15928, lon:-84.41462, designStrand:'221-360', designFiber:'221-360', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-002 → P-003' },
  { id:'P-004', lat:34.15905, lon:-84.41400, designStrand:'360-507', designFiber:'360-507', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-003 → P-004' },
  { id:'P-005', lat:34.15885, lon:-84.41345, designStrand:'507-577', designFiber:'507-577', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-004 → P-005' },
  { id:'P-006', lat:34.15870, lon:-84.41300, designStrand:'577-647', designFiber:'577-647', cableType:'aerial', road:'Hickory Flat Hwy @ Vaughn Rd', span:'P-005 → P-006' },
  { id:'P-007', lat:34.15850, lon:-84.41250, designStrand:'647-844', designFiber:'647-844', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-006 → P-007' },
  { id:'P-008', lat:34.15832, lon:-84.41198, designStrand:'844-1035', designFiber:'844-1035', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-007 → P-008' },
  { id:'P-009', lat:34.15818, lon:-84.41148, designStrand:'1035-1172', designFiber:'1035-1172', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-008 → P-009' },
  { id:'P-010', lat:34.15800, lon:-84.41098, designStrand:'1172-1496', designFiber:'1172-1496', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-009 → P-010' },
  { id:'P-011', lat:34.15778, lon:-84.41042, designStrand:'1496-1690', designFiber:'1496-1690', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-010 → P-011' },
  { id:'P-012', lat:34.15760, lon:-84.40992, designStrand:'1690-1884', designFiber:'1690-1884', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-011 → P-012' },
  { id:'P-013', lat:34.15740, lon:-84.40935, designStrand:'1884-1929', designFiber:'1884-1929', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-012 → P-013' },
  { id:'P-014', lat:34.15720, lon:-84.40880, designStrand:'1929-2126', designFiber:'1929-2126', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-013 → P-014' },
  { id:'P-015', lat:34.15700, lon:-84.40825, designStrand:'2126-2273', designFiber:'2126-2273', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-014 → P-015' },
  { id:'P-016', lat:34.15685, lon:-84.40780, designStrand:'2273-2431', designFiber:'2273-2431', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-015 → P-016' },
  { id:'P-017', lat:34.15668, lon:-84.40730, designStrand:'2431-2578', designFiber:'2431-2578', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-016 → P-017' },
  { id:'P-018', lat:34.15652, lon:-84.40682, designStrand:'2578-2772', designFiber:'2578-2772', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-017 → P-018' },
  { id:'P-019', lat:34.15638, lon:-84.40640, designStrand:'2772-2909', designFiber:'2772-2909', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-018 → P-019' },
  { id:'P-020', lat:34.15620, lon:-84.40595, designStrand:'2909-3103', designFiber:'2909-3103', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-019 → P-020' },
  // Side route — Vaughn Rd
  { id:'P-021', lat:34.15840, lon:-84.41280, designStrand:'', designFiber:'', cableType:'buried', road:'Vaughn Rd', span:'P-006 → P-021 (UG)' },
  { id:'P-022', lat:34.15810, lon:-84.41260, designStrand:'', designFiber:'', cableType:'buried', road:'Vaughn Rd', span:'P-021 → P-022' },
  { id:'P-023', lat:34.15780, lon:-84.41240, designStrand:'', designFiber:'', cableType:'buried', road:'Vaughn Rd', span:'P-022 → P-023' },
  { id:'P-024', lat:34.15750, lon:-84.41225, designStrand:'', designFiber:'', cableType:'buried', road:'Vaughn Rd', span:'P-023 → P-024' },
  // Continue main route
  { id:'P-025', lat:34.15600, lon:-84.40548, designStrand:'3103-3250', designFiber:'3103-3250', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-020 → P-025' },
  { id:'P-026', lat:34.15582, lon:-84.40502, designStrand:'3250-3394', designFiber:'3250-3394', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-025 → P-026' },
  { id:'P-027', lat:34.15565, lon:-84.40455, designStrand:'3394-3497', designFiber:'3394-3497', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-026 → P-027' },
  { id:'P-028', lat:34.15548, lon:-84.40410, designStrand:'3497-3601', designFiber:'3497-3601', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-027 → P-028' },
  { id:'P-029', lat:34.15530, lon:-84.40362, designStrand:'3601-3720', designFiber:'3601-3720', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-028 → P-029' },
  { id:'P-030', lat:34.15515, lon:-84.40318, designStrand:'3720-3840', designFiber:'3720-3840', cableType:'aerial', road:'Hickory Flat Hwy', span:'P-029 → P-030' },
  // More poles along continuation
  { id:'P-031', lat:34.15672, lon:-84.41320, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'Branch off P-006' },
  { id:'P-032', lat:34.15650, lon:-84.41350, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-031 → P-032' },
  { id:'P-033', lat:34.15628, lon:-84.41380, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-032 → P-033' },
  { id:'P-034', lat:34.15610, lon:-84.41420, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-033 → P-034' },
  { id:'P-035', lat:34.15590, lon:-84.41460, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-034 → P-035' },
  { id:'P-036', lat:34.15570, lon:-84.41500, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-035 → P-036' },
  { id:'P-037', lat:34.15548, lon:-84.41540, designStrand:'', designFiber:'', cableType:'aerial', road:'Wiley Bridge Rd', span:'P-036 → P-037' },
];

// State: track completion data per pole
const poleData = {};
const completedLines = [];
const ticLabels = [];

// ═══════════════════════════════════════════
// INIT MAP
// ═══════════════════════════════════════════
const map = L.map('map', {
  center: [34.1572, -84.4115],
  zoom: 17,
  zoomControl: false
});

L.control.zoom({ position: 'topright' }).addTo(map);

// Google Earth Hybrid — satellite + street labels
L.tileLayer('https://mt{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
  attribution: 'Google',
  subdomains: ['0','1','2','3'],
  maxZoom: 21
}).addTo(map);

// ═══════════════════════════════════════════
// DESIGN ROUTE LINES (faint — what was engineered)
// ═══════════════════════════════════════════
// Main route — Hickory Flat Hwy
const mainRouteCoords = POLES.filter(p => p.road.includes('Hickory Flat')).map(p => [p.lat, p.lon]);
mainRouteCoords.unshift([FDH.lat, FDH.lon]);
L.polyline(mainRouteCoords, {
  color: '#fbbf24', weight: 2, opacity: 0.25, dashArray: '8,6'
}).addTo(map).bindTooltip('Design: Strand Route (Hickory Flat Hwy)', {sticky:true});

// Vaughn Rd buried route
const vaughnCoords = POLES.filter(p => p.road === 'Vaughn Rd').map(p => [p.lat, p.lon]);
vaughnCoords.unshift([POLES[5].lat, POLES[5].lon]); // starts at P-006
L.polyline(vaughnCoords, {
  color: '#f97316', weight: 2, opacity: 0.25, dashArray: '6,6'
}).addTo(map).bindTooltip('Design: Buried Route (Vaughn Rd)', {sticky:true});

// Wiley Bridge Rd route
const wileyCoords = POLES.filter(p => p.road === 'Wiley Bridge Rd').map(p => [p.lat, p.lon]);
L.polyline(wileyCoords, {
  color: '#3b82f6', weight: 2, opacity: 0.25, dashArray: '8,6'
}).addTo(map).bindTooltip('Design: Fiber Route (Wiley Bridge Rd)', {sticky:true});

// ═══════════════════════════════════════════

function createPoleIcon(pole, completed) {
  const bg = completed
    ? 'linear-gradient(135deg,#059669,#10b981)'
    : pole.cableType === 'buried'
      ? 'linear-gradient(135deg,#92400e,#d97706)'
      : 'linear-gradient(135deg,#374151,#6b7280)';
  const border = completed ? '#34d399' : pole.cableType === 'buried' ? '#fbbf24' : '#9ca3af';
  const glow = completed ? '0 0 12px rgba(16,185,129,0.5)' : 'none';
  const num = pole.id.replace('P-','');
  const check = completed ? '✅' : '';
  const size = completed ? 24 : 18;

  return L.divIcon({
    className:'',
    html:`<div style="width:${size}px;height:${size}px;background:${bg};border:2px solid ${border};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${completed?10:8}px;font-weight:800;color:white;box-shadow:${glow};cursor:pointer;transition:all 0.3s;">${completed?check:num}</div>`,
    iconSize:[size,size], iconAnchor:[size/2,size/2]
  });
}

// ═══════════════════════════════════════════
// POLE POPUP — TIC MARK ENTRY FORM
// ═══════════════════════════════════════════
function openPolePopup(pole, marker) {
  const data = poleData[pole.id];
  const prevPole = getPreviousPole(pole);
  const prevData = prevPole ? poleData[prevPole.id] : null;

  let html = `<div class="pole-popup">`;
  html += `<h3>🔩 ${pole.id} <span style="font-size:11px;color:#6b7280;font-weight:400;">${pole.road}</span>
    <span class="status-badge ${data ? 'status-done' : 'status-pending'}">${data ? '✅ DONE' : '⏳ PENDING'}</span></h3>`;
  html += `<div style="font-size:10px;color:#6b7280;margin-bottom:6px;">${pole.span} · ${pole.cableType.toUpperCase()}</div>`;

  if (data) {
    // Show saved data
    html += `<div class="saved-data">`;
    if (data.strandTic) {
      html += `<div style="font-size:10px;color:#b45309;font-weight:600;">🟡 STRAND TIC MARK</div>`;
      html += `<div class="tic-display" style="color:#b45309;">${data.strandTic}</div>`;
    }
    if (data.fiberTic) {
      html += `<div style="font-size:10px;color:#1e40af;font-weight:600;">🔵 FIBER TIC MARK</div>`;
      html += `<div class="tic-display">${data.fiberTic}</div>`;
    }
    if (data.footage) {
      html += `<div class="cable-calc">📏 Span footage: <strong>${data.footage}'</strong> (from prev pole tic mark)</div>`;
    }
    html += `<div class="detail-row"><span>Cable Type</span><span>${data.cableType || pole.cableType}</span></div>`;
    html += `<div class="detail-row"><span>Attachment</span><span>${data.attachment || '—'}</span></div>`;
    if (data.height) html += `<div class="detail-row"><span>Attach Height</span><span>${data.height}'</span></div>`;
    if (data.notes) html += `<div class="detail-row"><span>Notes</span><span>${data.notes}</span></div>`;
    if (data.timestamp) html += `<div class="detail-row"><span>Recorded</span><span>${data.timestamp}</span></div>`;
    html += `</div>`;
    html += `<div class="btn-row" style="margin-top:8px;"><button class="btn-clear" onclick="clearPole('${pole.id}')">↩️ Undo</button></div>`;
  } else {
    // Entry form
    html += `<div class="pole-form" id="poleForm_${pole.id}">`;

    if (pole.cableType === 'aerial') {
      html += `<label>🟡 Strand Tic Mark at this pole</label>`;
      html += `<div class="tic-row">
        <div><input type="number" id="strandTic_${pole.id}" placeholder="e.g. 1250" style="font-size:18px;font-weight:800;text-align:center;color:#b45309;"></div>
      </div>`;
      if (prevData && prevData.strandTic) {
        html += `<div style="font-size:10px;color:#6b7280;margin-top:2px;">Previous pole (${prevPole.id}): <strong style="color:#b45309;">${prevData.strandTic}</strong></div>`;
      }

      html += `<label>🔵 Fiber Tic Mark at this pole</label>`;
      html += `<div class="tic-row">
        <div><input type="number" id="fiberTic_${pole.id}" placeholder="e.g. 1250" style="font-size:18px;font-weight:800;text-align:center;color:#1e40af;"></div>
      </div>`;
      if (prevData && prevData.fiberTic) {
        html += `<div style="font-size:10px;color:#6b7280;margin-top:2px;">Previous pole (${prevPole.id}): <strong style="color:#1e40af;">${prevData.fiberTic}</strong></div>`;
      }

      html += `<label>Attachment Type</label>`;
      html += `<select id="attach_${pole.id}">
        <option value="lash">Lashed</option>
        <option value="overlash">Overlashed</option>
        <option value="self-support">Self-Supporting</option>
        <option value="clamp">Clamped</option>
      </select>`;

      html += `<label>Attachment Height (ft)</label>`;
      html += `<input type="number" id="height_${pole.id}" placeholder="e.g. 18" value="18">`;
    } else {
      // Buried
      html += `<label>🔵 Fiber Tic Mark at this point</label>`;
      html += `<input type="number" id="fiberTic_${pole.id}" placeholder="e.g. 2500" style="font-size:18px;font-weight:800;text-align:center;color:#1e40af;">`;
      if (prevData && prevData.fiberTic) {
        html += `<div style="font-size:10px;color:#6b7280;margin-top:2px;">Previous point (${prevPole.id}): <strong style="color:#1e40af;">${prevData.fiberTic}</strong></div>`;
      }

      html += `<input type="number" id="depth_${pole.id}" placeholder="e.g. 30" value="30">`;

      html += `<label>Method</label>`;
      html += `<select id="method_${pole.id}">
        <option value="plow">Plow</option>

      <button class="btn-save" onclick="savePole('${pole.id}')">✅ Save Tic Marks</button>

  }

  html += `</div>`;

  marker.unbindPopup();
  marker.bindPopup(html, {maxWidth:320, minWidth:280}).openPopup();
}

function getPreviousPole(pole) {
  const idx = POLES.indexOf(pole);
  if (idx <= 0) return null;
  // Find previous on same road
  for (let i = idx - 1; i >= 0; i--) {
    if (POLES[i].road === pole.road) return POLES[i];
  }
  return null;
}

// ═══════════════════════════════════════════
// SAVE POLE DATA
// ═══════════════════════════════════════════
function savePole(poleId) {
  const pole = POLES.find(p => p.id === poleId);
  const strandEl = document.getElementById(`strandTic_${poleId}`);
  const fiberEl = document.getElementById(`fiberTic_${poleId}`);
  const notesEl = document.getElementById(`notes_${poleId}`);
  const attachEl = document.getElementById(`attach_${poleId}`);
  const heightEl = document.getElementById(`height_${poleId}`);
  const depthEl = document.getElementById(`depth_${poleId}`);
  const methodEl = document.getElementById(`method_${poleId}`);

  const strandTic = strandEl ? strandEl.value : '';
  const fiberTic = fiberEl ? fiberEl.value : '';

  if (!strandTic && !fiberTic) {
    alert('Enter at least one tic mark reading!');
    return;
  }

  // Calculate footage from previous pole
  const prevPole = getPreviousPole(pole);
  const prevData = prevPole ? poleData[prevPole.id] : null;
  let footage = '';
  if (prevData) {
    if (fiberTic && prevData.fiberTic) {
      footage = Math.abs(parseInt(fiberTic) - parseInt(prevData.fiberTic));
    } else if (strandTic && prevData.strandTic) {
      footage = Math.abs(parseInt(strandTic) - parseInt(prevData.strandTic));
    }
  }

  const now = new Date();
  poleData[poleId] = {
    strandTic,
    fiberTic,
    footage,
    cableType: pole.cableType,
    attachment: attachEl ? attachEl.value : (methodEl ? methodEl.value : ''),
    height: heightEl ? heightEl.value : '',
    depth: depthEl ? depthEl.value : '',
    notes: notesEl ? notesEl.value : '',
    timestamp: now.toLocaleString(),
    lat: pole.lat,
    lon: pole.lon
  };

  // Update marker icon to completed
  const marker = poleMarkers[poleId];
  marker.setIcon(createPoleIcon(pole, true));

  // Draw completed line from previous pole
  if (prevPole && prevData) {
    const color = pole.cableType === 'buried' ? '#f97316' : '#fbbf24';
    const fiberColor = '#3b82f6';

    // Strand line (if aerial)
    if (strandTic && pole.cableType === 'aerial') {
      const line = L.polyline([[prevPole.lat, prevPole.lon], [pole.lat, pole.lon]], {
        color: '#fbbf24', weight: 5, opacity: 0.9
      }).addTo(map);
      completedLines.push(line);

      // Footage label on line
      const midLat = (prevPole.lat + pole.lat) / 2;
      const midLon = (prevPole.lon + pole.lon) / 2;
      if (footage) {
        const label = L.marker([midLat, midLon - 0.0002], {
          icon: L.divIcon({
            className: '',
            html: `<div class="tic-label tic-label-strand">${footage}'</div>`,
            iconSize: [50, 20], iconAnchor: [25, 10]
          })
        }).addTo(map);
        ticLabels.push(label);
      }
    }

    // Fiber line
    if (fiberTic) {
      const offset = pole.cableType === 'aerial' ? 0.00008 : 0;
      const line = L.polyline(
        [[prevPole.lat + offset, prevPole.lon], [pole.lat + offset, pole.lon]],
        { color: pole.cableType === 'buried' ? '#f97316' : '#3b82f6', weight: 4, opacity: 0.85, dashArray: pole.cableType === 'buried' ? '8,4' : null }
      ).addTo(map);
      completedLines.push(line);
    }
  }

  // Add tic mark labels at pole
  if (strandTic) {
    const label = L.marker([pole.lat, pole.lon + 0.0003], {
      icon: L.divIcon({
        className: '',
        html: `<div class="tic-label tic-label-strand">S: ${strandTic}</div>`,
        iconSize: [70, 20], iconAnchor: [0, 10]
      })
    }).addTo(map);
    ticLabels.push(label);
  }
  if (fiberTic) {
    const label = L.marker([pole.lat - 0.00015, pole.lon + 0.0003], {
      icon: L.divIcon({
        className: '',
        html: `<div class="tic-label tic-label-fiber">F: ${fiberTic}</div>`,
        iconSize: [70, 20], iconAnchor: [0, 10]
      })
    }).addTo(map);
    ticLabels.push(label);
  }

  // Close popup and update stats
  marker.closePopup();
  updateStats();

  // Vibrate
  if (navigator.vibrate) navigator.vibrate(100);
}

// ═══════════════════════════════════════════
// CLEAR / UNDO
// ═══════════════════════════════════════════
function clearPole(poleId) {
  const pole = POLES.find(p => p.id === poleId);
  delete poleData[poleId];
  const marker = poleMarkers[poleId];
  marker.setIcon(createPoleIcon(pole, false));
  marker.closePopup();
  // Note: lines/labels not removed for simplicity — full version would track per-pole
  updateStats();
}

function undoLast() {
  const keys = Object.keys(poleData);
  if (keys.length === 0) return;
  const lastKey = keys[keys.length - 1];
  clearPole(lastKey);
}

// ═══════════════════════════════════════════
// UPDATE STATS
// ═══════════════════════════════════════════
function updateStats() {
  let totalStrand = 0, totalFiber = 0, totalBuried = 0;
  let doneCount = 0;

  Object.values(poleData).forEach(d => {
    if (d.footage) {
      if (d.cableType === 'buried') {
        totalBuried += parseInt(d.footage);
      } else {
        if (d.strandTic) totalStrand += parseInt(d.footage);
        if (d.fiberTic) totalFiber += parseInt(d.footage);
      }
    }
    doneCount++;
  });

  document.getElementById('strandFt').textContent = totalStrand.toLocaleString() + "'";
  document.getElementById('fiberFt').textContent = totalFiber.toLocaleString() + "'";
  document.getElementById('buriedFt').textContent = totalBuried.toLocaleString() + "'";
  document.getElementById('polesDone').textContent = `${doneCount}/${POLES.length}`;

  const pct = Math.round((doneCount / POLES.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';

  // Update progress ring
  const circumference = 2 * Math.PI * 18; // r=18
  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('progressCircle').style.strokeDashoffset = offset;
  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = `${doneCount}/${POLES.length} poles`;
}

// ═══════════════════════════════════════════
// REPORT
// ═══════════════════════════════════════════
function showReport() {
  let html = `<table><thead><tr><th>Pole</th><th>Road</th><th>Strand Tic</th><th>Fiber Tic</th><th>Span (ft)</th><th>Status</th></tr></thead><tbody>`;
  POLES.forEach(pole => {
    const d = poleData[pole.id];
    const cls = d ? 'row-done' : 'row-pending';
    html += `<tr class="${cls}">
      <td><strong>${pole.id}</strong></td>
      <td style="font-size:11px;">${pole.road}</td>
      <td style="font-weight:700;color:${d?'#b45309':'#9ca3af'};">${d ? (d.strandTic || '—') : '—'}</td>
      <td style="font-weight:700;color:${d?'#1e40af':'#9ca3af'};">${d ? (d.fiberTic || '—') : '—'}</td>
      <td>${d && d.footage ? d.footage + "'" : '—'}</td>
      <td>${d ? '✅' : '⏳'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  // Totals
  let ts=0,tf=0,tb=0;
  Object.values(poleData).forEach(d => {
    if(d.footage){
      if(d.cableType==='buried') tb+=parseInt(d.footage);
      else { if(d.strandTic) ts+=parseInt(d.footage); if(d.fiberTic) tf+=parseInt(d.footage); }
    }
  });
  html += `<div style="margin-top:16px;padding:12px;background:#f3f0ff;border-radius:8px;">
    <strong style="color:#5b21b6;">📊 Totals</strong><br>
    <span style="color:#b45309;">Strand: ${ts.toLocaleString()}'</span> · 
    <span style="color:#1e40af;">Fiber: ${tf.toLocaleString()}'</span> · 
    <span style="color:#ea580c;">Buried: ${tb.toLocaleString()}'</span> · 
    <span style="color:#059669;">Completed: ${Object.keys(poleData).length}/${POLES.length} poles</span>
  </div>`;

  document.getElementById('reportContent').innerHTML = html;
  document.getElementById('reportModal').classList.add('active');
}

function closeReport() {
  document.getElementById('reportModal').classList.remove('active');
}

// ═══════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════
function exportCSV() {
  let csv = 'Pole ID,Road,Lat,Lon,Cable Type,Strand Tic,Fiber Tic,Span Footage,Attachment,Height,Notes,Timestamp\\n';
  POLES.forEach(pole => {
    const d = poleData[pole.id] || {};
    csv += `${pole.id},${pole.road},${pole.lat},${pole.lon},${pole.cableType},${d.strandTic||''},${d.fiberTic||''},${d.footage||''},${d.attachment||''},${d.height||''},${(d.notes||'').replace(/,/g,';')},${d.timestamp||''}\\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'asbuilt_ticmarks_SEFH9384.csv';
  a.click();
}
