<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>As-Built — GPS Tic Mark Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#fff;overflow:hidden;height:100vh}
#map{width:100%;height:100vh;z-index:1}

/* Top header bar */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:linear-gradient(135deg,#1a0a2e,#0d1117);border-bottom:2px solid #7c3aed;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:14px;color:#fbbf24;font-family:'Georgia',serif;letter-spacing:1px}
.header .job-id{font-size:11px;color:#a78bfa;margin-left:8px}
.header .stats{display:flex;gap:12px;font-size:11px}
.header .stat{display:flex;align-items:center;gap:4px}
.header .stat .dot{width:8px;height:8px;border-radius:50%}

/* Mode toggle bar */
.mode-bar{position:fixed;top:44px;left:0;right:0;z-index:999;background:rgba(13,17,23,0.95);border-bottom:1px solid #333;display:flex;padding:6px;gap:6px}
.mode-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.3s}
.mode-btn.active{color:#fff;transform:scale(1.02)}
.mode-btn:not(.active){background:#1a1a2e;color:#888}
.mode-btn.survey{background:linear-gradient(135deg,#059669,#10b981)}
.mode-btn.asbuilt{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
.mode-btn.report{background:linear-gradient(135deg,#d97706,#fbbf24);color:#000}

/* GPS accuracy badge */
.gps-badge{position:fixed;top:90px;right:10px;z-index:998;padding:6px 10px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.gps-badge.good{background:rgba(16,185,129,0.2);border:1px solid #10b981;color:#10b981}
.gps-badge.fair{background:rgba(251,191,36,0.2);border:1px solid #fbbf24;color:#fbbf24}
.gps-badge.poor{background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#ef4444}
.gps-pulse{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}

/* Pole popup */
.pole-popup{min-width:320px;max-width:360px}
.pole-popup .pole-header{background:linear-gradient(135deg,#1a0a2e,#2d1b69);padding:12px;border-radius:10px 10px 0 0;margin:-1px -1px 0 -1px}
.pole-popup .pole-id{font-size:16px;font-weight:800;color:#fbbf24}
.pole-popup .pole-loc{font-size:10px;color:#a78bfa;margin-top:2px}
.pole-popup .pole-status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-top:4px}
.pole-popup .status-pending{background:#374151;color:#9ca3af}
.pole-popup .status-surveyed{background:rgba(16,185,129,0.2);color:#10b981;border:1px solid #10b981}
.pole-popup .status-complete{background:rgba(124,58,237,0.2);color:#a78bfa;border:1px solid #7c3aed}

.pole-popup .section{padding:10px 12px;border-bottom:1px solid #333}
.pole-popup .section-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:6px;font-weight:700}

/* GPS "I'm Here" button */
.btn-here{width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;margin-bottom:8px}
.btn-here.capture{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 0 20px rgba(16,185,129,0.4)}
.btn-here.captured{background:linear-gradient(135deg,#1a1a2e,#2d1b69);color:#a78bfa;border:2px solid #7c3aed}
.btn-here:active{transform:scale(0.97)}

/* Measurement display */
.measurement-box{background:#0d1117;border:1px solid #333;border-radius:8px;padding:10px;margin:6px 0}
.measurement-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.measurement-row .label{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.measurement-row .value{font-size:14px;font-weight:800}
.measurement-row .value.gps{color:#10b981}
.measurement-row .value.tic{color:#fbbf24}
.measurement-row .value.variance{color:#ef4444}
.measurement-row .value.ok{color:#10b981}

/* Input fields */
.tic-input{width:100%;padding:10px;background:#1a1a2e;border:2px solid #333;border-radius:8px;color:#fff;font-size:16px;font-weight:700;text-align:center;outline:none;transition:border 0.3s}
.tic-input:focus{border-color:#7c3aed}
.tic-input::placeholder{color:#555}
.input-row{display:flex;gap:8px;margin:6px 0}
.input-row .tic-input{flex:1}
.input-label{font-size:11px;color:#888;margin-bottom:4px;display:flex;align-items:center;gap:4px}

/* Attachment selector */
.attach-options{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.attach-opt{padding:6px 10px;border-radius:6px;font-size:11px;border:1px solid #333;background:#1a1a2e;color:#888;cursor:pointer;transition:all 0.2s}
.attach-opt.selected{border-color:#7c3aed;background:rgba(124,58,237,0.2);color:#a78bfa}

/* Action buttons */
.btn-row{display:flex;gap:6px;padding:8px 12px}
.action-btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.action-btn:active{transform:scale(0.95)}
.btn-save{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.btn-photo{background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff}
.btn-note{background:linear-gradient(135deg,#d97706,#fbbf24);color:#000}
.btn-skip{background:#374151;color:#888}

/* Span line labels on map */
.span-label{background:rgba(0,0,0,0.85);color:#10b981;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:800;border:1px solid #10b981;white-space:nowrap;font-family:monospace}
.span-label.variance{border-color:#ef4444;color:#ef4444}
.tic-label{background:rgba(0,0,0,0.85);padding:2px 6px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap;font-family:monospace}
.tic-label.strand{color:#fbbf24;border:1px solid #fbbf24}
.tic-label.fiber{color:#38bdf8;border:1px solid #38bdf8}

/* Report panel */
.report-panel{position:fixed;bottom:0;left:0;right:0;z-index:1001;background:#0d1117;border-top:2px solid #7c3aed;border-radius:16px 16px 0 0;max-height:60vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease}
.report-panel.open{transform:translateY(0)}
.report-panel .rp-header{position:sticky;top:0;background:#0d1117;padding:12px 16px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.report-panel h2{font-size:16px;color:#fbbf24}
.report-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer}
.report-table{width:100%;font-size:11px;border-collapse:collapse}
.report-table th{background:#1a1a2e;padding:8px;text-align:left;color:#a78bfa;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:48px}
.report-table td{padding:6px 8px;border-bottom:1px solid #1a1a2e}
.report-table tr:nth-child(even){background:rgba(26,10,46,0.3)}
.report-table .gps-val{color:#10b981;font-weight:700}
.report-table .tic-val{color:#fbbf24;font-weight:700}
.report-table .var-bad{color:#ef4444;font-weight:700}
.report-table .var-ok{color:#10b981}

/* Path tracker */
.path-indicator{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:998;background:linear-gradient(135deg,#059669,#10b981);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;display:none;align-items:center;gap:8px;box-shadow:0 0 30px rgba(16,185,129,0.5);animation:slideUp 0.3s ease}
.path-indicator.active{display:flex}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* Legend */
.legend{position:fixed;bottom:10px;left:10px;z-index:998;background:rgba(13,17,23,0.95);border:1px solid #333;border-radius:10px;padding:8px 12px;font-size:10px}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0}
.legend-line{width:20px;height:3px;border-radius:2px}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* Tracking banner */
.tracking-banner{position:fixed;top:90px;left:10px;z-index:998;background:rgba(16,185,129,0.15);border:1px solid #10b981;border-radius:10px;padding:8px 12px;font-size:12px;color:#10b981;display:none;align-items:center;gap:6px;max-width:200px;animation:slideIn 0.3s ease}
.tracking-banner.active{display:flex}
@keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:#1a1a2e!important;color:#fff!important;border-radius:12px!important;border:1px solid #7c3aed!important;box-shadow:0 0 30px rgba(124,58,237,0.3)!important}
.leaflet-popup-tip{background:#1a1a2e!important;border:1px solid #7c3aed!important}
.leaflet-popup-content{margin:0!important;padding:0!important;min-width:320px}
.leaflet-popup-close-button{color:#888!important;font-size:18px!important;top:8px!important;right:8px!important;z-index:10}
.leaflet-control-layers{background:#1a1a2e!important;border:1px solid #333!important;color:#fff!important;border-radius:8px!important}
</style>
</head>

// ======== HAVERSINE ========
function haversine(lat1,lon1,lat2,lon2){
  const R=20902231;// feet
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ======== GPS ========
function initGPS(){
  if(!navigator.geolocation){
    document.getElementById('gpsText').textContent='GPS: Not Available';
    document.getElementById('gpsBadge').className='gps-badge poor';
    return;
  }
  navigator.geolocation.watchPosition(pos=>{
    gpsLat=pos.coords.latitude;
    gpsLon=pos.coords.longitude;
    gpsAccuracy=pos.coords.accuracy;
    const badge=document.getElementById('gpsBadge');
    const text=document.getElementById('gpsText');
    if(gpsAccuracy<5){
      badge.className='gps-badge good';
      badge.querySelector('.gps-pulse').style.background='#10b981';
      text.textContent='GPS: ±'+gpsAccuracy.toFixed(1)+'ft ★';
    } else if(gpsAccuracy<15){
      badge.className='gps-badge good';
      badge.querySelector('.gps-pulse').style.background='#10b981';
      text.textContent='GPS: ±'+gpsAccuracy.toFixed(1)+'ft';
    } else if(gpsAccuracy<50){
      badge.className='gps-badge fair';
      badge.querySelector('.gps-pulse').style.background='#fbbf24';
      text.textContent='GPS: ±'+gpsAccuracy.toFixed(1)+'ft';
    } else {
      badge.className='gps-badge poor';
      badge.querySelector('.gps-pulse').style.background='#ef4444';
      text.textContent='GPS: ±'+gpsAccuracy.toFixed(0)+'ft ⚠️';
    }
    // Track path if active
    if(isTracking&&trackingPath.length>0){
      const last=trackingPath[trackingPath.length-1];
      const dist=haversine(last.lat,last.lon,gpsLat,gpsLon);
      if(dist>3){// Only add if moved 3+ feet
        trackingPath.push({lat:gpsLat,lon:gpsLon});
        updatePathIndicator();
      }
    }
  },err=>{
    document.getElementById('gpsText').textContent='GPS: Error ('+err.message+')';
    document.getElementById('gpsBadge').className='gps-badge poor';
  },{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
}

function getPathDistance(){
  let total=0;
  for(let i=1;i<trackingPath.length;i++){
    total+=haversine(trackingPath[i-1].lat,trackingPath[i-1].lon,trackingPath[i].lat,trackingPath[i].lon);
  }
  return Math.round(total);
}

function updatePathIndicator(){
  const el=document.getElementById('pathIndicator');
  const text=document.getElementById('pathText');
  if(isTracking){
    el.classList.add('active');
    text.textContent='Walking: '+getPathDistance()+' ft tracked ('+trackingPath.length+' pts)';
  } else {
    el.classList.remove('active');
  }
}

function startTracking(){
  isTracking=true;
  trackingPath=[{lat:gpsLat||34.1597,lon:gpsLon||-84.4158}];
  document.getElementById('trackingBanner').classList.add('active');
  document.getElementById('trackingText').textContent='📡 Tracking path to next pole...';
  updatePathIndicator();
}

function stopTracking(){
  isTracking=false;
  document.getElementById('trackingBanner').classList.remove('active');
  document.getElementById('pathIndicator').classList.remove('active');
  const distance=getPathDistance();
  trackingPath=[];
  return distance;
}

function createPoleMarker(pole,data){
  let color='#6b7280';
  let glow='';
  let inner=pole.id.replace('P-','');
  let size=20;
  if(data&&data.status==='complete'){
    color='#7c3aed';
    glow='box-shadow:0 0 12px rgba(124,58,237,0.5);';
    inner='✓';
  } else if(data&&data.status==='surveyed'){
    color='#10b981';
    glow='box-shadow:0 0 12px rgba(16,185,129,0.5);';
  }

  const isAnchor=pole.type==='anchor';
  const shape=isAnchor?'3px':'50%';

  const marker=L.marker([pole.lat,pole.lon],{
    icon:L.divIcon({
      className:'',
      html:'<div style="width:'+size+'px;height:'+size+'px;background:'+color+';border:2px solid #fff;border-radius:'+shape+';display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;'+glow+'cursor:pointer">'+(isAnchor?'⚓':inner)+'</div>',
      iconSize:[size,size],
      iconAnchor:[size/2,size/2]
    }),
    zIndexOffset:100
  }).addTo(map);

  marker.on('click',()=>openPolePopup(pole));
  return marker;
}

function getPreviousPole(poleId){
  const idx=poles.findIndex(p=>p.id===poleId);
  // Find connected previous (same road segment logic)
  const currentRoad=poles[idx]?.road;
  for(let i=idx-1;i>=0;i--){
    if(poles[i].road===currentRoad||poles[i].road.includes(currentRoad.split(' ')[0])){
      return poles[i].id;
    }
  }
  return idx>0?poles[idx-1].id:null;
}

function captureGPS(poleId){
  if(!gpsLat){
    alert('GPS not available yet — wait for a fix');
    return;
  }
  if(!poleData[poleId]) poleData[poleId]={};
  poleData[poleId].gpsLat=gpsLat;
  poleData[poleId].gpsLon=gpsLon;
  poleData[poleId].gpsAccuracy=gpsAccuracy;
  poleData[poleId].timestamp=new Date().toLocaleString();

  // Vibrate
  if(navigator.vibrate) navigator.vibrate(100);

  // Recalculate GPS distance from previous pole
  const prevId=getPreviousPole(poleId);
  if(prevId&&poleData[prevId]&&poleData[prevId].gpsLat){
    poleData[poleId].gpsFootageFromPrev=Math.round(haversine(poleData[prevId].gpsLat,poleData[prevId].gpsLon,gpsLat,gpsLon));
  }

  // Refresh popup
  const pole=poles.find(p=>p.id===poleId);
  if(pole) openPolePopup(pole);
  updateStats();
}

function selectAttach(poleId,opt,el){
  document.querySelectorAll('#attachOpts_'+poleId+' .attach-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  if(!poleData[poleId]) poleData[poleId]={};
  poleData[poleId].attachment=opt;
}

function savePole(poleId){
  const strandEl=document.getElementById('strandTic_'+poleId);
  const fiberEl=document.getElementById('fiberTic_'+poleId);
  const heightEl=document.getElementById('height_'+poleId);
  const notesEl=document.getElementById('notes_'+poleId);

  if(!poleData[poleId]) poleData[poleId]={};
  const d=poleData[poleId];
  d.strandTic=parseInt(strandEl.value)||0;
  d.fiberTic=parseInt(fiberEl.value)||0;
  d.height=heightEl.value;
  d.notes=notesEl.value;
  d.timestamp=d.timestamp||new Date().toLocaleString();

  // Calculate tic footage from previous
  const prevId=getPreviousPole(poleId);
  if(prevId&&poleData[prevId]){
    d.ticFootageFromPrev=d.strandTic-poleData[prevId].strandTic;
  }

  // Set status
  if(d.gpsLat&&d.strandTic){
    d.status='complete';
  } else if(d.gpsLat||d.strandTic){
    d.status='surveyed';
  }

  // Vibrate + sound
  if(navigator.vibrate) navigator.vibrate([50,30,100]);
  try{
    const ctx=new AudioContext();
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;g.gain.value=0.15;
    o.start();o.stop(ctx.currentTime+0.1);
  }catch(e){}

  // Update marker
  const pole=poles.find(p=>p.id===poleId);
  if(pole){
    map.removeLayer(poleMarkers[poleId]);
    poleMarkers[poleId]=createPoleMarker(pole,d);
  }

  drawAsBuiltLines();
  updateStats();
  map.closePopup();
}

function takePhoto(poleId){
  alert('📸 Camera would open here — photo attached to '+poleId+' with GPS tag');
}

function startTrackingTo(poleId){
  startTracking();
  map.closePopup();
}

function stopTrackingAt(poleId){
  const dist=stopTracking();
  if(!poleData[poleId]) poleData[poleId]={};
  poleData[poleId].walkedDistance=dist;
  const pole=poles.find(p=>p.id===poleId);
  if(pole) openPolePopup(pole);
}

// ======== DRAW AS-BUILT LINES ========
let asBuiltLayers=[];
function drawAsBuiltLines(){
  // Remove old
  asBuiltLayers.forEach(l=>map.removeLayer(l));
  asBuiltLayers=[];

  // Group poles by road segment
  const roads={};
  poles.forEach(p=>{
    const road=p.road.split('@')[0].trim();
    if(!roads[road]) roads[road]=[];
    roads[road].push(p);
  });

  Object.entries(roads).forEach(([road,roadPoles])=>{
    for(let i=1;i<roadPoles.length;i++){
      const prev=roadPoles[i-1];
      const curr=roadPoles[i];
      const pd=poleData[prev.id];
      const cd=poleData[curr.id];

      // Designed route (faint dashed)
      const designed=L.polyline([[prev.lat,prev.lon],[curr.lat,curr.lon]],{
        color:'#555',weight:1,dashArray:'8,6',opacity:0.4
      }).addTo(map);
      asBuiltLayers.push(designed);

      // As-built (solid glow) — only if both poles have data
      if(pd&&cd&&pd.status&&cd.status){
        // Strand line (yellow)
        if(pd.strandTic!==undefined&&cd.strandTic!==undefined){
          const fromPt=pd.gpsLat?[pd.gpsLat,pd.gpsLon]:[prev.lat,prev.lon];
          const toPt=cd.gpsLat?[cd.gpsLat,cd.gpsLon]:[curr.lat,curr.lon];

          // Glow
          const glow=L.polyline([fromPt,toPt],{color:'#fbbf24',weight:6,opacity:0.25}).addTo(map);
          const strand=L.polyline([fromPt,toPt],{color:'#fbbf24',weight:3,opacity:0.9}).addTo(map);
          asBuiltLayers.push(glow,strand);

          // Fiber line (blue, slightly offset)
          const fiberGlow=L.polyline([fromPt,toPt],{color:'#38bdf8',weight:5,opacity:0.2}).addTo(map);
          const fiber=L.polyline([fromPt,toPt],{color:'#38bdf8',weight:2,opacity:0.8,dashArray:'10,4'}).addTo(map);
          asBuiltLayers.push(fiberGlow,fiber);

          // Footage label
          const midLat=(fromPt[0]+toPt[0])/2;
          const midLon=(fromPt[1]+toPt[1])/2;
          const gpsF=cd.gpsFootageFromPrev||'';
          const ticF=cd.ticFootageFromPrev||'';
          const variance=gpsF&&ticF?Math.abs(gpsF-ticF):0;
          const varClass=variance>15?'variance':'';

          let labelHtml='<div class="span-label '+varClass+'">';
          if(gpsF) labelHtml+='📍'+gpsF+"'";
          if(gpsF&&ticF) labelHtml+=' · ';
          if(ticF) labelHtml+='🏷️'+ticF+"'";
          if(variance>15) labelHtml+=' ⚠️'+variance+"'";
          labelHtml+='</div>';

          const label=L.marker([midLat,midLon],{icon:L.divIcon({className:'',html:labelHtml,iconSize:[0,0]})}).addTo(map);
          asBuiltLayers.push(label);
        }

        // Tic mark labels at poles
        if(cd.strandTic){
          const pos=cd.gpsLat?[cd.gpsLat,cd.gpsLon]:[curr.lat,curr.lon];
          const ticHtml='<div style="transform:translate(14px,-8px)"><div class="tic-label strand">S:'+cd.strandTic+'</div>'+(cd.fiberTic?'<div class="tic-label fiber" style="margin-top:1px">F:'+cd.fiberTic+'</div>':'')+'</div>';
          const ticMarker=L.marker(pos,{icon:L.divIcon({className:'',html:ticHtml,iconSize:[0,0]})}).addTo(map);
          asBuiltLayers.push(ticMarker);
        }
      }
    }
  });
}

// ======== STATS ========
function updateStats(){
  let surveyed=0,complete=0,footage=0;
  Object.values(poleData).forEach(d=>{
    if(d.status==='surveyed') surveyed++;
    if(d.status==='complete') complete++;
    if(d.gpsFootageFromPrev) footage+=d.gpsFootageFromPrev;
    if(!d.gpsFootageFromPrev&&d.ticFootageFromPrev) footage+=d.ticFootageFromPrev;
  });
  document.getElementById('statSurveyed').textContent=surveyed;
  document.getElementById('statComplete').textContent=complete;
  document.getElementById('statFootage').textContent=footage.toLocaleString();
}

// ======== MODES ========
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  if(mode==='survey') document.querySelector('.mode-btn.survey').classList.add('active');
  if(mode==='asbuilt') document.querySelector('.mode-btn.asbuilt').classList.add('active');
  if(mode==='report') document.querySelector('.mode-btn.report').classList.add('active');

  const rp=document.getElementById('reportPanel');
  if(mode==='report'){
    rp.classList.add('open');
    buildReport();
  } else {
    rp.classList.remove('open');
  }
}

function buildReport(){
  let html='<table class="report-table"><thead><tr>';
  html+='<th>Pole</th><th>Road</th><th>Strand Tic</th><th>Fiber Tic</th><th>GPS Dist</th><th>Tic Dist</th><th>Variance</th><th>Attach</th><th>Status</th>';
  html+='</tr></thead><tbody>';

  poles.forEach(p=>{
    const d=poleData[p.id]||{};
    const gps=d.gpsFootageFromPrev||'—';
    const tic=d.ticFootageFromPrev||'—';
    const variance=(typeof gps==='number'&&typeof tic==='number')?Math.abs(gps-tic):'—';
    const varClass=typeof variance==='number'&&variance>15?'var-bad':'var-ok';
    const status=d.status==='complete'?'✅':d.status==='surveyed'?'📍':'⬜';

    html+='<tr>';
    html+='<td style="font-weight:700;color:#a78bfa">'+p.id+'</td>';
    html+='<td style="color:#888;font-size:10px">'+p.road+'</td>';
    html+='<td class="tic-val">'+(d.strandTic||'—')+'</td>';
    html+='<td class="tic-val">'+(d.fiberTic||'—')+'</td>';
    html+='<td class="gps-val">'+(typeof gps==='number'?gps+"'":'—')+'</td>';
    html+='<td class="tic-val">'+(typeof tic==='number'?tic+"'":'—')+'</td>';
    html+='<td class="'+varClass+'">'+(typeof variance==='number'?variance+"'":'—')+'</td>';
    html+='<td style="color:#888;font-size:10px">'+(d.attachment||p.attachment)+'</td>';
    html+='<td>'+status+'</td>';
    html+='</tr>';
  });

  html+='</tbody></table>';
  document.getElementById('reportContent').innerHTML=html;
}

function exportCSV(){
  let csv='Pole,Road,Lat,Lon,GPS Lat,GPS Lon,Strand Tic,Fiber Tic,GPS Distance,Tic Distance,Variance,Attachment,Height,Status,Notes,Timestamp\n';
  poles.forEach(p=>{
    const d=poleData[p.id]||{};
    csv+=p.id+','+p.road+','+p.lat+','+p.lon+','+(d.gpsLat||'')+','+(d.gpsLon||'')+','+(d.strandTic||'')+','+(d.fiberTic||'')+','+(d.gpsFootageFromPrev||'')+','+(d.ticFootageFromPrev||'')+','+(d.gpsFootageFromPrev&&d.ticFootageFromPrev?Math.abs(d.gpsFootageFromPrev-d.ticFootageFromPrev):'')+','+(d.attachment||p.attachment)+','+(d.height||p.height)+','+(d.status||'pending')+','+(d.notes||'')+','+(d.timestamp||'')+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='asbuilt_SEFH9384_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ======== INIT ========
initMap();
initGPS();
updateStats();
</script>
