          }
          var entryId = user.uid + '_' + date;
          var existing = asBuiltData[selectedPole.id] || {};
          var existingEntries = existing.entries || {};
          existingEntries[entryId] = {
            userId: user.uid,
            userName: user.displayName || user.email.split('@')[0],
            userPhoto: avatarURL || user.photoURL || null,
            date: date,
            codes: entries,

          await db.collection('fiberAsBuilt').doc(selectedPole.id).set({
            siteId: selectedPole.id,
            siteName: selectedPole.name,
            lat: selectedPole.lat,
            lon: selectedPole.lon,
            entries: existingEntries,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          setSaved(true);
          if (navigator.vibrate) navigator.vibrate(100);
          setTimeout(function() { setShowLogForm(false); setFormQty({}); setFormNotes(''); setSaved(false); setSelectedPole(null); }, 800);

          if (!navigator.onLine) {
            setSaved(true);
            if (navigator.vibrate) navigator.vibrate(100);

        setSaving(false);

        try {
          var pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(
              function(p) { resolve({ lat: p.coords.latitude, lon: p.coords.longitude, accuracy: p.coords.accuracy }); },
              function(e) { reject(e); },
              { enableHighAccuracy: true, timeout: 15000 }

          });
          await db.collection('fiberPinCorrections').doc(selectedPole.id).set({

      // ── Capture & upload geotagged photo ──
      async function capturePolePhoto(file) {
        if (!file || !selectedPole) return;
        setUploadingPhoto(true);
        try {
          // Compress image
          var canvas = document.createElement('canvas');
          var img = new Image();
          var dataUrl = await new Promise(function(resolve) {
            var reader = new FileReader();
            reader.onload = function(e) { resolve(e.target.result); };
            reader.readAsDataURL(file);
          });
          await new Promise(function(resolve) { img.onload = resolve; img.src = dataUrl; });
          var maxDim = 1200;
          var w = img.width, h = img.height;
          if (w > maxDim || h > maxDim) {
            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
            else { w = Math.round(w * maxDim / h); h = maxDim; }
          }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          var compressed = canvas.toDataURL('image/jpeg', 0.6);

          // Get GPS
          var gps = null;
          try {
            var gpsPos = await new Promise(function(resolve, reject) {
              navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
            });
            gps = { lat: gpsPos.coords.latitude, lon: gpsPos.coords.longitude, accuracy: Math.round(gpsPos.coords.accuracy) };
          } catch(ge) {}

          await db.collection('fiberPolePhotos').doc(selectedPole.id).collection('photos').add({
            imageData: compressed,
            siteId: selectedPole.id,
            siteName: selectedPole.name,
            userId: user.uid,
            userName: user.displayName || user.email.split('@')[0],
            userPhoto: avatarURL || user.photoURL || null,
            gps: gps,
            createdAt: new Date().toISOString(),
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          if (navigator.vibrate) navigator.vibrate(30);
        } catch(e) {
          if (navigator.onLine) alert('Photo upload failed: ' + e.message);
        }
        setUploadingPhoto(false);
      }

          snap.forEach(function(doc) { trims.push(Object.assign({ id: doc.id }, doc.data())); });

      // ── Firestore listener for fiber en-route claims — auto-expire after 2 hours ──
      useEffect(function() {
        return db.collection('fiberEnroute').onSnapshot(function(snap) {
          var data = {};
          var now = Date.now();
          snap.forEach(function(doc) {
            var d = doc.data();
            var claimedAt = d.claimedAt && d.claimedAt.toMillis ? d.claimedAt.toMillis() : (d.claimedAt || 0);
            if (now - claimedAt > 2 * 60 * 60 * 1000) {
              db.collection('fiberEnroute').doc(doc.id).delete().catch(function(){});
              return;
            }
            data[doc.id] = d;
          });
          setFiberEnroutes(data);
        });
      }, []);

      // ── Claim fiber pole en-route ──
      function claimFiberEnroute(poleId) {
        // Clear any existing en-route by this user
        Object.keys(fiberEnroutes).forEach(function(k) {
          if (fiberEnroutes[k].userId === user.uid && k !== poleId) {
            db.collection('fiberEnroute').doc(k).delete().catch(function(){});
          }
        });
        // Write new claim
        var claimData = {
          userId: user.uid,
          userName: user.displayName || user.email,
          userPhoto: avatarURL || user.photoURL || '',
          claimedAt: firebase.firestore.FieldValue.serverTimestamp(),
          poleName: (allFiberSites.find(function(s){return s.id===poleId;})||{}).name || poleId
        };
        // Optimistic update
        setFiberEnroutes(function(prev) {
          var next = Object.assign({}, prev);
          next[poleId] = Object.assign({}, claimData, { claimedAt: Date.now(), userId: user.uid });
          return next;
        });
        db.collection('fiberEnroute').doc(poleId).set(claimData)
          .catch(function(e) { console.error('Fiber en-route claim error:', e); });
      }

      function cancelFiberEnroute(poleId) {
        setFiberEnroutes(function(prev) {
          var next = Object.assign({}, prev);
          delete next[poleId];
          return next;
        });
        db.collection('fiberEnroute').doc(poleId).delete().catch(function(){});
      }

      // ── Fiber pole directions URL ──

        if (/iPad|iPhone|iPod/.test(ua)) {

      // Count work entries per pole
      function getPoleStatus(siteId) {
        var data = asBuiltData[siteId];
        if (!data || !data.entries) return { count: 0, codes: 0 };
        var allEntries = Object.values(data.entries);
        var totalCodes = 0;
        allEntries.forEach(function(e) { totalCodes += Object.keys(e.codes || {}).length; });
        return { count: allEntries.length, codes: totalCodes };
      }

      // Calculate totals (admin only)
      function calcTotals() {
        var total = 0;
        var byCat = {};
        Object.values(asBuiltData).forEach(function(pole) {
          Object.values(pole.entries || {}).forEach(function(entry) {
            Object.keys(entry.codes || {}).forEach(function(code) {
              var qty = entry.codes[code];
              var item = GIGABEAM_CODES.find(function(c) { return c.code === code; });
              if (item) {
                total += qty * item.rate;
                if (!byCat[item.cat]) byCat[item.cat] = 0;
                byCat[item.cat] += qty * item.rate;
              }
            });
          });
        });
        return { total: total, byCat: byCat };
      }

      // ── Update span stage + auto-bill footage ──
      async function updateSpanStage(fromPole, toPole, stage, distFt) {
        var spanId = fromPole.id + '__' + toPole.id;
        await db.collection('fiberSpanStages').doc(spanId).set({
          stage: stage,
          fromId: fromPole.id,
          toId: toPole.id,
          fromName: fromPole.name,
          toName: toPole.name,
          distFt: distFt,
          updatedBy: user.uid,
          updatedByName: user.displayName || user.email.split('@')[0],
          updatedByPhoto: avatarURL || user.photoURL || null,
          updatedAt: new Date().toISOString(),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        // ── AUTO-BILL: footage by stage ──
        var footage = Math.round(distFt || 0);
        if (footage > 0) {
          var today = new Date().toISOString().split('T')[0];
          var autoKey = 'auto_span_' + spanId;
          var billCode = null; var billNote = '';
          // Strand and Cable are visual progress only — no billing
          // Only AE2 (Strand and Lash) bills when lashed or complete
          if (stage === 'strand') { billCode = null; billNote = ''; }
          else if (stage === 'cable') { billCode = null; billNote = ''; }
          else if (stage === 'lashed') { billCode = 'AE2'; billNote = '⚡ Auto: Strand & Lash ' + footage + 'ft (' + fromPole.name + ' → ' + toPole.name + ')'; }
          else if (stage === 'complete') { billCode = 'AE2'; billNote = '⚡ Auto: Strand & Lash (Complete) ' + footage + 'ft (' + fromPole.name + ' → ' + toPole.name + ')'; }
          
          if (billCode) {
            // Write to the "from" pole's production sheet
            var existing = asBuiltData[fromPole.id] || {};
            var entries = Object.assign({}, existing.entries || {});
            entries[autoKey] = {
              userId: user.uid,
              userName: user.displayName || user.email.split('@')[0],
              userPhoto: avatarURL || user.photoURL || null,
              date: today,
              codes: {},
              notes: billNote,
              auto: true,
              spanId: spanId,
              updatedAt: new Date().toISOString()
            };
            entries[autoKey].codes[billCode] = footage;
            await db.collection('fiberAsBuilt').doc(fromPole.id).set({
              siteId: fromPole.id, siteName: fromPole.name,
              lat: fromPole.lat, lon: fromPole.lon,
              entries: entries,
              lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }
          
          // If going back to "none", remove auto entry
          if (stage === 'none') {
            var existing2 = asBuiltData[fromPole.id] || {};
            var entries2 = Object.assign({}, existing2.entries || {});
            if (entries2[autoKey]) {
              delete entries2[autoKey];
              await db.collection('fiberAsBuilt').doc(fromPole.id).update({
                entries: entries2,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
              });
            }
          }
        }
        if (navigator.vibrate) navigator.vibrate(30);
      }

      // ── AUTO-POPULATE: Equipment actions → production sheet entry ──
      async function autoPopulateEquipment(poleId, billingCode, isPlacing) {
        var today = new Date().toISOString().split('T')[0];
        var autoEntryId = 'auto_' + billingCode + '_' + user.uid;
        var poleSite = allFiberSites.find(function(s) { return s.id === poleId; });
        var poleName = poleSite ? poleSite.name : poleId;
        
        var existing = asBuiltData[poleId] || {};
        var existingEntries = Object.assign({}, existing.entries || {});
        
        if (isPlacing) {
          // Add auto-billed entry
          existingEntries[autoEntryId] = {
            userId: user.uid,
            userName: user.displayName || user.email.split('@')[0],
            userPhoto: avatarURL || user.photoURL || null,
            date: today,
            codes: {},
            notes: '⚡ Auto-billed from map action',
            auto: true,
            updatedAt: new Date().toISOString()
          };
          existingEntries[autoEntryId].codes[billingCode] = 1;
        } else {
          // Remove auto-billed entry
          delete existingEntries[autoEntryId];
        }
        
        await db.collection('fiberAsBuilt').doc(poleId).set({
          siteId: poleId,
          siteName: poleName,
          lat: poleSite ? poleSite.lat : 0,
          lon: poleSite ? poleSite.lon : 0,
          entries: existingEntries,
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
      }

      // ── AUTO-POPULATE: Snowshoe → nearest pole production sheet ──
      function findNearestPoleId(lat, lon) {
        var nearest = null; var nearDist = Infinity;
        allFiberSites.forEach(function(s) {
          if (s.type === 'tower' || s.type === 'key') return;
          var d = haversineFt(lat, lon, s.lat, s.lon);
          if (d < nearDist) { nearDist = d; nearest = s; }
        });
        return nearest;
      }

      // ── Generate End-of-Day Report (HTML with map + as-built) ──
      function generateDailyReport() {
        var today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        var ft = calcDailyFootage();
        var tots = calcTotals();
        var todayFt = (ft.today.strand||0) + (ft.today.cable||0) + (ft.today.lashed||0) + (ft.today.complete||0);
        
        // Count equipment
        var anchorCount = 0; var downGuyCount = 0;
        Object.values(fiberEquipment).forEach(function(eq) { if (eq.screwAnchor) anchorCount++; if (eq.downGuy) downGuyCount++; });
        var snowshoeCount = allSnowshoes.length;
        
        // Build span stage summary
        var spanSummary = { none: 0, strand: 0, cable: 0, lashed: 0, complete: 0 };

          spanData._routeSpans.forEach(function(span) {

            var stageLabel = stage === 'none' ? '⬜ Not Started' : stage === 'strand' ? '🟡 Strand' : stage === 'cable' ? '🟠 Cable' : stage === 'lashed' ? '🟢 Lashed' : '✅ Complete';
            var stageColor = stage === 'none' ? '#64748b' : stage === 'strand' ? '#eab308' : stage === 'cable' ? '#f97316' : stage === 'lashed' ? '#22c55e' : '#10b981';
            spanDetails.push('<tr><td style="padding:6px 10px;border-bottom:1px solid #333;color:#ccc;">' + span.from.name + '</td><td style="padding:6px 10px;border-bottom:1px solid #333;color:#ccc;">' + span.to.name + '</td><td style="padding:6px 10px;border-bottom:1px solid #333;color:#fff;font-weight:700;">' + span.dist + ' ft</td><td style="padding:6px 10px;border-bottom:1px solid #333;color:' + stageColor + ';font-weight:700;">' + stageLabel + '</td><td style="padding:6px 10px;border-bottom:1px solid #333;color:#94a3b8;font-size:11px;">' + (stageData.updatedByName || '-') + '</td></tr>');
          });
        }
        
        // Build workers summary
        var workers = {};
        Object.values(asBuiltData).forEach(function(pole) {

            workers[entry.userId].poles.add(pole.siteId || pole.siteName);
            Object.keys(entry.codes || {}).forEach(function(code) {
              workers[entry.userId].codes[code] = (workers[entry.userId].codes[code] || 0) + entry.codes[code];
            });
          });
        });
        
        // Anchor log
        var anchorRows = [];
        Object.keys(fiberEquipment).forEach(function(poleId) {
          var eq = fiberEquipment[poleId];
          var site = allFiberSites.find(function(s){return s.id===poleId;});
          var siteName = site ? site.name : poleId;
          if (eq.screwAnchor) {
            anchorRows.push('<tr><td style="padding:5px 8px;border-bottom:1px solid #333;">⚓ Screw Anchor</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#ccc;">' + siteName + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (eq.screwAnchorBy||'') + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (eq.screwAnchorAt ? new Date(eq.screwAnchorAt).toLocaleString() : '') + '</td></tr>');
          }
          if (eq.downGuy) {
            anchorRows.push('<tr><td style="padding:5px 8px;border-bottom:1px solid #333;">📎 Down Guy</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#ccc;">' + siteName + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (eq.downGuyBy||'') + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (eq.downGuyAt ? new Date(eq.downGuyAt).toLocaleString() : '') + '</td></tr>');
          }
        });
        
        // Snowshoe log
        var snowshoeRows = [];
        allSnowshoes.forEach(function(shoe) {
          snowshoeRows.push('<tr><td style="padding:5px 8px;border-bottom:1px solid #333;">❄️ ' + shoe.ticType.toUpperCase() + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#ccc;">📍 ' + shoe.lat.toFixed(5) + ', ' + shoe.lon.toFixed(5) + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (shoe.placedBy||'') + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + new Date(shoe.placedAt).toLocaleString() + '</td></tr>');
        });
        // Tree trim rows for report
        var treeTrimRows = [];
        var totalTrimFeet = 0;
        allTreeTrims.forEach(function(trim) {
          totalTrimFeet += trim.footage;
          treeTrimRows.push('<tr><td style="padding:5px 8px;border-bottom:1px solid #333;">🌳 ' + trim.footage + ' ft</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#93c5fd;">📍 ' + trim.startLat.toFixed(5) + ',' + trim.startLon.toFixed(5) + ' → ' + trim.endLat.toFixed(5) + ',' + trim.endLon.toFixed(5) + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + (trim.placedBy||'') + '</td><td style="padding:5px 8px;border-bottom:1px solid #333;color:#94a3b8;">' + new Date(trim.completedAt).toLocaleString() + '</td></tr>');
        });

        // Generate canvas-based route map image with span lines
        var mapCanvas = document.createElement('canvas');
        mapCanvas.width = 800; mapCanvas.height = 500;
        var ctx = mapCanvas.getContext('2d');
        // Dark background
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, 800, 500);
        // Calculate bounds
        var minLat = 999, maxLat = -999, minLon = 999, maxLon = -999;
        allFiberSites.forEach(function(s) {
          if (s.lat < minLat) minLat = s.lat;
          if (s.lat > maxLat) maxLat = s.lat;
          if (s.lon < minLon) minLon = s.lon;
          if (s.lon > maxLon) maxLon = s.lon;
        });
        var padLat = (maxLat - minLat) * 0.15 || 0.001;
        var padLon = (maxLon - minLon) * 0.15 || 0.001;
        minLat -= padLat; maxLat += padLat; minLon -= padLon; maxLon += padLon;
        var toX = function(lon) { return 40 + ((lon - minLon) / (maxLon - minLon)) * 720; };
        var toY = function(lat) { return 460 - ((lat - minLat) / (maxLat - minLat)) * 420; };
        // Draw route path if OLT-57
        if (typeof OLT57_DATA !== 'undefined' && activeRouteId === 'olt57' && OLT57_DATA.routePath) {
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(139,92,246,0.3)';
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 4]);
          OLT57_DATA.routePath.forEach(function(pt, i) {
            if (i === 0) ctx.moveTo(toX(pt.lon), toY(pt.lat));
            else ctx.lineTo(toX(pt.lon), toY(pt.lat));
          });
          ctx.stroke();
          ctx.setLineDash([]);
        }
        // Draw span lines with colors
        if (spanData._routeSpans) {
          spanData._routeSpans.forEach(function(span) {
            var sId = span.from.id + '__' + span.to.id;
            var rId = span.to.id + '__' + span.from.id;
            var stageData = spanStages[sId] || spanStages[rId] || { stage: 'none' };
            var stage = stageData.stage || 'none';
            var x1 = toX(span.from.lon), y1 = toY(span.from.lat);
            var x2 = toX(span.to.lon), y2 = toY(span.to.lat);
            if (stage === 'none') {
              ctx.strokeStyle = '#475569'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
            } else if (stage === 'strand') {
              ctx.strokeStyle = '#eab308'; ctx.lineWidth = 3; ctx.setLineDash([]);
            } else if (stage === 'cable') {
              ctx.strokeStyle = '#f97316'; ctx.lineWidth = 3; ctx.setLineDash([]);
            } else {
              ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 3; ctx.setLineDash([]);
            }
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.setLineDash([]);
          });
        }
        // Draw pole markers
        allFiberSites.forEach(function(s) {
          var x = toX(s.lon), y = toY(s.lat);
          var hasWork = !!asBuiltData[s.id];
          ctx.beginPath();
          ctx.arc(x, y, s.poleType === 'transmission' ? 6 : 5, 0, Math.PI * 2);
          ctx.fillStyle = hasWork ? '#22c55e' : s.poleType === 'transmission' ? '#3b82f6' : '#ef4444';
          ctx.fill();
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Label
          ctx.fillStyle = '#e2e8f0';
          ctx.font = '9px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(s.name || s.id, x, y - 9);
        });
        // Draw equipment markers
        Object.keys(fiberEquipment).forEach(function(poleId) {
          var eq = fiberEquipment[poleId];
          var site = allFiberSites.find(function(s){return s.id===poleId;});
          if (!site) return;
          var x = toX(site.lon), y = toY(site.lat);

          if (eq.downGuy) { ctx.fillStyle = '#60a5fa'; ctx.font = '12px sans-serif'; ctx.fillText('📎', x + 10, y + 12); }
        });
        // Tree trim blue lines on canvas
        allTreeTrims.forEach(function(trim) {
          var x1 = toX(trim.startLon), y1 = toY(trim.startLat);
          var x2 = toX(trim.endLon), y2 = toY(trim.endLat);
          ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.setLineDash([]);
          ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
          ctx.fillStyle = '#3b82f6'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText('🌳 ' + trim.footage + 'ft', (x1+x2)/2, (y1+y2)/2 - 5);
        });
        // Title
        ctx.fillStyle = '#a78bfa';
        ctx.font = 'bold 14px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('⚡ Route Map — ' + today, 15, 20);
        // Legend
        ctx.font = '10px sans-serif';
        var legendY = 40;
        [{c:'#ef4444',l:'No work'},{c:'#22c55e',l:'Work done'},{c:'#3b82f6',l:'Tower'},{c:'#eab308',l:'Strand'},{c:'#f97316',l:'Cable'},{c:'#22c55e',l:'Lashed'},{c:'#3b82f6',l:'🌳 Tree Trim'}].forEach(function(item,i) {
          ctx.fillStyle = item.c;
          ctx.fillRect(15, legendY + i * 14, 8, 8);
          ctx.fillStyle = '#94a3b8';
          ctx.fillText(item.l, 28, legendY + i * 14 + 8);
        });
        var mapDataUrl = mapCanvas.toDataURL('image/png');

        var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Daily As-Built Report - ' + today + '</title></head><body style="background:#0f0a1e;color:white;font-family:system-ui,sans-serif;margin:0;padding:20px;">';
        html += '<div style="max-width:800px;margin:0 auto;">';
        
        // Header
        html += '<div style="text-align:center;padding:30px;background:linear-gradient(135deg,#1a0f3c,#2d1b69);border-radius:16px;margin-bottom:24px;">';
        html += '<div style="font-family:Playfair Display,serif;font-size:28px;font-weight:700;color:#d4af37;letter-spacing:2px;">⚡ FIBER PRODUCTION</div>';

      // ── Add snowshoe at CURRENT GPS location ──
      async function addSnowshoeAtGPS(ticType) {
        setPlacingSnowshoe(ticType);
        try {
          var pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(
              function(p) { resolve({ lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy }); },
              function(e) { reject(e); },
              { enableHighAccuracy: true, timeout: 15000 }
            );
          });
          var docRef = await db.collection('fiberSnowshoes').add({
            lat: pos.lat,
            lon: pos.lon,
            accuracy: pos.acc,
            ticType: ticType,
            placedBy: user.displayName || user.email.split('@')[0],
            placedByPhoto: avatarURL || user.photoURL || null,
            placedByUid: user.uid,
            placedAt: new Date().toISOString()
          });
          // ── AUTO-BILL: AE6 Snow Shoe at nearest pole ──
          var nearestPole = findNearestPoleId(pos.lat, pos.lon);
          if (nearestPole) {
            var today = new Date().toISOString().split('T')[0];
            var autoKey = 'auto_AE6_' + docRef.id;
            var existing = asBuiltData[nearestPole.id] || {};
            var entries = Object.assign({}, existing.entries || {});
            entries[autoKey] = {
              userId: user.uid,
              userName: user.displayName || user.email.split('@')[0],
              userPhoto: avatarURL || user.photoURL || null,
              date: today,
              codes: { 'AE6': 1 },
              notes: '⚡ Auto-billed: Snow Shoe (' + ticType.toUpperCase() + ') near ' + nearestPole.name,
              auto: true,
              snowshoeDocId: docRef.id,
              updatedAt: new Date().toISOString()
            };
            await db.collection('fiberAsBuilt').doc(nearestPole.id).set({
              siteId: nearestPole.id, siteName: nearestPole.name,
              lat: nearestPole.lat, lon: nearestPole.lon,
              entries: entries,
              lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }
          if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
        } catch(e) {
          alert('Could not get GPS location: ' + e.message);
        }
        setPlacingSnowshoe(null);
      }

      // ── Add Pole at GPS Location ──
      async function addPoleAtGPS() {
        if (!navigator.geolocation) { alert('❌ Geolocation not available on this device.'); return; }
        
        // Step 1: Get GPS
        var pos;
        try {
          pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 });
          });
        } catch (gpsErr) {
          if (gpsErr.code === 1) alert('📍 Location permission denied. Please enable GPS in your phone settings.');
          else if (gpsErr.code === 3) alert('⏱️ GPS timed out. Make sure you have a clear sky view and try again.');
          else alert('❌ Could not get GPS: ' + (gpsErr.message || 'Unknown error'));
          return;
        }
        
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        var accuracy = pos.coords.accuracy;
        
        // Warn if accuracy is poor (>50m)
        if (accuracy > 50) {
          if (!confirm('⚠️ GPS accuracy is ' + Math.round(accuracy) + 'm (poor). Pin may be inaccurate.\n\nAdd pole anyway?')) return;
        }
        
        // Step 2: Get pole name
        var poleName = prompt('Enter pole ID/name (e.g. 257/3 or "New Pole A"):');
        if (!poleName || !poleName.trim()) return;
        poleName = poleName.trim();

        // Step 3: Save to Firestore
        try {
          var targetRouteId = activeRouteId;
          var targetRouteName = 'OLT-57';
          var newPole = { id: poleName, name: poleName, lat: lat, lon: lon, type: 'pole' };

          if (targetRouteId === 'olt57') {
            // For built-in route, save to a "Field Additions" imported route
            var fieldRouteSnap = await db.collection('fiberRoutes').where('name', '==', 'Field Additions').get();
            if (!fieldRouteSnap.empty) {
              var existingDoc = fieldRouteSnap.docs[0];
              var existingData = existingDoc.data();
              var existingPoles = existingData.poles || [];
              // Check for duplicate pole name
              var dupe = existingPoles.find(function(p) { return p.id === poleName || p.name === poleName; });
              if (dupe) {
                if (!confirm('⚠️ Pole "' + poleName + '" already exists in Field Additions. Add a duplicate?')) return;
              }
              existingPoles.push(newPole);
              await db.collection('fiberRoutes').doc(existingDoc.id).update({
                poles: existingPoles,
                poleCount: existingPoles.length,
                importedAt: existingData.importedAt || firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              targetRouteId = existingDoc.id;
            } else {
              var newDoc = await db.collection('fiberRoutes').add({
                name: 'Field Additions',
                poles: [newPole],
                poleCount: 1,
                createdBy: user.uid,
                createdByName: user.displayName || user.email,
                importedAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              targetRouteId = newDoc.id;
            }
            targetRouteName = 'Field Additions';
          } else {
            // Add to the currently selected imported route
            var routeDoc = await db.collection('fiberRoutes').doc(targetRouteId).get();
            if (routeDoc.exists) {
              var rd = routeDoc.data();
              var poles = rd.poles || [];
              // Check for duplicate
              var dupe2 = poles.find(function(p) { return p.id === poleName || p.name === poleName; });
              if (dupe2) {
                if (!confirm('⚠️ Pole "' + poleName + '" already exists in ' + rd.name + '. Add a duplicate?')) return;
              }
              poles.push(newPole);
              await db.collection('fiberRoutes').doc(targetRouteId).update({
                poles: poles,
                poleCount: poles.length,
                importedAt: rd.importedAt || firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              targetRouteName = rd.name;
            } else {
              alert('❌ Route not found in database. Try switching to OLT-57 first.');
              return;
            }
          }

          // Success!
          if (navigator.vibrate) navigator.vibrate([50, 50, 100]);
          alert('✅ Pole "' + poleName + '" added to ' + targetRouteName + '\n📍 GPS: ' + lat.toFixed(6) + ', ' + lon.toFixed(6) + '\n📏 Accuracy: ' + Math.round(accuracy) + 'm');
          setActiveRouteId(targetRouteId);
        } catch (saveErr) {
          console.error('Add pole Firestore error:', saveErr);
          alert('❌ Failed to save pole: ' + (saveErr.message || saveErr) + '\n\nMake sure you have internet connection.');
        }
      }

      // ── Import a fiber route from KML/KMZ file ──
      async function importFiberRoute(file) {
        setImportingRoute(true);
        try {
          var text = '';
          var fileName = file.name.toLowerCase();
          if (fileName.endsWith('.kmz')) {
            // KMZ is a zip containing doc.kml
            var JSZip = window.JSZip;
            if (!JSZip) {
              // Load JSZip dynamically
              await new Promise(function(resolve) {
                var s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
                s.onload = resolve;
                document.head.appendChild(s);
              });
              JSZip = window.JSZip;
            }
            var zip = await JSZip.loadAsync(file);
            var kmlFile = Object.keys(zip.files).find(function(n) { return n.toLowerCase().endsWith('.kml'); });
            if (!kmlFile) throw new Error('No KML found inside KMZ');
            text = await zip.files[kmlFile].async('text');
          } else {
            text = await file.text();
          }
          // Parse KML
          var parser = new DOMParser();
          var kml = parser.parseFromString(text, 'text/xml');
          var placemarks = kml.querySelectorAll('Placemark');
          var poles = [];
          var routePath = [];
          var idx = 0;
          placemarks.forEach(function(pm) {
            var name = (pm.querySelector('name') || {}).textContent || '';
            var coords = pm.querySelector('coordinates');
            if (!coords) return;
            var coordText = coords.textContent.trim();
            var points = coordText.split(/\s+/).filter(function(c) { return c.includes(','); });
            if (points.length > 2) {
              // This is a route path (LineString)
              points.forEach(function(pt) {
                var parts = pt.split(',');
                if (parts.length >= 2) {
                  routePath.push({ lat: parseFloat(parts[1]), lon: parseFloat(parts[0]) });
                }
              });
            } else if (points.length <= 2) {
              // Single point = pole/tower/location
              var parts = points[0].split(',');
              if (parts.length >= 2) {
                idx++;
                var pType = 'distribution';
                var nameLower = name.toLowerCase();
                if (nameLower.includes('tower') || nameLower.includes('transmission')) pType = 'transmission';
                else if (nameLower.includes('splice') || nameLower.includes('key') || nameLower.includes('ped') || nameLower.includes('hub')) pType = 'key';
                poles.push({
                  id: 'pole-' + idx,
                  name: name || ('Pole ' + idx),
                  lat: parseFloat(parts[1]),
                  lon: parseFloat(parts[0]),
                  poleType: pType
                });
              }
            }
          });
          if (poles.length === 0) {
            alert('No poles found in file. Make sure the KML has Placemark elements with coordinates.');
            setImportingRoute(false);
            return;
          }
          // Prompt for route name
          var routeName = prompt('Name this route (e.g., OLT-58, Project Alpha):', file.name.replace(/\.(kml|kmz)$/i, ''));
          if (!routeName) { setImportingRoute(false); return; }
          // Save to Firestore
          var docRef = await db.collection('fiberRoutes').add({
            name: routeName,
            fileName: file.name,
            poles: poles,
            routePath: routePath,
            poleCount: poles.length,
            importedBy: user.displayName || user.email.split('@')[0],
            importedByUid: user.uid,
            importedByPhoto: avatarURL || user.photoURL || null,
            importedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          // Switch to the new route
          setActiveRouteId(docRef.id);
          setShowRouteImporter(false);
          if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
          alert('✅ Imported ' + poles.length + ' poles from "' + routeName + '"');
        } catch(e) {
          if (navigator.onLine) alert('Import failed: ' + e.message);
        }
        setImportingRoute(false);
      }

      // ── Remove snowshoe by doc ID ──
      async function removeSnowshoe(docId) {
        if (confirm('Remove this snowshoe?')) {
          await db.collection('fiberSnowshoes').doc(docId).delete();
          // ── Also remove auto-billed AE6 entry from nearest pole ──
          var autoKey = 'auto_AE6_' + docId;
          var allPoleIds = Object.keys(asBuiltData);
          for (var pi = 0; pi < allPoleIds.length; pi++) {
            var poleEntries = asBuiltData[allPoleIds[pi]].entries || {};
            if (poleEntries[autoKey]) {
              var updatedEntries = Object.assign({}, poleEntries);
              delete updatedEntries[autoKey];
              await db.collection('fiberAsBuilt').doc(allPoleIds[pi]).update({
                entries: updatedEntries,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
              });
              break;
            }
          }
        }
      }

        setPlacingTrim('start');
        try {
          var pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(
              function(p) { resolve({ lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy }); },
              function(e) { reject(e); },
              { enableHighAccuracy: true, timeout: 15000 }
            );
          });
          setTrimStartPoint(pos);
          if (navigator.vibrate) navigator.vibrate([50, 50]);
        } catch(e) {
          alert('GPS error: ' + e.message);
        }
        setPlacingTrim(null);
      }

      async function stopTreeTrimGPS() {
        if (!trimStartPoint) { alert('Tap 🌳 TRIM START first'); return; }
        setPlacingTrim('stop');
        try {
          var pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(
              function(p) { resolve({ lat: p.coords.latitude, lon: p.coords.longitude, acc: p.coords.accuracy }); },
              function(e) { reject(e); },
              { enableHighAccuracy: true, timeout: 15000 }
            );
          });
          // Calculate footage using haversine
          var feet = Math.round(haversineFt(trimStartPoint.lat, trimStartPoint.lon, pos.lat, pos.lon));
          // Save to Firestore
          var docRef = await db.collection('fiberTreeTrims').add({
            startLat: trimStartPoint.lat, startLon: trimStartPoint.lon, startAcc: trimStartPoint.acc,
            endLat: pos.lat, endLon: pos.lon, endAcc: pos.acc,
            footage: feet,
            placedBy: user.displayName || user.email.split('@')[0],
            placedByPhoto: avatarURL || user.photoURL || null,
            placedByUid: user.uid,
            completedAt: new Date().toISOString()
          });
          // Auto-bill AE19 at nearest pole
          var nearestPole = findNearestPoleId(trimStartPoint.lat, trimStartPoint.lon);
          if (nearestPole) {
            var today = new Date().toISOString().split('T')[0];
            var autoKey = 'auto_AE19_' + docRef.id;
            var existing = asBuiltData[nearestPole.id] || {};
            var entries = Object.assign({}, existing.entries || {});
            entries[autoKey] = {
              userId: user.uid,
              userName: user.displayName || user.email.split('@')[0],
              userPhoto: avatarURL || user.photoURL || null,
              date: today,
              codes: { 'AE19': feet },
              notes: '⚡ Auto: Tree Trimming ' + feet + 'ft',
              auto: true,
              trimDocId: docRef.id,
              updatedAt: new Date().toISOString()
            };
            await db.collection('fiberAsBuilt').doc(nearestPole.id).set({
              siteId: nearestPole.id, siteName: nearestPole.name,
              lat: nearestPole.lat, lon: nearestPole.lon,
              entries: entries,
              lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }
          setTrimStartPoint(null);
          if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
        } catch(e) {
          if (!navigator.onLine) {
            setTrimStartPoint(null);
            if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
          } else {
            alert('GPS/save error: ' + e.message);
          }
        }
        setPlacingTrim(null);
      }

      async function removeTreeTrim(docId) {
        if (!confirm('Remove this tree trimming record?')) return;
        try {
          await db.collection('fiberTreeTrims').doc(docId).delete();
          // Remove auto-billed AE19 entry
          var autoKey = 'auto_AE19_' + docId;
          var allPoleIds = Object.keys(asBuiltData);
          for (var pi = 0; pi < allPoleIds.length; pi++) {
            var poleEntries = asBuiltData[allPoleIds[pi]].entries || {};
            if (poleEntries[autoKey]) {
              var updatedEntries = Object.assign({}, poleEntries);
              delete updatedEntries[autoKey];
              await db.collection('fiberAsBuilt').doc(allPoleIds[pi]).update({
                entries: updatedEntries,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
              });
              break;
            }
          }
          if (navigator.vibrate) navigator.vibrate(50);
        } catch(e) {
          if (!navigator.onLine) {
            offlineQueue.add({ type: 'removeTreeTrim', docId: docId });
          } else {
            console.error('Remove tree trim error:', e);
            alert('Error removing tree trim: ' + e.message);
          }
        }
      }

      // ── Calculate daily footage by stage ──
      function calcDailyFootage() {
        var today = new Date().toISOString().split('T')[0];
        var byStage = { strand: 0, cable: 0, lashed: 0, complete: 0 };
        var totalByStage = { strand: 0, cable: 0, lashed: 0, complete: 0 };
        var totalActive = 0;
        Object.values(spanStages).forEach(function(s) {
          if (s.stage && s.stage !== 'none') {
            totalByStage[s.stage] = (totalByStage[s.stage] || 0) + (s.distFt || 0);
            totalActive += (s.distFt || 0);
            // Check if updated today
            if (s.updatedAt && s.updatedAt.startsWith(today)) {
              byStage[s.stage] = (byStage[s.stage] || 0) + (s.distFt || 0);
            }
          }
        });
        return { today: byStage, total: totalByStage, totalActive: totalActive };
      }

        var rows = [['Pole','Site Name','Date','Worker','Code','Description','Unit','Qty'].concat(isAdmin ? ['Rate','Total'] : [])];

        var spanRows = [['\n--- SPAN STAGES ---'],['From Pole','To Pole','Distance (ft)','Stage','Updated By','Updated At']];
        if (spanData._routeSpans) {
          spanData._routeSpans.forEach(function(span) {
            var spanId = span.from.id + '__' + span.to.id;
            var reverseId = span.to.id + '__' + span.from.id;
            var stageData = spanStages[spanId] || spanStages[reverseId] || { stage: 'none' };
            var stg = SPAN_STAGES.find(function(s){return s.key===stageData.stage;}) || SPAN_STAGES[0];
            spanRows.push([span.from.name, span.to.name, span.dist, stg.label, stageData.updatedByName||'', stageData.updatedAt||'']);
          });
        }
        Object.values(asBuiltData).forEach(function(pole) {
          Object.values(pole.entries || {}).forEach(function(entry) {
            Object.keys(entry.codes || {}).forEach(function(code) {
              var qty = entry.codes[code];
              var item = GIGABEAM_CODES.find(function(c) { return c.code === code; });
              if (item && qty > 0) {
                var row = [pole.siteId || pole.siteName, pole.siteName, entry.date, entry.userName, code, item.desc, item.unit, qty];
                if (isAdmin) row.push(item.rate, (qty * item.rate).toFixed(2));
                rows.push(row);
              }
            });
          });
        });
        rows = rows.concat(spanRows);
        // ── Auto-billed equipment ──
        rows.push(['']);
        rows.push(['--- AUTO-BILLED EQUIPMENT ---']);
        var eqHeader = ['Type','Location/ID','Placed By','Placed At','GPS Lat','GPS Lon','Billing Code','Description','Unit','Qty'];
        if (isAdmin) eqHeader.push('Rate','Total');
        rows.push(eqHeader);

        Object.keys(fiberEquipment).forEach(function(poleId) {

        // Tree Trims

          if (isAdmin) row.push((trim.footage * 1.232).toFixed(2), (trim.footage * 1.232).toFixed(2));
          rows.push(row);
        });
        var csv = rows.map(function(r) { return r.join(','); }).join('\n');
        var blob = new Blob([csv], { type: 'text/csv' });
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Fiber_AsBuilt_' + new Date().toISOString().split('T')[0] + '.csv';
        a.click();

                      {placingTrim === 'stop' ? '⏳...' : '🌳 STOP'}
                    </button>
                  </div>

                  </div>}
                </div>
                {/* Legend */}
                <div style={{position:'absolute',bottom:16,left:16,zIndex:1000,background:'rgba(15,10,30,0.9)',borderRadius:10,padding:'10px 14px',border:'1px solid rgba(139,92,246,0.3)',fontSize:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                    <div style={{width:12,height:12,borderRadius:'50%',background:'#ef4444'}}></div>
                    <span style={{color:'#e2e8f0'}}>No work logged</span>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:12,height:12,borderRadius:'50%',background:'#22c55e'}}></div>
                    <span style={{color:'#e2e8f0'}}>Work logged</span>
                  </div>
                </div>
                {allFiberSites.length === 0 && (
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(15,10,30,0.8)',zIndex:1001}}>
                    <div style={{textAlign:'center',padding:40}}>
                      <div style={{fontSize:48,marginBottom:12}}>🗺️</div>
                      <div style={{color:'white',fontSize:16,fontWeight:600,marginBottom:8}}>No poles loaded</div>
                      <div style={{color:'#94a3b8',fontSize:13}}>Import a KMZ/KML file with pole locations first</div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ─── LOG WORK FORM (Modal over map) ─── */}
            {showLogForm && selectedPole && ReactDOM.createPortal(
              <div style={{position:'fixed',inset:0,zIndex:6000,background:'rgba(0,0,0,0.7)',display:'flex',flexDirection:'column'}}>
                <div style={{flex:1,overflow:'auto',background:'#0f0a1e'}}>
                  {/* Pole header */}
                  <div style={{background:'linear-gradient(135deg,#1a0f3c,#2d1b69)',padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(139,92,246,0.3)'}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:16,color:'white'}}>📍 {selectedPole.name}</div>
                      <div style={{fontSize:12,color:'#a78bfa'}}>{selectedPole.address || selectedPole.description || 'Log work at this pole'}</div>
                    </div>
                    <button onClick={function(){setShowLogForm(false); setFormQty({}); setFormNotes(''); setSelectedPole(null);}} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'white',width:36,height:36,borderRadius:'50%',fontSize:18,cursor:'pointer'}}>✕</button>
                  </div>

                  <div style={{padding:16}}>
                    {/* ─── EN-ROUTE BANNER ─── */}
                    {fiberEnroutes[selectedPole.id] && (
                      <div style={{background: fiberEnroutes[selectedPole.id].userId === user.uid ? 'linear-gradient(135deg,#92400e,#d97706)' : 'linear-gradient(135deg,#1e3a5f,#3b82f6)', padding:'10px 14px', borderRadius:12, marginBottom:10, display:'flex', alignItems:'center', gap:10}}>
                        {fiberEnroutes[selectedPole.id].userPhoto ? (
                          <img src={fiberEnroutes[selectedPole.id].userPhoto} style={{width:40,height:40,borderRadius:'50%',border:'3px solid rgba(255,255,255,0.5)',objectFit:'cover'}} referrerPolicy="no-referrer" />
                        ) : (
                          <div style={{width:40,height:40,borderRadius:'50%',background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold',fontSize:18,color:'white',border:'3px solid rgba(255,255,255,0.5)'}}>{(fiberEnroutes[selectedPole.id].userName||'?').charAt(0).toUpperCase()}</div>
                        )}
                        <div style={{flex:1}}>
                          <div style={{color:'white',fontWeight:700,fontSize:14}}>
                            {fiberEnroutes[selectedPole.id].userId === user.uid ? '🚗 You are en-route!' : '🚗 ' + (fiberEnroutes[selectedPole.id].userName||'Teammate') + ' is en-route'}
                          </div>
                          <div style={{color:'rgba(255,255,255,0.7)',fontSize:11}}>Heading to this pole</div>
                        </div>
                        {fiberEnroutes[selectedPole.id].userId === user.uid && (
                          <button onClick={function(){cancelFiberEnroute(selectedPole.id);}} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'white',padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer'}}>✕ Cancel</button>
                        )}
                      </div>
                    )}

                    {/* ─── GET DIRECTIONS BUTTON ─── */}
                    <a href={fiberDirectionsUrl(selectedPole)} target="_blank" rel="noopener noreferrer"
                      onClick={function(){claimFiberEnroute(selectedPole.id); if(navigator.vibrate) navigator.vibrate([50,50,100]);}}
                      style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',padding:'14px 16px',borderRadius:12,background:'linear-gradient(135deg,#065f46,#059669)',color:'white',fontWeight:800,fontSize:15,textDecoration:'none',marginBottom:10,boxShadow:'0 4px 15px rgba(5,150,105,0.4)',border:'1px solid rgba(52,211,153,0.3)'}}>
                      🧭 Get Directions to this Pole
                    </a>

                    {/* ─── ACTION BUTTONS: Correct Pin + Photos + Anchor ─── */}
                    <div style={{display:'flex',gap:6,marginBottom:8}}>
                      <button onClick={correctPinLocation} disabled={correctingPin}
                        style={{flex:1,padding:'10px 6px',borderRadius:10,border:'1px solid rgba(59,130,246,0.4)',background:'linear-gradient(135deg,#1e3a5f,#2563eb)',color:'white',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                        {correctingPin ? '⏳...' : '📍 Pin'}
                      </button>
                      <button onClick={function(){setShowPolePhotos(!showPolePhotos);}}
                        style={{flex:1,padding:'10px 6px',borderRadius:10,border:'1px solid rgba(236,72,153,0.4)',background:showPolePhotos?'linear-gradient(135deg,#9d174d,#ec4899)':'linear-gradient(135deg,#831843,#be185d)',color:'white',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                        📷 Photos {Object.keys(polePhotos).length > 0 && <span style={{background:'#ec4899',borderRadius:10,padding:'1px 6px',fontSize:10}}>{Object.keys(polePhotos).length}</span>}
                      </button>
                      <button onClick={function(){toggleScrewAnchor(selectedPole.id);}}
                        style={{flex:1,padding:'10px 6px',borderRadius:10,border:'1px solid ' + ((fiberEquipment[selectedPole.id]||{}).screwAnchor ? 'rgba(251,191,36,0.6)' : 'rgba(120,53,15,0.4)'),background:(fiberEquipment[selectedPole.id]||{}).screwAnchor ? 'linear-gradient(135deg,#92400e,#b45309)' : 'linear-gradient(135deg,#451a03,#78350f)',color:'white',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
                        ⚓ {(fiberEquipment[selectedPole.id]||{}).screwAnchor ? '✓ Anchor' : 'Anchor'}
                      </button>
                    </div>
                    {/* Down Guy button row */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:8}}>
                      <button onClick={function(){toggleDownGuy(selectedPole.id);}}
                        style={{padding:'10px 6px',borderRadius:10,border:'1px solid ' + ((fiberEquipment[selectedPole.id]||{}).downGuy ? 'rgba(96,165,250,0.6)' : 'rgba(30,58,95,0.4)'),background:(fiberEquipment[selectedPole.id]||{}).downGuy ? 'linear-gradient(135deg,#1e3a5f,#2563eb)' : 'linear-gradient(135deg,#0c1e3d,#1e3a5f)',color:'white',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
                        📎 {(fiberEquipment[selectedPole.id]||{}).downGuy ? '✓ Down Guy' : 'Down Guy'}
                      </button>
                      <div style={{padding:'8px',borderRadius:10,background:'rgba(0,0,0,0.2)',fontSize:10,color:'#94a3b8',display:'flex',alignItems:'center',justifyContent:'center',textAlign:'center'}}>
                        {(fiberEquipment[selectedPole.id]||{}).screwAnchor && (fiberEquipment[selectedPole.id]||{}).downGuy ? '⚓📎 Full Assembly' : (fiberEquipment[selectedPole.id]||{}).screwAnchor ? '⚓ Anchor only' : (fiberEquipment[selectedPole.id]||{}).downGuy ? '📎 Guy only' : 'No hardware'}
                      </div>
                    </div>
                    {((fiberEquipment[selectedPole.id]||{}).screwAnchor || (fiberEquipment[selectedPole.id]||{}).downGuy) && (
                      <div style={{background:'rgba(146,64,14,0.15)',border:'1px solid rgba(251,191,36,0.3)',borderRadius:8,padding:'6px 10px',marginBottom:8,fontSize:11,color:'#fbbf24'}}>
                        {(fiberEquipment[selectedPole.id]||{}).screwAnchor && <div>⚓ Anchor — AE5{(fiberEquipment[selectedPole.id]||{}).screwAnchorBy ? ' by ' + fiberEquipment[selectedPole.id].screwAnchorBy : ''}{(fiberEquipment[selectedPole.id]||{}).screwAnchorAt ? ' • ' + new Date(fiberEquipment[selectedPole.id].screwAnchorAt).toLocaleDateString() : ''}</div>}
                        {(fiberEquipment[selectedPole.id]||{}).downGuy && <div style={{color:'#60a5fa',marginTop:(fiberEquipment[selectedPole.id]||{}).screwAnchor?4:0}}>📎 Down Guy — AE4{(fiberEquipment[selectedPole.id]||{}).downGuyBy ? ' by ' + fiberEquipment[selectedPole.id].downGuyBy : ''}{(fiberEquipment[selectedPole.id]||{}).downGuyAt ? ' • ' + new Date(fiberEquipment[selectedPole.id].downGuyAt).toLocaleDateString() : ''}</div>}
                      </div>
                    )}
                    {selectedPole.pinCorrected && (
                      <div style={{background:'rgba(34,197,94,0.15)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:8,padding:'6px 10px',marginBottom:10,fontSize:11,color:'#4ade80',display:'flex',alignItems:'center',gap:6}}>
                        ✅ Pin corrected{selectedPole.correctedBy ? ' by ' + selectedPole.correctedBy : ''}{selectedPole.correctedAt ? ' • ' + new Date(selectedPole.correctedAt).toLocaleDateString() : ''}
                      </div>
                    )}

                    {/* ─── SPAN MEASUREMENTS + WORK STAGES ─── */}
                    {selectedPole && selectedPole.poleType === 'distribution' && spanData[selectedPole.id] && (
                      <div style={{marginBottom:14,background:'rgba(30,40,60,0.5)',borderRadius:12,border:'1px solid rgba(59,130,246,0.2)',padding:12}}>
                        <div style={{fontSize:12,fontWeight:700,color:'#93c5fd',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>📏 SPANS & WORK STAGES <span style={{fontSize:10,color:'#64748b',fontWeight:400}}>(tap stage to update)</span></div>
                        <div style={{display:'flex',flexDirection:'column',gap:6}}>
                          {spanData[selectedPole.id].slice(0,6).map(function(span) {
                            var spanId = selectedPole.id + '__' + span.id;
                            var reverseId = span.id + '__' + selectedPole.id;
                            var stageData = spanStages[spanId] || spanStages[reverseId] || { stage: 'none' };
                            var currentStage = SPAN_STAGES.find(function(s){return s.key===stageData.stage;}) || SPAN_STAGES[0];
                            return (
                              <div key={span.id} style={{borderRadius:10,background:'rgba(15,10,30,0.6)',border:'1px solid ' + currentStage.color + '33',overflow:'hidden'}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 10px'}}>
                                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                                    <span style={{fontSize:14}}>↔</span>
                                    <span style={{fontSize:12,color:'white',fontWeight:600}}>{selectedPole.name} → {span.name}</span>
                                  </div>
                                  <div style={{background:'linear-gradient(135deg,#1e3a5f,#2563eb)',borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:800,color:'white',minWidth:55,textAlign:'center'}}>{span.dist} ft</div>
                                </div>
                                <div style={{display:'flex',gap:4,padding:'4px 10px 8px',flexWrap:'wrap'}}>
                                  {SPAN_STAGES.map(function(stage) {
                                    var isActive = stageData.stage === stage.key;
                                    return (
                                      <button key={stage.key} onClick={function(){ 
                                        var fromPole = allFiberSites.find(function(s){return s.id===selectedPole.id;}) || selectedPole;
                                        var toPole = allFiberSites.find(function(s){return s.id===span.id;});
                                        if (toPole) updateSpanStage(fromPole, toPole, stage.key, span.dist);
                                      }}
                                        style={{padding:'4px 8px',borderRadius:6,border:'1px solid ' + (isActive ? stage.color : 'rgba(100,116,139,0.3)'),
                                          background:isActive ? stage.color + '25' : 'transparent',color:isActive ? stage.color : '#64748b',
                                          fontSize:10,fontWeight:isActive?700:400,cursor:'pointer',display:'flex',alignItems:'center',gap:3}}>
                                        <span>{stage.icon}</span> {stage.label}
                                      </button>
                                    );
                                  })}
                                </div>
                                {stageData.updatedByName && (
                                  <div style={{padding:'0 10px 6px',fontSize:9,color:'#64748b',display:'flex',alignItems:'center',gap:4}}>
                                    {stageData.updatedByPhoto ? <img src={stageData.updatedByPhoto} style={{width:14,height:14,borderRadius:'50%',objectFit:'cover'}} /> : null}
                                    {stageData.updatedByName} • {new Date(stageData.updatedAt).toLocaleString()}
                                  </div>
                                )}
                                {/* ─── SNOWSHOE CONTROLS — GPS-based ─── */}
                                <div style={{padding:'4px 10px 8px',borderTop:'1px solid rgba(6,182,212,0.15)'}}>
                                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                                    <span style={{fontSize:10,color:'#06b6d4',fontWeight:600}}>❄️ Snowshoes</span>
                                    <button onClick={function(){ addSnowshoeAtGPS('in'); }} disabled={placingSnowshoe !== null}
                                      style={{padding:'2px 8px',borderRadius:5,background:'linear-gradient(135deg,#0e7490,#06b6d4)',border:'none',color:'white',fontSize:9,fontWeight:700,cursor:'pointer'}}>
                                      {placingSnowshoe === 'in' ? '⏳...' : '+ Tic IN'}
                                    </button>
                                    <button onClick={function(){ addSnowshoeAtGPS('out'); }} disabled={placingSnowshoe !== null}
                                      style={{padding:'2px 8px',borderRadius:5,background:'linear-gradient(135deg,#155e75,#0891b2)',border:'none',color:'white',fontSize:9,fontWeight:700,cursor:'pointer'}}>
                                      {placingSnowshoe === 'out' ? '⏳...' : '+ Tic OUT'}
                                    </button>
                                  </div>
                                  <div style={{fontSize:9,color:'#67e8f9',marginBottom:4}}>📍 Uses your current GPS location</div>
                                  {/* Show nearby snowshoes (within ~500ft of this pole) */}
                                  {(function(){
                                    var poleLat = selectedPole.lat;
                                    var poleLon = selectedPole.lon;
                                    var nearbyShoes = allSnowshoes.filter(function(shoe) {
                                      var dLat = (shoe.lat - poleLat) * 111320;
                                      var dLon = (shoe.lon - poleLon) * 111320 * Math.cos(poleLat * Math.PI / 180);
                                      var dist = Math.sqrt(dLat * dLat + dLon * dLon);
                                      return dist < 150; // ~500ft = 150m
                                    });
                                    if (nearbyShoes.length === 0) return <div style={{fontSize:9,color:'#475569'}}>No snowshoes nearby</div>;
                                    return nearbyShoes.map(function(shoe) {
                                      return (
                                        <div key={shoe.id} style={{display:'flex',alignItems:'center',gap:6,padding:'3px 0',fontSize:10}}>
                                          <span style={{color:'#06b6d4'}}>❄️ {shoe.ticType.toUpperCase()}</span>
                                          <span style={{color:'#94a3b8',fontSize:9}}>📍 {shoe.lat.toFixed(5)}, {shoe.lon.toFixed(5)}</span>
                                          <span style={{color:'#64748b',fontSize:9}}>• {shoe.placedBy}</span>
                                          {shoe.placedByUid === user.uid && (
                                            <button onClick={function(){removeSnowshoe(shoe.id);}} style={{marginLeft:'auto',background:'rgba(239,68,68,0.2)',border:'1px solid rgba(239,68,68,0.4)',color:'#f87171',borderRadius:4,padding:'1px 6px',fontSize:9,cursor:'pointer'}}>✕</button>
                                          )}
                                        </div>
                                      );
                                    });
                                  })()}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                        <div style={{fontSize:10,color:'#64748b',marginTop:6,textAlign:'center'}}>⬜ Not Started → 🟡 Strand → 🟠 Cable → 🟢 Lashed → ✅ Complete</div>
                      </div>
                    )}

                    {/* ─── PHOTO GALLERY ─── */}
                    {showPolePhotos && (
                      <div style={{marginBottom:16,background:'rgba(30,20,60,0.5)',borderRadius:12,border:'1px solid rgba(236,72,153,0.2)',padding:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                          <div style={{fontSize:13,fontWeight:700,color:'#f9a8d4'}}>📷 SITE PHOTOS</div>
                          <label style={{background:'linear-gradient(135deg,#ec4899,#f472b6)',color:'white',padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                            {uploadingPhoto ? '⏳ Uploading...' : '📸 Take Photo'}
                            <input ref={polePhotoInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}}
                              onChange={function(e){if(e.target.files&&e.target.files[0]){capturePolePhoto(e.target.files[0]); e.target.value='';}}} />
                          </label>
                        </div>

                        {Object.keys(polePhotos).length === 0 && (
                          <div style={{textAlign:'center',padding:20,color:'#64748b',fontSize:12}}>No photos yet — tap 📸 to capture the first one</div>
                        )}

                        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:8}}>
                          {Object.values(polePhotos).map(function(photo) {
                            return (
                              <div key={photo.id} style={{borderRadius:10,overflow:'hidden',border:'1px solid rgba(139,92,246,0.2)',background:'rgba(20,15,40,0.8)'}}>
                                <img src={photo.imageData} style={{width:'100%',height:140,objectFit:'cover',display:'block'}} />
                                <div style={{padding:6}}>
                                  <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
                                    {photo.userPhoto ? <img src={photo.userPhoto} style={{width:16,height:16,borderRadius:'50%',objectFit:'cover'}} /> : <div style={{width:16,height:16,borderRadius:'50%',background:'#7c3aed',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:8,fontWeight:700}}>{(photo.userName||'?')[0]}</div>}
                                    <span style={{fontSize:10,color:'#94a3b8',fontWeight:600}}>{photo.userName}</span>
                                  </div>
                                  <div style={{fontSize:9,color:'#64748b'}}>{new Date(photo.createdAt).toLocaleString()}</div>
                                  {photo.gps && (
                                    <div style={{fontSize:9,color:'#4ade80',marginTop:2}}>📍 {photo.gps.lat.toFixed(5)}, {photo.gps.lon.toFixed(5)} (±{photo.gps.accuracy}m)</div>
                                  )}
                                  {photo.userId === user.uid && (
                                    <button onClick={function(){deletePolePhoto(photo.id);}} style={{marginTop:4,padding:'2px 8px',borderRadius:4,border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.15)',color:'#f87171',fontSize:10,cursor:'pointer'}}>🗑️ Delete</button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    )}

                    {/* ─── POLE NOTES ─── */}
                    <div style={{marginBottom:14,background:'rgba(30,40,60,0.5)',borderRadius:12,border:'1px solid rgba(251,191,36,0.2)',padding:12}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                        <div style={{fontSize:12,fontWeight:700,color:'#fbbf24',display:'flex',alignItems:'center',gap:6}}>📝 POLE NOTES</div>
                        <div style={{fontSize:10,color:'#64748b'}}>{poleNotes.length} note{poleNotes.length!==1?'s':''}</div>
                      </div>
                      {/* Add note */}
                      <div style={{display:'flex',gap:6,marginBottom:8}}>
                        <input value={newPoleNote} onChange={function(e){setNewPoleNote(e.target.value);}}
                          onKeyDown={function(e){if(e.key==='Enter'&&newPoleNote.trim()){savePoleNote(selectedPole.id,newPoleNote);}}}
                          placeholder="Add a note... (e.g., strand only, tree in way, needs anchor)"
                          style={{flex:1,padding:'8px 12px',borderRadius:8,border:'1px solid rgba(251,191,36,0.3)',background:'rgba(30,20,60,0.6)',color:'white',fontSize:12}} />
                        <button onClick={function(){if(newPoleNote.trim())savePoleNote(selectedPole.id,newPoleNote);}}
                          style={{padding:'8px 14px',borderRadius:8,border:'none',background:'linear-gradient(135deg,#d97706,#f59e0b)',color:'white',fontSize:12,fontWeight:700,cursor:'pointer'}}>Send</button>
                      </div>
                      {/* Notes list */}
                      <div style={{maxHeight:180,overflow:'auto',display:'flex',flexDirection:'column',gap:4}}>
                        {poleNotes.map(function(note) {
                          return (
                            <div key={note.id} style={{display:'flex',gap:8,padding:'6px 8px',borderRadius:8,background:'rgba(251,191,36,0.05)',border:'1px solid rgba(251,191,36,0.1)'}}>
                              {note.userPhoto ? <img src={note.userPhoto} style={{width:24,height:24,borderRadius:'50%',objectFit:'cover',flexShrink:0}} /> : <div style={{width:24,height:24,borderRadius:'50%',background:'#d97706',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:10,fontWeight:700,flexShrink:0}}>{(note.userName||'?')[0]}</div>}
                              <div style={{flex:1}}>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                  <span style={{fontSize:11,color:'#fbbf24',fontWeight:600}}>{note.userName}</span>
                                  <span style={{fontSize:9,color:'#64748b'}}>{note.createdAt ? new Date(note.createdAt).toLocaleString() : ''}</span>
                                </div>
                                <div style={{fontSize:12,color:'white',marginTop:2}}>{note.text}</div>
                                {note.userId === user.uid && (
                                  <button onClick={function(){deletePoleNote(selectedPole.id, note.id);}} style={{marginTop:3,padding:'1px 6px',borderRadius:4,border:'1px solid rgba(239,68,68,0.3)',background:'rgba(239,68,68,0.1)',color:'#f87171',fontSize:9,cursor:'pointer'}}>🗑️ Delete</button>
                                )}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                      {poleNotes.length === 0 && (
                        <div style={{textAlign:'center',padding:10,color:'#64748b',fontSize:11}}>No notes yet — document strand placements, issues, anchors, etc.</div>
                      )}
                    </div>

                    {/* Date picker */}

                            <div key={idx} style={{background:'rgba(30,20,60,0.6)',borderRadius:8,padding:10,marginBottom:6,border:'1px solid rgba(139,92,246,0.1)'}}>

                                {entry.userPhoto ? <img src={entry.userPhoto} style={{width:24,height:24,borderRadius:'50%',objectFit:'cover'}} /> : <div style={{width:24,height:24,borderRadius:'50%',background:'#7c3aed',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:10,fontWeight:700}}>{(entry.userName||'?')[0]}</div>}

                                }).join(' • ')}
                              </div>
                              {entry.notes && <div style={{fontSize:11,color:'#fbbf24',marginTop:4}}>💬 {entry.notes}</div>}

                    {/* Billing code categories */}
                    {GIGABEAM_CATEGORIES.map(function(cat) {
                      var codes = codesByCat[cat.key];
                      if (!codes || codes.length === 0) return null;
                      var expanded = expandedCats[cat.key];
                      return (
                        <div key={cat.key} style={{marginBottom:10,borderRadius:12,overflow:'hidden',border:'1px solid rgba(139,92,246,0.15)',background:'rgba(20,15,40,0.6)'}}>
                          <button onClick={function(){toggleCat(cat.key);}} style={{width:'100%',display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',border:'none',background:'rgba(139,92,246,0.08)',color:'white',cursor:'pointer',fontSize:14}}>
                            <span style={{fontWeight:700}}>{cat.label}</span>
                            <span style={{fontSize:16,transition:'transform 0.2s',transform:expanded?'rotate(180deg)':'rotate(0)'}}>&#9660;</span>

                          {expanded && (
                            <div style={{padding:'8px 12px'}}>
                              {codes.map(function(item) {
                                var qty = formQty[item.code] || '';
