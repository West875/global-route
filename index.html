                                  <div key={item.code} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 4px',borderBottom:'1px solid rgba(139,92,246,0.08)'}}>
                                    <div style={{flex:1,minWidth:0}}>
                                      <div style={{fontSize:13,fontWeight:600,color:'white'}}>{item.code} — {item.desc}</div>
                                      <div style={{fontSize:11,color:'#64748b'}}>Per {item.unit}</div>
                                    </div>
                                    <input type="number" inputMode="decimal" min="0" value={qty}
                                      onChange={function(e){setFormQty(function(prev){var n=Object.assign({},prev); if(e.target.value===''||Number(e.target.value)===0){delete n[item.code];}else{n[item.code]=Number(e.target.value);} return n;});}}
                                      placeholder="0" style={{width:70,padding:'6px 8px',borderRadius:6,border:'1px solid rgba(139,92,246,0.3)',background:'rgba(30,20,60,0.8)',color:'white',textAlign:'center',fontSize:14}} />
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}

                    <button onClick={function(){setShowAllCodes(!showAllCodes);}} style={{width:'100%',padding:10,borderRadius:8,border:'1px solid rgba(139,92,246,0.3)',background:'transparent',color:'#a78bfa',fontSize:13,cursor:'pointer',marginBottom:12}}>
                      {showAllCodes ? '⬆️ Show Common Codes Only' : '📋 Show All Billing Codes'}
                    </button>

                    <textarea placeholder="Notes about this pole (damage, issues, measurements...)" value={formNotes} onChange={function(e){setFormNotes(e.target.value);}} rows={3} style={{width:'100%',padding:'10px 12px',borderRadius:8,border:'1px solid rgba(139,92,246,0.2)',background:'rgba(30,20,60,0.4)',color:'white',fontSize:14,resize:'vertical',marginBottom:16,boxSizing:'border-box'}} />

                    <button onClick={saveWorkAtPole} disabled={saving} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:saving?'#475569':saved?'linear-gradient(135deg,#059669,#10b981)':'linear-gradient(135deg,#7c3aed,#a855f7)',color:'white',fontSize:16,fontWeight:700,cursor:saving?'default':'pointer',letterSpacing:1}}>
                      {saving ? '⏳ Saving...' : saved ? '✅ Saved!' : '💾 LOG WORK AT THIS POLE'}
                    </button>
                  </div>
                </div>
              </div>,
              document.body
            )}

            {/* ─── AS-BUILT TAB ─── */}
            {tab === 'asbuilt' && (
              <div style={{padding:16}}>
                {/* Progress banner */}
                <div style={{background:'linear-gradient(135deg,#1e3a5f,#0d2847)',borderRadius:12,padding:16,marginBottom:16,textAlign:'center',border:'1px solid rgba(59,130,246,0.3)'}}>
                  <div style={{fontSize:12,color:'#93c5fd',fontWeight:600}}>AS-BUILT PROGRESS</div>
                  <div style={{fontSize:32,fontWeight:900,color:'#60a5fa'}}>{polesWithWork} / {totalPoles}</div>
                  <div style={{fontSize:11,color:'#64748b'}}>poles with work logged</div>
                  <div style={{marginTop:8,height:8,borderRadius:4,background:'rgba(59,130,246,0.15)',overflow:'hidden'}}>
                    <div style={{height:'100%',borderRadius:4,background:'linear-gradient(90deg,#3b82f6,#22c55e)',width:(totalPoles>0?Math.round(polesWithWork/totalPoles*100):0)+'%',transition:'width 0.5s'}}></div>
                  </div>
                </div>

                {/* ─── SPAN TABLE ─── */}
                {spanData._routeSpans && spanData._routeSpans.length > 0 && (
                  <div style={{marginBottom:16}}>
                    {/* Stage legend */}
                    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
                      {SPAN_STAGES.map(function(s){return <span key={s.key} style={{fontSize:10,color:s.color,display:'flex',alignItems:'center',gap:3}}>{s.icon} {s.label}</span>;})}
                    </div>
                    {/* Footage by stage */}
                    {(function() {
                      var ft = calcDailyFootage();
                      return (
                        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:6,marginBottom:12}}>
                          <div style={{background:'rgba(234,179,8,0.1)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid rgba(234,179,8,0.2)'}}>
                            <div style={{fontSize:10,color:'#eab308',fontWeight:600}}>🟡 STRAND</div>
                            <div style={{fontSize:18,fontWeight:900,color:'#eab308'}}>{(ft.total.strand||0).toLocaleString()} ft</div>
                          </div>
                          <div style={{background:'rgba(249,115,22,0.1)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid rgba(249,115,22,0.2)'}}>
                            <div style={{fontSize:10,color:'#f97316',fontWeight:600}}>🟠 CABLE</div>
                            <div style={{fontSize:18,fontWeight:900,color:'#f97316'}}>{(ft.total.cable||0).toLocaleString()} ft</div>
                          </div>
                          <div style={{background:'rgba(34,197,94,0.1)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid rgba(34,197,94,0.2)'}}>
                            <div style={{fontSize:10,color:'#22c55e',fontWeight:600}}>🟢 LASHED</div>
                            <div style={{fontSize:18,fontWeight:900,color:'#22c55e'}}>{(ft.total.lashed||0).toLocaleString()} ft</div>
                          </div>
                          <div style={{background:'rgba(16,185,129,0.1)',borderRadius:8,padding:10,textAlign:'center',border:'1px solid rgba(16,185,129,0.2)'}}>
                            <div style={{fontSize:10,color:'#10b981',fontWeight:600}}>✅ COMPLETE</div>
                            <div style={{fontSize:18,fontWeight:900,color:'#10b981'}}>{(ft.total.complete||0).toLocaleString()} ft</div>
                          </div>
                        </div>
                      );
                    })()}
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                      <div style={{fontSize:13,fontWeight:700,color:'#93c5fd',display:'flex',alignItems:'center',gap:6}}>📏 ROUTE SPANS</div>
                      <div style={{background:'linear-gradient(135deg,#1e3a5f,#2563eb)',borderRadius:8,padding:'4px 12px',fontSize:12,fontWeight:800,color:'white'}}>
                        Total: {spanData._totalFootage.toLocaleString()} ft
                      </div>
                    </div>
                    <div style={{background:'rgba(30,40,60,0.4)',borderRadius:12,border:'1px solid rgba(59,130,246,0.15)',overflow:'hidden'}}>
                      {spanData._routeSpans.map(function(span, idx) {
                        var spanId = span.from.id + '__' + span.to.id;
                        var reverseId = span.to.id + '__' + span.from.id;
                        var stageData = spanStages[spanId] || spanStages[reverseId] || { stage: 'none' };
                        var stg = SPAN_STAGES.find(function(s){return s.key===stageData.stage;}) || SPAN_STAGES[0];
                        return (
                          <div key={idx} style={{display:'flex',alignItems:'center',padding:'10px 14px',borderBottom:idx < spanData._routeSpans.length - 1 ? '1px solid rgba(59,130,246,0.08)' : 'none',background:stg.color+'08'}}>
                            <div style={{width:24,textAlign:'center',marginRight:8,fontSize:14}}>{stg.icon}</div>
                            <div style={{flex:1}}>
                              <div style={{display:'flex',alignItems:'center',gap:4}}>
                                <span style={{fontSize:12,color:'white',fontWeight:600}}>{span.from.name}</span>
                                <span style={{fontSize:11,color:'#64748b'}}>→</span>
                                <span style={{fontSize:12,color:'white',fontWeight:600}}>{span.to.name}</span>
                              </div>
                              <div style={{fontSize:10,color:stg.color,fontWeight:600}}>{stg.label}{stageData.updatedByName ? ' • ' + stageData.updatedByName : ''}</div>
                            </div>
                            <div style={{background:stg.color+'25',borderRadius:6,padding:'3px 10px',fontSize:12,fontWeight:800,color:stg.color,minWidth:60,textAlign:'center'}}>{span.dist} ft</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Pole list */}
                {allFiberSites.length === 0 && (
                  <div style={{textAlign:'center',padding:40,color:'#64748b'}}>
                    <div style={{fontSize:48,marginBottom:12}}>📋</div>
                    <div>Import a KMZ/KML file to see poles here</div>
                  </div>
                )}
                {allFiberSites.map(function(site) {
                  var status = getPoleStatus(site.id);
                  var poleData = asBuiltData[site.id];
                  var hasWork = status.count > 0;
                  return (
                    <div key={site.id} style={{background:'rgba(30,20,60,0.6)',borderRadius:12,padding:14,marginBottom:10,border:'1px solid ' + (hasWork ? 'rgba(34,197,94,0.3)' : 'rgba(139,92,246,0.15)'),cursor:'pointer'}}
                      onClick={function(){ setSelectedPole(site); setShowLogForm(true); }}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:hasWork?8:0}}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{width:32,height:32,borderRadius:'50%',background:hasWork?'#22c55e':'#475569',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>
                            {hasWork ? '✅' : '📍'}
                          </div>
                          <div>
                            <div style={{fontWeight:700,color:'white',fontSize:14}}>
                              {site.name}
                              {fiberEnroutes[site.id] && (
                                <span style={{marginLeft:8,background:fiberEnroutes[site.id].userId===user.uid?'#f59e0b':'#3b82f6',color:'white',padding:'2px 8px',borderRadius:10,fontSize:10,fontWeight:700,verticalAlign:'middle'}}>
                                  🚗 {fiberEnroutes[site.id].userId===user.uid ? 'You' : (fiberEnroutes[site.id].userName||'').split(' ')[0]}
                                </span>
                              )}
                            </div>
                            <div style={{fontSize:11,color:'#64748b'}}>{site.address || site.description || ''}</div>
                            {site.poleType === 'distribution' && spanData[site.id] && spanData[site.id][0] && (
                              <div style={{fontSize:10,color:'#93c5fd',marginTop:2}}>↔ {spanData[site.id][0].name}: {spanData[site.id][0].dist} ft</div>
                            )}
                          </div>
                        </div>
                        {hasWork && <div style={{background:'rgba(34,197,94,0.15)',borderRadius:8,padding:'4px 10px',fontSize:11,color:'#22c55e',fontWeight:700}}>{status.count} entry{status.count>1?'ies':''}</div>}
                      </div>
                      {hasWork && poleData && poleData.entries && (
                        <div style={{marginTop:6}}>
                          {Object.values(poleData.entries).slice(0,3).map(function(entry, idx) {
                            return (
                              <div key={idx} style={{fontSize:11,color:'#94a3b8',padding:'4px 0',display:'flex',gap:6,alignItems:'center'}}>
                                {entry.userPhoto ? <img src={entry.userPhoto} style={{width:18,height:18,borderRadius:'50%',objectFit:'cover'}} /> : <span>👷</span>}
                                <span style={{color:'white',fontWeight:600}}>{entry.userName}</span>
                                <span>•</span>
                                <span>{entry.date}</span>
                                <span>•</span>
                                <span>{Object.keys(entry.codes||{}).length} items</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ─── CREW TAB ─── */}
            {tab === 'crew' && (
              <div style={{padding:16}}>
                {(function() {
                  // Build crew list from PRESENCE first (shows everyone who opened fiber mode)
                  var crew = {};
                  Object.keys(fiberPresence).forEach(function(uid) {
                    var p = fiberPresence[uid];
                    var lastSeen = p.lastSeen ? (p.lastSeen.toDate ? p.lastSeen.toDate() : new Date(p.lastSeen)) : null;
                    crew[uid] = {
                      name: p.userName || p.userEmail || 'Unknown',
                      photo: p.userPhoto || null,
                      email: p.userEmail || '',
                      lastSeen: lastSeen,
                      poles: new Set(),
                      codeCount: 0,
                      enrouteTo: null,
                      recentWork: []
                    };
                  });
                  // Always include current user
                  if (!crew[user.uid]) {
                    crew[user.uid] = {
                      name: user.displayName || user.email.split('@')[0],
                      photo: avatarURL || user.photoURL || null,
                      email: user.email,
                      lastSeen: new Date(),
                      poles: new Set(),
                      codeCount: 0,
                      enrouteTo: null,
                      recentWork: []
                    };
                  }
                  // Enrich with as-built work data
                  Object.values(asBuiltData).forEach(function(pole) {
                    Object.values(pole.entries || {}).forEach(function(entry) {
                      var uid2 = entry.userId;
                      if (!crew[uid2]) {
                        crew[uid2] = { name: entry.userName || 'Unknown', photo: entry.userPhoto || null, email: '', lastSeen: null, poles: new Set(), codeCount: 0, enrouteTo: null, recentWork: [] };
                      }
                      crew[uid2].poles.add(pole.siteId || pole.siteName);
                      crew[uid2].codeCount += Object.keys(entry.codes || {}).length;
                      var ts = entry.timestamp;
                      var d = ts ? (ts.toDate ? ts.toDate() : new Date(ts)) : null;
                      if (d && (!crew[uid2].lastSeen || d > crew[uid2].lastSeen)) crew[uid2].lastSeen = d;
                      var poleName = (allFiberSites.find(function(s){ return s.id === (pole.siteId || pole.siteName); }) || {}).name || pole.siteId || pole.siteName;
                      var codeStr = Object.keys(entry.codes || {}).map(function(c){ return c + '×' + entry.codes[c]; }).join(', ');
                      crew[uid2].recentWork.push({ pole: poleName, codes: codeStr, time: d });
                    });
                  });
                  // Enrich with en-route claims
                  Object.keys(fiberEnroutes).forEach(function(poleId) {
                    var claim = fiberEnroutes[poleId];
                    if (claim && claim.userId) {
                      if (!crew[claim.userId]) {
                        crew[claim.userId] = { name: claim.userName || 'Unknown', photo: claim.userPhoto || null, email: '', lastSeen: new Date(), poles: new Set(), codeCount: 0, enrouteTo: null, recentWork: [] };
                      }
                      var poleName2 = (allFiberSites.find(function(s){ return s.id === poleId; }) || {}).name || poleId;
                      crew[claim.userId].enrouteTo = poleName2;
                      crew[claim.userId].lastSeen = new Date();
                    }
                  });

                  var crewIds = Object.keys(crew);
                  var onlineCount = crewIds.filter(function(uid3) { var c = crew[uid3]; return c.lastSeen && (Date.now() - c.lastSeen.getTime()) < 10 * 60 * 1000; }).length;
                  var activeToday = crewIds.filter(function(uid3) { var c = crew[uid3]; return c.lastSeen && (Date.now() - c.lastSeen.getTime()) < 24 * 60 * 60 * 1000; }).length;

                  // Sort: current user first, then online, then by recent activity
                  crewIds.sort(function(a, b) {
                    if (a === user.uid) return -1;
                    if (b === user.uid) return 1;
                    var aOnline = crew[a].lastSeen && (Date.now() - crew[a].lastSeen.getTime()) < 10 * 60 * 1000;
                    var bOnline = crew[b].lastSeen && (Date.now() - crew[b].lastSeen.getTime()) < 10 * 60 * 1000;
                    if (aOnline && !bOnline) return -1;
                    if (!aOnline && bOnline) return 1;
                    return ((crew[b].lastSeen || 0) - (crew[a].lastSeen || 0));
                  });

                  return [
                    <div key="header" style={{background:'linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1))',borderRadius:14,padding:16,marginBottom:16,border:'1px solid rgba(139,92,246,0.2)'}}>
                      <div style={{fontSize:16,fontWeight:800,color:'white',marginBottom:4}}>👥 Fiber Crew</div>
                      <div style={{fontSize:12,color:'#94a3b8'}}>
                        {crewIds.length + ' member' + (crewIds.length !== 1 ? 's' : '') + ' · '}
                        <span style={{color:'#22c55e',fontWeight:700}}>{onlineCount + ' online'}</span>
                        {' · ' + activeToday + ' active today'}
                      </div>
                    </div>
                  ].concat(crewIds.map(function(uid4) {
                    var c = crew[uid4];
                    var isMe = uid4 === user.uid;
                    var isOnline = c.lastSeen && (Date.now() - c.lastSeen.getTime()) < 10 * 60 * 1000;
                    var isActive = c.lastSeen && (Date.now() - c.lastSeen.getTime()) < 24 * 60 * 60 * 1000;
                    var recentSorted = c.recentWork.sort(function(a, b) {
                      if (!a.time && !b.time) return 0;
                      if (!a.time) return 1;
                      if (!b.time) return -1;
                      return b.time.getTime() - a.time.getTime();
                    }).slice(0, 5);

                    return (
                      <div key={uid4} style={{
                        background:'rgba(30,20,60,0.5)',borderRadius:14,padding:14,marginBottom:10,
                        border:'2px solid ' + (isMe ? 'rgba(34,197,94,0.4)' : isOnline ? 'rgba(59,130,246,0.4)' : 'rgba(100,100,120,0.1)'),
                        borderLeft:'4px solid ' + (isMe ? '#22c55e' : isOnline ? '#3b82f6' : '#475569')
                      }}>
                        <div style={{display:'flex',alignItems:'center',gap:10}}>
                          <div style={{position:'relative',flexShrink:0}}>
                            {c.photo ? (
                              <img src={c.photo} style={{width:44,height:44,borderRadius:'50%',objectFit:'cover',border:'3px solid ' + (isMe ? '#22c55e' : isOnline ? '#3b82f6' : '#475569')}} referrerPolicy="no-referrer" />
                            ) : (
                              <div style={{width:44,height:44,borderRadius:'50%',background:isMe?'#166534':'#1e3a5f',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:18,color:'white',border:'3px solid ' + (isMe ? '#22c55e' : '#3b82f6')}}>{(c.name||'?')[0].toUpperCase()}</div>
                            )}
                            <div style={{position:'absolute',bottom:-1,right:-1,width:13,height:13,borderRadius:'50%',background:isOnline?'#22c55e':isActive?'#f59e0b':'#475569',border:'2px solid #0e0b1c'}}></div>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontWeight:800,color:'white',fontSize:15}}>{c.name}{isMe ? ' (You)' : ''}</div>
                            <div style={{fontSize:11,color:'#94a3b8'}}>
                              {isOnline ? '🟢 Online now' : isActive ? '🟡 Active today' : '⚪ Offline'}
                              {c.poles.size > 0 ? ' · ' + c.poles.size + ' pole' + (c.poles.size !== 1 ? 's' : '') : ''}
                            </div>
                          </div>
                        </div>

                        {c.enrouteTo && (
                          <div style={{background:isMe?'rgba(245,158,11,0.15)':'rgba(59,130,246,0.12)',borderRadius:10,padding:'6px 10px',marginTop:8,display:'flex',alignItems:'center',gap:6,border:'1px solid ' + (isMe ? 'rgba(245,158,11,0.3)' : 'rgba(59,130,246,0.2)')}}>
                            <span>🚗</span>
                            <span style={{fontSize:12,color:isMe?'#fbbf24':'#93c5fd',fontWeight:600}}>En-route to {c.enrouteTo}</span>
                          </div>
                        )}

                        {recentSorted.length > 0 && (
                          <div style={{marginTop:8,display:'flex',flexDirection:'column',gap:3}}>
                            {recentSorted.map(function(work, idx) {
                              return (
                                <div key={idx} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',borderRadius:6,background:'rgba(14,11,28,0.6)',fontSize:11}}>
                                  <div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>
                                    <span style={{color:'#c4b5fd',fontWeight:600}}>⚡ {work.pole}</span>
                                    {work.codes && <span style={{color:'#64748b',marginLeft:4}}>{work.codes}</span>}
                                  </div>
                                  {work.time && <span style={{color:'#475569',fontSize:10,marginLeft:4,flexShrink:0}}>{work.time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  }));
                })()}
              </div>
            )}

            {/* ─── SCHEDULE TAB ─── */}
            {tab === 'schedule' && (

    function TeamActivity({ sharedCompletions, allSites, currentUserId }) {
      // Group completions by user
      var byUser = {};
      Object.keys(sharedCompletions).forEach(function(siteId) {
        var c = sharedCompletions[siteId];
        var uid = c.completedBy || 'unknown';
        if (!byUser[uid]) {
          byUser[uid] = {
            name: c.completedByName || 'Unknown',
            photo: c.completedByPhoto || null,
            sites: []
          };

          osc.connect(gain).connect(c.destination);

          osc.stop(t + i * 0.12 + 0.6);

    }

    // ── Biometric (Fingerprint / Face ID) Authentication ──
    var BiometricAuth = {
      isAvailable: async function() {
        if (!window.PublicKeyCredential) return false;
        try {
          return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
        } catch(e) { return false; }
      },

      register: async function(userId, userEmail) {
        try {
          var challenge = crypto.getRandomValues(new Uint8Array(32));
          var credential = await navigator.credentials.create({
            publicKey: {
              challenge: challenge,
              rp: { name: "Global Route", id: window.location.hostname },
              user: {
                id: new TextEncoder().encode(userId),
                name: userEmail,
                displayName: userEmail.split('@')[0]
              },
              pubKeyCredParams: [
                { type: "public-key", alg: -7 },
                { type: "public-key", alg: -257 }
              ],
              authenticatorSelection: {
                authenticatorAttachment: "platform",
                userVerification: "required",
                residentKey: "preferred"
              },
              timeout: 60000
            }
          });
          var credId = btoa(String.fromCharCode.apply(null, new Uint8Array(credential.rawId)));
          localStorage.setItem('gr_bio_cred', credId);
          localStorage.setItem('gr_bio_email', userEmail);
          localStorage.setItem('gr_bio_uid', userId);
          localStorage.setItem('gr_bio_enabled', 'true');
          return true;
        } catch(e) {
          console.log('Biometric registration failed:', e);
          return false;
        }
      },

      verify: async function() {
        try {
          var credId = localStorage.getItem('gr_bio_cred');
          if (!credId) return false;
          var rawId = Uint8Array.from(atob(credId), function(c) { return c.charCodeAt(0); });
          var challenge = crypto.getRandomValues(new Uint8Array(32));
          var assertion = await navigator.credentials.get({
            publicKey: {
              challenge: challenge,
              allowCredentials: [{
                type: "public-key",
                id: rawId,
                transports: ["internal"]
              }],
              userVerification: "required",
              timeout: 60000
            }
          });
          return !!assertion;
        } catch(e) {
          console.log('Biometric verification failed:', e);
          return false;
        }
      },

      isEnabled: function() {
        return localStorage.getItem('gr_bio_enabled') === 'true' && !!localStorage.getItem('gr_bio_cred');
      },

      getStoredEmail: function() {
        return localStorage.getItem('gr_bio_email');
      },

      disable: function() {
        localStorage.removeItem('gr_bio_cred');
        localStorage.removeItem('gr_bio_email');
        localStorage.removeItem('gr_bio_uid');
        localStorage.removeItem('gr_bio_enabled');

        var routeKey = (!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_');
        // Optimistic local update — remove flag instantly
        setRevisits(function(prev) {
          var merged = Object.assign({}, prev);
          delete merged[siteId];
          return merged;
        });
        setMapVersion(function(v) { return v + 1; });
        db.collection('sharedRoutes').doc(routeKey)
          .collection('revisits').doc(siteId).delete()
          .catch(function(err) { console.error('Clear revisit error:', err); });
      };

      // Expose flag functions globally so map popups (plain HTML) can call them
      window.__flagRevisit = flagRevisit;
      window.__clearRevisit = clearRevisit;

      var resetProgress = function() {
        if (confirm('Reset all YOUR visited sites? This cannot be undone.')) {
          const newVisited = new Set();
          setVisited(newVisited);
          saveToFirestore(newVisited, importedFiles, importedSites);
          // Note: shared completions are NOT reset — they track team progress
        }
      };

      const handleKMZImport = function(fileName, sites) {
        var sourceName = fileName.replace(/\.[^.]+$/, '');
        // Check for overlap with existing KMZ files
        var newIds = {};
        sites.forEach(function(s) { newIds[s.id] = true; });
        var allFiles = [].concat(importedFiles, sharedKMZFiles);
        var matchedFile = null;
        for (var fi = 0; fi < allFiles.length; fi++) {
          var f = allFiles[fi];
          if (f.name === sourceName) continue;
          var fSites = [].concat(importedSites, sharedKMZSites).filter(function(s) { return s.source === f.name; });
          if (fSites.length === 0) continue;
          var ov = 0;
          fSites.forEach(function(s) { if (newIds[s.id]) ov++; });
          if (ov > fSites.length * 0.5) { matchedFile = f.name; break; }
        }

        if (matchedFile) {
          // Smart merge: keep old route key, add new unique sites
          db.collection('sharedKMZ').doc(matchedFile).get().then(function(doc) {
            var existingSites = doc.exists ? (doc.data().sites || []) : [];
            var existingIds = {};
            existingSites.forEach(function(s) { existingIds[s.id] = true; });
            var merged = existingSites.slice();
            sites.forEach(function(s) {
              if (!existingIds[s.id]) {
                merged.push(Object.assign({}, s, { source: matchedFile }));
              }
            });
            db.collection('sharedKMZ').doc(matchedFile).set({
              sites: merged,
              uploadedBy: user.uid,
              uploadedByName: user.displayName || user.email || 'Unknown',
              uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            if (sourceName !== matchedFile) {
              db.collection('sharedKMZ').doc(sourceName).delete().catch(function() {});
            }
            // Copy completions/revisits from new route key to old
            var keepRK = matchedFile.replace(/[^a-zA-Z0-9\-_]/g, '_');
            var removeRK = sourceName.replace(/[^a-zA-Z0-9\-_]/g, '_');
            if (keepRK !== removeRK) {
              db.collection('sharedRoutes').doc(removeRK).collection('completions').get().then(function(cs) {
                cs.forEach(function(cd) { db.collection('sharedRoutes').doc(keepRK).collection('completions').doc(cd.id).set(cd.data(), { merge: true }); });
              });
            }
            var cleanSites = importedSites.filter(function(s) { return s.source !== matchedFile && s.source !== sourceName; });
            var cleanFiles = importedFiles.filter(function(f) { return f.name !== matchedFile && f.name !== sourceName; });
            var updatedSites = [].concat(cleanSites, merged);
            var updatedFiles = [].concat(cleanFiles, [{ name: matchedFile, siteCount: merged.length }]);
            setImportedSites(updatedSites);
            setImportedFiles(updatedFiles);
            saveToFirestore(visited, updatedFiles, updatedSites);
            var added = merged.length - existingSites.length;
            alert('Updated "' + matchedFile + '": added ' + added + ' new site(s) (' + merged.length + ' total). All data preserved!');
          }).catch(function(err) { console.error('Merge error:', err); });
          return;
        }

        // Normal import (no overlap)
        db.collection('sharedKMZ').doc(sourceName).set({
          sites: sites,
          uploadedBy: user.uid,
          uploadedByName: user.displayName || user.email || 'Unknown',
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(function(err) { console.error('Shared KMZ save error:', err); });
        var newImported = importedSites.filter(function(s) { return s.source !== sourceName; });
        var newFiles = importedFiles.filter(function(f) { return f.name !== sourceName; });
        var updatedSites = [].concat(newImported, sites);
        var updatedFiles = [].concat(newFiles, [{ name: sourceName, siteCount: sites.length }]);
        setImportedSites(updatedSites);
        setImportedFiles(updatedFiles);
        saveToFirestore(visited, updatedFiles, updatedSites);
      };

      var handleRemoveFile = function(sourceName) {
        if (confirm('Remove all sites from "' + sourceName + '"?')) {
          // Remove from shared collection too
          db.collection('sharedKMZ').doc(sourceName).delete()
            .catch(function(err) { console.error('Shared KMZ delete error:', err); });
          var updatedSites = importedSites.filter(function(s) { return s.source !== sourceName; });
          var updatedFiles = importedFiles.filter(function(f) { return f.name !== sourceName; });
          setImportedSites(updatedSites);
          setImportedFiles(updatedFiles);
          saveToFirestore(visited, updatedFiles, updatedSites);
          if (sourceFilter === sourceName) setSourceFilter('all');
        }
      };

      // Apply source and status filters (memoized to prevent map flicker)
      const filteredSites = useMemo(function() { return sortedSites.filter(function(s) {
        if (sourceFilter !== 'all') {
          if (sourceFilter === 'builtin' && s.source !== 'builtin') return false;
          if (sourceFilter !== 'builtin' && s.source !== sourceFilter) return false;
        }
        if (filter === 'remaining') return !visited.has(s.id) && !sharedCompletions[s.id];
        if (filter === 'visited') return visited.has(s.id);
        if (filter === 'completed') return !!sharedCompletions[s.id];
        if (filter === 'revisit') return !!revisits[s.id];
        return true;
      }); }, [sortedSites, sourceFilter, filter, visited, sharedCompletions, revisits]);

      const currentTargetId = useMemo(function() { var found = sortedSites.find(function(s) { if (visited.has(s.id) || sharedCompletions[s.id]) return false; var er = enroutes[s.id]; if (er && er.userId && er.userId !== user.uid) return false; return true; }); return found ? found.id : null; }, [sortedSites, visited, sharedCompletions, enroutes, user]);
      const remainingCount = useMemo(function() { return sortedSites.filter(function(s) { return !visited.has(s.id) && !sharedCompletions[s.id]; }).length; }, [sortedSites, visited, sharedCompletions]);
      const teamCompletedCount = useMemo(function() { return Object.keys(sharedCompletions).length; }, [sharedCompletions]);
      const revisitCount = useMemo(function() { return Object.keys(revisits).length; }, [revisits]);

      // ── Confetti celebration ──
      const [showConfetti, setShowConfetti] = useState(false);
      const confettiFiredRef = useRef(false);
      useEffect(function() {
        if (allSites.length > 0 && teamCompletedCount >= allSites.length && !confettiFiredRef.current) {
          confettiFiredRef.current = true;
          playVictorySound();
          setShowConfetti(true);
          setTimeout(function() { setShowConfetti(false); }, 4000);
        }
        if (teamCompletedCount < allSites.length) { confettiFiredRef.current = false; }
      }, [teamCompletedCount, allSites.length]);

      // Loading screen
      if (!permissionGranted) {
        if (loading) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen gap-4 p-8 text-center">
              <div className="relative">
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-24 h-24 rounded-full border-2 border-primary/30 pulse-ring"></div>
                </div>
                <div className="relative z-10 bg-primary/10 rounded-full p-6"><MapPinIcon size={48} className="text-primary" /></div>
              </div>
              <span className="loading loading-spinner loading-lg text-primary"></span>
              <p className="opacity-70 text-lg font-semibold">Finding your location…</p>
              <p className="text-xs opacity-40">Allow location access when your browser asks</p>
            </div>
          );
        }
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-5 p-8 text-center" style={{background:'linear-gradient(135deg,#140d2e 0%,#0e0920 100%)'}}>
            <div style={{background:'linear-gradient(135deg,rgba(239,68,68,0.15),rgba(239,68,68,0.05))',borderRadius:'50%',padding:24,border:'2px solid rgba(239,68,68,0.3)'}}>
              <MapPinIcon size={48} style={{color:'#ef4444'}} />
            </div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.5rem',fontWeight:700,color:'#d4af37',margin:0}}>Location Required</h2>
            <p style={{color:'rgba(255,255,255,0.7)',fontSize:14,maxWidth:320,lineHeight:1.6,margin:0}}>
              Global Route needs your GPS location to navigate you to job sites, track routes, and sync with your crew.
            </p>
            {geoError && (<div style={{background:'rgba(245,158,11,0.15)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:12,padding:'10px 16px',color:'#fbbf24',fontSize:13,maxWidth:320,display:'flex',alignItems:'center',gap:8}}>
              <MapPinIcon size={16} /><span>{geoError}</span>
            </div>)}
            <button className="btn btn-primary btn-lg gap-2" onClick={requestLocation} style={{background:'linear-gradient(135deg,#7c3aed,#6d28d9)',border:'none',borderRadius:12,fontWeight:600,fontSize:16,padding:'14px 32px',boxShadow:'0 4px 15px rgba(124,58,237,0.4)'}}>
              <MapPinIcon size={20} /> Enable Location
            </button>
            <div style={{background:'rgba(139,92,246,0.08)',border:'1px solid rgba(139,92,246,0.15)',borderRadius:16,padding:'16px 20px',maxWidth:320,textAlign:'left',marginTop:8}}>
              <p style={{color:'rgba(255,255,255,0.9)',fontSize:13,fontWeight:600,margin:'0 0 8px'}}>📱 If location is blocked:</p>
              <p style={{color:'rgba(255,255,255,0.5)',fontSize:12,margin:'0 0 4px'}}>
                <strong style={{color:'rgba(255,255,255,0.7)'}}>Android:</strong> Settings → Apps → Chrome → Permissions → Location → Allow
              </p>
              <p style={{color:'rgba(255,255,255,0.5)',fontSize:12,margin:0}}>
                <strong style={{color:'rgba(255,255,255,0.7)'}}>iPhone:</strong> Settings → Safari → Location → Allow
              </p>
            </div>
            <p style={{color:'rgba(255,255,255,0.3)',fontSize:11,maxWidth:280,margin:'8px 0 0'}}>
              🔒 Your location is only shared with your crew while the app is open
            </p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <div style={{background:'linear-gradient(135deg,#140d2e 0%,#0e0920 100%)',borderBottom:'1px solid rgba(139,92,246,0.12)',padding:'14px 20px 10px',boxShadow:'0 4px 24px rgba(0,0,0,0.35)'}}>
            <div className="flex items-center justify-between">
              <h1 className="flex items-center gap-2" style={{margin:0}}>
                <span style={{fontSize:'22px',filter:'drop-shadow(0 0 8px rgba(212,175,55,0.3))'}}>🧭</span>
                <div>
                  <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,letterSpacing:'0.1em',fontSize:'1.15rem',color:'#d4af37',textShadow:'0 0 20px rgba(212,175,55,0.2)'}}>GLOBAL ROUTE</span>
                  <div style={{fontSize:'0.5rem',letterSpacing:'0.3em',color:'rgba(212,175,55,0.5)',marginTop:'-1px',fontWeight:600}}>ROUTE • TRACK • MANAGE</div>
                </div>
              </h1>
              <UserMenu user={user} avatarURL={avatarURL} onLogout={onLogout} onChangePhoto={function() { setShowAvatarSetup(true); }} onDownloadReport={handleDownloadReport} onShowFiberProduction={function() { setShowFiberProduction(true); }} />
            </div>
            <div style={{textAlign:'center',fontSize:'0.7rem',color:'rgba(168,163,184,0.7)',marginTop:6,fontWeight:500,letterSpacing:'0.02em'}}>
              {allSites.length} sites • {teamCompletedCount} completed • Nearest-First Routing
            </div>
          </div>

          {/* Toolbar */}
          <div style={{position:'sticky',top:0,zIndex:1000,background:'rgba(14,11,28,0.88)',backdropFilter:'blur(16px) saturate(1.2)',WebkitBackdropFilter:'blur(16px) saturate(1.2)',borderBottom:'1px solid rgba(139,92,246,0.1)',padding:'12px 20px',display:'flex',flexWrap:'wrap',alignItems:'center',gap:12}}>
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <NavIcon size={16} className="text-primary shrink-0" />
              <span style={{fontWeight:700,fontSize:14,color:'var(--text-primary)'}}>{remainingCount} remaining</span>
              <span style={{fontSize:11,color:'var(--text-muted)',fontWeight:500}}>({visited.size} you • {teamCompletedCount} team)</span>
              <span style={{fontSize:9,color:'var(--text-muted)',opacity:0.4}}>v59</span>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button className="btn btn-sm btn-outline btn-warning gap-1" onClick={function() { setShowKMZManager(true); }} title="Import KMZ">
                <FolderIcon size={14} />
                {importedFiles.length > 0 && <span className="badge badge-xs badge-warning">{importedFiles.length}</span>}
              </button>
              <div className="join">
                <button className={`join-item btn btn-sm ${view === 'list' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('list'); }} title="List view"><ListIcon size={14} /></button>
                <button className={`join-item btn btn-sm ${view === 'map' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('map'); }} title="Map view"><MapIcon size={14} /></button>
                <button className={`join-item btn btn-sm ${view === 'team' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('team'); }} title="Team Activity">👥</button>
              </div>
              {view === 'list' && (
                <select className="select select-bordered select-sm" value={filter} onChange={function(e) { setFilter(e.target.value); }}>
                  <option value="all">All ({sortedSites.length})</option>
                  <option value="remaining">Remaining ({remainingCount})</option>
                  <option value="visited">My Visited ({visited.size})</option>
                  <option value="completed">Team Done ({teamCompletedCount})</option>
                  <option value="revisit">🔄 Revisit ({revisitCount})</option>
                </select>
              )}
              <button className="btn btn-sm btn-outline btn-primary" onClick={requestLocation} title="Refresh GPS"><RefreshIcon size={14} /></button>
              {visited.size > 0 && <button className="btn btn-sm btn-outline btn-error" onClick={resetProgress} title="Reset my progress">↺</button>}
            </div>
          </div>

          {/* Source filter bar */}
          {(importedFiles.length > 0 || sharedKMZFiles.length > 0) && (
            <div className="px-4 py-2 bg-base-200 border-b border-base-300 flex gap-2 overflow-x-auto">
              <button className={`btn btn-xs ${sourceFilter === 'all' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setSourceFilter('all'); }}>All Sources ({allSites.length})</button>
              <button className={`btn btn-xs ${sourceFilter === 'builtin' ? 'btn-success' : 'btn-ghost'}`} onClick={function() { setSourceFilter('builtin'); }}>Built-in ({BUILTIN_SITES.length})</button>
              {importedFiles.map(function(f) { return (
                <button key={f.name} className={`btn btn-xs ${sourceFilter === f.name ? 'btn-warning' : 'btn-ghost'}`} onClick={function() { setSourceFilter(f.name); }}>{f.name} ({f.siteCount})</button>
              ); })}
              {sharedKMZFiles.filter(function(sf) { return !importedFiles.some(function(pf) { return pf.name === sf.name; }); }).map(function(sf) { return (
                <button key={'shared-' + sf.name} className={'btn btn-xs ' + (sourceFilter === sf.name ? 'btn-info' : 'btn-ghost')} onClick={function() { setSourceFilter(sf.name); }}>👥 {sf.name} ({sf.siteCount})</button>
              ); })}
            </div>
          )}

          {/* Default location banner */}
          {usingDefault && (
            <div className="px-4 py-2 bg-warning/20 text-warning-content text-xs flex items-center justify-between gap-2">
              <span>📍 Using approximate location — enable GPS for accurate distances</span>
              <button className="btn btn-xs btn-warning" onClick={requestLocation}>Use My GPS</button>
            </div>
          )}

          {/* Location bar */}
          {userLoc && !usingDefault && view === 'list' && (
            <div className="px-4 py-2 bg-base-200 text-xs opacity-60 flex items-center gap-1">
              <MapPinIcon size={12} /> Your location: {userLoc.lat.toFixed(5)}, {userLoc.lon.toFixed(5)}
            </div>
          )}

          {/* Content */}
          {view === 'team' ? (
            <TeamActivity sharedCompletions={sharedCompletions} allSites={sortedSites} currentUserId={user.uid} />
          ) : view === 'map' ? (
            <SiteMap sites={filteredSites} userLoc={userLoc} visited={visited} sharedCompletions={sharedCompletions} currentTargetId={currentTargetId} myAvatarURL={avatarURL} myPhotoURL={user.photoURL} enroutes={enroutes} revisits={revisits} mapVersion={mapVersion} />
          ) : (
            <div className="flex flex-col gap-3 p-4 pb-24">
              {filteredSites.length === 0 ? (
                <div className="text-center py-12 opacity-50">
                  {filter === 'visited' ? 'No sites visited yet.' : filter === 'completed' ? 'No team completions yet.' : '🎉 All sites completed! Great work team!'}
                </div>
              ) : (
                filteredSites.map(function(site, idx) { return (
                  <SiteCard key={`${site.source}-${site.id}`} site={site} index={idx} total={filteredSites.length}
                    isCurrent={site.id === currentTargetId} isVisited={visited.has(site.id)}
                    sharedCompletion={sharedCompletions[site.id]}
                    onMarkVisited={function() { markVisited(site.id, site); }}
                    onUndoVisit={function() { undoVisit(site.id, site); }}
                    currentUserId={user.uid}
                    myAvatarURL={avatarURL} myPhotoURL={user.photoURL}
                    noteCount={noteCounts[`${(!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_')}_${site.id}`] || 0}
                    onOpenNotes={function() { setActiveNoteSite(site); }}
                    photoCount={photoCounts[`${(!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_')}_${site.id}`] || 0}
                    onOpenPhotos={function() { setActivePhotoSite(site); }}
                    enrouteInfo={enroutes[site.id]}
                    onClaimEnroute={function(e) { claimEnroute(site.id, site, e); }}
                    onCancelEnroute={function() { cancelEnroute(site.id, site); }}
                    revisitInfo={revisits[site.id]}
                    onFlagRevisit={function() { flagRevisit(site.id, site); }}
                    onClearRevisit={function() { clearRevisit(site.id, site); }} />
                ); })
              )}
            </div>
          )}

          {/* Map Legend */}
          {view === 'map' && (
            <div className="fixed bottom-4 left-4 z-[1000] bg-base-200/95 backdrop-blur rounded-lg p-3 shadow-lg text-xs space-y-1">
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#3b82f6',border:'2px solid white'}}></div> Your Location</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#a855f7',border:'2px solid #fbbf24'}}></div> Next Stop</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid white'}}></div> Existing Cabinet</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#ef4444',border:'2px solid white'}}></div> Out of Scope</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#f59e0b',border:'2px solid white'}}></div> Imported</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#6b7280',border:'2px solid white'}}></div> Completed</div>
            </div>
          )}

          {/* KMZ Manager Modal */}
          {showKMZManager && (
            <KMZManager importedFiles={importedFiles} sharedFiles={sharedKMZFiles} onImport={handleKMZImport} onRemoveFile={handleRemoveFile} onClose={function() { setShowKMZManager(false); }} />
          )}

          {/* Notes Panel */}
          {activeNoteSite && (
            <NotesPanel site={activeNoteSite} user={user} avatarURL={avatarURL} onClose={function() { setActiveNoteSite(null); }} />
          )}

          {/* Photos Panel */}
          {activePhotoSite && (
            <SitePhotosPanel
              site={activePhotoSite}
              userId={user.uid}
              userName={user.displayName || 'Anonymous'}
              avatarURL={avatarURL || user.photoURL || null}
              onClose={function() { setActivePhotoSite(null); }}
            />
          )}

          {/* Fiber Production Panel */}
          {showFiberProduction && (
            <FiberProductionPanel user={user} avatarURL={avatarURL} sites={allSites} onClose={function() { setShowFiberProduction(false); }} />
          )}

          {/* Avatar Setup Overlay */}
          {showAvatarSetup && (
            <div className="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center">
              <div className="relative w-full max-w-sm mx-4">
                <button className="absolute -top-10 right-0 btn btn-sm btn-ghost text-white" onClick={function() { setShowAvatarSetup(false); }}>✕ Cancel</button>
                <AvatarSetup user={user} onComplete={function(url) { setAvatarURL(url); setShowAvatarSetup(false); }} />
              </div>
            </div>
          )}

          {/* En-Route Confirmation Modal */}
          {enrouteConfirm && (
            <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
              onClick={enrouteConfirm.onNo}>
              <div style={{background:'#1d232a',borderRadius:16,padding:24,maxWidth:320,width:'100%',textAlign:'center',boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}
                onClick={function(e){e.stopPropagation();}}>
                <div style={{fontSize:24,marginBottom:12}}>🚗 Heads Up!</div>
                {enrouteConfirm.userPhoto ? (
                  <img src={enrouteConfirm.userPhoto} alt="" style={{width:64,height:64,borderRadius:'50%',objectFit:'cover',border:'3px solid #3b82f6',marginBottom:8}} />
                ) : (
                  <div style={{width:64,height:64,borderRadius:'50%',background:'#3b82f6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 8px',fontSize:28,color:'white'}}>
                    {(enrouteConfirm.userName || '?').charAt(0).toUpperCase()}
                  </div>
                )}
                <div style={{fontWeight:700,fontSize:16,color:'white',marginBottom:4}}>{enrouteConfirm.userName}</div>
                <div style={{color:'#94a3b8',fontSize:14,marginBottom:20}}>is already en-route to this site.<br/>Go anyway?</div>
                <div style={{display:'flex',gap:12}}>
                  <button onClick={enrouteConfirm.onNo} style={{flex:1,padding:'10px 0',borderRadius:8,border:'1px solid #475569',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer'}}>Cancel</button>
                  <a href={enrouteConfirm.directionsUrl || '#'} target="_blank" rel="noopener"
                    onClick={enrouteConfirm.onYes}
                    style={{flex:1,padding:'10px 0',borderRadius:8,border:'none',background:'#570df8',color:'white',fontWeight:600,fontSize:14,cursor:'pointer',textDecoration:'none',textAlign:'center',display:'block'}}>Go Anyway</a>
                </div>
              </div>
            </div>
          )}

          {/* Confetti celebration */}
          {showConfetti && ReactDOM.createPortal(
            html`<div style=${{position:'fixed',inset:0,pointerEvents:'none',zIndex:99999,overflow:'hidden'}}>
              <div style=${{position:'absolute',top:'35%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',zIndex:100000,animation:'confettiBannerIn 0.5s ease-out'}}>
                <div style=${{fontSize:64,marginBottom:8}}>🎉</div>
                <div style=${{fontFamily:"'Playfair Display', serif",fontSize:28,fontWeight:900,color:'#f0d68a',textShadow:'0 0 20px rgba(192,168,76,0.6)',letterSpacing:3}}>ALL COMPLETE!</div>
                <div style=${{fontSize:16,color:'#a78bfa',marginTop:4,fontWeight:600}}>Every site has been visited 🏆</div>
              </div>
              ${Array.from({length:60}, function(_, i) {
                const colors = ['#c9a84c','#f0d68a','#7c3aed','#a855f7','#22c55e','#3b82f6','#ef4444','#f59e0b'];
                return html`<div key=${i} style=${{
                  position:'absolute',
                  left: (50 + (Math.random()-0.5)*20) + '%',
                  top: '-5%',
                  width: 6 + Math.random()*10,
                  height: 8 + Math.random()*12,
                  backgroundColor: colors[Math.floor(Math.random()*colors.length)],
                  borderRadius: Math.random() > 0.5 ? '50%' : '1px',
                  animation: 'confettiFall ' + (1.5+Math.random()) + 's ease-in ' + (Math.random()*0.6) + 's forwards',
                  opacity: 0.9,
                  '--vx': ((Math.random()-0.5)*60) + 'px',
                  '--vy': (40+Math.random()*60) + 'vh',
                }}></div>`;
              })}
            </div>`,
            document.body
          )}

          {/* Install Banner */}
          {showInstallBanner && !isStandalone && (
            <InstallBanner onInstall={handleInstall} onDismiss={dismissInstall} isIOS={isIOS} hasNativePrompt={installPrompt != null} />
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('React error:', error, info); }
      render() {
        if (this.state.error) {
          return React.createElement('div', { style: { padding: 40, color: 'white', background: '#1d232a', minHeight: '100vh' } },
            React.createElement('h2', null, '⚠️ App Error'),
            React.createElement('pre', { style: { whiteSpace: 'pre-wrap', color: '#f87171', fontSize: 14 } }, String(this.state.error)),
            React.createElement('button', { onClick: async function() { try { if ('caches' in window) { var keys = await caches.keys(); await Promise.all(keys.map(function(k) { return caches.delete(k); })); } if ('serviceWorker' in navigator) { var regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(function(r) { return r.unregister(); })); } } catch(e) {} setTimeout(function() { location.href = location.pathname + '?bust=' + Date.now(); }, 500); }, style: { marginTop: 20, padding: '12px 24px', background: 'linear-gradient(135deg,#570df8,#a855f7)', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 16, fontWeight: 700 } }, '🔄 Clear Cache & Reload')
          );
        }
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
</html>
