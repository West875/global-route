    // ── KMZ/KML Parser ──
    async function parseKMZFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      let kmlText;
      try {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const kmlFile = Object.keys(zip.files).find(function(name) { return name.endsWith('.kml'); });
        if (kmlFile) kmlText = await zip.files[kmlFile].async('text');
      } catch (e) {
        kmlText = new TextDecoder().decode(arrayBuffer);
      }
      if (!kmlText) throw new Error('No KML data found in file');
      const parser = new DOMParser();
      const doc = parser.parseFromString(kmlText, 'text/xml');
      const placemarks = doc.querySelectorAll('Placemark');
      const sites = [];
      placemarks.forEach(function(pm, idx) {
        const nameEl = pm.querySelector('name');
        const name = nameEl ? nameEl.textContent.trim() : `Site ${idx + 1}`;
        const descEl = pm.querySelector('description');
        var rawDesc = descEl ? descEl.textContent.trim() : '';
        // Strip HTML tags and extract clean address text
        var tempDiv = document.createElement('div');
        tempDiv.innerHTML = rawDesc;
        var description = tempDiv.textContent.trim().replace(/\s+/g, ' ');
        let coords = null;
        const pointCoords = pm.querySelector('Point coordinates');
        if (pointCoords) {
          const parts = pointCoords.textContent.trim().split(',');
          if (parts.length >= 2) coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
        }
        if (!coords) {
          const anyCoords = pm.querySelector('coordinates');
          if (anyCoords) {
            const first = anyCoords.textContent.trim().split(/\s+/)[0];
            const parts = first.split(',');
            if (parts.length >= 2) coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
          }
        }
        if (coords && !isNaN(coords.lat) && !isNaN(coords.lon)) {
          let status = 'Imported';
          const extData = pm.querySelectorAll('ExtendedData Data, ExtendedData SimpleData');
          extData.forEach(function(d) {
            const dName = (d.getAttribute('name') || '').toLowerCase();
            if (dName.includes('status') || dName.includes('type')) {
              const val = d.querySelector('value') || d;
              status = val.textContent.trim() || status;
            }
          });
          sites.push({ id: name, address: description || `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`, status, lat: coords.lat, lon: coords.lon, source: file.name.replace(/\.[^.]+$/, '') });
        }
      });
      return sites;
    }

    // ── Geo Helpers ──
    function toRad(deg) { return (deg * Math.PI) / 180; }
    function haversineDistance(loc1, loc2) {
      const R = 3958.8;
      const dLat = toRad(loc2.lat - loc1.lat);
      const dLon = toRad(loc2.lon - loc1.lon);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(loc1.lat)) * Math.cos(toRad(loc2.lat)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function sortByNearest(sites, userLoc) {
      return sites.map(function(s) { return { ...s, distance: haversineDistance(userLoc, { lat: s.lat, lon: s.lon }) }; }).sort(function(a, b) { return a.distance - b.distance; });
    }
    function directionsUrl(site) {
      return `https://www.google.com/maps/dir/?api=1&destination=${site.lat},${site.lon}`;
    }

      const [cameraReady, setCameraReady] = useState(false);

      const startCamera = useCallback(async function() {
        setError(null);
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }, audio: false });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.onloadedmetadata = function() { setCameraReady(true); };
          }
        } catch (err) {
          setError('Camera access denied. Please allow camera access and try again.');
        }
      }, []);

      useEffect(function() { startCamera(); return function() { if (stream) stream.getTracks().forEach(function(t) { t.stop(); }); }; }, []);

      var capturePhoto = function() {
        if (!videoRef.current || !canvasRef.current) return;
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const size = Math.min(video.videoWidth, video.videoHeight);
        const sx = (video.videoWidth - size) / 2;
        const sy = (video.videoHeight - size) / 2;
        canvas.width = 150;
        canvas.height = 150;
        const ctx = canvas.getContext('2d');
        // Mirror the image (front camera is mirrored)
        ctx.translate(150, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, size, size, 0, 0, 150, 150);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        setCaptured(dataUrl);
        if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
      };

      var retake = async function() {
        setCaptured(null);
        setCameraReady(false);
        await startCamera();
      };

      var saveAvatar = async function() {
        if (!captured) return;
        setSaving(true);
        try {
          await db.collection('users').doc(user.uid).set({
            avatarURL: captured,
            avatarSetAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          onComplete(captured);
        } catch (err) {
          setError('Failed to save photo. Please try again.');
          setSaving(false);
        }
      };

      var handleFileUpload = function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
          const img = new Image();
          img.onload = function() {
            const canvas = canvasRef.current;
            canvas.width = 150;
            canvas.height = 150;
            const ctx = canvas.getContext('2d');
            const size = Math.min(img.width, img.height);
            const sx = (img.width - size) / 2;
            const sy = (img.height - size) / 2;
            ctx.drawImage(img, sx, sy, size, size, 0, 0, 150, 150);
            setCaptured(canvas.toDataURL('image/jpeg', 0.7));
            if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="auth-bg min-h-screen flex items-center justify-center p-6">
          <div className="card bg-base-200 w-full max-w-md glow-card fade-in">
            <div className="card-body gap-4">

              <div className="flex flex-col gap-2 mt-2">

      const [captured, setCaptured] = useState(null);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraReady, setCameraReady] = useState(false);

      const startCamera = useCallback(async function() {
        setError(null);
        setCameraActive(true);
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }, audio: false });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.onloadedmetadata = function() { setCameraReady(true); };
          }
        } catch (err) {
          setError('Camera access denied. Please use the upload option.');
          setCameraActive(false);
        }
      }, []);

      useEffect(function() {
        startCamera();
        return function() { if (stream) stream.getTracks().forEach(function(t) { t.stop(); }); };
      }, []);

      // Re-attach stream when videoRef becomes available
      useEffect(function() {
        if (stream && videoRef.current && !videoRef.current.srcObject) {
          videoRef.current.srcObject = stream;
          videoRef.current.onloadedmetadata = function() { setCameraReady(true); };
        }
      }, [stream, cameraActive]);

      var capturePhoto = function() {
        if (!videoRef.current || !canvasRef.current) return;

        const canvas = canvasRef.current;
        const size = Math.min(video.videoWidth, video.videoHeight);
        canvas.width = 400;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        const sx = (video.videoWidth - size) / 2;
        const sy = (video.videoHeight - size) / 2;
        ctx.save();
        ctx.translate(400, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, size, size, 0, 0, 400, 400);
        ctx.restore();
        setCaptured(canvas.toDataURL('image/jpeg', 0.85));
        if (stream) stream.getTracks().forEach(function(t) { t.stop(); });
        setCameraActive(false);

        <div className="relative">
          <button className="btn btn-ghost p-0" style={{minWidth:'44px',minHeight:'44px'}} onClick={function() { setOpen(!open); }} title={displayName}>
            {photoSrc ? (
              <img src={photoSrc} alt="" className="w-10 h-10 rounded-full object-cover ring-2 ring-white/50" referrerPolicy="no-referrer" />
            ) : (
              <div className="w-10 h-10 rounded-full bg-warning text-warning-content flex items-center justify-center text-lg font-bold ring-2 ring-white/50">
                {initial}
              </div>
            )}
          </button>
          {open && (
            <>
              <div className="fixed inset-0 z-[3000]" onClick={function() { setOpen(false); }}></div>
              <div className="absolute right-0 top-full mt-1 z-[3001] bg-base-200 rounded-lg shadow-xl border border-base-300 min-w-[220px] fade-in">
                <div className="p-3 border-b border-base-300">
                  <p className="font-semibold text-sm">{displayName}</p>
                  <p className="text-xs opacity-50">{user.email}</p>
                </div>
                <div className="p-1">
                  <button className="btn btn-sm btn-ghost w-full justify-start gap-2" onClick={function() { setOpen(false); onChangePhoto(); }}>
                    📷 {photoSrc ? 'Change Photo' : 'Take Photo'}
                  </button>
                  <button className="btn btn-sm btn-ghost w-full justify-start gap-2" onClick={function() { setOpen(false); onDownloadReport(); }}>
                    📥 Download Report
                  </button>
                  <button className="btn btn-sm btn-ghost w-full justify-start gap-2 text-error" onClick={function() { setOpen(false); onLogout(); }}>
                    <LogOutIcon size={14} /> Sign Out
                  </button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ── Leaflet Map Component ──
    function SiteMap({ sites, userLoc, visited, sharedCompletions, currentTargetId, myAvatarURL, myPhotoURL, enroutes, revisits, mapVersion }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const userLayerRef = useRef(null);
      const sitesLayerRef = useRef(null);
      const hasInitFit = useRef(false);

      // Initialize map once
      useEffect(function() {
        if (mapInstanceRef.current) return;
        const center = [33.6891, -78.8867];
        const map = L.map(mapRef.current, { zoomControl: true }).setView(center, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
        mapInstanceRef.current = map;
        userLayerRef.current = L.layerGroup().addTo(map);
        sitesLayerRef.current = L.layerGroup().addTo(map);
        if (!document.getElementById('pulse-css')) {
          const style = document.createElement('style');
          style.id = 'pulse-css';
          style.textContent = '@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } } @keyframes pulseRed { 0%,100% { box-shadow: 0 0 6px 3px #ef444480; transform: scale(1); } 50% { box-shadow: 0 0 20px 8px #ef4444cc, 0 0 40px 12px #ef444466; transform: scale(1.4); } } @keyframes pulseOrange { 0%,100% { box-shadow: 0 0 6px 3px #f59e0b80; transform: scale(1); } 50% { box-shadow: 0 0 18px 6px #f59e0bcc, 0 0 35px 10px #f59e0b66; transform: scale(1.3); } } @keyframes waveFlag { 0% { transform: rotate(-15deg); } 15% { transform: rotate(20deg); } 30% { transform: rotate(-12deg); } 45% { transform: rotate(15deg); } 60% { transform: rotate(-8deg); } 75% { transform: rotate(10deg); } 100% { transform: rotate(-15deg); } } @keyframes flagGlow { 0%,100% { text-shadow: 0 0 4px #ef444480; } 50% { text-shadow: 0 0 14px #ef4444, 0 0 28px #ef444488; } }';
          document.head.appendChild(style);
        }
        return function() { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
      }, []);

      // Update user location marker (smooth — no map rebuild)
      useEffect(function() {
        if (!userLayerRef.current) return;
        userLayerRef.current.clearLayers();
        if (userLoc) {
          const userIcon = L.divIcon({ html: '<div style="width:16px;height:16px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(59,130,246,0.6);"></div>', iconSize: [16, 16], iconAnchor: [8, 8], className: '' });
          L.marker([userLoc.lat, userLoc.lon], { icon: userIcon }).addTo(userLayerRef.current).bindPopup('<b>📍 Your Location</b>');
        }
      }, [userLoc]);



      // Update site markers
      useEffect(function() {
        if (!sitesLayerRef.current) return;
        sitesLayerRef.current.clearLayers();

        sites.forEach(function(site) {
          const isExisting = site.status.includes('Existing Cabinet');
          const isImported = site.source && site.source !== 'builtin';
          const isVisited = visited.has(site.id);
          const isSharedComplete = sharedCompletions[site.id];
          const isCurrent = site.id === currentTargetId;

          var isEnroute = enroutes && enroutes[site.id];
          var isFlagged = revisits && revisits[site.id];
          let color = isImported ? '#f59e0b' : (isExisting ? '#22c55e' : '#ef4444');
          let borderColor = 'white';
          let size = 14;
          if (isCurrent) { color = '#a855f7'; borderColor = '#fbbf24'; size = 20; }
          if (isEnroute && !isVisited && !isSharedComplete) { color = '#f59e0b'; borderColor = '#fff'; size = 18; }
          if (isVisited || isSharedComplete) { color = '#6b7280'; }
          if (isFlagged) { color = '#ef4444'; borderColor = '#fbbf24'; size = 18; }

          var animStyle = '';
          if (isCurrent) { animStyle = 'animation:pulse 1.5s infinite;'; }
          if (isEnroute && !isVisited && !isSharedComplete) { animStyle = 'animation:pulseOrange 1.5s infinite;'; }
          if (isFlagged) { animStyle = 'animation:pulseRed 1.5s infinite;'; }

          var iconHtml = '';
          var iconW = size; var iconH = size; var anchorX = size/2; var anchorY = size/2;

          if (isFlagged && !isVisited && !isSharedComplete) {
            // Waving caution flag marker
            iconW = 40; iconH = 50; anchorX = 12; anchorY = 45;
            iconHtml = '<div style="position:relative;width:40px;height:50px;">' +
              '<div style="position:absolute;bottom:0;left:10px;width:3px;height:32px;background:#444;border-radius:2px;"></div>' +
              '<div style="position:absolute;top:0;left:13px;font-size:28px;transform-origin:bottom left;animation:waveFlag 0.8s ease-in-out infinite;animation:waveFlag 0.8s ease-in-out infinite, flagGlow 1.5s ease-in-out infinite;">&#9873;</div>' +
              '<div style="position:absolute;bottom:-2px;left:5px;width:14px;height:6px;background:#ef444480;border-radius:50%;filter:blur(2px);"></div>' +
              '</div>';
          } else if (isEnroute && !isVisited && !isSharedComplete && isEnroute.userPhoto) {
            // En-route with avatar photo on marker
            iconW = 36; iconH = 36; anchorX = 18; anchorY = 18;
            iconHtml = '<div style="position:relative;width:36px;height:36px;' + animStyle + '">' +
              '<img src="' + isEnroute.userPhoto + '" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:3px solid #f59e0b;box-shadow:0 0 8px #f59e0baa;" referrerpolicy="no-referrer" />' +
              '<div style="position:absolute;bottom:-2px;right:-2px;font-size:14px;">&#128663;</div>' +
              '</div>';
          } else if (isEnroute && !isVisited && !isSharedComplete) {
            // En-route without photo — show initial
            var erInitial = (isEnroute.userName || '?').charAt(0).toUpperCase();
            iconW = 36; iconH = 36; anchorX = 18; anchorY = 18;
            iconHtml = '<div style="position:relative;width:36px;height:36px;' + animStyle + '">' +
              '<div style="width:32px;height:32px;border-radius:50%;background:#f59e0b;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:15px;box-shadow:0 0 8px #f59e0baa;">' + erInitial + '</div>' +
              '<div style="position:absolute;bottom:-2px;right:-2px;font-size:14px;">&#128663;</div>' +
              '</div>';
          } else {
            iconHtml = '<div style="width:' + size + 'px;height:' + size + 'px;background:' + color + ';border:' + (isCurrent ? '3' : '2') + 'px solid ' + borderColor + ';border-radius:50%;box-shadow:0 0 ' + (isCurrent ? '12px' : '4px') + ' ' + color + '80;' + animStyle + '"></div>';
          }

          const icon = L.divIcon({
            html: iconHtml,
            iconSize: [iconW, iconH], iconAnchor: [anchorX, anchorY], className: ''
          });

          const distText = site.distance !== undefined ? `<br>📍 ${site.distance.toFixed(2)} mi away` : '';
          const sourceBadge = isImported
            ? `<span style="background:#f59e0b;color:black;padding:1px 6px;border-radius:8px;font-size:11px;">${site.source}</span>`
            : (isExisting ? '<span style="background:#22c55e;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Existing Cabinet</span>' : '<span style="background:#ef4444;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Out of Scope</span>');
          const currentBadge = isCurrent ? '<div style="background:#a855f7;color:white;padding:2px 8px;border-radius:8px;font-size:11px;text-align:center;margin-bottom:4px;">⭐ NEXT STOP</div>' : '';

          let closedByHtml = '';
          if (isVisited || isSharedComplete) {
            const closerName = isVisited ? 'You' : (isSharedComplete ? isSharedComplete.completedByName : 'Team Member');
            const initial = closerName.charAt(0).toUpperCase();
            const bgColor = isVisited ? '#22c55e' : '#6366f1';
            const photoUrl = isVisited ? (myAvatarURL || myPhotoURL || null) : (isSharedComplete ? isSharedComplete.completedByPhoto : null);
            let timeStr = '';
            if (isSharedComplete && isSharedComplete.completedAt) {
              try { timeStr = new Date(isSharedComplete.completedAt.toDate()).toLocaleString(); } catch(e) {}
            }
            const avatarHtml = photoUrl
              ? `<img src="${photoUrl}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid ${bgColor};flex-shrink:0;" />`
              : `<div style="width:28px;height:28px;border-radius:50%;background:${bgColor};color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;">${initial}</div>`;
            closedByHtml = `
              <div style="background:${bgColor}15;border:1px solid ${bgColor}40;border-radius:8px;padding:8px;margin:6px 0;display:flex;align-items:center;gap:8px;">
                ${avatarHtml}
                <div>
                  <div style="font-weight:700;font-size:13px;color:${bgColor};">✅ Completed by ${closerName}</div>
                  ${timeStr ? `<div style="font-size:10px;opacity:0.7;">${timeStr}</div>` : ''}
                </div>
              </div>`;
          }

          var enrouteHtml = '';
          if (isEnroute && !isVisited && !isSharedComplete) {
            var erName = isEnroute.userName || 'Teammate';
            var erPhoto = isEnroute.userPhoto;
            var erAvatarHtml = erPhoto
              ? '<img src="' + erPhoto + '" style="width:24px;height:24px;border-radius:50%;object-fit:cover;border:2px solid #fff;flex-shrink:0;" referrerPolicy="no-referrer" />'
              : '<div style="width:24px;height:24px;border-radius:50%;background:#fff3;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:11px;flex-shrink:0;">' + erName.charAt(0).toUpperCase() + '</div>';
            enrouteHtml = '<div style="background:#f59e0b;color:#fff;padding:6px 8px;border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;">' + erAvatarHtml + ' 🚗 ' + erName + ' is en-route</div>';
          }

          var revisitData = revisits && revisits[site.id];
          var revisitHtml = '';
          if (revisitData) {
            var rvName = revisitData.flaggedByName || 'Someone';
            var rvPhoto = revisitData.flaggedByPhoto;
            var rvAvatarHtml = rvPhoto
              ? '<img src="' + rvPhoto + '" style="width:22px;height:22px;border-radius:50%;object-fit:cover;border:2px solid #f59e0b;flex-shrink:0;" referrerPolicy="no-referrer" />'
              : '<div style="width:22px;height:22px;border-radius:50%;background:#f59e0b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:10px;flex-shrink:0;">' + rvName.charAt(0).toUpperCase() + '</div>';
            revisitHtml = '<div style="background:#fef3c7;border:1px solid #f59e0b80;border-radius:6px;padding:6px 8px;margin:6px 0;display:flex;align-items:center;gap:6px;">' + rvAvatarHtml + '<span style="font-size:12px;font-weight:600;color:#92400e;">🔄 Flagged by ' + rvName + '</span></div>';
          }

          var flagBtnHtml = revisitData
            ? '<button onclick="(function(){ try { var sid=&quot;' + site.id + '&quot;; var s=(window.__allSites||[]).find(function(x){return x.id===sid;}); if(s) window.__clearRevisit(sid,s); } catch(e){} })()" style="display:inline-block;background:#ef4444;color:white;padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;margin-left:4px;">🚩 Unflag</button>'
            : '<button onclick="(function(){ try { var sid=&quot;' + site.id + '&quot;; var s=(window.__allSites||[]).find(function(x){return x.id===sid;}); if(s) window.__flagRevisit(sid,s); } catch(e){} })()" style="display:inline-block;background:#f59e0b;color:white;padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-left:4px;">🔄 Flag Issue</button>';

          const popup = `
            <div style="min-width:200px;font-family:system-ui;">
              ${currentBadge}
              ${enrouteHtml}
              ${revisitHtml}
              <b style="font-size:14px;">${site.id}</b> ${sourceBadge}<br>
              <span style="color:#888;font-size:12px;">${site.address}</span>${distText}
              ${closedByHtml}
              <br>
              <a href="${directionsUrl(site)}" target="_blank" rel="noopener"
                onclick="try{var s=(window.__allSites||[]).find(function(x){return x.id==='${site.id}';});if(s){window.__claimEnroute('${site.id}',s,event);}}catch(e){}"
                style="display:inline-block;background:#570df8;color:white;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;">
                🗺️ Get Directions
              </a>
              ${flagBtnHtml}
              <button onclick="(function(){ try { var sid='${site.id}'; if(window.__openSitePhotos) window.__openSitePhotos(sid); } catch(e){} })()" style="display:inline-block;background:#a855f7;color:white;padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;margin-left:4px;">📷 Photos</button>
            </div>
          `;
          L.marker([site.lat, site.lon], { icon }).addTo(sitesLayerRef.current).bindPopup(popup);
        });

        // Add Material Pickup Location markers (purple diamond)
        PICKUP_LOCATIONS.forEach(function(pu) {
          var puIcon = L.divIcon({
            html: '<div style="width:20px;height:20px;background:#8b5cf6;border:3px solid #fbbf24;border-radius:4px;transform:rotate(45deg);box-shadow:0 0 8px #8b5cf680;display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(-45deg);font-size:10px;">📦</span></div>',
            iconSize: [20, 20], iconAnchor: [10, 10], className: ''
          });
          var puDirectionsUrl = 'https://www.google.com/maps/dir/?api=1&destination=' + pu.lat + ',' + pu.lon;
          var puPopup = '<div style="min-width:200px;font-family:system-ui;">' +
            '<div style="background:#8b5cf6;color:white;padding:4px 8px;border-radius:6px;margin-bottom:6px;font-size:12px;font-weight:700;">📦 MATERIAL PICKUP</div>' +
            '<b style="font-size:14px;">' + pu.name + '</b><br>' +
            '<span style="color:#888;font-size:12px;">' + pu.address + '</span><br><br>' +
            '<a href="' + puDirectionsUrl + '" target="_blank" style="display:inline-block;background:#8b5cf6;color:white;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">🗺️ Get Directions</a>' +
            '</div>';
          L.marker([pu.lat, pu.lon], { icon: puIcon }).addTo(sitesLayerRef.current).bindPopup(puPopup);
        });

        // Fit bounds only on first load
        if (!hasInitFit.current && sites.length > 0 && mapInstanceRef.current) {
          const bounds = L.latLngBounds(sites.map(function(s) { return [s.lat, s.lon]; }));
          if (userLoc) bounds.extend([userLoc.lat, userLoc.lon]);
          mapInstanceRef.current.fitBounds(bounds, { padding: [30, 30] });
          hasInitFit.current = true;
        }
      }, [sites, visited, sharedCompletions, currentTargetId, enroutes, revisits, mapVersion]);

      return <div id="map-container" ref={mapRef}></div>;
    }

    // ── Site Card ──
    function SiteCard({ site, index, total, isCurrent, isVisited, sharedCompletion, onMarkVisited, onUndoVisit, myAvatarURL, myPhotoURL, noteCount, onOpenNotes, photoCount, onOpenPhotos, currentUserId, enrouteInfo, onClaimEnroute, onCancelEnroute, revisitInfo, onFlagRevisit, onClearRevisit }) {
      const isExisting = site.status.includes('Existing Cabinet');
      const isImported = site.source && site.source !== 'builtin';
      const isCompleted = isVisited || sharedCompletion;
      const completedByName = isVisited
        ? 'You'
        : (sharedCompletion ? sharedCompletion.completedByName : null);
      const completedAt = isVisited
        ? (sharedCompletion && sharedCompletion.completedAt ? sharedCompletion.completedAt : null)
        : (sharedCompletion && sharedCompletion.completedAt ? sharedCompletion.completedAt : null);
      const completedByPhoto = isVisited
        ? (myAvatarURL || myPhotoURL || null)
        : (sharedCompletion && sharedCompletion.completedByPhoto ? sharedCompletion.completedByPhoto : null);

      return (
        <div className={`card bg-base-200 shadow-md fade-in ${isCurrent ? 'ring-2 ring-primary' : ''} ${isCompleted ? 'opacity-60' : ''}`}>
          <div className="card-body p-4 gap-2">
            {enrouteInfo && (
              <div style={{background: enrouteInfo.userId === currentUserId ? '#f59e0b' : '#3b82f6', color: '#fff', padding: '8px 12px', borderRadius: '8px', marginBottom: '6px', display: 'flex', alignItems: 'center', gap: '10px', fontSize: '14px'}}>
                {enrouteInfo.userPhoto ? (
                  <img src={enrouteInfo.userPhoto} style={{width: '36px', height: '36px', borderRadius: '50%', border: '3px solid #fff', objectFit: 'cover', boxShadow: '0 2px 8px rgba(0,0,0,0.3)'}} referrerPolicy="no-referrer" />
                ) : (
                  <div style={{width: '36px', height: '36px', borderRadius: '50%', background: 'rgba(255,255,255,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', fontSize: '16px', border: '3px solid #fff'}}>{(enrouteInfo.userName || '?').charAt(0).toUpperCase()}</div>
                )}
                <span style={{fontWeight: 600}}>
                  {enrouteInfo.userId === currentUserId ? '🚗 You are en-route!' : '🚗 ' + enrouteInfo.userName + ' is en-route'}
                </span>
                {enrouteInfo.userId === currentUserId && (
                  <button onClick={function(e) { e.stopPropagation(); onCancelEnroute(); }} style={{marginLeft: 'auto', background: 'rgba(255,255,255,0.3)', border: 'none', borderRadius: '4px', padding: '2px 8px', color: '#fff', cursor: 'pointer', fontSize: '12px'}}>Cancel</button>
                )}
              </div>
            )}
            <div className="flex items-center justify-between flex-wrap gap-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="badge badge-sm badge-outline font-mono">#{index + 1} of {total}</span>
                {isImported ? (
                  <span className="badge badge-sm badge-warning">{site.source}</span>
                ) : (
                  <span className={`badge badge-sm ${isExisting ? 'badge-success' : 'badge-error'}`}>
                    {isExisting ? 'Existing Cabinet' : 'Out of Scope'}
                  </span>
                )}
              </div>
              {isCurrent && <span className="badge badge-primary badge-sm">⭐ NEXT STOP</span>}
            </div>
            <div className="flex items-start gap-2 mt-1">
              <MapPinIcon size={18} className="opacity-60 shrink-0 mt-0.5" />
              <div>
                <p className="font-semibold text-sm">{site.id}</p>
                <p className="text-sm opacity-70">{site.address}</p>
              </div>
            </div>
            {site.distance !== undefined && (
              <p className="text-xs opacity-50 ml-6">📍 {site.distance.toFixed(2)} miles away</p>
            )}

            {/* Prominent "Completed by" banner with large ID selfie */}
            {isCompleted && (
              <div className={`mt-2 rounded-xl p-4 flex items-center gap-4 ${isVisited ? 'bg-success/20 border-2 border-success/40' : 'bg-info/20 border-2 border-info/40'}`}>
                {completedByPhoto ? (
                  <img src={completedByPhoto} alt="" className="w-14 h-14 rounded-full object-cover shrink-0 border-3 shadow-lg" style={{ borderColor: isVisited ? '#22c55e' : '#6366f1', borderWidth: '3px' }} referrerPolicy="no-referrer" />
                ) : (
                  <div className={`w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold shrink-0 shadow-lg ${isVisited ? 'bg-success text-success-content' : 'bg-info text-info-content'}`}>
                    {completedByName ? completedByName.charAt(0).toUpperCase() : '✓'}
                  </div>
                )}
                <div className="flex-1 min-w-0">
                  <p className={`font-bold text-base ${isVisited ? 'text-success' : 'text-info'}`}>
                    ✅ Completed by {completedByName || 'Team Member'}
                  </p>
                  {completedAt && (
                    <p className="text-xs opacity-60 mt-1">
                      🕐 {(function() { try { return new Date(completedAt.toDate()).toLocaleString(); } catch(e) { return ''; } })()}
                    </p>
                  )}
                </div>
              </div>
            )}

            {/* Revisit needed banner */}
            {revisitInfo && (
              <div className="mt-2 rounded-xl p-4 flex items-center gap-4" style={{background: 'linear-gradient(135deg, #fef3c7, #fde68a)', border: '2px solid #f59e0b', borderRadius: '12px', position: 'relative', overflow: 'hidden'}}>
                <div style={{position: 'absolute', top: '-2px', right: '8px', fontSize: '28px', transformOrigin: 'bottom center', animation: 'waveFlag 0.8s ease-in-out infinite'}}>&#9873;</div>
                <div style={{position: 'absolute', top: '-2px', right: '42px', fontSize: '22px', transformOrigin: 'bottom center', animation: 'waveFlag 1s ease-in-out infinite 0.2s', opacity: 0.6}}>&#9873;</div>
                {revisitInfo.flaggedByPhoto ? (
                  <img src={revisitInfo.flaggedByPhoto} alt="" className="w-12 h-12 rounded-full object-cover shrink-0 shadow-lg" style={{ borderColor: '#ef4444', borderWidth: '3px', borderStyle: 'solid' }} referrerPolicy="no-referrer" />
                ) : (
                  <div className="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold shrink-0 shadow-lg" style={{background: '#ef4444', color: '#fff'}}>
                    {revisitInfo.flaggedByName ? revisitInfo.flaggedByName.charAt(0).toUpperCase() : '!'}
                  </div>
                )}
                <div className="flex-1 min-w-0">
                  <p style={{fontWeight: 700, fontSize: '14px', color: '#92400e'}}>&#9888;&#65039; Caution - Issue Flagged</p>
                  <p className="text-xs" style={{color: '#78350f', opacity: 0.8}}>Flagged by {revisitInfo.flaggedByName || 'Team Member'}</p>
                  {revisitInfo.flaggedAt && (
                    <p className="text-xs opacity-50">
                      {(function() { try { return new Date(revisitInfo.flaggedAt.toDate()).toLocaleString(); } catch(e) { return ''; } })()}
                    </p>
                  )}
                </div>
              </div>
            )}

            <div className="flex gap-2 mt-2 flex-wrap">
              <a href={directionsUrl(site)} target="_blank" rel="noopener noreferrer"

    // ── Site Notes Panel ──
    function NotesPanel({ site, user, avatarURL, onClose }) {
      const [notes, setNotes] = useState([]);
      const [newNote, setNewNote] = useState('');
      const [sending, setSending] = useState(false);
      const scrollRef = useRef(null);
      const routeKey = (!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_');

      // Listen for notes in real-time
      useEffect(function() {
        const unsub = db.collection('siteNotes').doc(`${routeKey}_${site.id}`)
          .collection('messages')
          .orderBy('createdAt', 'asc')
          .onSnapshot(function(snapshot) {
            const msgs = [];
            snapshot.forEach(function(doc) { msgs.push({ id: doc.id, ...doc.data() }); });
            setNotes(msgs);
            setTimeout(function() { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 100);
          });
        return unsub;
      }, [site.id, routeKey]);

      var sendNote = async function() {
        const text = newNote.trim();
        if (!text) return;
        setSending(true);
        const displayName = user.displayName || user.email.split('@')[0];
        try {
          await db.collection('siteNotes').doc(`${routeKey}_${site.id}`)
            .collection('messages').add({
              text,
              authorId: user.uid,
              authorName: displayName,
              authorPhoto: avatarURL || user.photoURL || null,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          setNewNote('');
        } catch (err) { console.error('Note error:', err); }
        setSending(false);
      };

      var handleKeyDown = function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNote(); } };

      const [editingId, setEditingId] = useState(null);
      const [editText, setEditText] = useState('');

      var startEdit = function(note) { setEditingId(note.id); setEditText(note.text); };
      var cancelEdit = function() { setEditingId(null); setEditText(''); };

      var saveEdit = function(noteId) {
        var text = editText.trim();
        if (!text) return;
        db.collection('siteNotes').doc(routeKey + '_' + site.id)
          .collection('messages').doc(noteId).update({
            text: text,
            editedAt: firebase.firestore.FieldValue.serverTimestamp()
          }).then(function() {
            setEditingId(null);
            setEditText('');
          }).catch(function(err) { console.error('Edit note error:', err); });
      };

      var deleteNote = function(noteId) {
        db.collection('siteNotes').doc(routeKey + '_' + site.id)
          .collection('messages').doc(noteId).delete()
          .catch(function(err) { console.error('Delete note error:', err); });
      };

      var formatTime = function(ts) {
        if (!ts) return '';
        try { const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); } catch(e) { return ''; }
      };

      return (
        <div className="fixed inset-0 z-[2000] bg-black/60 flex items-end sm:items-center justify-center" onClick={onClose}>
          <div className="bg-base-200 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col" onClick={function(e) { e.stopPropagation(); }}>
            {/* Header */}
            <div className="p-4 border-b border-base-300 flex items-center gap-3 shrink-0">
              <div className="bg-primary/20 rounded-lg p-2"><NoteIcon size={20} className="text-primary" /></div>
              <div className="flex-1 min-w-0">
                <h2 className="font-bold text-base truncate">{site.id}</h2>
                <p className="text-xs opacity-60">Site Notes</p>
              </div>
              <button className="btn btn-sm btn-ghost btn-circle" onClick={onClose}>✕</button>
            </div>

            {/* Notes list */}
            <div ref={scrollRef} className="flex-1 overflow-auto p-4 space-y-3 min-h-[200px] max-h-[50vh]">
              {notes.length === 0 ? (
                <div className="text-center py-8 opacity-40">
                  <NoteIcon size={32} className="mx-auto mb-2 opacity-30" />
                  <p className="text-sm">No notes yet</p>
                  <p className="text-xs">Be the first to leave a note!</p>
                </div>
              ) : (
                notes.map(function(note) {
                  const isMe = note.authorId === user.uid;
                  return (
                    <div key={note.id} className={`flex gap-2 ${isMe ? 'flex-row-reverse' : ''}`}>
                      {note.authorPhoto ? (
                        <img src={note.authorPhoto} alt="" className="w-8 h-8 rounded-full object-cover shrink-0 border border-base-300" referrerPolicy="no-referrer" />
                      ) : (
                        <div className="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center text-xs font-bold shrink-0">
                          {note.authorName ? note.authorName.charAt(0).toUpperCase() : '?'}
                        </div>
                      )}
                      <div className={`max-w-[75%] ${isMe ? 'items-end' : 'items-start'} flex flex-col`}>
                        {editingId === note.id ? (
                          <div className="w-full">
                            <textarea className="textarea textarea-bordered w-full text-sm min-h-[40px] resize-none"
                              value={editText} onChange={function(e) { setEditText(e.target.value); }}
                              onKeyDown={function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(note.id); } if (e.key === 'Escape') cancelEdit(); }}
                              rows={2} autoFocus />
                            <div className="flex gap-1 mt-1 justify-end">
                              <button className="btn btn-xs btn-ghost" onClick={cancelEdit}>Cancel</button>
                              <button className="btn btn-xs btn-primary" onClick={function() { saveEdit(note.id); }} disabled={!editText.trim()}>Save</button>
                            </div>
                          </div>
                        ) : (
                          <div className="group relative">
                            <div className={`rounded-2xl px-3 py-2 text-sm ${isMe ? 'bg-primary text-primary-content rounded-br-sm' : 'bg-base-300 rounded-bl-sm'}`}>
                              {note.text}
                              {note.editedAt && <span className="text-xs opacity-50 ml-1">(edited)</span>}
                            </div>
                            {isMe && (
                              <div className={`flex gap-1 mt-0.5 ${isMe ? 'justify-end' : ''}`}>
                                <button className="btn btn-xs btn-ghost px-1 h-6 min-h-0" onClick={function() { startEdit(note); }}>✏️ Edit</button>
                                <button className="btn btn-xs btn-ghost px-1 h-6 min-h-0 text-error" onClick={function() { if (window.confirm('Delete this note?')) deleteNote(note.id); }}>🗑️ Delete</button>
                              </div>
                            )}
                          </div>
                        )}
                        <div className={`flex items-center gap-1 mt-0.5 text-xs opacity-40 ${isMe ? 'justify-end' : ''}`}>
                          <span className="font-medium">{isMe ? 'You' : note.authorName}</span>
                          {note.createdAt && <span>· {formatTime(note.createdAt)}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            {/* Input */}
            <div className="p-3 border-t border-base-300 shrink-0">
              <div className="flex gap-2 items-end">
                <textarea className="textarea textarea-bordered flex-1 text-sm min-h-[40px] max-h-[100px] resize-none"
                  placeholder="Write a note..." value={newNote} onChange={function(e) { setNewNote(e.target.value); }}
                  onKeyDown={handleKeyDown} rows={1} />
                <button className={`btn btn-primary btn-sm btn-circle ${sending ? 'loading' : ''}`} onClick={sendNote} disabled={!newNote.trim() || sending}>
                  {!sending && <SendIcon size={16} />}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Compress image utility ──
    function compressPhoto(file, maxDim, quality) {
      maxDim = maxDim || 1024;
      quality = quality || 0.65;
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function TeamActivity({ sharedCompletions, allSites, currentUserId }) {
      // Group completions by user
      var byUser = {};
      Object.keys(sharedCompletions).forEach(function(siteId) {
        var c = sharedCompletions[siteId];
        var uid = c.completedBy || 'unknown';
        if (!byUser[uid]) {
          byUser[uid] = {
            name: c.completedByName || 'Unknown',
            photo: c.completedByPhoto || null,
            sites: []
          };
        }
        var siteName = siteId;
        var siteObj = allSites.find(function(s) { return s.id === siteId; });
        if (siteObj) siteName = siteObj.name || siteId;
        var ts = null;
        if (c.completedAt && c.completedAt.toDate) {
          ts = c.completedAt.toDate();
        } else if (c.completedAt && c.completedAt.seconds) {
          ts = new Date(c.completedAt.seconds * 1000);
        }
        byUser[uid].sites.push({ id: siteId, name: siteName, time: ts });
      });
      // Sort each user's sites by most recent first
      Object.keys(byUser).forEach(function(uid) {
        byUser[uid].sites.sort(function(a, b) {
          if (!a.time && !b.time) return 0;
          if (!a.time) return 1;
          if (!b.time) return -1;
          return b.time.getTime() - a.time.getTime();
        });
      });
      // Sort users by number of completions desc
      var users = Object.keys(byUser).map(function(uid) { return { uid: uid, data: byUser[uid] }; });
      users.sort(function(a, b) { return b.data.sites.length - a.data.sites.length; });

      function downloadTeamCSV() {
        var rows = [['Team Member', 'Site ID', 'Site Name', 'Address', 'Source', 'Completed Date', 'Completed Time']];
        users.forEach(function(u) {
          u.data.sites.forEach(function(s) {
            var siteObj = allSites.find(function(si) { return si.id === s.id || si.id === s.id.split('@')[0]; });
            var addr = siteObj ? (siteObj.address || '') : '';
            var source = siteObj ? (siteObj.source || 'builtin') : '';
            var dateStr = s.time ? s.time.toLocaleDateString() : '';
            var timeStr = s.time ? s.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            rows.push([u.data.name, s.id.split('@')[0], s.name, addr, source, dateStr, timeStr]);
          });
        });
        var csv = rows.map(function(r) {
          return r.map(function(cell) { return '"' + String(cell).replace(/"/g, '""') + '"'; }).join(',');
        }).join('\n');
        var blob = new Blob([csv], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        var today = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = 'Team_Production_' + today + '.csv';
        a.click();
        URL.revokeObjectURL(url);
      }

      var totalCompleted = users.reduce(function(sum, u) { return sum + u.data.sites.length; }, 0);

      if (users.length === 0) {

          React.createElement('div', { className: 'card-body p-4' },
            React.createElement('div', { className: 'flex items-center justify-between' },

          var isMe = u.uid === currentUserId;

            React.createElement('div', { className: 'card-body p-4' },
              React.createElement('div', { className: 'flex items-center gap-3 mb-3' },
                u.data.photo
                  ? React.createElement('img', { src: u.data.photo, className: 'w-12 h-12 rounded-full object-cover border-2 ' + (isMe ? 'border-green-500' : 'border-blue-500'), referrerPolicy: 'no-referrer' })
                  : React.createElement('div', { className: 'w-12 h-12 rounded-full bg-base-300 flex items-center justify-center text-lg font-bold' }, u.data.name.charAt(0).toUpperCase()),
                React.createElement('div', null,
                  React.createElement('div', { className: 'font-bold text-lg' }, u.data.name, isMe ? ' (You)' : ''),
                  React.createElement('div', { className: 'text-sm opacity-60' }, u.data.sites.length + ' site' + (u.data.sites.length !== 1 ? 's' : '') + ' completed')
                )
              ),
              React.createElement('div', { className: 'flex flex-col gap-1' },
                u.data.sites.map(function(s) {
                  return React.createElement('div', { key: s.id, className: 'flex items-center justify-between py-1 px-2 rounded bg-base-200 text-sm' },
                    React.createElement('span', { className: 'font-medium' }, '✅ ' + s.name),
                    s.time ? React.createElement('span', { className: 'text-xs opacity-50' }, s.time.toLocaleDateString() + ' ' + s.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })) : null
                  );
                })
              )
            )
          );
        })
      );

    // ── Main App (after auth) ──
    function MainApp({ user, avatarURL, setAvatarURL, onLogout }) {
      const [showAvatarSetup, setShowAvatarSetup] = useState(false);
      const [permissionGranted, setPermissionGranted] = useState(false);
      const [userLoc, setUserLoc] = useState(null);
      const [geoError, setGeoError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [visited, setVisited] = useState(new Set());
      const [filter, setFilter] = useState('all');
      const [usingDefault, setUsingDefault] = useState(false);
      const [view, setView] = useState('list');
      const [showKMZManager, setShowKMZManager] = useState(false);
      const [importedFiles, setImportedFiles] = useState([]);
      const [importedSites, setImportedSites] = useState([]);
      const [sharedKMZFiles, setSharedKMZFiles] = useState([]);
      const [sharedKMZSites, setSharedKMZSites] = useState([]);
      const [sharedCompletions, setSharedCompletions] = useState({});
      const [revisits, setRevisits] = useState({});
      const [dataLoaded, setDataLoaded] = useState(false);
      const dedupDone = useRef(false);

      // Merge all sites, deduplicating by id (builtin > personal > shared)
      var allSites = (function() {
        var seen = {};
        var result = [];
        BUILTIN_SITES.forEach(function(s) { if (!seen[s.id]) { seen[s.id] = true; result.push(s); } });
        importedSites.forEach(function(s) { if (!seen[s.id]) { seen[s.id] = true; result.push(s); } });

        return result;
      })();
      const [sortedSites, setSortedSites] = useState(allSites);
      const [sourceFilter, setSourceFilter] = useState('all');

      // PWA install prompt
      const [installPrompt, setInstallPrompt] = useState(null);

      const [isIOS, setIsIOS] = useState(false);
      const [isStandalone, setIsStandalone] = useState(false);
      const [noteCounts, setNoteCounts] = useState({});
      const [enroutes, setEnroutes] = useState({});

      const [mapVersion, setMapVersion] = useState(0);
      const [enrouteConfirm, setEnrouteConfirm] = useState(null); // {userName, userPhoto, onYes, onNo}
      const [activeNoteSite, setActiveNoteSite] = useState(null);
      const [activePhotoSite, setActivePhotoSite] = useState(null);
      const [photoCounts, setPhotoCounts] = useState({});


      useEffect(function() {
        var ios = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        setIsIOS(ios);
        setIsStandalone(standalone);
        // Show install banner on every visit (session-only dismiss) unless already installed
        if (!standalone) {
          setTimeout(function() { setShowInstallBanner(true); }, 2000);
        }
      }, []);

      useEffect(function() {
        // Capture native install prompt if Chrome fires it
        var handler = function(e) { e.preventDefault(); setInstallPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        return function() { window.removeEventListener('beforeinstallprompt', handler); };
      }, []);

      var handleInstall = async function() {
        if (installPrompt) { installPrompt.prompt(); const result = await installPrompt.userChoice; if (result.outcome === 'accepted') setShowInstallBanner(false); setInstallPrompt(null); }
      };
      // Session-only dismiss — banner comes back on next visit until app is installed
      var dismissInstall = function() { setShowInstallBanner(false); };

      // ── Load user data from Firestore ──
      useEffect(function() {
        const uid = user.uid;
        const unsub = db.collection('userData').doc(uid).onSnapshot(function(doc) {
          if (doc.exists) {
            const data = doc.data();
            const newVisitedArr = data.visited || [];
            setVisited(function(prev) {
              if (newVisitedArr.length === prev.size && newVisitedArr.every(function(v) { return prev.has(v); })) return prev;
              return new Set(newVisitedArr);
            });
            setImportedFiles(data.importedFiles || []);
            setImportedSites(data.importedSites || []);
          }
          // Migrate existing personal KMZ imports to shared collection
          if (doc.exists) {
            var pFiles = doc.data().importedFiles || [];
            var pSites = doc.data().importedSites || [];
            if (pFiles.length > 0 && pSites.length > 0) {
              pFiles.forEach(function(f) {
                var sitesForFile = pSites.filter(function(s) { return s.source === f.name; });
                if (sitesForFile.length > 0) {
                  db.collection('sharedKMZ').doc(f.name).get().then(function(existing) {
                    if (!existing.exists) {
                      db.collection('sharedKMZ').doc(f.name).set({
                        sites: sitesForFile,
                        uploadedBy: uid,
                        uploadedByName: user.displayName || user.email || 'Unknown',
                        uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
                      });
                    }
                  });
                }
              });
            }
          }
          setDataLoaded(true);
        });
        return unsub;
      }, [user.uid]);

      // ── Listen for shared KMZ files (team-wide) ──
      useEffect(function() {
        var unsub = db.collection('sharedKMZ').onSnapshot(function(snapshot) {
          var files = [];
          var sites = [];
          snapshot.forEach(function(doc) {
            var data = doc.data();
            files.push({ name: doc.id, siteCount: (data.sites || []).length, uploadedBy: data.uploadedByName || 'Unknown' });
            (data.sites || []).forEach(function(s) {
              var exists = sites.some(function(x) { return x.id === s.id; });
              if (!exists) sites.push(s);
            });
          });
          setSharedKMZFiles(files);
          setSharedKMZSites(sites);
        });
        return unsub;
      }, []);

      // ── Auto-dedup: merge overlapping shared KMZ files ──
      useEffect(function() {
        if (dedupDone.current) return;
        if (!user) return;
        if (sharedKMZFiles.length < 2) return;
        dedupDone.current = true;

        db.collection('sharedKMZ').get().then(function(snapshot) {
          var docs = [];
          snapshot.forEach(function(doc) {
            docs.push({ name: doc.id, sites: doc.data().sites || [], data: doc.data() });
          });
          if (docs.length < 2) return;

          for (var i = 0; i < docs.length; i++) {
            for (var j = i + 1; j < docs.length; j++) {
              var a = docs[i];
              var b = docs[j];
              var aIds = {};
              a.sites.forEach(function(s) { aIds[s.id] = true; });
              var overlap = 0;
              b.sites.forEach(function(s) { if (aIds[s.id]) overlap++; });
              var threshold = Math.min(a.sites.length, b.sites.length) * 0.5;
              if (overlap <= threshold) continue;

              // Found overlap! Keep the first (older) doc, merge unique sites from second
              var keep = a;
              var remove = b;
              var keepIds = {};
              keep.sites.forEach(function(s) { keepIds[s.id] = true; });
              var merged = keep.sites.slice();
              remove.sites.forEach(function(s) {
                if (!keepIds[s.id]) {
                  merged.push(Object.assign({}, s, { source: keep.name }));
                }
              });

              // Update kept doc with merged sites
              db.collection('sharedKMZ').doc(keep.name).set({
                sites: merged,
                uploadedBy: keep.data.uploadedBy || user.uid,
                uploadedByName: keep.data.uploadedByName || user.displayName || 'Unknown',
                uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              // Delete duplicate doc
              db.collection('sharedKMZ').doc(remove.name).delete();

              // Copy any completions from removed route key to kept route key
              var keepRK = keep.name.replace(/[^a-zA-Z0-9\-_]/g, '_');
              var removeRK = remove.name.replace(/[^a-zA-Z0-9\-_]/g, '_');
              if (keepRK !== removeRK) {
                db.collection('sharedRoutes').doc(removeRK).collection('completions').get().then(function(cs) {
                  cs.forEach(function(cd) {
                    db.collection('sharedRoutes').doc(keepRK).collection('completions').doc(cd.id).set(cd.data(), { merge: true });
                  });
                });
                db.collection('sharedRoutes').doc(removeRK).collection('revisits').get().then(function(rs) {
                  rs.forEach(function(rd) {
                    db.collection('sharedRoutes').doc(keepRK).collection('revisits').doc(rd.id).set(rd.data(), { merge: true });
                  });
                });
              }

              // Clean personal imports too
              var cleanFiles = importedFiles.filter(function(f) { return f.name !== remove.name; });
              var cleanSites = importedSites.filter(function(s) { return s.source !== remove.name; });
              if (cleanFiles.length !== importedFiles.length) {
                setImportedFiles(cleanFiles);
                setImportedSites(cleanSites);
                saveToFirestore(visited, cleanFiles, cleanSites);
              }

              console.log('Auto-merged KMZ: "' + remove.name + '" into "' + keep.name + '" (' + merged.length + ' sites)');
              return;
            }
          }
        });
      }, [sharedKMZFiles, user]);

      // ── Listen for shared route completions (builtin route) ──
      useEffect(function() {
        const unsub = db.collection('sharedRoutes').doc('builtin')
          .collection('completions').onSnapshot(function(snapshot) {
            const completions = {};
            snapshot.forEach(function(doc) {
              completions[doc.id] = doc.data();
            });
            setSharedCompletions(function(prev) {
              // Remove old builtin completions, keep imported ones, add new builtin
              var kept = {};
              Object.keys(prev).forEach(function(k) {
                if (prev[k]._src && prev[k]._src !== 'builtin') kept[k] = prev[k];
              });
              Object.keys(completions).forEach(function(k) {
                completions[k]._src = 'builtin';
              });
              return Object.assign({}, kept, completions);
            });
          });
        return unsub;
      }, []);

      // ── Listen for revisit flags (builtin route) ──
      useEffect(function() {
        var unsub = db.collection('sharedRoutes').doc('builtin')
          .collection('revisits').onSnapshot(function(snapshot) {
            var revs = {};
            snapshot.forEach(function(doc) { var d = doc.data(); d._source = 'builtin'; revs[doc.id] = d; });
            setRevisits(function(prev) {
              // Remove old builtin revisits, keep imported ones
              var merged = {};
              Object.keys(prev).forEach(function(k) {
                if (prev[k]._source && prev[k]._source !== 'builtin') {
                  merged[k] = prev[k];
                }
              });
              Object.keys(revs).forEach(function(k) { merged[k] = revs[k]; });
              return Object.assign({}, merged);
            });
            setMapVersion(function(v) { return v + 1; });
          });
        return unsub;
      }, []);

      // ── Listen for en-route claims (builtin route) — auto-expire after 2 hours ──
      useEffect(function() {

      // ── Download Team Production Report as CSV ──
      var handleDownloadReport = function() {
        var rows = [['Site ID', 'Site Name', 'Source', 'Status', 'Completed By', 'Completed At', 'Flagged By', 'Flagged At', 'En-route By']];
        sortedSites.forEach(function(site) {

          if (comp) {

            if (comp.completedAt) {
              var d = comp.completedAt.toDate ? comp.completedAt.toDate() : (comp.completedAt.seconds ? new Date(comp.completedAt.seconds * 1000) : null);

      const handleKMZImport = function(fileName, sites) {
