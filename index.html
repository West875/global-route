    // ── KMZ/KML Parser ──
    async function parseKMZFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      let kmlText;
      try {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
        if (kmlFile) kmlText = await zip.files[kmlFile].async('text');
      } catch (e) {
        kmlText = new TextDecoder().decode(arrayBuffer);
      }
      if (!kmlText) throw new Error('No KML data found in file');
      const parser = new DOMParser();
      const doc = parser.parseFromString(kmlText, 'text/xml');
      const placemarks = doc.querySelectorAll('Placemark');
      const sites = [];
      placemarks.forEach((pm, idx) => {
        const nameEl = pm.querySelector('name');
        const name = nameEl ? nameEl.textContent.trim() : `Site ${idx + 1}`;
        const descEl = pm.querySelector('description');
        const description = descEl ? descEl.textContent.trim() : '';
        let coords = null;
        const pointCoords = pm.querySelector('Point coordinates');
        if (pointCoords) {
          const parts = pointCoords.textContent.trim().split(',');
          if (parts.length >= 2) coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
        }
        if (!coords) {
          const anyCoords = pm.querySelector('coordinates');
          if (anyCoords) {
            const first = anyCoords.textContent.trim().split(/\s+/)[0];
            const parts = first.split(',');
            if (parts.length >= 2) coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
          }
        }
        if (coords && !isNaN(coords.lat) && !isNaN(coords.lon)) {
          let status = 'Imported';
          const extData = pm.querySelectorAll('ExtendedData Data, ExtendedData SimpleData');
          extData.forEach(d => {
            const dName = (d.getAttribute('name') || '').toLowerCase();
            if (dName.includes('status') || dName.includes('type')) {
              const val = d.querySelector('value') || d;
              status = val.textContent.trim() || status;
            }
          });
          sites.push({ id: name, address: description || `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`, status, lat: coords.lat, lon: coords.lon, source: file.name.replace(/\.[^.]+$/, '') });
        }
      });
      return sites;
    }

    // ── Geo Helpers ──
    function toRad(deg) { return (deg * Math.PI) / 180; }
    function haversineDistance(loc1, loc2) {
      const R = 3958.8;
      const dLat = toRad(loc2.lat - loc1.lat);
      const dLon = toRad(loc2.lon - loc1.lon);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(loc1.lat)) * Math.cos(toRad(loc2.lat)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function sortByNearest(sites, userLoc) {
      return sites.map((s) => ({ ...s, distance: haversineDistance(userLoc, { lat: s.lat, lon: s.lon }) })).sort((a, b) => a.distance - b.distance);
    }

    // ── Avatar Setup Screen (mandatory selfie) ──
    function AvatarSetup({ user, onComplete }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [captured, setCaptured] = useState(null);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [cameraReady, setCameraReady] = useState(false);

      const startCamera = useCallback(async () => {
        setError(null);
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }, audio: false });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.onloadedmetadata = () => setCameraReady(true);
          }
        } catch (err) {
          setError('Camera access denied. Please allow camera access and try again.');
        }
      }, []);

      useEffect(() => { startCamera(); return () => { if (stream) stream.getTracks().forEach(t => t.stop()); }; }, []);

      const capturePhoto = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const size = Math.min(video.videoWidth, video.videoHeight);
        const sx = (video.videoWidth - size) / 2;
        const sy = (video.videoHeight - size) / 2;
        canvas.width = 150;
        canvas.height = 150;
        const ctx = canvas.getContext('2d');
        // Mirror the image (front camera is mirrored)
        ctx.translate(150, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, size, size, 0, 0, 150, 150);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
        setCaptured(dataUrl);
        if (stream) stream.getTracks().forEach(t => t.stop());
      };

      const retake = async () => {
        setCaptured(null);
        setCameraReady(false);
        await startCamera();
      };

      const saveAvatar = async () => {
        if (!captured) return;
        setSaving(true);
        try {
          await db.collection('users').doc(user.uid).set({
            avatarURL: captured,
            avatarSetAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          onComplete(captured);
        } catch (err) {
          setError('Failed to save photo. Please try again.');
          setSaving(false);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = canvasRef.current;
            canvas.width = 150;
            canvas.height = 150;
            const ctx = canvas.getContext('2d');
            const size = Math.min(img.width, img.height);
            const sx = (img.width - size) / 2;
            const sy = (img.height - size) / 2;
            ctx.drawImage(img, sx, sy, size, size, 0, 0, 150, 150);
            setCaptured(canvas.toDataURL('image/jpeg', 0.7));
            if (stream) stream.getTracks().forEach(t => t.stop());
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="auth-bg min-h-screen flex items-center justify-center p-6">
          <div className="card bg-base-200 w-full max-w-md glow-card fade-in">

    // ── Mandatory ID Selfie ──
    function IDUpload({ user, onComplete }) {
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [stream, setStream] = useState(null);
      const [captured, setCaptured] = useState(null);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState(null);
      const [cameraActive, setCameraActive] = useState(false);
      const [cameraReady, setCameraReady] = useState(false);

      const startCamera = useCallback(async () => {
        setError(null);
        setCameraActive(true);
        try {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 480 } }, audio: false });
          setStream(s);
          if (videoRef.current) {
            videoRef.current.srcObject = s;
            videoRef.current.onloadedmetadata = () => setCameraReady(true);
          }
        } catch (err) {
          setError('Camera access denied. Please use the upload option.');
          setCameraActive(false);
        }
      }, []);

      useEffect(() => {
        startCamera();
        return () => { if (stream) stream.getTracks().forEach(t => t.stop()); };
      }, []);

      // Re-attach stream when videoRef becomes available
      useEffect(() => {
        if (stream && videoRef.current && !videoRef.current.srcObject) {
          videoRef.current.srcObject = stream;
          videoRef.current.onloadedmetadata = () => setCameraReady(true);
        }
      }, [stream, cameraActive]);

      const capturePhoto = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const size = Math.min(video.videoWidth, video.videoHeight);
        canvas.width = 400;
        canvas.height = 400;
        const ctx = canvas.getContext('2d');
        const sx = (video.videoWidth - size) / 2;
        const sy = (video.videoHeight - size) / 2;
        ctx.save();
        ctx.translate(400, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, sx, sy, size, size, 0, 0, 400, 400);
        ctx.restore();
        setCaptured(canvas.toDataURL('image/jpeg', 0.85));
        if (stream) stream.getTracks().forEach(t => t.stop());
        setCameraActive(false);
      };

      const retake = async () => {
        setCaptured(null);
        setCameraReady(false);
        setTimeout(() => startCamera(), 100);
      };

      const saveID = async () => {
        if (!captured) return;
        setSaving(true);
        try {
          await db.collection('users').doc(user.uid).set({
            idPhotoURL: captured,
            idUploadedAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true });
          onComplete(captured);
        } catch (err) {
          setError('Failed to save. Please try again.');
          setSaving(false);
        }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (stream) stream.getTracks().forEach(t => t.stop());
        setCameraActive(false);
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = canvasRef.current;
            const size = Math.min(img.width, img.height);
            canvas.width = 400;
            canvas.height = 400;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, 400, 400);
            setCaptured(canvas.toDataURL('image/jpeg', 0.85));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="auth-bg min-h-screen flex items-center justify-center p-6">
          <div className="card bg-base-200 w-full max-w-md glow-card fade-in">
            <div className="card-body gap-4">
              <div className="text-center mb-2">
                <div className="inline-flex bg-info/20 rounded-full p-4 mb-3">
                  <CameraIcon size={48} className="text-info" />
                </div>
                <h1 className="text-xl font-bold">Take Your ID Selfie</h1>
                <p className="text-sm opacity-60">A clear face photo is required for team identification</p>
                <p className="text-xs opacity-40 mt-1">This will be visible to your team leads</p>
              </div>

              {error && (
                <div className="alert alert-error text-sm py-2"><span>{error}</span></div>
              )}

              <div className="flex justify-center">
                {cameraActive && !captured ? (
                  <div className="relative" style={{ width: 220, height: 220 }}>
                    <video ref={videoRef} autoPlay playsInline muted
                      style={{ width: 220, height: 220, borderRadius: '50%', objectFit: 'cover', background: '#000', border: '4px solid rgba(56,189,248,0.6)', transform: 'scaleX(-1)' }} />
                    {!cameraReady && !error && (
                      <div className="absolute inset-0 flex items-center justify-center" style={{ borderRadius: '50%', background: 'rgba(0,0,0,0.5)' }}>
                        <span className="loading loading-spinner loading-lg text-info"></span>
                      </div>
                    )}
                    <div className="absolute inset-0" style={{ borderRadius: '50%', boxShadow: 'inset 0 0 30px rgba(56,189,248,0.2)' }}></div>
                  </div>
                ) : captured ? (
                  <div style={{ width: 220, height: 220, position: 'relative' }}>
                    <img src={captured} alt="ID Selfie"
                      style={{ width: 220, height: 220, borderRadius: '50%', objectFit: 'cover', border: '4px solid #22c55e' }} />
                    <div style={{ position: 'absolute', bottom: 4, right: 4, background: '#22c55e', borderRadius: '50%', width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18 }}>✓</div>
                  </div>
                ) : (
                  <div style={{ width: 220, height: 220, borderRadius: '50%', border: '4px dashed rgba(56,189,248,0.3)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 8 }}>
                    <CameraIcon size={48} className="opacity-20" />
                    <span className="text-xs opacity-40">Camera loading...</span>
                  </div>
                )}
              </div>
              <canvas ref={canvasRef} style={{ display: 'none' }} />

              <div className="flex flex-col gap-2 mt-2">
                {!captured ? (
                  <>
                    {cameraActive && cameraReady && (
                      <button className="btn btn-info w-full gap-2" onClick={capturePhoto}>
                        <CameraIcon size={18} /> Take ID Selfie
                      </button>
                    )}
                    <label className="btn btn-outline btn-sm w-full gap-2 cursor-pointer">
                      <UploadIcon size={14} /> Upload from Gallery
                      <input type="file" accept="image/*" className="hidden" onChange={handleFileUpload} />
                    </label>
                  </>
                ) : (
                  <>
                    <button className={`btn btn-success w-full gap-2 ${saving ? 'loading' : ''}`} onClick={saveID} disabled={saving}>
                      {saving && <span className="loading loading-spinner loading-xs"></span>}

                    </button>
                    <button className="btn btn-ghost btn-sm w-full" onClick={retake} disabled={saving}>
                      ↻ Retake Photo

              </div>

              <p className="text-xs text-center opacity-40 mt-1">🔒 Your ID selfie is stored securely and visible to team leads only.</p>
            </div>
          </div>
        </div>
      );
    }

    // ── Leaflet Map Component ──
    const SiteMap = React.memo(function SiteMap({ sites, userLoc, visited, sharedCompletions, currentTargetId, myAvatarURL, myPhotoURL }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);
      const userLayerRef = useRef(null);
      const sitesLayerRef = useRef(null);
      const hasInitFit = useRef(false);

      // Initialize map once
      useEffect(() => {
        if (mapInstanceRef.current) return;
        const center = [33.6891, -78.8867];
        const map = L.map(mapRef.current, { zoomControl: true }).setView(center, 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
        mapInstanceRef.current = map;
        userLayerRef.current = L.layerGroup().addTo(map);
        sitesLayerRef.current = L.layerGroup().addTo(map);
        if (!document.getElementById('pulse-css')) {
          const style = document.createElement('style');
          style.id = 'pulse-css';
          style.textContent = '@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }';
          document.head.appendChild(style);
        }
        return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
      }, []);

      // Update user location marker (smooth — no map rebuild)
      useEffect(() => {
        if (!userLayerRef.current) return;
        userLayerRef.current.clearLayers();
        if (userLoc) {
          const userIcon = L.divIcon({ html: '<div style="width:16px;height:16px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(59,130,246,0.6);"></div>', iconSize: [16, 16], iconAnchor: [8, 8], className: '' });
          L.marker([userLoc.lat, userLoc.lon], { icon: userIcon }).addTo(userLayerRef.current).bindPopup('<b>📍 Your Location</b>');
        }
      }, [userLoc]);



      // Update site markers
      useEffect(() => {
        if (!sitesLayerRef.current) return;
        sitesLayerRef.current.clearLayers();

        sites.forEach((site) => {
          const isExisting = site.status.includes('Existing Cabinet');
          const isImported = site.source && site.source !== 'builtin';
          const isVisited = visited.has(site.id);
          const isSharedComplete = sharedCompletions[site.id];
          const isCurrent = site.id === currentTargetId;

          let color = isImported ? '#f59e0b' : (isExisting ? '#22c55e' : '#ef4444');
          let borderColor = 'white';
          let size = 14;
          if (isCurrent) { color = '#a855f7'; borderColor = '#fbbf24'; size = 20; }
          if (isVisited || isSharedComplete) { color = '#6b7280'; }

          const icon = L.divIcon({
            html: `<div style="width:${size}px;height:${size}px;background:${color};border:${isCurrent ? '3' : '2'}px solid ${borderColor};border-radius:50%;box-shadow:0 0 ${isCurrent ? '12px' : '4px'} ${color}80;${isCurrent ? 'animation:pulse 1.5s infinite;' : ''}"></div>`,
            iconSize: [size, size], iconAnchor: [size/2, size/2], className: ''
          });

          const distText = site.distance !== undefined ? `<br>📍 ${site.distance.toFixed(2)} mi away` : '';
          const sourceBadge = isImported
            ? `<span style="background:#f59e0b;color:black;padding:1px 6px;border-radius:8px;font-size:11px;">${site.source}</span>`
            : (isExisting ? '<span style="background:#22c55e;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Existing Cabinet</span>' : '<span style="background:#ef4444;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Out of Scope</span>');
          const currentBadge = isCurrent ? '<div style="background:#a855f7;color:white;padding:2px 8px;border-radius:8px;font-size:11px;text-align:center;margin-bottom:4px;">⭐ NEXT STOP</div>' : '';

          let closedByHtml = '';
          if (isVisited || isSharedComplete) {
            const closerName = isVisited ? 'You' : (isSharedComplete ? isSharedComplete.completedByName : 'Team Member');
            const initial = closerName.charAt(0).toUpperCase();
            const bgColor = isVisited ? '#22c55e' : '#6366f1';
            const photoUrl = isVisited ? (myAvatarURL || myPhotoURL || null) : (isSharedComplete ? isSharedComplete.completedByPhoto : null);
            let timeStr = '';
            if (isSharedComplete && isSharedComplete.completedAt) {
              try { timeStr = new Date(isSharedComplete.completedAt.toDate()).toLocaleString(); } catch(e) {}
            }
            const avatarHtml = photoUrl
              ? `<img src="${photoUrl}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:2px solid ${bgColor};flex-shrink:0;" />`
              : `<div style="width:28px;height:28px;border-radius:50%;background:${bgColor};color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0;">${initial}</div>`;
            closedByHtml = `
              <div style="background:${bgColor}15;border:1px solid ${bgColor}40;border-radius:8px;padding:8px;margin:6px 0;display:flex;align-items:center;gap:8px;">
                ${avatarHtml}
                <div>
                  <div style="font-weight:700;font-size:13px;color:${bgColor};">✅ Completed by ${closerName}</div>
                  ${timeStr ? `<div style="font-size:10px;opacity:0.7;">${timeStr}</div>` : ''}
                </div>
              </div>`;
          }

          const popup = `
            <div style="min-width:200px;font-family:system-ui;">
              ${currentBadge}
              <b style="font-size:14px;">${site.id}</b> ${sourceBadge}<br>
              <span style="color:#888;font-size:12px;">${site.address}</span>${distText}

              <br>
              <a href="${directionsUrl(site)}" target="_blank" rel="noopener"
                style="display:inline-block;background:#570df8;color:white;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">
                🗺️ Get Directions
              </a>
            </div>
          `;
          L.marker([site.lat, site.lon], { icon }).addTo(sitesLayerRef.current).bindPopup(popup);
        });

        // Fit bounds only on first load
        if (!hasInitFit.current && sites.length > 0 && mapInstanceRef.current) {
          const bounds = L.latLngBounds(sites.map(s => [s.lat, s.lon]));
          if (userLoc) bounds.extend([userLoc.lat, userLoc.lon]);
          mapInstanceRef.current.fitBounds(bounds, { padding: [30, 30] });
          hasInitFit.current = true;
        }
      }, [sites, visited, sharedCompletions, currentTargetId]);

      return <div id="map-container" ref={mapRef}></div>;
    });

    function NotesPanel({ site, user, avatarURL, onClose }) {

      // Listen for notes in real-time
      useEffect(() => {
        const unsub = db.collection('siteNotes').doc(`${routeKey}_${site.id}`)
          .collection('messages')
          .orderBy('createdAt', 'asc')
          .onSnapshot((snapshot) => {
            const msgs = [];
            snapshot.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
            setNotes(msgs);
            setTimeout(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, 100);
          });
        return unsub;
      }, [site.id, routeKey]);

      const sendNote = async () => {
        const text = newNote.trim();
        if (!text) return;
        setSending(true);
        const displayName = user.displayName || user.email.split('@')[0];
        try {
          await db.collection('siteNotes').doc(`${routeKey}_${site.id}`)
            .collection('messages').add({
              text,
              authorId: user.uid,
              authorName: displayName,
              authorPhoto: avatarURL || user.photoURL || null,
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          setNewNote('');
        } catch (err) { console.error('Note error:', err); }
        setSending(false);
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNote(); } };

      const formatTime = (ts) => {
        if (!ts) return '';
        try { const d = ts.toDate ? ts.toDate() : new Date(ts); return d.toLocaleString([], { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); } catch(e) { return ''; }

              {notes.length === 0 ? (
                <div className="text-center py-8 opacity-40">
                  <NoteIcon size={32} className="mx-auto mb-2 opacity-30" />
                  <p className="text-sm">No notes yet</p>
                  <p className="text-xs">Be the first to leave a note!</p>
                </div>
              ) : (
                notes.map(note => {
                  const isMe = note.authorId === user.uid;
                  return (
                    <div key={note.id} className={`flex gap-2 ${isMe ? 'flex-row-reverse' : ''}`}>
                      {note.authorPhoto ? (
                        <img src={note.authorPhoto} alt="" className="w-8 h-8 rounded-full object-cover shrink-0 border border-base-300" referrerPolicy="no-referrer" />
                      ) : (
                        <div className="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center text-xs font-bold shrink-0">
                          {note.authorName ? note.authorName.charAt(0).toUpperCase() : '?'}
                        </div>
                      )}
                      <div className={`max-w-[75%] ${isMe ? 'items-end' : 'items-start'}`}>
                        <div className={`rounded-2xl px-3 py-2 text-sm ${isMe ? 'bg-primary text-primary-content rounded-br-sm' : 'bg-base-300 rounded-bl-sm'}`}>
                          {note.text}
                        </div>
                        <div className={`flex items-center gap-1 mt-0.5 text-xs opacity-40 ${isMe ? 'justify-end' : ''}`}>
                          <span className="font-medium">{isMe ? 'You' : note.authorName}</span>
                          {note.createdAt && <span>· {formatTime(note.createdAt)}</span>}
                        </div>
                      </div>
                    </div>
                  );
                })
              )}

            {/* Input */}
            <div className="p-3 border-t border-base-300 shrink-0">
              <div className="flex gap-2 items-end">
                <textarea className="textarea textarea-bordered flex-1 text-sm min-h-[40px] max-h-[100px] resize-none"

    // ── Default fallback location ──
    const MYRTLE_BEACH_CENTER = { lat: 33.6891, lon: -78.8867 };

    // ── Main App ──
    function App() {
      // Auth state
      const [user, setUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [avatarURL, setAvatarURL] = useState(null);
      const [idPhotoURL, setIdPhotoURL] = useState(null);
      const [profileChecked, setProfileChecked] = useState(false);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(async (u) => {
          setUser(u);
          setAuthLoading(false);
          if (u) {
            // Check if user has avatar and ID photo
            try {
              const doc = await db.collection('users').doc(u.uid).get();
              if (doc.exists) {
                const data = doc.data();
                if (data.avatarURL) setAvatarURL(data.avatarURL);
                if (data.idPhotoURL) setIdPhotoURL(data.idPhotoURL);
              }
            } catch(e) {}
            setProfileChecked(true);
          } else {
            setAvatarURL(null);
            setIdPhotoURL(null);
            setProfileChecked(false);
          }
        });
        return unsub;
      }, []);

      const handleLogout = async () => {
        if (confirm('Sign out of Global Route?')) {
          await auth.signOut();
          setAvatarURL(null);
          setIdPhotoURL(null);
          setProfileChecked(false);
        }
      };

      if (authLoading) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-4">
            <div className="bg-primary/10 rounded-full p-6"><GlobeIcon size={48} className="text-primary" /></div>
            <span className="loading loading-spinner loading-lg text-primary"></span>
            <p className="text-sm opacity-60">Loading Global Route...</p>
          </div>
        );
      }

      if (!user) {
        return <AuthScreen />;
      }

      // Wait for profile check
      if (!profileChecked) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-4">
            <div className="bg-primary/10 rounded-full p-6"><GlobeIcon size={48} className="text-primary" /></div>
            <span className="loading loading-spinner loading-lg text-primary"></span>
            <p className="text-sm opacity-60">Loading profile...</p>
          </div>
        );
      }

      // Step 1: Show avatar setup if user hasn't set one (and not Google photo)
      if (!avatarURL && !user.photoURL) {
        return <AvatarSetup user={user} onComplete={(url) => setAvatarURL(url)} />;
      }

      // ID photo is now the same as the avatar selfie — no separate step needed

      return <MainApp user={user} avatarURL={avatarURL} setAvatarURL={setAvatarURL} onLogout={handleLogout} />;
    }

    // ── Main App (after auth) ──
    function MainApp({ user, avatarURL, setAvatarURL, onLogout }) {
      const [showAvatarSetup, setShowAvatarSetup] = useState(false);
      const [permissionGranted, setPermissionGranted] = useState(false);
      const [userLoc, setUserLoc] = useState(null);
      const [geoError, setGeoError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [visited, setVisited] = useState(new Set());
      const [filter, setFilter] = useState('all');
      const [usingDefault, setUsingDefault] = useState(false);
      const [view, setView] = useState('list');
      const [showKMZManager, setShowKMZManager] = useState(false);
      const [importedFiles, setImportedFiles] = useState([]);
      const [importedSites, setImportedSites] = useState([]);
      const [sharedCompletions, setSharedCompletions] = useState({});
      const [dataLoaded, setDataLoaded] = useState(false);

      const allSites = [...BUILTIN_SITES, ...importedSites];
      const [sortedSites, setSortedSites] = useState(allSites);
      const [sourceFilter, setSourceFilter] = useState('all');

      // PWA install prompt
      const [installPrompt, setInstallPrompt] = useState(null);
      const [showInstallBanner, setShowInstallBanner] = useState(false);
      const [isIOS, setIsIOS] = useState(false);
      const [isStandalone, setIsStandalone] = useState(false);
      const [noteCounts, setNoteCounts] = useState({});
      const [activeNoteSite, setActiveNoteSite] = useState(null);


      useEffect(() => {
        const ios = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        setIsIOS(ios);
        setIsStandalone(standalone);
        // Show install banner immediately on every visit (iOS)
        if (ios && !standalone) {
          setTimeout(() => setShowInstallBanner(true), 1500);
        }
      }, []);

      useEffect(() => {
        // Show install banner immediately when Android/Chrome fires the event
        const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = async () => {
        if (installPrompt) { installPrompt.prompt(); const result = await installPrompt.userChoice; if (result.outcome === 'accepted') setShowInstallBanner(false); setInstallPrompt(null); }
      };
      // Session-only dismiss — banner comes back on next visit until app is installed
      const dismissInstall = () => { setShowInstallBanner(false); };

      // ── Load user data from Firestore ──
      useEffect(() => {
        const uid = user.uid;
        const unsub = db.collection('userData').doc(uid).onSnapshot((doc) => {
          if (doc.exists) {
            const data = doc.data();
            const newVisitedArr = data.visited || [];
            setVisited(prev => {
              if (newVisitedArr.length === prev.size && newVisitedArr.every(v => prev.has(v))) return prev;
              return new Set(newVisitedArr);
            });
            setImportedFiles(prev => {
              const newVal = data.importedFiles || [];
              if (JSON.stringify(newVal) === JSON.stringify(prev)) return prev;
              return newVal;
            });
            setImportedSites(prev => {
              const newVal = data.importedSites || [];
              if (JSON.stringify(newVal) === JSON.stringify(prev)) return prev;
              return newVal;
            });
          }
          setDataLoaded(true);
        });
        return unsub;
      }, [user.uid]);

      // ── Listen for shared route completions (builtin route) ──
      useEffect(() => {
        const unsub = db.collection('sharedRoutes').doc('builtin')
          .collection('completions').onSnapshot((snapshot) => {
            const completions = {};
            snapshot.forEach(doc => {
              completions[doc.id] = doc.data();
            });
            setSharedCompletions(prev => {
              const merged = { ...prev, ...completions };
              if (JSON.stringify(merged) === JSON.stringify(prev)) return prev;
              return merged;
            });
          });
        return unsub;
      }, []);

      // ── Listen for shared completions on imported files ──
      useEffect(() => {
        if (importedFiles.length === 0) return;
        const unsubs = importedFiles.map(f => {
          return db.collection('sharedRoutes').doc(f.name.replace(/[^a-zA-Z0-9-_]/g, '_'))
            .collection('completions').onSnapshot((snapshot) => {
              const completions = {};
              snapshot.forEach(doc => { completions[doc.id] = doc.data(); });
              setSharedCompletions(prev => {
                const merged = { ...prev, ...completions };
                if (JSON.stringify(merged) === JSON.stringify(prev)) return prev;
                return merged;
              });
            });
        });
        return () => unsubs.forEach(u => u());
      }, [importedFiles]);

      // ── Listen for note counts across all sites ──
      useEffect(() => {
        const unsub = db.collectionGroup('messages')
          .onSnapshot((snapshot) => {
            const counts = {};
            snapshot.forEach(doc => {
              const parentId = doc.ref.parent.parent.id;
              counts[parentId] = (counts[parentId] || 0) + 1;
            });
            setNoteCounts(prev => {
              if (JSON.stringify(counts) === JSON.stringify(prev)) return prev;
              return counts;
            });
          });
        return unsub;
      }, []);

      // ── Save user data to Firestore (debounced) ──
      const saveTimeoutRef = useRef(null);
      const saveToFirestore = useCallback((newVisited, newImportedFiles, newImportedSites) => {
        if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
        saveTimeoutRef.current = setTimeout(() => {
          db.collection('userData').doc(user.uid).set({
            visited: [...newVisited],
            importedFiles: newImportedFiles,
            importedSites: newImportedSites,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true }).catch(err => console.error('Save error:', err));
        }, 500);
      }, [user.uid]);

      // Re-sort when sites or location change
      useEffect(() => {
        const all = [...BUILTIN_SITES, ...importedSites];
        if (userLoc) { setSortedSites(sortByNearest(all, userLoc)); }
        else { setSortedSites(all); }
      }, [importedSites, userLoc]);

      const applyLocation = useCallback((loc, isDefault) => {
        setUserLoc(loc); setUsingDefault(isDefault || false); setPermissionGranted(true); setLoading(false);
      }, []);

      const useDefaultLocation = useCallback(() => { applyLocation(MYRTLE_BEACH_CENTER, true); }, [applyLocation]);

      const requestLocation = useCallback(() => {
        if (!navigator.geolocation) { setGeoError('Geolocation is not supported.'); return; }
        setLoading(true); setGeoError(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => { applyLocation({ lat: pos.coords.latitude, lon: pos.coords.longitude }, false); },
          (err) => {
            const msg = err.code === 1 ? 'Location denied — tap below to use Myrtle Beach center instead.' : 'Could not get location: ' + err.message;
            setGeoError(msg); setLoading(false);
          },
          { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
        );
      }, [applyLocation]);

      // ── Get user location once on load ──
      useEffect(() => {
        if (!navigator.geolocation) { setGeoError('Geolocation is not supported.'); setLoading(false); return; }
        setLoading(true); setGeoError(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            applyLocation({ lat: pos.coords.latitude, lon: pos.coords.longitude }, false);
          },
          (err) => {
            const msg = err.code === 1 ? 'Location denied — tap below to use Myrtle Beach center instead.' : `Could not get location: ${err.message}`;
            setGeoError(msg); setLoading(false);
          },
          { enableHighAccuracy: true, maximumAge: 30000, timeout: 15000 }
        );
      }, []);

      const markVisited = (siteId, site) => {
        const newVisited = new Set(visited);
        newVisited.add(siteId);
        setVisited(newVisited);
        saveToFirestore(newVisited, importedFiles, importedSites);

        // Write to shared completions (include avatar photo)
        const routeKey = (site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_');
        const displayName = user.displayName || user.email.split('@')[0];
        const completionData = {
          completedBy: user.uid,
          completedByName: displayName,
          completedByPhoto: avatarURL || user.photoURL || null,
          completedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        db.collection('sharedRoutes').doc(routeKey)
          .collection('completions').doc(siteId).set(completionData)
          .catch(err => console.error('Shared completion error:', err));
      };

      const resetProgress = () => {
        if (confirm('Reset all YOUR visited sites? This cannot be undone.')) {
          const newVisited = new Set();
          setVisited(newVisited);
          saveToFirestore(newVisited, importedFiles, importedSites);
          // Note: shared completions are NOT reset — they track team progress
        }
      };

      const handleKMZImport = (fileName, sites) => {
        const sourceName = fileName.replace(/\.[^.]+$/, '');
        const newImported = importedSites.filter(s => s.source !== sourceName);
        const newFiles = importedFiles.filter(f => f.name !== sourceName);
        const updatedSites = [...newImported, ...sites];
        const updatedFiles = [...newFiles, { name: sourceName, siteCount: sites.length }];
        setImportedSites(updatedSites);
        setImportedFiles(updatedFiles);
        saveToFirestore(visited, updatedFiles, updatedSites);
      };

      const handleRemoveFile = (sourceName) => {
        if (confirm(`Remove all sites from "${sourceName}"?`)) {
          const updatedSites = importedSites.filter(s => s.source !== sourceName);
          const updatedFiles = importedFiles.filter(f => f.name !== sourceName);
          setImportedSites(updatedSites);
          setImportedFiles(updatedFiles);
          saveToFirestore(visited, updatedFiles, updatedSites);
          if (sourceFilter === sourceName) setSourceFilter('all');
        }
      };

      // Apply source and status filters (memoized to prevent map flicker)
      const filteredSites = useMemo(() => sortedSites.filter((s) => {
        if (sourceFilter !== 'all') {
          if (sourceFilter === 'builtin' && s.source !== 'builtin') return false;
          if (sourceFilter !== 'builtin' && s.source !== sourceFilter) return false;
        }
        if (filter === 'remaining') return !visited.has(s.id) && !sharedCompletions[s.id];
        if (filter === 'visited') return visited.has(s.id);
        if (filter === 'completed') return !!sharedCompletions[s.id];
        return true;
      }), [sortedSites, sourceFilter, filter, visited, sharedCompletions]);

      const currentTargetId = useMemo(() => { const found = sortedSites.find((s) => !visited.has(s.id) && !sharedCompletions[s.id]); return found ? found.id : null; }, [sortedSites, visited, sharedCompletions]);
      const remainingCount = useMemo(() => sortedSites.filter(s => !visited.has(s.id) && !sharedCompletions[s.id]).length, [sortedSites, visited, sharedCompletions]);
      const teamCompletedCount = useMemo(() => Object.keys(sharedCompletions).length, [sharedCompletions]);

      // Loading screen
      if (!permissionGranted) {
        if (loading) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen gap-4 p-8 text-center">
              <div className="relative">
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-24 h-24 rounded-full border-2 border-primary/30 pulse-ring"></div>
                </div>
                <div className="relative z-10 bg-primary/10 rounded-full p-6"><MapPinIcon size={48} className="text-primary" /></div>
              </div>
              <span className="loading loading-spinner loading-lg text-primary"></span>
              <p className="opacity-70 text-lg font-semibold">Finding your location…</p>
              <p className="text-xs opacity-40">Allow location access when your browser asks</p>
            </div>
          );
        }
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-5 p-8 text-center">
            <div className="bg-error/10 rounded-full p-6"><MapPinIcon size={48} className="text-error" /></div>
            {geoError && (<div className="alert alert-warning max-w-sm text-sm"><MapPinIcon size={16} /><span>{geoError}</span></div>)}
            <button className="btn btn-primary btn-lg gap-2" onClick={requestLocation}><MapPinIcon size={20} /> Try Again</button>
            <div className="divider max-w-xs">OR</div>
            <button className="btn btn-outline btn-lg gap-2" onClick={useDefaultLocation}><GlobeIcon size={20} /> Use Myrtle Beach Center</button>
            <p className="text-xs opacity-40 max-w-xs">This will sort sites from the center of Myrtle Beach.</p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <div className="bg-primary text-primary-content px-4 py-3">
            <div className="flex items-center justify-between">
              <h1 className="text-lg font-bold flex items-center gap-2">
                <GlobeIcon size={22} /> Global Route
              </h1>
              <UserMenu user={user} avatarURL={avatarURL} onLogout={onLogout} onChangePhoto={() => setShowAvatarSetup(true)} />
            </div>
            <p className="text-xs opacity-80 text-center">
              {allSites.length} sites total • {teamCompletedCount} completed by team • Nearest-First Routing
            </p>
          </div>

          {/* Toolbar */}
          <div className="sticky top-0 z-[1000] bg-base-100 border-b border-base-300 px-4 py-3 flex flex-wrap items-center gap-3">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <NavIcon size={18} className="text-primary shrink-0" />
              <span className="font-semibold text-sm truncate">{remainingCount} remaining</span>
              <span className="text-xs opacity-50">({visited.size} you • {teamCompletedCount} team)</span>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button className="btn btn-sm btn-outline btn-warning gap-1" onClick={() => setShowKMZManager(true)} title="Import KMZ">
                <FolderIcon size={14} />
                {importedFiles.length > 0 && <span className="badge badge-xs badge-warning">{importedFiles.length}</span>}
              </button>
              <div className="join">
                <button className={`join-item btn btn-sm ${view === 'list' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setView('list')} title="List view"><ListIcon size={14} /></button>
                <button className={`join-item btn btn-sm ${view === 'map' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setView('map')} title="Map view"><MapIcon size={14} /></button>
              </div>
              {view === 'list' && (
                <select className="select select-bordered select-sm" value={filter} onChange={(e) => setFilter(e.target.value)}>
                  <option value="all">All ({sortedSites.length})</option>
                  <option value="remaining">Remaining ({remainingCount})</option>
                  <option value="visited">My Visited ({visited.size})</option>
                  <option value="completed">Team Done ({teamCompletedCount})</option>
                </select>
              )}
              <button className="btn btn-sm btn-outline btn-primary" onClick={requestLocation} title="Refresh GPS"><RefreshIcon size={14} /></button>
              {visited.size > 0 && <button className="btn btn-sm btn-outline btn-error" onClick={resetProgress} title="Reset my progress">↺</button>}
            </div>
          </div>

          {/* Source filter bar */}
          {importedFiles.length > 0 && (
            <div className="px-4 py-2 bg-base-200 border-b border-base-300 flex gap-2 overflow-x-auto">
              <button className={`btn btn-xs ${sourceFilter === 'all' ? 'btn-primary' : 'btn-ghost'}`} onClick={() => setSourceFilter('all')}>All Sources ({allSites.length})</button>
              <button className={`btn btn-xs ${sourceFilter === 'builtin' ? 'btn-success' : 'btn-ghost'}`} onClick={() => setSourceFilter('builtin')}>Myrtle Beach ({BUILTIN_SITES.length})</button>
              {importedFiles.map(f => (
                <button key={f.name} className={`btn btn-xs ${sourceFilter === f.name ? 'btn-warning' : 'btn-ghost'}`} onClick={() => setSourceFilter(f.name)}>{f.name} ({f.siteCount})</button>
              ))}
            </div>
          )}

          {/* Default location banner */}
          {usingDefault && (
            <div className="px-4 py-2 bg-warning/20 text-warning-content text-xs flex items-center justify-between gap-2">
              <span>📍 Using Myrtle Beach center — distances are approximate</span>
              <button className="btn btn-xs btn-warning" onClick={requestLocation}>Use My GPS</button>
            </div>
          )}

          {/* Location bar */}
          {userLoc && !usingDefault && view === 'list' && (
            <div className="px-4 py-2 bg-base-200 text-xs opacity-60 flex items-center gap-1">
              <MapPinIcon size={12} /> Your location: {userLoc.lat.toFixed(5)}, {userLoc.lon.toFixed(5)}
            </div>
          )}

          {/* Content */}
          {view === 'map' ? (
            <SiteMap sites={filteredSites} userLoc={userLoc} visited={visited} sharedCompletions={sharedCompletions} currentTargetId={currentTargetId} myAvatarURL={avatarURL} myPhotoURL={user.photoURL}  />
          ) : (
            <div className="flex flex-col gap-3 p-4 pb-24">
              {filteredSites.length === 0 ? (
                <div className="text-center py-12 opacity-50">
                  {filter === 'visited' ? 'No sites visited yet.' : filter === 'completed' ? 'No team completions yet.' : '🎉 All sites completed! Great work team!'}
                </div>
              ) : (
                filteredSites.map((site, idx) => (
                  <SiteCard key={`${site.source}-${site.id}`} site={site} index={idx} total={filteredSites.length}
                    isCurrent={site.id === currentTargetId} isVisited={visited.has(site.id)}
                    sharedCompletion={sharedCompletions[site.id]}
                    onMarkVisited={() => markVisited(site.id, site)}
                    myAvatarURL={avatarURL} myPhotoURL={user.photoURL}
                    noteCount={noteCounts[`${(!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_')}_${site.id}`] || 0}
                    onOpenNotes={() => setActiveNoteSite(site)} />
                ))
              )}
            </div>
          )}

          {/* Map Legend */}
          {view === 'map' && (
            <div className="fixed bottom-4 left-4 z-[1000] bg-base-200/95 backdrop-blur rounded-lg p-3 shadow-lg text-xs space-y-1">
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#3b82f6',border:'2px solid white'}}></div> Your Location</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#a855f7',border:'2px solid #fbbf24'}}></div> Next Stop</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid white'}}></div> Existing Cabinet</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#ef4444',border:'2px solid white'}}></div> Out of Scope</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#f59e0b',border:'2px solid white'}}></div> Imported</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#6b7280',border:'2px solid white'}}></div> Completed</div>
            </div>
          )}

          {/* KMZ Manager Modal */}
          {showKMZManager && (
            <KMZManager importedFiles={importedFiles} onImport={handleKMZImport} onRemoveFile={handleRemoveFile} onClose={() => setShowKMZManager(false)} />
          )}

          {/* Notes Panel */}
          {activeNoteSite && (
            <NotesPanel site={activeNoteSite} user={user} avatarURL={avatarURL} onClose={() => setActiveNoteSite(null)} />
          )}

          {/* Avatar Setup Overlay */}
          {showAvatarSetup && (
            <div className="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center">
              <div className="relative w-full max-w-sm mx-4">
                <button className="absolute -top-10 right-0 btn btn-sm btn-ghost text-white" onClick={() => setShowAvatarSetup(false)}>✕ Cancel</button>
                <AvatarSetup user={user} onComplete={(url) => { setAvatarURL(url); setShowAvatarSetup(false); }} />
              </div>
            </div>
          )}

          {/* Install Banner */}
          {showInstallBanner && !isStandalone && (
            <InstallBanner onInstall={handleInstall} onDismiss={dismissInstall} isIOS={isIOS} />
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('React error:', error, info); }
      render() {
        if (this.state.error) {
          return React.createElement('div', { style: { padding: 40, color: 'white', background: '#1d232a', minHeight: '100vh' } },
            React.createElement('h2', null, '⚠️ App Error'),
            React.createElement('pre', { style: { whiteSpace: 'pre-wrap', color: '#f87171', fontSize: 14 } }, String(this.state.error)),
            React.createElement('button', { onClick: () => { if ('caches' in window) caches.keys().then(k => k.forEach(c => caches.delete(c))); location.reload(); }, style: { marginTop: 20, padding: '10px 20px', background: '#570df8', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer' } }, 'Clear Cache & Reload')
          );
        }
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
</html>
