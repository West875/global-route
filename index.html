    // ── KMZ/KML Parser ──
    async function parseKMZFile(file) {
      const arrayBuffer = await file.arrayBuffer();
      let kmlText;

      // Try as KMZ (zip) first
      try {
        const zip = await JSZip.loadAsync(arrayBuffer);
        const kmlFile = Object.keys(zip.files).find(name => name.endsWith('.kml'));
        if (kmlFile) {
          kmlText = await zip.files[kmlFile].async('text');
        }
      } catch (e) {
        // Not a zip — try as raw KML
        kmlText = new TextDecoder().decode(arrayBuffer);
      }

      if (!kmlText) throw new Error('No KML data found in file');

      const parser = new DOMParser();
      const doc = parser.parseFromString(kmlText, 'text/xml');
      const placemarks = doc.querySelectorAll('Placemark');
      const sites = [];

      placemarks.forEach((pm, idx) => {
        const nameEl = pm.querySelector('name');
        const name = nameEl ? nameEl.textContent.trim() : `Site ${idx + 1}`;
        const descEl = pm.querySelector('description');
        const description = descEl ? descEl.textContent.trim() : '';

        // Get coordinates from Point, or from LineString/Polygon first coord
        let coords = null;
        const pointCoords = pm.querySelector('Point coordinates');
        if (pointCoords) {
          const parts = pointCoords.textContent.trim().split(',');
          if (parts.length >= 2) {
            coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
          }
        }
        if (!coords) {
          const anyCoords = pm.querySelector('coordinates');
          if (anyCoords) {
            const first = anyCoords.textContent.trim().split(/\s+/)[0];
            const parts = first.split(',');
            if (parts.length >= 2) {
              coords = { lon: parseFloat(parts[0]), lat: parseFloat(parts[1]) };
            }
          }
        }

        if (coords && !isNaN(coords.lat) && !isNaN(coords.lon)) {
          // Try to extract status from ExtendedData or description
          let status = 'Imported';
          const extData = pm.querySelectorAll('ExtendedData Data, ExtendedData SimpleData');
          extData.forEach(d => {
            const dName = (d.getAttribute('name') || '').toLowerCase();
            if (dName.includes('status') || dName.includes('type')) {
              const val = d.querySelector('value') || d;
              status = val.textContent.trim() || status;
            }
          });

          sites.push({
            id: name,
            address: description || `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`,
            status: status,
            lat: coords.lat,
            lon: coords.lon,
            source: file.name.replace(/\.[^.]+$/, ''),
          });
        }
      });

      return sites;
    }

    // ── Geo Helpers ──
    function toRad(deg) { return (deg * Math.PI) / 180; }
    function haversineDistance(loc1, loc2) {
      const R = 3958.8;
      const dLat = toRad(loc2.lat - loc1.lat);
      const dLon = toRad(loc2.lon - loc1.lon);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(loc1.lat)) * Math.cos(toRad(loc2.lat)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function sortByNearest(sites, userLoc) {
      return sites
        .map((s) => ({ ...s, distance: haversineDistance(userLoc, { lat: s.lat, lon: s.lon }) }))
        .sort((a, b) => a.distance - b.distance);
    }

    }

    // ── Leaflet Map Component ──
    function SiteMap({ sites, userLoc, visited, currentTargetId }) {
      const mapRef = useRef(null);
      const mapInstanceRef = useRef(null);

      useEffect(() => {
        if (mapInstanceRef.current) {
          mapInstanceRef.current.remove();
          mapInstanceRef.current = null;
        }

        const center = userLoc ? [userLoc.lat, userLoc.lon] : [33.6891, -78.8867];
        const map = L.map(mapRef.current, { zoomControl: true }).setView(center, 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 19,
        }).addTo(map);

        // User location marker
        if (userLoc) {
          const userIcon = L.divIcon({
            html: '<div style="width:16px;height:16px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(59,130,246,0.6);"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8],
            className: '',
          });
          L.marker([userLoc.lat, userLoc.lon], { icon: userIcon })
            .addTo(map)
            .bindPopup('<b>📍 Your Location</b>');
        }

        // Site markers
        sites.forEach((site) => {
          const isExisting = site.status.includes('Existing Cabinet');
          const isImported = site.source && site.source !== 'builtin';
          const isVisited = visited.has(site.id);
          const isCurrent = site.id === currentTargetId;

          let color = isImported ? '#f59e0b' : (isExisting ? '#22c55e' : '#ef4444');
          let borderColor = 'white';
          let size = 14;
          if (isCurrent) { color = '#a855f7'; borderColor = '#fbbf24'; size = 20; }
          if (isVisited) { color = '#6b7280'; }

          const icon = L.divIcon({
            html: `<div style="width:${size}px;height:${size}px;background:${color};border:${isCurrent ? '3' : '2'}px solid ${borderColor};border-radius:50%;box-shadow:0 0 ${isCurrent ? '12px' : '4px'} ${color}80;${isCurrent ? 'animation:pulse 1.5s infinite;' : ''}"></div>`,
            iconSize: [size, size],
            iconAnchor: [size/2, size/2],
            className: '',
          });

          const distText = site.distance !== undefined ? `<br>📍 ${site.distance.toFixed(2)} mi away` : '';
          const sourceBadge = isImported
            ? `<span style="background:#f59e0b;color:black;padding:1px 6px;border-radius:8px;font-size:11px;">${site.source}</span>`
            : (isExisting
              ? '<span style="background:#22c55e;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Existing Cabinet</span>'
              : '<span style="background:#ef4444;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">Out of Scope</span>');
          const visitedBadge = isVisited ? ' <span style="background:#6b7280;color:white;padding:1px 6px;border-radius:8px;font-size:11px;">✓ Visited</span>' : '';
          const currentBadge = isCurrent ? '<div style="background:#a855f7;color:white;padding:2px 8px;border-radius:8px;font-size:11px;text-align:center;margin-bottom:4px;">⭐ NEXT STOP</div>' : '';

          const popup = `
            <div style="min-width:200px;font-family:system-ui;">
              ${currentBadge}
              <b style="font-size:14px;">${site.id}</b> ${sourceBadge}${visitedBadge}<br>
              <span style="color:#888;font-size:12px;">${site.address}</span>${distText}
              <br><br>
              <a href="${directionsUrl(site)}" target="_blank" rel="noopener"
                style="display:inline-block;background:#570df8;color:white;padding:6px 14px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">
                🗺️ Get Directions
              </a>
            </div>
          `;

          L.marker([site.lat, site.lon], { icon }).addTo(map).bindPopup(popup);
        });

        mapInstanceRef.current = map;

        // Fit bounds
        if (sites.length > 0) {
          const bounds = L.latLngBounds(sites.map(s => [s.lat, s.lon]));
          if (userLoc) bounds.extend([userLoc.lat, userLoc.lon]);
          map.fitBounds(bounds, { padding: [30, 30] });
        }

        if (!document.getElementById('pulse-css')) {
          const style = document.createElement('style');
          style.id = 'pulse-css';
          style.textContent = '@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }';
          document.head.appendChild(style);
        }

        return () => {
          if (mapInstanceRef.current) {
            mapInstanceRef.current.remove();
            mapInstanceRef.current = null;
          }
        };
      }, [sites, userLoc, visited, currentTargetId]);

      return <div id="map-container" ref={mapRef}></div>;
    }

    // ── Site Card ──
    function SiteCard({ site, index, total, isCurrent, isVisited, onMarkVisited }) {
      const isExisting = site.status.includes('Existing Cabinet');
      const isImported = site.source && site.source !== 'builtin';
      return (
        <div className={`card bg-base-200 shadow-md fade-in ${isCurrent ? 'ring-2 ring-primary' : ''} ${isVisited ? 'opacity-50' : ''}`}>
          <div className="card-body p-4 gap-2">
            <div className="flex items-center justify-between flex-wrap gap-1">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="badge badge-sm badge-outline font-mono">#{index + 1} of {total}</span>
                {isImported ? (
                  <span className="badge badge-sm badge-warning">{site.source}</span>
                ) : (
                  <span className={`badge badge-sm ${isExisting ? 'badge-success' : 'badge-error'}`}>
                    {isExisting ? 'Existing Cabinet' : 'Out of Scope'}
                  </span>
                )}
                {isVisited && (
                  <span className="badge badge-sm badge-ghost"><CheckIcon size={12} /> Visited</span>
                )}
              </div>
              {isCurrent && <span className="badge badge-primary badge-sm">⭐ NEXT STOP</span>}
            </div>
            <div className="flex items-start gap-2 mt-1">
              <MapPinIcon size={18} className="opacity-60 shrink-0 mt-0.5" />
              <div>
                <p className="font-semibold text-sm">{site.id}</p>
                <p className="text-sm opacity-70">{site.address}</p>
              </div>
            </div>
            {site.distance !== undefined && (
              <p className="text-xs opacity-50 ml-6">📍 {site.distance.toFixed(2)} miles away</p>
            )}
            <div className="flex gap-2 mt-2">
              <a href={directionsUrl(site)} target="_blank" rel="noopener noreferrer"
                className="btn btn-primary btn-sm flex-1">
                <NavIcon size={14} /> Get Directions <ExternalIcon />
              </a>
              {!isVisited && (
                <button className="btn btn-outline btn-success btn-sm" onClick={onMarkVisited}>
                  <CheckIcon size={14} /> Done
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── KMZ Manager Panel ──
    function KMZManager({ importedFiles, onImport, onRemoveFile, onClose }) {
      const fileInputRef = useRef(null);
      const [importing, setImporting] = useState(false);
      const [error, setError] = useState(null);
      const [lastResult, setLastResult] = useState(null);

      const handleFileSelect = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setImporting(true);
        setError(null);
        setLastResult(null);
        try {
          const sites = await parseKMZFile(file);
          if (sites.length === 0) {
            setError('No locations found in file. Make sure it contains placemarks with coordinates.');
          } else {
            onImport(file.name, sites);
            setLastResult(`✅ Loaded ${sites.length} sites from ${file.name}`);
          }
        } catch (err) {
          setError(`Error reading file: ${err.message}`);
        }
        setImporting(false);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };

      return (
        <div className="fixed inset-0 z-[2000] bg-black/60 flex items-end sm:items-center justify-center" onClick={onClose}>
          <div className="bg-base-200 w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl max-h-[80vh] overflow-auto" onClick={e => e.stopPropagation()}>
            <div className="p-4 border-b border-base-300 flex items-center justify-between">
              <h2 className="font-bold text-lg flex items-center gap-2"><FolderIcon size={20} /> KMZ Files</h2>
              <button className="btn btn-sm btn-ghost btn-circle" onClick={onClose}>✕</button>
            </div>

            <div className="p-4 space-y-4">
              {/* Import button */}
              <div>
                <input ref={fileInputRef} type="file" accept=".kmz,.kml" className="hidden" onChange={handleFileSelect} />
                <button className="btn btn-primary w-full gap-2" onClick={() => fileInputRef.current?.click()} disabled={importing}>
                  {importing ? <span className="loading loading-spinner loading-sm"></span> : <UploadIcon size={18} />}
                  {importing ? 'Importing...' : 'Import KMZ / KML File'}
                </button>
                <p className="text-xs opacity-50 mt-1 text-center">Supports .kmz and .kml files with placemarks</p>
              </div>

              {error && (
                <div className="alert alert-error text-sm py-2">
                  <span>{error}</span>
                </div>
              )}

              {lastResult && (
                <div className="alert alert-success text-sm py-2">
                  <span>{lastResult}</span>
                </div>
              )}

              {/* Built-in file */}
              <div className="space-y-2">
                <h3 className="text-sm font-semibold opacity-70">Loaded Files</h3>

                <div className="card bg-base-300">
                  <div className="card-body p-3 flex-row items-center gap-3">
                    <div className="bg-success/20 rounded-lg p-2">
                      <MapPinIcon size={18} className="text-success" />
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm truncate">Myrtle Beach (Built-in)</p>
                      <p className="text-xs opacity-50">{BUILTIN_SITES.length} sites</p>
                    </div>
                    <span className="badge badge-sm badge-ghost">Default</span>
                  </div>
                </div>

                {/* Imported files */}
                {importedFiles.map(f => (
                  <div key={f.name} className="card bg-base-300">
                    <div className="card-body p-3 flex-row items-center gap-3">
                      <div className="bg-warning/20 rounded-lg p-2">
                        <MapPinIcon size={18} className="text-warning" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="font-semibold text-sm truncate">{f.name}</p>
                        <p className="text-xs opacity-50">{f.siteCount} sites</p>
                      </div>
                      <button className="btn btn-sm btn-ghost btn-circle text-error"
                        onClick={() => onRemoveFile(f.name)} title="Remove">
                        <TrashIcon size={16} />
                      </button>
                    </div>
                  </div>
                ))}

                {importedFiles.length === 0 && (
                  <p className="text-xs opacity-40 text-center py-2">No imported files yet. Tap "Import" above to add KMZ files.</p>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Install Banner ──
    function InstallBanner({ onInstall, onDismiss, isIOS }) {
      if (isIOS) {
        return (
          <div className="fixed bottom-0 left-0 right-0 z-50 p-4 install-banner">
            <div className="card bg-base-200 shadow-xl border border-primary/30">
              <div className="card-body p-4 gap-3">
                <div className="flex items-center gap-3">
                  <div className="bg-primary/20 rounded-xl p-2">
                    <GlobeIcon size={32} className="text-primary" />
                  </div>
                  <div className="flex-1">
                    <p className="font-bold text-sm">Install Global Route</p>
                    <p className="text-xs opacity-70">Add to your home screen for quick access</p>
                  </div>
                  <button className="btn btn-sm btn-ghost btn-circle" onClick={onDismiss}>✕</button>
                </div>
                <div className="bg-base-300 rounded-lg p-3 text-sm">
                  <p className="font-semibold mb-1">To install on iPhone/iPad:</p>
                  <ol className="list-decimal list-inside space-y-1 text-xs opacity-80">
                    <li>Tap the <strong>Share</strong> button <span className="inline-block align-middle"><ShareIcon size={14} /></span> at the bottom of Safari</li>
                    <li>Scroll down and tap <strong>"Add to Home Screen"</strong></li>
                    <li>Tap <strong>"Add"</strong> in the top right</li>
                  </ol>
                </div>
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="fixed bottom-0 left-0 right-0 z-50 p-4 install-banner">
          <div className="card bg-base-200 shadow-xl border border-primary/30">
            <div className="card-body p-4">
              <div className="flex items-center gap-3">
                <div className="bg-primary/20 rounded-xl p-2">
                  <GlobeIcon size={32} className="text-primary" />
                </div>
                <div className="flex-1">
                  <p className="font-bold text-sm">Install Global Route</p>
                  <p className="text-xs opacity-70">Add to your home screen like a real app</p>
                </div>
              </div>
              <div className="flex gap-2 mt-2">
                <button className="btn btn-primary btn-sm flex-1 gap-2" onClick={onInstall}>
                  <DownloadIcon size={16} /> Install App
                </button>
                <button className="btn btn-ghost btn-sm" onClick={onDismiss}>Not now</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Default fallback location ──
    const MYRTLE_BEACH_CENTER = { lat: 33.6891, lon: -78.8867 };

    // ── Main App ──
    function App() {
      const [permissionGranted, setPermissionGranted] = useState(false);
      const [userLoc, setUserLoc] = useState(null);
      const [geoError, setGeoError] = useState(null);
      const [loading, setLoading] = useState(true);
      const [visited, setVisited] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('gr_visited') || '[]')); }
        catch { return new Set(); }
      });
      const [filter, setFilter] = useState('all');
      const [usingDefault, setUsingDefault] = useState(false);
      const [view, setView] = useState('list');
      const [showKMZManager, setShowKMZManager] = useState(false);

      // Imported sites from KMZ files (persisted in localStorage)
      const [importedFiles, setImportedFiles] = useState(() => {
        try { return JSON.parse(localStorage.getItem('gr_imported_files') || '[]'); }
        catch { return []; }
      });
      const [importedSites, setImportedSites] = useState(() => {
        try { return JSON.parse(localStorage.getItem('gr_imported_sites') || '[]'); }
        catch { return []; }
      });

      // All sites = built-in + imported
      const allSites = [...BUILTIN_SITES, ...importedSites];
      const [sortedSites, setSortedSites] = useState(allSites);

      // Source filter
      const [sourceFilter, setSourceFilter] = useState('all');
      const sourceNames = ['builtin', ...importedFiles.map(f => f.name.replace(/\.[^.]+$/, ''))];

      // PWA install prompt
      const [installPrompt, setInstallPrompt] = useState(null);
      const [showInstallBanner, setShowInstallBanner] = useState(false);
      const [isIOS, setIsIOS] = useState(false);
      const [isStandalone, setIsStandalone] = useState(false);

      useEffect(() => {
        const ios = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        setIsIOS(ios);
        setIsStandalone(standalone);
        if (ios && !standalone && !localStorage.getItem('gr_install_dismissed')) {
          setTimeout(() => setShowInstallBanner(true), 3000);
        }
      }, []);

      useEffect(() => {
        const handler = (e) => {
          e.preventDefault();
          setInstallPrompt(e);
          if (!localStorage.getItem('gr_install_dismissed')) {
            setShowInstallBanner(true);
          }
        };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const handleInstall = async () => {
        if (installPrompt) {
          installPrompt.prompt();
          const result = await installPrompt.userChoice;
          if (result.outcome === 'accepted') setShowInstallBanner(false);
          setInstallPrompt(null);
        }
      };

      const dismissInstall = () => {
        setShowInstallBanner(false);
        localStorage.setItem('gr_install_dismissed', 'true');
      };

      useEffect(() => {
        localStorage.setItem('gr_visited', JSON.stringify([...visited]));
      }, [visited]);

      // Save imported data to localStorage
      useEffect(() => {
        localStorage.setItem('gr_imported_files', JSON.stringify(importedFiles));
        localStorage.setItem('gr_imported_sites', JSON.stringify(importedSites));
      }, [importedFiles, importedSites]);

      // Re-sort when sites or location change
      useEffect(() => {
        const all = [...BUILTIN_SITES, ...importedSites];
        if (userLoc) {
          setSortedSites(sortByNearest(all, userLoc));
        } else {
          setSortedSites(all);
        }
      }, [importedSites, userLoc]);

      const applyLocation = useCallback((loc, isDefault) => {
        setUserLoc(loc);
        setUsingDefault(isDefault || false);
        setPermissionGranted(true);
        setLoading(false);
      }, []);

      const requestLocation = useCallback(() => {
        setLoading(true);
        setGeoError(null);
        if (!navigator.geolocation) {
          setGeoError('Geolocation is not supported by your browser.');
          setLoading(false);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => applyLocation({ lat: pos.coords.latitude, lon: pos.coords.longitude }, false),
          (err) => {
            const msg = err.code === 1
              ? 'Location denied — tap below to use Myrtle Beach center instead.'
              : `Could not get location: ${err.message}`;
            setGeoError(msg);
            setLoading(false);
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      }, [applyLocation]);

      const useDefaultLocation = useCallback(() => {
        applyLocation(MYRTLE_BEACH_CENTER, true);
      }, [applyLocation]);

      useEffect(() => { requestLocation(); }, []);

      const markVisited = (id) => {
        setVisited((prev) => { const next = new Set(prev); next.add(id); return next; });
      };

      const resetProgress = () => {
        if (confirm('Reset all visited sites? This cannot be undone.')) {
          setVisited(new Set());
          localStorage.removeItem('gr_visited');
        }
      };

      // Import KMZ handler
      const handleKMZImport = (fileName, sites) => {
        const sourceName = fileName.replace(/\.[^.]+$/, '');
        // Remove existing file with same name
        const newImported = importedSites.filter(s => s.source !== sourceName);
        const newFiles = importedFiles.filter(f => f.name !== sourceName);

        setImportedSites([...newImported, ...sites]);
        setImportedFiles([...newFiles, { name: sourceName, siteCount: sites.length }]);
      };

      const handleRemoveFile = (sourceName) => {
        if (confirm(`Remove all sites from "${sourceName}"?`)) {
          setImportedSites(importedSites.filter(s => s.source !== sourceName));
          setImportedFiles(importedFiles.filter(f => f.name !== sourceName));
          if (sourceFilter === sourceName) setSourceFilter('all');
        }
      };

      // Apply source and status filters
      const filteredSites = sortedSites.filter((s) => {
        // Source filter
        if (sourceFilter !== 'all') {
          if (sourceFilter === 'builtin' && s.source !== 'builtin') return false;
          if (sourceFilter !== 'builtin' && s.source !== sourceFilter) return false;
        }
        // Status filter
        if (filter === 'remaining') return !visited.has(s.id);
        if (filter === 'visited') return visited.has(s.id);
        return true;
      });

      const currentTargetId = sortedSites.find((s) => !visited.has(s.id))?.id ?? null;
      const remainingCount = sortedSites.length - visited.size;

      // Loading screen
      if (!permissionGranted) {
        if (loading) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen gap-4 p-8 text-center">
              <div className="relative">
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-24 h-24 rounded-full border-2 border-primary/30 pulse-ring"></div>
                </div>
                <div className="relative z-10 bg-primary/10 rounded-full p-6">
                  <MapPinIcon size={48} className="text-primary" />
                </div>
              </div>
              <span className="loading loading-spinner loading-lg text-primary"></span>
              <p className="opacity-70 text-lg font-semibold">Finding your location…</p>
              <p className="text-xs opacity-40">Allow location access when your browser asks</p>
            </div>
          );
        }
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-5 p-8 text-center">
            <div className="bg-error/10 rounded-full p-6">
              <MapPinIcon size={48} className="text-error" />
            </div>
            {geoError && (
              <div className="alert alert-warning max-w-sm text-sm">
                <MapPinIcon size={16} /><span>{geoError}</span>
              </div>
            )}
            <button className="btn btn-primary btn-lg gap-2" onClick={requestLocation}>
              <MapPinIcon size={20} /> Try Again
            </button>
            <div className="divider max-w-xs">OR</div>
            <button className="btn btn-outline btn-lg gap-2" onClick={useDefaultLocation}>
              <GlobeIcon size={20} /> Use Myrtle Beach Center
            </button>
            <p className="text-xs opacity-40 max-w-xs">
              This will sort sites from the center of Myrtle Beach. You can refresh your GPS later.
            </p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <div className="bg-primary text-primary-content px-4 py-3 text-center">
            <h1 className="text-lg font-bold flex items-center justify-center gap-2">
              <GlobeIcon size={22} /> Global Route
            </h1>
            <p className="text-xs opacity-80">
              {allSites.length} sites total • Nearest-First Routing
            </p>
          </div>

          {/* Toolbar */}
          <div className="sticky top-0 z-[1000] bg-base-100 border-b border-base-300 px-4 py-3 flex flex-wrap items-center gap-3">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <NavIcon size={18} className="text-primary shrink-0" />
              <span className="font-semibold text-sm truncate">{remainingCount} remaining</span>
              <span className="text-xs opacity-50">({visited.size} visited)</span>
            </div>
            <div className="flex gap-2 flex-wrap">
              {/* KMZ import button */}
              <button className="btn btn-sm btn-outline btn-warning gap-1" onClick={() => setShowKMZManager(true)} title="Import KMZ">
                <FolderIcon size={14} />
                {importedFiles.length > 0 && (
                  <span className="badge badge-xs badge-warning">{importedFiles.length}</span>
                )}
              </button>
              {/* View toggle */}
              <div className="join">
                <button className={`join-item btn btn-sm ${view === 'list' ? 'btn-primary' : 'btn-ghost'}`}
                  onClick={() => setView('list')} title="List view">
                  <ListIcon size={14} />
                </button>
                <button className={`join-item btn btn-sm ${view === 'map' ? 'btn-primary' : 'btn-ghost'}`}
                  onClick={() => setView('map')} title="Map view">
                  <MapIcon size={14} />
                </button>
              </div>
              {view === 'list' && (
                <select className="select select-bordered select-sm" value={filter}
                  onChange={(e) => setFilter(e.target.value)}>
                  <option value="all">All ({sortedSites.length})</option>
                  <option value="remaining">Remaining ({remainingCount})</option>
                  <option value="visited">Visited ({visited.size})</option>
                </select>
              )}
              <button className="btn btn-sm btn-outline btn-primary" onClick={requestLocation} title="Refresh GPS">
                <RefreshIcon size={14} />
              </button>
              {visited.size > 0 && (
                <button className="btn btn-sm btn-outline btn-error" onClick={resetProgress} title="Reset progress">
                  ↺
                </button>
              )}
            </div>
          </div>

          {/* Source filter bar (show when imports exist) */}
          {importedFiles.length > 0 && (
            <div className="px-4 py-2 bg-base-200 border-b border-base-300 flex gap-2 overflow-x-auto">
              <button className={`btn btn-xs ${sourceFilter === 'all' ? 'btn-primary' : 'btn-ghost'}`}
                onClick={() => setSourceFilter('all')}>
                All Sources ({allSites.length})
              </button>
              <button className={`btn btn-xs ${sourceFilter === 'builtin' ? 'btn-success' : 'btn-ghost'}`}
                onClick={() => setSourceFilter('builtin')}>
                Myrtle Beach ({BUILTIN_SITES.length})
              </button>
              {importedFiles.map(f => (
                <button key={f.name} className={`btn btn-xs ${sourceFilter === f.name ? 'btn-warning' : 'btn-ghost'}`}
                  onClick={() => setSourceFilter(f.name)}>
                  {f.name} ({f.siteCount})
                </button>
              ))}
            </div>
          )}

          {/* Default location banner */}
          {usingDefault && (
            <div className="px-4 py-2 bg-warning/20 text-warning-content text-xs flex items-center justify-between gap-2">
              <span>📍 Using Myrtle Beach center — distances are approximate</span>
              <button className="btn btn-xs btn-warning" onClick={requestLocation}>Use My GPS</button>
            </div>
          )}

          {/* Location bar */}
          {userLoc && !usingDefault && view === 'list' && (
            <div className="px-4 py-2 bg-base-200 text-xs opacity-60 flex items-center gap-1">
              <MapPinIcon size={12} /> Your location: {userLoc.lat.toFixed(5)}, {userLoc.lon.toFixed(5)}
            </div>
          )}

          {/* Content */}
          {view === 'map' ? (
            <SiteMap sites={filteredSites} userLoc={userLoc} visited={visited} currentTargetId={currentTargetId} />
          ) : (
            <div className="flex flex-col gap-3 p-4 pb-24">
              {filteredSites.length === 0 ? (
                <div className="text-center py-12 opacity-50">
                  {filter === 'visited' ? 'No sites visited yet.' : '🎉 All sites visited! Great work!'}
                </div>
              ) : (
                filteredSites.map((site, idx) => (
                  <SiteCard key={`${site.source}-${site.id}`} site={site} index={idx} total={filteredSites.length}
                    isCurrent={site.id === currentTargetId} isVisited={visited.has(site.id)}
                    onMarkVisited={() => markVisited(site.id)} />
                ))
              )}
            </div>
          )}

          {/* Map Legend */}
          {view === 'map' && (
            <div className="fixed bottom-4 left-4 z-[1000] bg-base-200/95 backdrop-blur rounded-lg p-3 shadow-lg text-xs space-y-1">
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#3b82f6',border:'2px solid white'}}></div> Your Location</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#a855f7',border:'2px solid #fbbf24'}}></div> Next Stop</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid white'}}></div> Existing Cabinet</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#ef4444',border:'2px solid white'}}></div> Out of Scope</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#f59e0b',border:'2px solid white'}}></div> Imported</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#6b7280',border:'2px solid white'}}></div> Visited</div>
            </div>
          )}

          {/* KMZ Manager Modal */}
          {showKMZManager && (
            <KMZManager
              importedFiles={importedFiles}
              onImport={handleKMZImport}
              onRemoveFile={handleRemoveFile}
              onClose={() => setShowKMZManager(false)}
            />
          )}

          {/* Install Banner */}
          {showInstallBanner && !isStandalone && (
            <InstallBanner onInstall={handleInstall} onDismiss={dismissInstall} isIOS={isIOS} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
