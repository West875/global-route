      };

      // Apply source and status filters (memoized to prevent map flicker)
      const filteredSites = useMemo(function() { return sortedSites.filter(function(s) {
        if (sourceFilter !== 'all') {
          if (sourceFilter === 'builtin' && s.source !== 'builtin') return false;
          if (sourceFilter !== 'builtin' && s.source !== sourceFilter) return false;
        }
        if (filter === 'remaining') return !visited.has(s.id) && !sharedCompletions[s.id];
        if (filter === 'visited') return visited.has(s.id);
        if (filter === 'completed') return !!sharedCompletions[s.id];
        if (filter === 'revisit') return !!revisits[s.id];
        return true;
      }); }, [sortedSites, sourceFilter, filter, visited, sharedCompletions, revisits]);

      const currentTargetId = useMemo(function() { var found = sortedSites.find(function(s) { if (visited.has(s.id) || sharedCompletions[s.id]) return false; var er = enroutes[s.id]; if (er && er.userId && er.userId !== user.uid) return false; return true; }); return found ? found.id : null; }, [sortedSites, visited, sharedCompletions, enroutes, user]);
      const remainingCount = useMemo(function() { return sortedSites.filter(function(s) { return !visited.has(s.id) && !sharedCompletions[s.id]; }).length; }, [sortedSites, visited, sharedCompletions]);
      const teamCompletedCount = useMemo(function() { return Object.keys(sharedCompletions).length; }, [sharedCompletions]);
      const revisitCount = useMemo(function() { return Object.keys(revisits).length; }, [revisits]);

      // Loading screen
      if (!permissionGranted) {
        if (loading) {
          return (
            <div className="flex flex-col items-center justify-center min-h-screen gap-4 p-8 text-center">
              <div className="relative">
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-24 h-24 rounded-full border-2 border-primary/30 pulse-ring"></div>
                </div>
                <div className="relative z-10 bg-primary/10 rounded-full p-6"><MapPinIcon size={48} className="text-primary" /></div>
              </div>
              <span className="loading loading-spinner loading-lg text-primary"></span>
              <p className="opacity-70 text-lg font-semibold">Finding your location…</p>
              <p className="text-xs opacity-40">Allow location access when your browser asks</p>
            </div>
          );
        }
        return (
          <div className="flex flex-col items-center justify-center min-h-screen gap-5 p-8 text-center">
            <div className="bg-error/10 rounded-full p-6"><MapPinIcon size={48} className="text-error" /></div>
            {geoError && (<div className="alert alert-warning max-w-sm text-sm"><MapPinIcon size={16} /><span>{geoError}</span></div>)}
            <button className="btn btn-primary btn-lg gap-2" onClick={requestLocation}><MapPinIcon size={20} /> Try Again</button>
            <div className="divider max-w-xs">OR</div>
            <button className="btn btn-outline btn-lg gap-2" onClick={useDefaultLocation}><GlobeIcon size={20} /> Use Myrtle Beach Center</button>
            <p className="text-xs opacity-40 max-w-xs">This will sort sites from the center of Myrtle Beach.</p>
          </div>
        );
      }

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header */}
          <div className="bg-primary text-primary-content px-4 py-3">
            <div className="flex items-center justify-between">
              <h1 className="flex items-center gap-2">
                <svg width="28" height="28" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="100" cy="100" r="85" stroke="#d4af37" strokeWidth="2.5" fill="none" opacity="0.5"/>
                  <circle cx="100" cy="100" r="65" stroke="#d4af37" strokeWidth="1.5" fill="none" opacity="0.3"/>
                  <polygon points="100,25 107,88 100,80 93,88" fill="#d4af37"/>
                  <polygon points="100,175 107,112 100,120 93,112" fill="#d4af37" opacity="0.7"/>
                  <polygon points="25,100 88,93 80,100 88,107" fill="#d4af37" opacity="0.7"/>
                  <polygon points="175,100 112,93 120,100 112,107" fill="#d4af37" opacity="0.7"/>
                  <polygon points="100,40 105,90 100,83 95,90" fill="#d4af37" opacity="0.5" transform="rotate(45,100,100)"/>
                  <polygon points="100,40 105,90 100,83 95,90" fill="#d4af37" opacity="0.5" transform="rotate(135,100,100)"/>
                  <polygon points="100,40 105,90 100,83 95,90" fill="#d4af37" opacity="0.5" transform="rotate(225,100,100)"/>
                  <polygon points="100,40 105,90 100,83 95,90" fill="#d4af37" opacity="0.5" transform="rotate(315,100,100)"/>
                  <circle cx="100" cy="100" r="5" fill="#d4af37"/>
                  <g transform="translate(128,48)">
                    <path d="M0,-7 C3.5,-7 7,-3.5 7,0 C7,5 0,12 0,12 C0,12 -7,5 -7,0 C-7,-3.5 -3.5,-7 0,-7Z" fill="#a855f7"/>
                    <circle cx="0" cy="0" r="2.5" fill="white"/>
                  </g>
                </svg>
                <span style="font-family: 'Playfair Display', serif; font-weight: 700; letter-spacing: 0.08em; font-size: 1.1rem; background: linear-gradient(180deg, #f5e6a3, #d4af37); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GLOBAL ROUTE</span>
              </h1>
              <UserMenu user={user} avatarURL={avatarURL} onLogout={onLogout} onChangePhoto={function() { setShowAvatarSetup(true); }} onDownloadReport={handleDownloadReport} />
            </div>
            <p className="text-xs opacity-80 text-center">
              {allSites.length} sites total • {teamCompletedCount} completed by team • Nearest-First Routing
            </p>
          </div>

          {/* Toolbar */}
          <div className="sticky top-0 z-[1000] bg-base-100 border-b border-base-300 px-4 py-3 flex flex-wrap items-center gap-3">
            <div className="flex items-center gap-2 flex-1 min-w-0">
              <NavIcon size={18} className="text-primary shrink-0" />
              <span className="font-semibold text-sm truncate">{remainingCount} remaining <span className="opacity-40 text-xs">v46</span></span>

              <span className="text-xs opacity-50">({visited.size} you • {teamCompletedCount} team)</span>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button className="btn btn-sm btn-outline btn-warning gap-1" onClick={function() { setShowKMZManager(true); }} title="Import KMZ">
                <FolderIcon size={14} />
                {importedFiles.length > 0 && <span className="badge badge-xs badge-warning">{importedFiles.length}</span>}
              </button>
              <div className="join">
                <button className={`join-item btn btn-sm ${view === 'list' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('list'); }} title="List view"><ListIcon size={14} /></button>
                <button className={`join-item btn btn-sm ${view === 'map' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('map'); }} title="Map view"><MapIcon size={14} /></button>
                <button className={`join-item btn btn-sm ${view === 'team' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setView('team'); }} title="Team Activity">👥</button>
              </div>
              {view === 'list' && (
                <select className="select select-bordered select-sm" value={filter} onChange={function(e) { setFilter(e.target.value); }}>
                  <option value="all">All ({sortedSites.length})</option>
                  <option value="remaining">Remaining ({remainingCount})</option>
                  <option value="visited">My Visited ({visited.size})</option>
                  <option value="completed">Team Done ({teamCompletedCount})</option>
                  <option value="revisit">🔄 Revisit ({revisitCount})</option>
                </select>
              )}
              <button className="btn btn-sm btn-outline btn-primary" onClick={requestLocation} title="Refresh GPS"><RefreshIcon size={14} /></button>
              {visited.size > 0 && <button className="btn btn-sm btn-outline btn-error" onClick={resetProgress} title="Reset my progress">↺</button>}
            </div>
          </div>

          {/* Source filter bar */}
          {(importedFiles.length > 0 || sharedKMZFiles.length > 0) && (
            <div className="px-4 py-2 bg-base-200 border-b border-base-300 flex gap-2 overflow-x-auto">
              <button className={`btn btn-xs ${sourceFilter === 'all' ? 'btn-primary' : 'btn-ghost'}`} onClick={function() { setSourceFilter('all'); }}>All Sources ({allSites.length})</button>
              <button className={`btn btn-xs ${sourceFilter === 'builtin' ? 'btn-success' : 'btn-ghost'}`} onClick={function() { setSourceFilter('builtin'); }}>Myrtle Beach ({BUILTIN_SITES.length})</button>
              {importedFiles.map(function(f) { return (
                <button key={f.name} className={`btn btn-xs ${sourceFilter === f.name ? 'btn-warning' : 'btn-ghost'}`} onClick={function() { setSourceFilter(f.name); }}>{f.name} ({f.siteCount})</button>
              ); })}
              {sharedKMZFiles.filter(function(sf) { return !importedFiles.some(function(pf) { return pf.name === sf.name; }); }).map(function(sf) { return (
                <button key={'shared-' + sf.name} className={'btn btn-xs ' + (sourceFilter === sf.name ? 'btn-info' : 'btn-ghost')} onClick={function() { setSourceFilter(sf.name); }}>👥 {sf.name} ({sf.siteCount})</button>
              ); })}
            </div>
          )}

          {/* Default location banner */}
          {usingDefault && (
            <div className="px-4 py-2 bg-warning/20 text-warning-content text-xs flex items-center justify-between gap-2">
              <span>📍 Using Myrtle Beach center — distances are approximate</span>
              <button className="btn btn-xs btn-warning" onClick={requestLocation}>Use My GPS</button>
            </div>
          )}

          {/* Location bar */}
          {userLoc && !usingDefault && view === 'list' && (
            <div className="px-4 py-2 bg-base-200 text-xs opacity-60 flex items-center gap-1">
              <MapPinIcon size={12} /> Your location: {userLoc.lat.toFixed(5)}, {userLoc.lon.toFixed(5)}
            </div>
          )}

          {/* Content */}
          {view === 'team' ? (
            <TeamActivity sharedCompletions={sharedCompletions} allSites={sortedSites} currentUserId={user.uid} />
          ) : view === 'map' ? (
            <SiteMap sites={filteredSites} userLoc={userLoc} visited={visited} sharedCompletions={sharedCompletions} currentTargetId={currentTargetId} myAvatarURL={avatarURL} myPhotoURL={user.photoURL} enroutes={enroutes} revisits={revisits} mapVersion={mapVersion} />
          ) : (
            <div className="flex flex-col gap-3 p-4 pb-24">
              {filteredSites.length === 0 ? (
                <div className="text-center py-12 opacity-50">
                  {filter === 'visited' ? 'No sites visited yet.' : filter === 'completed' ? 'No team completions yet.' : '🎉 All sites completed! Great work team!'}
                </div>
              ) : (
                filteredSites.map(function(site, idx) { return (
                  <SiteCard key={`${site.source}-${site.id}`} site={site} index={idx} total={filteredSites.length}
                    isCurrent={site.id === currentTargetId} isVisited={visited.has(site.id)}
                    sharedCompletion={sharedCompletions[site.id]}
                    onMarkVisited={function() { markVisited(site.id, site); }}
                    onUndoVisit={function() { undoVisit(site.id, site); }}
                    currentUserId={user.uid}
                    myAvatarURL={avatarURL} myPhotoURL={user.photoURL}
                    noteCount={noteCounts[`${(!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_')}_${site.id}`] || 0}
                    onOpenNotes={function() { setActiveNoteSite(site); }}
                    photoCount={photoCounts[`${(!site.source || site.source === 'builtin') ? 'builtin' : site.source.replace(/[^a-zA-Z0-9-_]/g, '_')}_${site.id}`] || 0}
                    onOpenPhotos={function() { setActivePhotoSite(site); }}
                    enrouteInfo={enroutes[site.id]}
                    onClaimEnroute={function(e) { claimEnroute(site.id, site, e); }}
                    onCancelEnroute={function() { cancelEnroute(site.id, site); }}
                    revisitInfo={revisits[site.id]}
                    onFlagRevisit={function() { flagRevisit(site.id, site); }}
                    onClearRevisit={function() { clearRevisit(site.id, site); }} />
                ); })
              )}
            </div>
          )}

          {/* Map Legend */}
          {view === 'map' && (
            <div className="fixed bottom-4 left-4 z-[1000] bg-base-200/95 backdrop-blur rounded-lg p-3 shadow-lg text-xs space-y-1">
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#3b82f6',border:'2px solid white'}}></div> Your Location</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#a855f7',border:'2px solid #fbbf24'}}></div> Next Stop</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#22c55e',border:'2px solid white'}}></div> Existing Cabinet</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#ef4444',border:'2px solid white'}}></div> Out of Scope</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#f59e0b',border:'2px solid white'}}></div> Imported</div>
              <div className="flex items-center gap-2"><div style={{width:10,height:10,borderRadius:'50%',background:'#6b7280',border:'2px solid white'}}></div> Completed</div>
            </div>
          )}

          {/* KMZ Manager Modal */}
          {showKMZManager && (
            <KMZManager importedFiles={importedFiles} sharedFiles={sharedKMZFiles} onImport={handleKMZImport} onRemoveFile={handleRemoveFile} onClose={function() { setShowKMZManager(false); }} />
          )}

          {/* Notes Panel */}
          {activeNoteSite && (
            <NotesPanel site={activeNoteSite} user={user} avatarURL={avatarURL} onClose={function() { setActiveNoteSite(null); }} />
          )}

          {/* Photos Panel */}
          {activePhotoSite && (
            <SitePhotosPanel
              site={activePhotoSite}
              userId={user.uid}
              userName={user.displayName || 'Anonymous'}
              avatarURL={avatarURL || user.photoURL || null}
              onClose={function() { setActivePhotoSite(null); }}
            />
          )}

          {/* Avatar Setup Overlay */}
          {showAvatarSetup && (
            <div className="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center">
              <div className="relative w-full max-w-sm mx-4">
                <button className="absolute -top-10 right-0 btn btn-sm btn-ghost text-white" onClick={function() { setShowAvatarSetup(false); }}>✕ Cancel</button>
                <AvatarSetup user={user} onComplete={function(url) { setAvatarURL(url); setShowAvatarSetup(false); }} />
              </div>
            </div>
          )}

          {/* En-Route Confirmation Modal */}
          {enrouteConfirm && (
            <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
              onClick={enrouteConfirm.onNo}>
              <div style={{background:'#1d232a',borderRadius:16,padding:24,maxWidth:320,width:'100%',textAlign:'center',boxShadow:'0 8px 32px rgba(0,0,0,0.5)'}}
                onClick={function(e){e.stopPropagation();}}>
                <div style={{fontSize:24,marginBottom:12}}>🚗 Heads Up!</div>
                {enrouteConfirm.userPhoto ? (
                  <img src={enrouteConfirm.userPhoto} alt="" style={{width:64,height:64,borderRadius:'50%',objectFit:'cover',border:'3px solid #3b82f6',marginBottom:8}} />
                ) : (
                  <div style={{width:64,height:64,borderRadius:'50%',background:'#3b82f6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 8px',fontSize:28,color:'white'}}>
                    {(enrouteConfirm.userName || '?').charAt(0).toUpperCase()}
                  </div>
                )}
                <div style={{fontWeight:700,fontSize:16,color:'white',marginBottom:4}}>{enrouteConfirm.userName}</div>
                <div style={{color:'#94a3b8',fontSize:14,marginBottom:20}}>is already en-route to this site.<br/>Go anyway?</div>
                <div style={{display:'flex',gap:12}}>
                  <button onClick={enrouteConfirm.onNo} style={{flex:1,padding:'10px 0',borderRadius:8,border:'1px solid #475569',background:'transparent',color:'#94a3b8',fontWeight:600,fontSize:14,cursor:'pointer'}}>Cancel</button>
                  <a href={enrouteConfirm.directionsUrl || '#'} target="_blank" rel="noopener"
                    onClick={enrouteConfirm.onYes}
                    style={{flex:1,padding:'10px 0',borderRadius:8,border:'none',background:'#570df8',color:'white',fontWeight:600,fontSize:14,cursor:'pointer',textDecoration:'none',textAlign:'center',display:'block'}}>Go Anyway</a>
                </div>
              </div>
            </div>
          )}

          {/* Install Banner */}
          {showInstallBanner && !isStandalone && (
            <InstallBanner onInstall={handleInstall} onDismiss={dismissInstall} isIOS={isIOS} hasNativePrompt={installPrompt != null} />
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(error, info) { console.error('React error:', error, info); }
      render() {
        if (this.state.error) {
          return React.createElement('div', { style: { padding: 40, color: 'white', background: '#1d232a', minHeight: '100vh' } },
            React.createElement('h2', null, '⚠️ App Error'),
            React.createElement('pre', { style: { whiteSpace: 'pre-wrap', color: '#f87171', fontSize: 14 } }, String(this.state.error)),
            React.createElement('button', { onClick: function() { if ('caches' in window) caches.keys().then(function(k) { k.forEach(function(c) { caches.delete(c); }); }); location.reload(); }, style: { marginTop: 20, padding: '10px 20px', background: '#570df8', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer' } }, 'Clear Cache & Reload')
          );
        }
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
  </script>
</body>
</html>
