<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Route - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #1d232a; min-height: 100vh; margin: 0; -webkit-tap-highlight-color: transparent; }
    
    /* Layout */
    .app-shell { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 250px; min-height: 100vh; background: #191e24; border-right: 1px solid #2a323c; flex-shrink: 0; display: flex; flex-direction: column; }
    .content-area { flex: 1; padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    
    /* Sidebar */
    .sb-item { padding: 11px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s, border-color 0.15s; border-left: 3px solid transparent; font-size: 0.9rem; }
    .sb-item:hover { background: #2a323c; }
    .sb-item.active { background: #2a323c; border-left-color: #570df8; color: #570df8; font-weight: 600; }
    
    /* Cards */
    .card-item { background: #191e24; border: 1px solid #2a323c; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: background 0.15s, transform 0.1s; border-left: 3px solid #2a323c; -webkit-user-select: none; user-select: none; }
    .card-item:active { transform: scale(0.99); background: #1f2733; }
    .card-item.green { border-left-color: #36d399; }
    .card-item.purple { border-left-color: #570df8; }
    .card-item.amber { border-left-color: #f59e0b; }
    .card-item.blue { border-left-color: #3abff8; }
    .card-item.red { border-left-color: #f87272; }
    
    /* Detail panels */
    .detail-panel { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease; max-height: 0; opacity: 0; }
    .detail-panel.open { max-height: 800px; opacity: 1; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .detail-cell { background: #1d232a; border-radius: 8px; padding: 10px; }
    .detail-cell .label { font-size: 0.7rem; color: #a6adbb; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 2px; }
    .detail-cell .value { font-weight: 500; }
    .detail-cell.span2 { grid-column: span 2; }
    
    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-box { background: #191e24; border: 1px solid #2a323c; border-radius: 12px; padding: 14px; }
    .stat-box .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 8px; }
    .stat-box .num { font-size: 1.5rem; font-weight: 700; }
    .stat-box .lbl { font-size: 0.75rem; color: #a6adbb; }

    /* Avatars */
    .av { border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .av-sm { width: 34px; height: 34px; }
    .av-md { width: 44px; height: 44px; }
    .av-init { display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; border-radius: 50%; flex-shrink: 0; }
    
    /* Badges */
    .bg-admin { background: #570df8; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.72rem; font-weight: 600; }
    .bg-user { background: #2a323c; color: #a6adbb; padding: 2px 10px; border-radius: 12px; font-size: 0.72rem; }
    
    /* Buttons */
    .btn-del { background: #f8727222; border: 1px solid #f87272; color: #f87272; }
    .btn-del:hover { background: #f8727244; }
    
    /* Search */
    .search-input { background: #191e24; border: 1px solid #2a323c; border-radius: 8px; padding: 8px 14px; color: white; width: 100%; max-width: 300px; font-size: 0.9rem; }
    .search-input:focus { outline: none; border-color: #570df8; }
    
    /* Note bubbles */
    .note-bubble { background: #2a323c; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; }
    
    /* Arrow */
    .arrow { font-size: 1rem; color: #a6adbb; transition: transform 0.25s; display: inline-block; }
    .arrow.open { transform: rotate(180deg); }
    
    /* Mobile */
    .mobile-nav { display: none; background: #191e24; border-bottom: 1px solid #2a323c; padding: 6px 8px; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .mobile-nav::-webkit-scrollbar { display: none; }
    .mnav { padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
    .mnav.active { background: #570df8; color: white; font-weight: 600; }
    
    /* Performers row */
    .perf-row { display: flex; gap: 10px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px; }
    .perf-card { background: #191e24; border: 1px solid #2a323c; border-radius: 12px; padding: 12px; text-align: center; min-width: 110px; flex-shrink: 0; }
    
    /* Error banner */
    .err-banner { background: #f8727222; border: 1px solid #f87272; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; }
    .err-banner b { color: #f87272; }
    .err-banner .msg { font-size: 0.78rem; color: #f87272; }
    
    /* Loading skeleton */
    .skel { background: linear-gradient(90deg, #2a323c 25%, #3a424c 50%, #2a323c 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 60px; margin-bottom: 8px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .mobile-nav { display: flex; }
      .content-area { padding: 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-cell.span2 { grid-column: span 1; }
      .search-input { max-width: 100%; }
      .perf-row { gap: 8px; }
      .perf-card { min-width: 90px; padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyD-s8Pg4GeSZhOzYpusiHGEEcQuav-IBOo",
      authDomain: "global-route-79e25.firebaseapp.com",
      projectId: "global-route-79e25",
      storageBucket: "global-route-79e25.firebasestorage.app",
      messagingSenderId: "780041424093",
      appId: "1:780041424093:web:43ed17f4a12764db6f5f34"
    });
    var auth = firebase.auth();
    var db = firebase.firestore();

    var ADMIN_EMAILS = ['d.west@globalwestgroupllc.com'];
    var BUILTIN_SITES = [
      {id:"6M141",address:"6549 Pozzallo Pl, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.750530,lon:-78.840449},
      {id:"6M144",address:"6099 Tramonto St, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.745662,lon:-78.844500},
      {id:"6M149",address:"7701 N Ocean Blvd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.745449,lon:-78.815466},
      {id:"6M151",address:"US 17, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.659747,lon:-78.973617},
      {id:"6M152",address:"2304 N Ocean Blvd, Myrtle Beach, SC",status:"A - Existing Cabinet",lat:33.702635,lon:-78.867421},
      {id:"6M154",address:"6965 Skiff Ln, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.748245,lon:-78.833054},
      {id:"6M158",address:"2101 S Ocean Blvd, Myrtle Beach, SC",status:"A - Existing Cabinet",lat:33.668229,lon:-78.905800},
      {id:"6M159",address:"6103 Tides Way, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.742797,lon:-78.845791},
      {id:"6M160",address:"6085 Tides Way, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.743483,lon:-78.843621},
      {id:"6M161",address:"6035 Tides Way, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.741138,lon:-78.846391},
      {id:"6M162",address:"1406 Yaupon Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.675015,lon:-78.901795},
      {id:"6M201",address:"3999 Lark Hill Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.725786,lon:-78.887515},
      {id:"6M202",address:"1002 29th Ave N, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.718061,lon:-78.876865},
      {id:"6M208",address:"US 17, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.792668,lon:-78.758078},
      {id:"6M211",address:"1301 Pridgen Rd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.682650,lon:-78.907350},
      {id:"6M214",address:"1114 3rd Ave S, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.693616,lon:-78.897323},
      {id:"6M232",address:"815 44th Ave N, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.724270,lon:-78.857160},
      {id:"6M238",address:"6928 N Kings Hwy, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.741638,lon:-78.824970},
      {id:"6M266",address:"3865 Spruce Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.655865,lon:-78.949911},
      {id:"6M267",address:"307 Flagg St, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.687116,lon:-78.885784},
      {id:"6M280",address:"2010 S Ocean Blvd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.669508,lon:-78.906683},
      {id:"6M308",address:"890 Briarwood Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.793963,lon:-78.762701},
      {id:"6M366",address:"3861 Spruce Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.655766,lon:-78.949796},
      {id:"6M402",address:"1898 Plantation Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.727818,lon:-78.875115},
      {id:"6M408",address:"5308 N Ocean Blvd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.724970,lon:-78.839376},
      {id:"6M906",address:"1031 Anrea St, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.743347,lon:-78.847293},
      {id:"6M907",address:"520 Lake Arrowhead Rd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.770005,lon:-78.789908},
      {id:"6M908",address:"501 Lake Arrowhead Rd, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.768643,lon:-78.789720},
      {id:"6M911",address:"Goldfinch Dr, Myrtle Beach, SC",status:"E - Out of Scope (RTM)",lat:33.664454,lon:-78.967462}
    ];
    var SITE_IDS = BUILTIN_SITES.map(function(s) { return s.id; });

    // ── STATE ──
    var S = {
      user: null, isAdmin: false, authLoading: true,
      tab: 'dashboard', q: '', expandedId: null,
      users: [], completions: [], sites: [], notes: {}, kmzFiles: [],
      editingSite: null, showAddSite: false,
      dataReady: false
    };
    var dataErrors = [];
    var _renderTimer = null;

    function set(updates) {
      for (var k in updates) S[k] = updates[k];
      // Debounce renders — batch rapid state changes
      if (_renderTimer) return;
      _renderTimer = setTimeout(function() { _renderTimer = null; render(); }, 16);
    }

    // ── AUTH ──
    auth.onAuthStateChanged(function(u) {
      if (u) {
        set({ user: u, isAdmin: ADMIN_EMAILS.indexOf(u.email) !== -1, authLoading: false });
        if (ADMIN_EMAILS.indexOf(u.email) !== -1) loadData();
      } else {
        set({ user: null, isAdmin: false, authLoading: false });
      }
    });

    function signInEmail() {
      var em = document.getElementById('login-email').value;
      var pw = document.getElementById('login-pass').value;
      auth.signInWithEmailAndPassword(em, pw).catch(function(e) {
        document.getElementById('auth-err').textContent = e.message;
      });
    }
    function signInGoogle() {
      auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(function(e) {
        document.getElementById('auth-err').textContent = e.message;
      });
    }
    function signOut() { auth.signOut(); }

    // ── DATA ──
    function logErr(src, err) {
      console.error('[' + src + ']', err);
      dataErrors.push(src + ': ' + err.message);
      render();
    }

    function seedIfEmpty() {
      db.collection('sites').get().then(function(snap) {
        if (snap.empty) {
          var batch = db.batch();
          BUILTIN_SITES.forEach(function(s) {
            batch.set(db.collection('sites').doc(s.id), {
              name: s.id, address: s.address, status: s.status,
              lat: s.lat, lon: s.lon, source: 'builtin',
              createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
          batch.commit().then(function() { console.log('Sites seeded'); });
        }
      });
    }

    function loadData() {
      seedIfEmpty();

      // Users
      db.collection('users').onSnapshot(function(snap) {
        var arr = [];
        snap.forEach(function(d) { arr.push(Object.assign({id: d.id}, d.data())); });
        set({users: arr});
      }, function(e) { logErr('users', e); });

      // Builtin completions
      db.collection('sharedRoutes').doc('builtin').collection('completions')
        .onSnapshot(function(snap) {
          var arr = [];
          snap.forEach(function(d) { arr.push(Object.assign({id:d.id, siteId:d.id, routeKey:'builtin'}, d.data())); });
          S._bc = arr;
          set({completions: arr.concat(S._ic || [])});
        }, function(e) { logErr('completions', e); });

      // Imported completions
      db.collection('sharedRoutes').onSnapshot(function(snap) {
        snap.forEach(function(rd) {
          if (rd.id === 'builtin') return;
          rd.ref.collection('completions').onSnapshot(function(cs) {
            var arr = [];
            cs.forEach(function(d) { arr.push(Object.assign({id:d.id,siteId:d.id,routeKey:rd.id}, d.data())); });
            var prev = (S._ic || []).filter(function(c) { return c.routeKey !== rd.id; });
            S._ic = prev.concat(arr);
            set({completions: (S._bc || []).concat(S._ic)});
          }, function(e) { logErr('imp-comp', e); });
        });
      }, function(e) { logErr('routes', e); });

      // Sites
      db.collection('sites').onSnapshot(function(snap) {
        var arr = [];
        snap.forEach(function(d) { arr.push(Object.assign({id:d.id}, d.data())); });
        set({sites: arr});
      }, function(e) { logErr('sites', e); });

      // KMZ
      db.collection('kmzFiles').onSnapshot(function(snap) {
        var arr = [];
        snap.forEach(function(d) { arr.push(Object.assign({id:d.id}, d.data())); });
        set({kmzFiles: arr});
      }, function(e) { logErr('kmz', e); });

      // Notes — batch all 29 listeners, single setState after all first loads
      var notesBySite = {};
      var firstLoadCount = 0;
      var firstLoadDone = false;
      SITE_IDS.forEach(function(sid) {
        var docId = 'builtin_' + sid;
        db.collection('siteNotes').doc(docId).collection('messages')
          .onSnapshot(function(snap) {
            var msgs = [];
            snap.forEach(function(d) {
              msgs.push(Object.assign({id:d.id, siteId:sid, siteDocId:docId}, d.data()));
            });
            msgs.sort(function(a,b) {
              var ta = a.createdAt ? (a.createdAt.toMillis ? a.createdAt.toMillis() : +new Date(a.createdAt)) : 0;
              var tb = b.createdAt ? (b.createdAt.toMillis ? b.createdAt.toMillis() : +new Date(b.createdAt)) : 0;
              return tb - ta;
            });
            notesBySite[sid] = msgs;
            if (!firstLoadDone) {
              firstLoadCount++;
              if (firstLoadCount >= SITE_IDS.length) {
                firstLoadDone = true;
                set({notes: Object.assign({}, notesBySite), dataReady: true});
              }
            } else {
              set({notes: Object.assign({}, notesBySite)});
            }
          }, function(e) { logErr('notes-' + sid, e); });
      });
    }

    // ── HELPERS ──
    function fmtDate(ts) {
      if (!ts) return '—';
      var d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    }
    function fmtTime(ts) {
      if (!ts) return '—';
      var d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    }
    function initials(name) {
      if (!name) return '?';
      return name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().substring(0,2);
    }
    var _avColors = ['#570df8','#f000b8','#37cdbe','#3abff8','#fbbd23'];
    function av(user, size) {
      var cls = size === 'md' ? 'av av-md' : 'av av-sm';
      var px = size === 'md' ? 44 : 34;
      var fs = size === 'md' ? 16 : 13;
      if (user.avatarURL || user.photoURL) {
        return '<img src="' + (user.avatarURL || user.photoURL) + '" class="' + cls + '" />';
      }
      var n = user.displayName || user.email || '';
      var c = _avColors[n.length % _avColors.length];
      return '<div class="av-init" style="width:'+px+'px;height:'+px+'px;background:'+c+';font-size:'+fs+'px;">'+initials(n)+'</div>';
    }
    function photoOrAv(photoUrl, user, size) {
      var px = size === 'md' ? 44 : 34;
      if (photoUrl) return '<img src="'+photoUrl+'" class="av '+(size==='md'?'av-md':'av-sm')+'" />';
      if (user) return av(user, size);
      return '<div class="av-init" style="width:'+px+'px;height:'+px+'px;background:#2a323c;font-size:13px;">👤</div>';
    }
    function esc(s) { return (s||'').replace(/'/g, "\\'"); }
    function toggle(id) { set({expandedId: S.expandedId === id ? null : id}); }
    function totalNotes() {
      return Object.keys(S.notes).reduce(function(s,k){return s + S.notes[k].length;}, 0);
    }

    // ── ACTIONS ──
    function toggleRole(uid, cur) { db.collection('users').doc(uid).update({role: cur==='admin'?'user':'admin'}); }
    function toggleDisabled(uid, cur) { db.collection('users').doc(uid).update({disabled: !cur}); }
    function deleteUser(uid, email) {
      if (!confirm('Delete user ' + email + '?')) return;
      db.collection('users').doc(uid).delete();
    }
    function saveSite(data) {
      if (data.id) db.collection('sites').doc(data.id).update(data);
      else db.collection('sites').add(data);
      set({editingSite:null, showAddSite:false});
    }
    function saveSiteForm(eid) {
      var d = {
        name: document.getElementById('sf-name').value,
        address: document.getElementById('sf-addr').value,
        lat: parseFloat(document.getElementById('sf-lat').value) || 0,
        lng: parseFloat(document.getElementById('sf-lng').value) || 0,
        status: document.getElementById('sf-status').value,
        source: document.getElementById('sf-src').value
      };
      if (eid) d.id = eid;
      saveSite(d);
    }
    function editSite(id) {
      var s = S.sites.find(function(x){return x.id===id;});
      if (s) set({editingSite: Object.assign({}, s), showAddSite: false});
    }
    function deleteSite(id, name) {
      if (confirm('Delete site "' + name + '"?')) db.collection('sites').doc(id).delete();
    }
    function deleteNote(docId, msgId) {
      if (confirm('Delete this note?')) db.collection('siteNotes').doc(docId).collection('messages').doc(msgId).delete();
    }
    function deleteKmz(id, name) {
      if (confirm('Delete KMZ "' + name + '"?')) db.collection('kmzFiles').doc(id).delete();
    }

    // ── RENDER ──
    function render() {
      var app = document.getElementById('app');
      if (S.authLoading) {
        app.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><span class="loading loading-spinner loading-lg text-primary"></span></div>';
        return;
      }
      if (!S.user) { app.innerHTML = renderLogin(); return; }
      if (!S.isAdmin) {
        app.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;">' +
          '<div style="font-size:48px;">🔒</div><h2 style="font-size:1.4rem;font-weight:bold;">Access Denied</h2>' +
          '<p style="color:#a6adbb;">Admin privileges required.</p>' +
          '<p style="color:#a6adbb;font-size:0.85rem;">Logged in as: '+S.user.email+'</p>' +
          '<button class="btn btn-ghost" onclick="signOut()">Sign Out</button></div>';
        return;
      }
      app.innerHTML = renderShell();
    }

    function renderLogin() {
      return '<div style="display:flex;align-items:center;justify-content:center;height:100vh;">' +
        '<div class="card bg-base-200" style="width:380px;max-width:92vw;"><div class="card-body">' +
        '<div style="text-align:center;margin-bottom:14px;">' +
        '<div style="font-size:36px;margin-bottom:6px;">🌐</div>' +
        '<h1 style="font-size:1.4rem;font-weight:bold;">Global Route Admin</h1>' +
        '<p style="color:#a6adbb;font-size:0.85rem;">Back Office</p></div>' +
        '<div id="auth-err" style="color:#f87272;font-size:0.85rem;text-align:center;min-height:20px;"></div>' +
        '<input id="login-email" type="email" placeholder="Email" class="input input-bordered w-full" style="margin-bottom:8px;" />' +
        '<input id="login-pass" type="password" placeholder="Password" class="input input-bordered w-full" style="margin-bottom:10px;" onkeydown="if(event.key===\'Enter\')signInEmail()" />' +
        '<button class="btn btn-primary w-full" onclick="signInEmail()">Sign In</button>' +
        '<div class="divider" style="margin:10px 0;">OR</div>' +
        '<button class="btn btn-outline w-full" onclick="signInGoogle()">🔵 Sign in with Google</button>' +
        '</div></div></div>';
    }

    var TABS = [
      {id:'dashboard',icon:'📊',label:'Dashboard'},
      {id:'users',icon:'👥',label:'Users'},
      {id:'activity',icon:'📋',label:'Activity'},
      {id:'sites',icon:'📍',label:'Sites'},
      {id:'notes',icon:'📝',label:'Notes'},
      {id:'kmz',icon:'📁',label:'KMZ'},
      {id:'roles',icon:'🔒',label:'Roles'}
    ];

    function renderShell() {
      // Sidebar
      var sb = '<div class="sidebar"><div style="padding:16px;border-bottom:1px solid #2a323c;">' +
        '<div style="display:flex;align-items:center;gap:10px;">' +
        '<div style="font-size:24px;">🌐</div>' +
        '<div><div style="font-weight:bold;font-size:1rem;">Global Route</div>' +
        '<div style="color:#a6adbb;font-size:0.7rem;">Admin Panel</div></div></div></div>';
      TABS.forEach(function(t) {
        sb += '<div class="sb-item'+(S.tab===t.id?' active':'')+'" onclick="set({tab:\''+t.id+'\',q:\'\',expandedId:null})">' +
          '<span>'+t.icon+'</span><span>'+t.label+'</span></div>';
      });
      sb += '<div style="margin-top:auto;padding:14px;border-top:1px solid #2a323c;">' +
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+av(S.user,'sm') +
        '<div style="flex:1;min-width:0;"><div style="font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(S.user.displayName||'Admin')+'</div>' +
        '<div style="font-size:0.68rem;color:#a6adbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+S.user.email+'</div></div></div>' +
        '<button class="btn btn-ghost btn-sm w-full" onclick="signOut()">Sign Out</button></div></div>';

      // Mobile nav
      var mn = '<div class="mobile-nav">';
      TABS.forEach(function(t) {
        mn += '<div class="mnav'+(S.tab===t.id?' active':'')+'" onclick="set({tab:\''+t.id+'\',q:\'\',expandedId:null})">'+t.icon+' '+t.label+'</div>';
      });
      mn += '</div>';

      var content = '';
      switch(S.tab) {
        case 'dashboard': content = rDash(); break;
        case 'users': content = rUsers(); break;
        case 'activity': content = rActivity(); break;
        case 'sites': content = rSites(); break;
        case 'notes': content = rNotes(); break;
        case 'kmz': content = rKmz(); break;
        case 'roles': content = rRoles(); break;
      }

      var errHtml = '';
      if (dataErrors.length > 0) {
        errHtml = '<div class="err-banner"><b>⚠️ Data Errors:</b><div class="msg">'+dataErrors.join('<br>')+'</div></div>';
      }

      return mn + '<div class="app-shell">' + sb + '<div class="content-area">'+errHtml+content+'</div></div>';
    }

    // ── DASHBOARD ──
    function rDash() {
      var tc = S.completions.length;
      var tn = totalNotes();
      var today = new Date(); today.setHours(0,0,0,0);
      var todayC = S.completions.filter(function(c) {
        var d = c.completedAt ? (c.completedAt.toDate ? c.completedAt.toDate() : new Date(c.completedAt)) : null;
        return d && d >= today;
      }).length;
      var pct = S.sites.length > 0 ? Math.round(tc / S.sites.length * 100) : 0;

      var h = '<h2 style="font-size:1.3rem;font-weight:bold;margin-bottom:16px;">📊 Dashboard</h2>';
      h += '<div class="stats-grid">';
      h += sBox('👥','Users',S.users.length,'#570df8');
      h += sBox('✅','Completions',tc,'#36d399');
      h += sBox('📍','Sites',S.sites.length,'#f59e0b');
      h += sBox('📝','Notes',tn,'#3abff8');
      h += sBox('🔥','Today',todayC,'#f87272');
      h += sBox('📈','Done',pct+'%','#a78bfa');
      h += '</div>';

      // Recent
      var recent = S.completions.slice().sort(function(a,b) {
        var ta = a.completedAt?(a.completedAt.toDate?a.completedAt.toDate().getTime():+new Date(a.completedAt)):0;
        var tb = b.completedAt?(b.completedAt.toDate?b.completedAt.toDate().getTime():+new Date(b.completedAt)):0;
        return tb-ta;
      }).slice(0,8);

      h += '<div class="stat-box"><h3 style="font-weight:bold;margin-bottom:12px;">🕐 Recent Activity</h3>';
      if (recent.length === 0) { h += '<p style="color:#a6adbb;">No completions yet.</p>'; }
      else {
        recent.forEach(function(c) {
          var u = S.users.find(function(x){return x.id===c.completedBy;});
          var name = u?(u.displayName||u.email):(c.completedByName||'Unknown');
          var site = S.sites.find(function(x){return x.id===c.siteId;});
          var sn = site?(site.name||c.siteId):c.siteId;
          h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a323c;">' +
            photoOrAv(c.completedByPhoto,u,'sm') +
            '<div style="flex:1;min-width:0;"><div style="font-weight:500;font-size:0.9rem;">'+name+'</div>' +
            '<div style="font-size:0.78rem;color:#a6adbb;">📍 '+sn+'</div></div>' +
            '<div style="font-size:0.72rem;color:#a6adbb;white-space:nowrap;">'+fmtTime(c.completedAt)+'</div></div>';
        });
      }
      h += '</div>';
      return h;
    }

    function sBox(icon, label, val, color) {
      return '<div class="stat-box"><div class="icon" style="background:'+color+'20;">'+icon+'</div>' +
        '<div class="num">'+val+'</div><div class="lbl">'+label+'</div></div>';
    }

    // ── USERS ──
    function rUsers() {
      var filtered = S.users.filter(function(u) {
        if (!S.q) return true;
        var q = S.q.toLowerCase();
        return (u.displayName||'').toLowerCase().indexOf(q)!==-1 || (u.email||'').toLowerCase().indexOf(q)!==-1;
      });

      var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">' +
        '<h2 style="font-size:1.3rem;font-weight:bold;">👥 Users ('+S.users.length+')</h2>' +
        '<input class="search-input" placeholder="🔍 Search users..." value="'+(S.q||'')+'" oninput="set({q:this.value})" /></div>';

      filtered.forEach(function(u) {
        var cc = S.completions.filter(function(c){return c.completedBy===u.id;}).length;
        var role = u.role || 'user';
        var dis = u.disabled || false;
        var ex = S.expandedId === 'u_'+u.id;
        var uc = S.completions.filter(function(c){return c.completedBy===u.id;});

        h += '<div class="card-item '+(dis?'red':'green')+'" onclick="toggle(\'u_'+u.id+'\')">';
        h += '<div style="display:flex;align-items:center;gap:10px;">' + av(u,'sm') +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-weight:600;">'+(u.displayName||'No Name')+'</div>' +
            '<div style="font-size:0.78rem;color:#a6adbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(u.email||'—')+'</div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<span class="'+(role==='admin'?'bg-admin':'bg-user')+'">'+role+'</span>' +
            '<div style="font-size:0.72rem;color:#a6adbb;margin-top:3px;">'+cc+' ✅</div>' +
          '</div>' +
          '<span class="arrow'+(ex?' open':'')+'">▼</span></div>';

        h += '<div class="detail-panel'+(ex?' open':'')+'">';
        if (ex) {
          h += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a323c;" onclick="event.stopPropagation()">';
          h += '<div class="detail-grid">' +
            '<div class="detail-cell"><div class="label">Status</div><div class="value" style="color:'+(dis?'#f87272':'#36d399')+';">'+(dis?'🚫 Disabled':'✅ Active')+'</div></div>' +
            '<div class="detail-cell"><div class="label">Joined</div><div class="value">'+fmtDate(u.createdAt)+'</div></div>' +
            '<div class="detail-cell"><div class="label">Completions</div><div class="value" style="font-size:1.2rem;color:#36d399;">'+cc+'</div></div>' +
            '<div class="detail-cell"><div class="label">User ID</div><div style="font-size:0.68rem;word-break:break-all;">'+u.id+'</div></div>' +
          '</div>';
          if (uc.length > 0) {
            h += '<div style="margin-bottom:12px;"><div style="font-weight:600;font-size:0.82rem;margin-bottom:6px;">📍 Completed Sites:</div>';
            uc.slice(0,10).forEach(function(c) {
              var so = S.sites.find(function(x){return x.id===c.siteId;});
              h += '<div style="display:flex;justify-content:space-between;padding:5px 8px;background:#1d232a;border-radius:6px;margin-bottom:3px;font-size:0.82rem;">' +
                '<span>📍 '+(so?so.name||c.siteId:c.siteId)+'</span><span style="color:#a6adbb;font-size:0.72rem;">'+fmtTime(c.completedAt)+'</span></div>';
            });
            h += '</div>';
          }
          h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
            '<button class="btn btn-sm btn-ghost" onclick="toggleDisabled(\''+u.id+'\','+dis+')">'+(dis?'✅ Enable':'🚫 Disable')+'</button>' +
            '<button class="btn btn-sm btn-del" onclick="deleteUser(\''+u.id+'\',\''+esc(u.email)+'\')">🗑️ Delete</button></div>';
          h += '</div>';
        }
        h += '</div></div>';
      });

      if (filtered.length===0) h += '<div class="stat-box"><p style="color:#a6adbb;">No users found.</p></div>';
      return h;
    }

    // ── ACTIVITY ──
    function rActivity() {
      var sorted = S.completions.slice().sort(function(a,b) {
        var ta = a.completedAt?(a.completedAt.toDate?a.completedAt.toDate().getTime():+new Date(a.completedAt)):0;
        var tb = b.completedAt?(b.completedAt.toDate?b.completedAt.toDate().getTime():+new Date(b.completedAt)):0;
        return tb-ta;
      });
      var filtered = sorted.filter(function(c) {
        if (!S.q) return true;
        var q = S.q.toLowerCase();
        var u = S.users.find(function(x){return x.id===c.completedBy;});
        var n = u?(u.displayName||u.email||''):(c.completedByName||'');
        return n.toLowerCase().indexOf(q)!==-1 || (c.siteId||'').toLowerCase().indexOf(q)!==-1;
      });

      // Top performers
      var stats = {};
      S.completions.forEach(function(c) { stats[c.completedBy] = (stats[c.completedBy]||0)+1; });
      var top = Object.keys(stats).map(function(uid) {
        var u = S.users.find(function(x){return x.id===uid;});
        return {uid:uid, count:stats[uid], name:u?(u.displayName||u.email):'Unknown', user:u};
      }).sort(function(a,b){return b.count-a.count;}).slice(0,5);

      var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">' +
        '<h2 style="font-size:1.3rem;font-weight:bold;">📋 Activity ('+S.completions.length+')</h2>' +
        '<input class="search-input" placeholder="🔍 Search..." value="'+(S.q||'')+'" oninput="set({q:this.value})" /></div>';

      if (top.length > 0) {
        var medals = ['🥇','🥈','🥉','🏅','🏅'];
        h += '<div class="perf-row">';
        top.forEach(function(t,i) {
          h += '<div class="perf-card">'+medals[i] +
            '<div style="margin:6px 0;">'+(t.user?av(t.user,'sm'):'')+'</div>' +
            '<div style="font-weight:500;font-size:0.8rem;">'+t.name+'</div>' +
            '<div style="font-size:1.2rem;font-weight:bold;color:#36d399;">'+t.count+'</div></div>';
        });
        h += '</div>';
      }

      filtered.slice(0,50).forEach(function(c, i) {
        var u = S.users.find(function(x){return x.id===c.completedBy;});
        var name = u?(u.displayName||u.email):(c.completedByName||'Unknown');
        var so = S.sites.find(function(x){return x.id===c.siteId;});
        var sn = so?(so.name||c.siteId):c.siteId;
        var ex = S.expandedId === 'a_'+i;

        h += '<div class="card-item green" onclick="toggle(\'a_'+i+'\')">';
        h += '<div style="display:flex;align-items:center;gap:10px;">' +
          photoOrAv(c.completedByPhoto,u,'sm') +
          '<div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:0.92rem;">'+name+'</div>' +
          '<div style="font-size:0.78rem;color:#a6adbb;">📍 '+sn+'</div></div>' +
          '<div style="text-align:right;"><div style="font-size:0.72rem;color:#a6adbb;">'+fmtTime(c.completedAt)+'</div>' +
          '<div style="color:#36d399;font-size:0.82rem;">✅</div></div>' +
          '<span class="arrow'+(ex?' open':'')+'">▼</span></div>';

        h += '<div class="detail-panel'+(ex?' open':'')+'">';
        if (ex) {
          h += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #2a323c;">';
          h += '<div class="detail-grid">' +
            '<div class="detail-cell"><div class="label">Site ID</div><div class="value">'+(c.siteId||'—')+'</div></div>' +
            '<div class="detail-cell"><div class="label">Completed</div><div class="value" style="font-size:0.85rem;">'+fmtTime(c.completedAt)+'</div></div>';
          if (so && so.address) h += '<div class="detail-cell span2"><div class="label">Address</div><div class="value" style="font-size:0.88rem;">'+so.address+'</div></div>';
          if (so && so.status) h += '<div class="detail-cell span2"><div class="label">Status</div><div><span class="badge badge-sm '+(so.status.indexOf('Existing')!==-1?'badge-success':'badge-warning')+'">'+so.status+'</span></div></div>';
          h += '</div>';
          if (u) {
            h += '<div style="background:#1d232a;border-radius:8px;padding:10px;display:flex;align-items:center;gap:8px;">'+av(u,'sm') +
              '<div><div style="font-weight:500;font-size:0.88rem;">'+(u.displayName||'—')+'</div>' +
              '<div style="font-size:0.72rem;color:#a6adbb;">'+(u.email||'')+'</div></div></div>';
          }
          h += '</div>';
        }
        h += '</div></div>';
      });

      if (filtered.length>50) h += '<div class="stat-box" style="text-align:center;color:#a6adbb;">... and '+(filtered.length-50)+' more</div>';
      if (filtered.length===0) h += '<div class="stat-box"><p style="color:#a6adbb;">No activity found.</p></div>';
      return h;
    }

    // ── SITES ──
    function rSites() {
      var filtered = S.sites.filter(function(s) {
        if (!S.q) return true;
        var q = S.q.toLowerCase();
        return (s.name||'').toLowerCase().indexOf(q)!==-1 || (s.address||'').toLowerCase().indexOf(q)!==-1;
      });

      var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">' +
        '<h2 style="font-size:1.3rem;font-weight:bold;">📍 Sites ('+S.sites.length+')</h2>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<input class="search-input" placeholder="🔍 Search sites..." value="'+(S.q||'')+'" oninput="set({q:this.value})" />' +
        '<button class="btn btn-primary btn-sm" onclick="set({showAddSite:true})">+ Add</button></div></div>';

      // Add/edit form
      if (S.showAddSite || S.editingSite) {
        var s = S.editingSite || {};
        h += '<div class="stat-box" style="margin-bottom:14px;border:1px solid #570df8;">' +
          '<h3 style="font-weight:bold;margin-bottom:10px;">'+(s.id?'✏️ Edit':'➕ Add')+' Site</h3>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
          '<input id="sf-name" class="input input-bordered input-sm" placeholder="Name" value="'+(s.name||'')+'" />' +
          '<input id="sf-addr" class="input input-bordered input-sm" placeholder="Address" value="'+(s.address||'')+'" />' +
          '<input id="sf-lat" class="input input-bordered input-sm" placeholder="Lat" value="'+(s.lat||'')+'" type="number" step="any" />' +
          '<input id="sf-lng" class="input input-bordered input-sm" placeholder="Lng" value="'+(s.lng||s.lon||'')+'" type="number" step="any" />' +
          '<input id="sf-status" class="input input-bordered input-sm" placeholder="Status" value="'+(s.status||'')+'" />' +
          '<select id="sf-src" class="select select-bordered select-sm"><option value="default">Default</option><option value="imported">Imported</option></select>' +
          '</div><div style="display:flex;gap:8px;margin-top:10px;">' +
          '<button class="btn btn-primary btn-sm" onclick="saveSiteForm(\''+(s.id||'')+'\')">💾 Save</button>' +
          '<button class="btn btn-ghost btn-sm" onclick="set({editingSite:null,showAddSite:false})">Cancel</button></div></div>';
      }

      filtered.forEach(function(s) {
        var cb = S.completions.filter(function(c){return c.siteId===s.id;});
        var nc = (S.notes[s.id]||[]).length;
        var isEx = (s.status||'').indexOf('Existing')!==-1;
        var ex = S.expandedId === 's_'+s.id;
        var bc = cb.length>0?'green':(isEx?'purple':'amber');
        var sn = S.notes[s.id]||[];

        h += '<div class="card-item '+bc+'" onclick="toggle(\'s_'+s.id+'\')">';
        h += '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="font-size:1.3rem;">'+(cb.length>0?'✅':'📍')+'</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-weight:600;">'+(s.name||'Unnamed')+'</div>' +
            '<div style="font-size:0.78rem;color:#a6adbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(s.address||'—')+'</div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<span class="badge badge-sm '+(isEx?'badge-success':'badge-warning')+'">'+(isEx?'Existing':'RTM')+'</span>' +
            '<div style="display:flex;gap:6px;justify-content:flex-end;margin-top:3px;">' +
              (cb.length>0?'<span style="color:#36d399;font-size:0.78rem;font-weight:bold;">'+cb.length+' ✓</span>':'') +
              (nc>0?'<span style="font-size:0.78rem;">'+nc+' 💬</span>':'') +
            '</div>' +
          '</div>' +
          '<span class="arrow'+(ex?' open':'')+'">▼</span></div>';

        h += '<div class="detail-panel'+(ex?' open':'')+'">';
        if (ex) {
          h += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid #2a323c;" onclick="event.stopPropagation()">';
          h += '<div class="detail-grid">' +
            '<div class="detail-cell"><div class="label">Site ID</div><div class="value">'+(s.name||s.id)+'</div></div>' +
            '<div class="detail-cell"><div class="label">Status</div><div><span class="badge badge-sm '+(isEx?'badge-success':'badge-warning')+'">'+(s.status||'Unknown')+'</span></div></div>' +
            '<div class="detail-cell span2"><div class="label">Address</div><div class="value" style="font-size:0.88rem;">'+(s.address||'—')+'</div></div>' +
            '<div class="detail-cell span2"><div class="label">Coordinates</div><div style="font-size:0.82rem;">'+(s.lat||'?')+', '+(s.lng||s.lon||'?')+'</div></div>' +
          '</div>';

          if (cb.length>0) {
            h += '<div style="margin-bottom:12px;"><div style="font-weight:600;font-size:0.82rem;margin-bottom:6px;">👷 Completed By:</div>';
            cb.forEach(function(c) {
              var u = S.users.find(function(x){return x.id===c.completedBy;});
              var name = u?(u.displayName||u.email):(c.completedByName||'Unknown');
              h += '<div style="display:flex;align-items:center;gap:8px;padding:7px;background:#1d232a;border-radius:8px;margin-bottom:3px;">' +
                photoOrAv(c.completedByPhoto,u,'sm') +
                '<div style="flex:1;font-weight:500;font-size:0.88rem;">'+name+'</div>' +
                '<div style="font-size:0.72rem;color:#a6adbb;">'+fmtTime(c.completedAt)+'</div></div>';
            });
            h += '</div>';
          } else {
            h += '<div style="background:#f59e0b22;border:1px solid #f59e0b44;border-radius:8px;padding:10px;margin-bottom:12px;text-align:center;color:#f59e0b;">⏳ Not yet completed</div>';
          }

          if (sn.length>0) {
            h += '<div style="margin-bottom:12px;"><div style="font-weight:600;font-size:0.82rem;margin-bottom:6px;">💬 Notes ('+sn.length+'):</div>';
            sn.slice(0,5).forEach(function(n) {
              h += '<div class="note-bubble"><div style="display:flex;justify-content:space-between;margin-bottom:3px;">' +
                '<span style="font-weight:500;font-size:0.78rem;">'+(n.authorName||'Unknown')+'</span>' +
                '<span style="font-size:0.68rem;color:#a6adbb;">'+fmtTime(n.createdAt)+'</span></div>' +
                '<div style="font-size:0.85rem;color:#ccc;">'+(n.text||n.message||'')+'</div></div>';
            });
            h += '</div>';
          }

          h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
            '<button class="btn btn-sm btn-primary" onclick="editSite(\''+s.id+'\')">✏️ Edit</button>' +
            '<button class="btn btn-sm btn-del" onclick="deleteSite(\''+s.id+'\',\''+esc(s.name)+'\')">🗑️ Delete</button></div>';
          h += '</div>';
        }
        h += '</div></div>';
      });

      if (filtered.length===0) h += '<div class="stat-box"><p style="color:#a6adbb;">No sites found.</p></div>';
      return h;
    }

    // ── NOTES ──
    function rNotes() {
      var allKeys = Object.keys(S.notes).filter(function(k) { return S.notes[k].length > 0; });
      var tn = totalNotes();

      var h = '<h2 style="font-size:1.3rem;font-weight:bold;margin-bottom:16px;">📝 Notes ('+tn+')</h2>';

      if (allKeys.length === 0) {
        h += '<div class="stat-box"><p style="color:#a6adbb;">No notes yet. Notes appear here when team members leave messages at sites.</p></div>';
        return h;
      }

      allKeys.forEach(function(sid) {
        var notes = S.notes[sid];
        var site = S.sites.find(function(x){return x.id===sid||x.name===sid;});
        var sn = site?site.name:sid;

        h += '<div class="stat-box" style="margin-bottom:10px;">' +
          '<h3 style="font-weight:bold;margin-bottom:10px;">📍 '+sn+' <span style="color:#a6adbb;font-weight:normal;font-size:0.82rem;">('+notes.length+')</span></h3>';

        notes.forEach(function(n) {
          var u = S.users.find(function(x){return x.id===(n.authorId||n.userId);});
          var name = u?(u.displayName||u.email):(n.authorName||'Unknown');
          h += '<div class="note-bubble">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
            photoOrAv(n.authorPhoto,u,'sm') +
            '<span style="font-weight:500;font-size:0.88rem;">'+name+'</span>' +
            '<span style="font-size:0.72rem;color:#a6adbb;margin-left:auto;">'+fmtTime(n.createdAt||n.timestamp)+'</span>' +
            '<button class="btn btn-ghost btn-xs" onclick="deleteNote(\''+esc(n.siteDocId)+'\',\''+n.id+'\')" title="Delete">🗑️</button></div>' +
            '<div style="font-size:0.88rem;padding-left:42px;color:#ddd;">'+(n.text||n.message||'')+'</div></div>';
        });
        h += '</div>';
      });
      return h;
    }

    // ── KMZ ──
    function rKmz() {
      var h = '<h2 style="font-size:1.3rem;font-weight:bold;margin-bottom:16px;">📁 KMZ Files ('+S.kmzFiles.length+')</h2>';
      if (S.kmzFiles.length===0) {
        h += '<div class="stat-box"><p style="color:#a6adbb;">No KMZ files imported yet.</p></div>';
        return h;
      }

      S.kmzFiles.forEach(function(f,i) {
        var u = S.users.find(function(x){return x.id===f.userId;});
        var name = u?(u.displayName||u.email):(f.userName||'Unknown');
        var ex = S.expandedId==='k_'+i;

        h += '<div class="card-item blue" onclick="toggle(\'k_'+i+'\')">';
        h += '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div style="font-size:1.3rem;">📄</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-weight:600;">'+(f.name||f.fileName||'Untitled')+'</div>' +
            '<div style="font-size:0.78rem;color:#a6adbb;">by '+name+'</div>' +
          '</div>' +
          '<div style="text-align:right;">' +
            '<div style="font-weight:bold;color:#3abff8;">'+(f.siteCount||'?')+' sites</div>' +
            '<div style="font-size:0.72rem;color:#a6adbb;">'+fmtDate(f.uploadedAt||f.createdAt)+'</div>' +
          '</div>' +
          '<span class="arrow'+(ex?' open':'')+'">▼</span></div>';

        h += '<div class="detail-panel'+(ex?' open':'')+'">';
        if (ex) {
          h += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #2a323c;" onclick="event.stopPropagation()">';
          h += '<div class="detail-grid">' +
            '<div class="detail-cell"><div class="label">File</div><div class="value" style="word-break:break-all;">'+(f.name||f.fileName||'Untitled')+'</div></div>' +
            '<div class="detail-cell"><div class="label">Sites</div><div class="value" style="font-size:1.2rem;color:#3abff8;">'+(f.siteCount||'?')+'</div></div>' +
            '<div class="detail-cell"><div class="label">Uploaded</div><div class="value">'+fmtDate(f.uploadedAt||f.createdAt)+'</div></div>' +
            '<div class="detail-cell"><div class="label">By</div><div style="display:flex;align-items:center;gap:6px;">'+(u?av(u,'sm'):'')+'<span style="font-size:0.85rem;">'+name+'</span></div></div>' +
          '</div>';
          h += '<button class="btn btn-sm btn-del" onclick="deleteKmz(\''+f.id+'\',\''+esc(f.name||f.fileName)+'\')">🗑️ Delete KMZ</button>';
          h += '</div>';
        }
        h += '</div></div>';
      });
      return h;
    }

    // ── ROLES ──
    function rRoles() {
      var admins = S.users.filter(function(u){return u.role==='admin'||ADMIN_EMAILS.indexOf(u.email)!==-1;});
      var regs = S.users.filter(function(u){return u.role!=='admin'&&ADMIN_EMAILS.indexOf(u.email)===-1;});

      var h = '<h2 style="font-size:1.3rem;font-weight:bold;margin-bottom:16px;">🔒 Role Management</h2>';

      h += '<div class="stat-box" style="margin-bottom:14px;">' +
        '<h3 style="font-weight:bold;margin-bottom:4px;">Administrators ('+admins.length+')</h3>' +
        '<p style="font-size:0.78rem;color:#a6adbb;margin-bottom:10px;">Full back office access</p>';
      admins.forEach(function(u) {
        var hard = ADMIN_EMAILS.indexOf(u.email)!==-1;
        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a323c;">' +
          av(u,'sm') +
          '<div style="flex:1;min-width:0;"><div style="font-weight:500;">'+(u.displayName||'No Name')+'</div>' +
          '<div style="font-size:0.78rem;color:#a6adbb;">'+(u.email||'')+'</div></div>' +
          (hard?'<span style="font-size:0.72rem;color:#a6adbb;">🔐 Owner</span>' :
          '<button class="btn btn-ghost btn-xs" onclick="toggleRole(\''+u.id+'\',\'admin\')">Remove</button>') + '</div>';
      });
      h += '</div>';

      h += '<div class="stat-box">' +
        '<h3 style="font-weight:bold;margin-bottom:4px;">Regular Users ('+regs.length+')</h3>' +
        '<p style="font-size:0.78rem;color:#a6adbb;margin-bottom:10px;">Tap "Make Admin" to promote</p>';
      regs.forEach(function(u) {
        h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #2a323c;">' +
          av(u,'sm') +
          '<div style="flex:1;min-width:0;"><div style="font-weight:500;">'+(u.displayName||'No Name')+'</div>' +
          '<div style="font-size:0.78rem;color:#a6adbb;">'+(u.email||'')+'</div></div>' +
          '<button class="btn btn-primary btn-xs" onclick="toggleRole(\''+u.id+'\',\'user\')">Make Admin</button></div>';
      });
      if (regs.length===0) h += '<p style="color:#a6adbb;">No regular users yet.</p>';
      h += '</div>';
      return h;
    }

    // Boot
    render();
  </script>
</body>
</html>
