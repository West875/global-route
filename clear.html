<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clearing Cache...</title></head>
<body style="background:#1a1a2e;color:white;font-family:sans-serif;padding:40px;text-align:center;">
<h2>🔄 Clearing Cache...</h2>
<p id="status">Working...</p>
<script>
(async function() {
  var status = document.getElementById('status');
  try {
    // Unregister all service workers
    if ('serviceWorker' in navigator) {
      var regs = await navigator.serviceWorker.getRegistrations();
      for (var i = 0; i < regs.length; i++) {
        await regs[i].unregister();
      }
      status.textContent = 'Service workers removed (' + regs.length + ')...';
    }
    // Clear all caches
    if ('caches' in window) {
      var keys = await caches.keys();
      for (var j = 0; j < keys.length; j++) {
        await caches.delete(keys[j]);
      }
      status.textContent = 'Caches cleared (' + keys.length + ')...';
    }
    status.innerHTML = '✅ All clear! Redirecting...';
    setTimeout(function() { window.location.href = './index.html'; }, 1500);
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }
})();
</script>
</body>
</html>
