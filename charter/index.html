function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='done'){osc.frequency.value=880;gain.gain.value=0.1;osc.start();osc.stop(ctx.currentTime+0.15);}
    else if(type==='click'){osc.frequency.value=600;gain.gain.value=0.05;osc.start();osc.stop(ctx.currentTime+0.08);}
  }catch(e){}
}

function directionsUrl(lat,lon){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  return isIOS?`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`:`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
}

function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return `${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

function showAuthError(msg){
  const clean=msg.replace('Firebase:','').replace(/\(auth\/.*\)/,'').trim();
  const el=$('auth-error');
  if(el){el.textContent=clean;el.classList.remove('hidden');}
  alert(clean);
}

window.doLogin=async function(){
  const email=$('auth-email')?.value?.trim();
  const pass=$('auth-pass')?.value;
  if(!email||!pass) return showAuthError('Enter email and password');
  const btn=$('btn-login');if(btn)btn.textContent='Signing in...';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){if(btn)btn.textContent='Sign In';showAuthError(e.message);}
};

window.doSignup=async function(){
  const email=$('auth-email')?.value?.trim();
  const pass=$('auth-pass')?.value;
  if(!email||!pass) return showAuthError('Enter email and password');
  if(pass.length<6) return showAuthError('Password must be 6+ characters');
  const btn=$('btn-signup');if(btn)btn.textContent='Creating account...';
  try{await createUserWithEmailAndPassword(auth,email,pass);}
  catch(e){if(btn)btn.textContent='Create Account';showAuthError(e.message);}
};

window.doGoogle=async function(){
  const provider=new GoogleAuthProvider();
  try{await signInWithPopup(auth,provider);}
  catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request'){
      try{await signInWithRedirect(auth,provider);}catch(e2){showAuthError(e2.message);}
    }else if(e.code!=='auth/popup-closed-by-user'){showAuthError(e.message.replace('Firebase:',''));}
  }
}

// ============ BIOMETRIC UNLOCK (Fingerprint / Face ID) ============
const BIO_KEY='globalroute_bio_enabled';
const BIO_CRED='globalroute_bio_cred';
const BIO_UID='globalroute_bio_uid';
const BIO_NAME='globalroute_bio_name';
const BIO_AVATAR='globalroute_bio_avatar';

function isBiometricSupported(){
  return window.PublicKeyCredential && 
    typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable==='function';
}

async function isBiometricAvailable(){
  if(!isBiometricSupported()) return false;
  try{return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();}
  catch(e){return false;}
}

async function registerBiometric(){
  try{
    const avail=await isBiometricAvailable();
    if(!avail) return false;
    const userId=new TextEncoder().encode(currentUser.uid);
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    const cred=await navigator.credentials.create({publicKey:{
      challenge:challenge,
      rp:{name:'Global Route',id:window.location.hostname},
      user:{id:userId,name:currentUser.email||currentUser.displayName||'crew',displayName:currentUser.displayName||currentUser.email||'Crew'},
      pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'discouraged'},
      timeout:60000
    }});
    const credIdArr=Array.from(new Uint8Array(cred.rawId));
    localStorage.setItem(BIO_CRED,JSON.stringify(credIdArr));
    localStorage.setItem(BIO_KEY,'true');
    localStorage.setItem(BIO_UID,currentUser.uid);
    localStorage.setItem(BIO_NAME,currentUser.displayName||currentUser.email||'');
    return true;
  }catch(e){console.warn('Biometric register failed:',e);return false;}
}

async function verifyBiometric(){
  try{
    const credIdArr=JSON.parse(localStorage.getItem(BIO_CRED));
    if(!credIdArr) return false;
    const credId=new Uint8Array(credIdArr);
    const challenge=crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({publicKey:{
      challenge:challenge,
      allowCredentials:[{id:credId,type:'public-key',transports:['internal']}],
      userVerification:'required',
      timeout:60000
    }});
    return true;
  }catch(e){console.warn('Biometric verify failed:',e);return false;}
}

let selfieStream=null;
let selfieDataURL=null;

async function startSelfieCamera(){
  try{
    selfieStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:480},height:{ideal:480}},audio:false});
    const video=$('selfie-video');
    if(video){video.srcObject=selfieStream;video.play();}
  }catch(e){
    console.error('Camera error:',e);
    $('selfie-preview').innerHTML='<div class="flex items-center justify-center h-full text-gray-400 text-sm p-4">Camera not available.<br>Please allow camera access.</div>';
  }
}

function stopSelfieCamera(){
  if(selfieStream){selfieStream.getTracks().forEach(t=>t.stop());selfieStream=null;}
}

window.captureSelfie=function(){
  const video=$('selfie-video');
  const canvas=$('selfie-canvas');
  if(!video||!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.save();
  ctx.translate(480,0);ctx.scale(-1,1);
  ctx.drawImage(video,0,0,480,480);
  ctx.restore();
  selfieDataURL=canvas.toDataURL('image/jpeg',0.8);
  const img=$('selfie-img');
  img.src=selfieDataURL;
  img.classList.remove('hidden');
  video.classList.add('hidden');
  $('selfie-actions').classList.add('hidden');
  $('selfie-confirm').classList.remove('hidden');
  stopSelfieCamera();
  vibrate(50);
};

window.retakeSelfie=function(){
  $('selfie-img').classList.add('hidden');
  $('selfie-video').classList.remove('hidden');
  $('selfie-actions').classList.remove('hidden');
  $('selfie-confirm').classList.add('hidden');
  selfieDataURL=null;
  startSelfieCamera();
};

window.confirmSelfie=async function(){
  if(!selfieDataURL)return;
  const btn=document.querySelector('#selfie-confirm button');
  if(btn)btn.textContent='Saving...';
  try{
    // Save avatar to charterNodeMembers doc
    const memberSnap=await getDocs(query(collection(db,'charterNodeMembers'),where('uid','==',currentUser.uid)));
    if(!memberSnap.empty){
      await updateDoc(memberSnap.docs[0].ref,{avatarURL:selfieDataURL});
    }
    userAvatarURL=selfieDataURL;
    vibrate(100);playSound('done');
    stopSelfieCamera();
    loadUserNode();
  }catch(e){
    console.error('Save selfie error:',e);
    alert('Error saving photo. Please try again.');
    if(btn)btn.textContent='✅ Looks Good — Continue';
  }
};

// ============ LOAD USER NODE ============
async function loadUserNode(){
  // Check if user belongs to any node
  const snap=await getDocs(query(collection(db,'charterNodeMembers'),where('uid','==',currentUser.uid)));
  if(snap.empty){renderInviteCode();return;}
  
  // Use first node found
  const membership=snap.docs[0].data();
  currentNodeId=membership.nodeId;
  
  // Check if avatar is set
  if(!membership.avatarURL && !currentUser.photoURL){
    renderSelfieScreen();
    return;
  }
  userAvatarURL=membership.avatarURL||currentUser.photoURL||null;
  
  // Get node details
  const nodeDoc=await getDoc(doc(db,'charterNodes',currentNodeId));
  if(!nodeDoc.exists()){renderInviteCode();return;}
  currentNode=nodeDoc.data();
  
  try { renderMainApp(); } catch(renderErr) {
    console.error('renderMainApp crashed:', renderErr);
    document.getElementById('app').innerHTML = '<div style="padding:20px;color:red;font-family:monospace">RENDER ERROR: ' + renderErr.message + '</div>';
  }
  subscribeToData();
}

let filterMode='all'; // all | pending | completed | enroute

function getFilteredPoles(){
  let poles=GT30E_POLES;
  if(searchTerm){
    const s=searchTerm.toLowerCase();
    poles=poles.filter(p=>p.name.toLowerCase().includes(s));
  }
  if(filterMode==='completed') poles=poles.filter(p=>completions[p.id]);
  else if(filterMode==='pending') poles=poles.filter(p=>!completions[p.id]);
  else if(filterMode==='enroute') poles=poles.filter(p=>enroutes[p.id]);
  else if(filterMode.startsWith('CO')) poles=poles.filter(p=>p.section===filterMode);
  return poles;
}

function completedCount(){ return GT30E_POLES.filter(p=>completions[p.id]).length; }
function progressPct(){ return Math.round((completedCount()/GT30E_POLES.length)*100); }
function spanFootageStats(){
  let strandFt=0, lashedFt=0, strandOnlyFt=0, totalFt=0;
  SPAN_DATA.forEach(s=>{
    totalFt+=s.ft;
    const key=s.f+'_'+s.t;
    const stage=spanStages[key];
    if(stage==='strand' && window._spanStrandOnly?.[key]) strandOnlyFt+=s.ft;
    else if(stage==='strand') strandFt+=s.ft;
    else if(stage==='lashed'){ lashedFt+=s.ft; }
  });
  return {strandFt, lashedFt, strandOnlyFt, totalFt, spansDone: Object.keys(spanStages).length};
}

    <span style="background:#f97316;color:#fff;font-weight:700;width:14px;height:14px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;transform:rotate(45deg)"><span style="transform:rotate(-45deg)">⚓</span></span> Anchors (117)
  </label>
</div>
</div>
    </main>
  </div>
  
  <!-- Menu Modal -->
  <div id="menu-modal" class="hidden modal-backdrop" onclick="if(event.target===this)closeMenu()">

  `;
  
  renderPoleList();
  if(currentView==='map') initMap();
}

// Debounced render — batches rapid-fire subscription updates into one paint
let _renderTimer=null;
function renderPoleListDebounced(){
  if(_renderTimer) return;
  _renderTimer=requestAnimationFrame(()=>{_renderTimer=null;renderPoleList();});
}

function renderPoleList(){
  var poles=getFilteredPoles();
  var container=document.getElementById('list-view');
  if(!container){console.error('renderPoleList: list-view NOT FOUND');return;}
  var savedScroll=container.scrollTop;
  
  if(!poles.length){
    container.innerHTML='<div style="text-align:center;color:#999;padding:40px">No poles found</div>';
    return;
  }
  
  var sectionOrder=['CO2259847','CO2259848','CO2259851','CO2259854','CO2259876','CO2259879','Other'];
  var sectionLabels={'CO2259847':'Section 847','CO2259848':'Section 848','CO2259851':'Section 851','CO2259854':'Section 854','CO2259876':'Section 876','CO2259879':'Section 879','Other':'Other Poles'};
  
  var groups={};
  for(var i=0;i<poles.length;i++){
    var s=poles[i].section||'Other';
    if(!groups[s]) groups[s]=[];
    groups[s].push(poles[i]);
  }
  
  var html='';
  for(var si=0;si<sectionOrder.length;si++){
    var section=sectionOrder[si];
    var grp=groups[section];
    if(!grp||!grp.length) continue;
    var sectionDone=0;
    for(var j=0;j<grp.length;j++){if(completions[grp[j].id])sectionDone++;}
    html+='<div style="margin:16px 0 8px;display:flex;align-items:center;justify-content:space-between;padding:0 4px">';
    html+='<span style="color:#d4a843;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px">'+(sectionLabels[section]||section)+'</span>';
    html+='<span style="color:#f0c040;font-size:11px;background:rgba(240,192,64,0.15);padding:2px 8px;border-radius:12px">'+sectionDone+'/'+grp.length+'</span>';
    html+='</div>';
    for(var k=0;k<grp.length;k++){
      var p=grp[k];
      var done=completions[p.id];
      var enr=enroutes[p.id];
      var badge='';
      if(done) badge='<span style="color:#34d399;font-size:11px">✅ '+(done.userName||'Done')+'</span>';
      else if(enr) badge='<span style="color:#fbbf24;font-size:11px">🚗 '+(enr.userName||'En Route')+'</span>';
      html+='<div style="background:rgba(22,18,42,0.75);border:1px solid rgba(139,92,246,0.12);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer;backdrop-filter:blur(20px)" onclick="openPole(\''+p.id+'\')">';
      html+='<div style="display:flex;align-items:center;justify-content:space-between">';
      html+='<div style="display:flex;align-items:center;gap:12px">';
      html+='<div style="width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;'+(done?'background:#374151;color:#6b7280':'background:rgba(88,28,135,0.5);color:white')+'">'+(p.name.length<=3?p.name:(done?'✅':'📍'))+'</div>';
      html+='<div>';
      html+='<p style="font-weight:600;'+(done?'color:#6b7280;text-decoration:line-through':'color:white')+'">Pole '+p.name+'</p>';
      html+='<p style="font-size:12px;color:#6b7280">'+p.lat.toFixed(5)+', '+p.lon.toFixed(5)+'</p>';
      html+='</div></div>';
      html+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+badge+'</div>';
      html+='</div></div>';
    }
  }
  
  container.innerHTML=html;
  container.scrollTop=savedScroll;
}

// ============ MAP ============

window.toggleFiberLayer=function(name,show){
  if(!window._fiberLayers) return;
  const layer=window._fiberLayers[name];
  if(!layer) return;
  if(show) layer.addTo(mapInstance);
  else mapInstance.removeLayer(layer);
};
window.toggleMapLegend=function(){
  const el=document.getElementById('mapLegend');
  el.style.display=el.style.display==='none'?'block':'none';
};

function initMap(){
  try{
  // Guard against re-initialization
  if(window._mapInited && mapInstance) { mapInstance.invalidateSize(); return; }
  
  var container=document.getElementById('map-container');
  if(!container){console.error('initMap: no map-container');return;}
  
  // Create map div — use fixed pixel height (not 100vh which flickers on mobile)
  if(!container.querySelector('#map')){
    var mapH = window.innerHeight - 140;
    container.innerHTML='<div id="map" style="height:'+mapH+'px;width:100%;position:relative;z-index:1"></div>';
  }
  
  if(mapInstance){try{mapInstance.remove();}catch(e){}mapInstance=null;}
  
  const lats=GT30E_POLES.map(p=>p.lat);
  const lons=GT30E_POLES.map(p=>p.lon);
  const bounds=[[Math.min(...lats)-0.002,Math.min(...lons)-0.003],[Math.max(...lats)+0.002,Math.max(...lons)+0.003]];
  
  mapInstance=L.map('map',{zoomControl:false,attributionControl:false,fadeAnimation:false,zoomAnimation:false,markerZoomAnimation:false,maxZoom:22}).fitBounds(bounds);
  // Map tile layers — maxNativeZoom prevents "Map data not yet available" by upscaling tiles
  const baseLayers = {
    'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:22,maxNativeZoom:19}),
    'Terrain': L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{maxZoom:22,maxNativeZoom:17,attribution:'OpenTopoMap'}),
    'Street': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22,maxNativeZoom:19,attribution:'OSM'}),
    'Hybrid': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:22,maxNativeZoom:19})
  };
  const labelsLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:22,maxNativeZoom:20,pane:'overlayPane'});
  baseLayers['Satellite'].addTo(mapInstance);

  // Leaflet built-in layer control (top-right crosshatch — same as OLT-57)
  L.control.layers({
    '🛰️ Satellite': baseLayers['Satellite'],
    '⛰️ Terrain': baseLayers['Terrain'],
    '🗺️ Street': baseLayers['Street']
  }, null, { position: 'topright', collapsed: true }).addTo(mapInstance);

  // Map control buttons (top-right, below layer control — same style as OLT-57)
  const mapC2 = document.getElementById('map-container');
  mapC2.style.position='relative';
  const mapBtnStyle='position:absolute;right:10px;z-index:1000;width:48px;height:48px;border-radius:6px;background:white;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.35);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;';

  // GPS Recenter button (crosshair SVG — matches OLT-57) — click handled by delegated listener below
  var gpsBtn=document.createElement('button');
  gpsBtn.id='gpsLocateBtn';
  gpsBtn.title='Re-center on my location';
  gpsBtn.style.cssText=mapBtnStyle+'top:60px;';
  gpsBtn.innerHTML='<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3.5" stroke="#333" stroke-width="2" fill="none"/><line x1="12" y1="1" x2="12" y2="5" stroke="#333" stroke-width="2"/><line x1="12" y1="19" x2="12" y2="23" stroke="#333" stroke-width="2"/><line x1="1" y1="12" x2="5" y2="12" stroke="#333" stroke-width="2"/><line x1="19" y1="12" x2="23" y2="12" stroke="#333" stroke-width="2"/></svg>';
  mapC2.appendChild(gpsBtn);

  // Team Activity button (below GPS)
  var teamBtn=document.createElement('button');
  teamBtn.id='teamActivityBtn';
  teamBtn.title='Team Activity';
  teamBtn.style.cssText=mapBtnStyle+'top:116px;';
  teamBtn.innerHTML='<span style="font-size:22px">👥</span>';
  teamBtn.onclick=function(){showTeamActivity();};
  teamBtn.ontouchstart=function(){this.style.background='#e0e0e0';};
  teamBtn.ontouchend=function(){this.style.background='white';};
  mapC2.appendChild(teamBtn);
  
  // Add markers
  GT30E_POLES.forEach(p=>{
    const done=completions[p.id];
    const enr=enroutes[p.id];
    
    let color='#3b82f6'; // blue
    let colorDark='#2563eb';
    let colorLight='#60a5fa';
    if(done){ color='#6b7280'; colorDark='#4b5563'; colorLight='#9ca3af'; }
    else if(enr){ color='#f59e0b'; colorDark='#d97706'; colorLight='#fbbf24'; }
    
    const label=(p.name||'').length>5 ? (p.name||'').slice(0,5) : (p.name||'');
    const uid=p.id.replace(/[^a-zA-Z0-9]/g,"");
    const icon=L.divIcon({
      className:'',
      html:'<div style="position:relative;filter:drop-shadow(1px 2px 3px rgba(0,0,0,0.5));">'+
        '<svg width="22" height="32" viewBox="0 0 36 52" xmlns="http://www.w3.org/2000/svg">'+
          '<defs>'+
            '<radialGradient id="cap_'+uid+'" cx="38%" cy="32%" r="55%">'+
              '<stop offset="0%" stop-color="'+colorLight+'"/>'+
              '<stop offset="60%" stop-color="'+color+'"/>'+
              '<stop offset="100%" stop-color="'+colorDark+'"/>'+
            '</radialGradient>'+
            '<linearGradient id="pin_'+uid+'" x1="0" y1="0" x2="0" y2="1">'+
              '<stop offset="0%" stop-color="#ccc"/>'+
              '<stop offset="50%" stop-color="#999"/>'+
              '<stop offset="100%" stop-color="#666"/>'+
            '</linearGradient>'+
          '</defs>'+
          '<ellipse cx="18" cy="49" rx="5" ry="2" fill="rgba(0,0,0,0.25)"/>'+
          '<polygon points="16,22 20,22 18.5,48 17.5,48" fill="url(#pin_'+uid+')"/>'+
          '<line x1="17" y1="22" x2="17" y2="47" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>'+
          '<circle cx="18" cy="14" r="13" fill="url(#cap_'+uid+')" stroke="'+colorDark+'" stroke-width="1.5"/>'+
          '<circle cx="18" cy="14" r="11" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>'+
          '<ellipse cx="13" cy="9" rx="6" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-25,13,9)"/>'+
          '<ellipse cx="14" cy="8" rx="3" ry="2" fill="rgba(255,255,255,0.25)" transform="rotate(-25,14,8)"/>'+
        '</svg>'+
        '<div style="position:absolute;top:2px;left:0;right:0;text-align:center;font-size:8px;font-weight:900;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.8);line-height:14px;">'+label+'</div>'+
      '</div>',
      iconSize:[22,32],iconAnchor:[11,30]
    });
    
    const m=L.marker([p.lat,p.lon],{icon}).addTo(mapInstance);
    m.bindPopup(`
      <div style="min-width:200px;font-family:Inter,sans-serif">
        <b>Pole ${p.name}</b>${p.section&&p.section!=='Other'?`<br><span style="color:#999;font-size:11px">${p.section.replace('CO','Section ')}</span>`:''}${done?'<br><span style="color:green">✅ Complete</span>':''}${enr?`<br><span style="color:orange">🚗 ${enr.userName}</span>`:''}
        <br><br>
        <a href="${directionsUrl(p.lat,p.lon)}" target="_blank" style="color:#7c3aed;font-weight:600">🧭 Get Directions</a>
        &nbsp;|&nbsp;
        <a href="#" onclick="event.preventDefault();openPole('${p.id}')" style="color:#7c3aed;font-weight:600">📋 Details</a>
      </div>
    `);
    markers[p.id]=m;
  });
  
  // === FIBER CABLE LAYERS ===
  const fiberLayers={trunk:L.layerGroup(),feeder:L.layerGroup(),storage:L.layerGroup(),splices:L.layerGroup()};
  
  // Trunk cables (96CT) - Red
  TRUNK_CABLES.forEach(coords=>{
    L.polyline(coords,{color:'#ef4444',weight:4,opacity:0.85,dashArray:null}).addTo(fiberLayers.trunk);
  });
  
  // Feeder cables (48CT) - Green
  FEEDER_CABLES.forEach(coords=>{
    L.polyline(coords,{color:'#22c55e',weight:3,opacity:0.8}).addTo(fiberLayers.feeder);
  });
  
  // Tail cables (12CT) - Teal
  TAIL_CABLES.forEach(coords=>{
    L.polyline(coords,{color:'#06b6d4',weight:2,opacity:0.7}).addTo(fiberLayers.feeder);
  });
  
  // Fiber Storage (∞) - Yellow markers
  FIBER_STORAGE.forEach(([lat,lon])=>{
    L.marker([lat,lon],{icon:L.divIcon({
      className:'',
      html:'<div style="background:#fbbf24;color:#000;font-weight:900;font-size:14px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">∞</div>',
      iconSize:[22,22],iconAnchor:[11,11]
    })}).bindPopup('<b>Fiber Storage</b><br>Slack storage loop').addTo(fiberLayers.storage);
  });
  
  // Splice Cans - Cyan markers
  SPLICE_CANS.forEach(s=>{
    L.marker([s.lat,s.lon],{icon:L.divIcon({
      className:'',
      html:'<div style="background:#06b6d4;color:#fff;font-weight:900;font-size:12px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4)">SP</div>',
      iconSize:[26,26],iconAnchor:[13,13]
    })}).bindPopup('<b>Splice Point</b><br>'+s.name).addTo(fiberLayers.splices);
  });
  
  // Anchors - Orange triangle markers
  const anchorLayer=L.layerGroup();
  ANCHORS.forEach(([lat,lon])=>{
    L.marker([lat,lon],{icon:L.divIcon({
      className:'',
      html:'<div style="background:#f97316;color:#fff;font-weight:900;font-size:10px;width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;border:1.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);transform:rotate(45deg)"><span style="transform:rotate(-45deg)">⚓</span></div>',
      iconSize:[18,18],iconAnchor:[9,9]
    })}).bindPopup('<b>⚓ Anchor/Guy Wire</b><br><span style="font-size:11px;color:#999">Down guy anchor point</span>').addTo(anchorLayer);
  });
  anchorLayer.addTo(mapInstance);
  fiberLayers.anchors=anchorLayer;

  // OLT Cabinet - Purple marker
  if(typeof OLT_CABINET!=='undefined'){
    L.marker([OLT_CABINET.lat,OLT_CABINET.lon],{icon:L.divIcon({
      className:'',
      html:'<div style="background:#7c3aed;color:#fff;font-weight:900;font-size:10px;width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:2px solid #gold;box-shadow:0 2px 8px rgba(124,58,237,.5)">OLT</div>',
      iconSize:[30,30],iconAnchor:[15,15]
    })}).bindPopup('<b>OLT Cabinet</b><br>'+OLT_CABINET.name).addTo(mapInstance);
  }
  
  // Add all layers to map by default
  fiberLayers.trunk.addTo(mapInstance);
  fiberLayers.feeder.addTo(mapInstance);
  fiberLayers.storage.addTo(mapInstance);
  fiberLayers.splices.addTo(mapInstance);
  
  // Store for toggle
  window._fiberLayers=fiberLayers;

  // ===== SPAN STAGE LINES (⬜→🟡→🟢) =====
  window._spanLayerGroup = L.layerGroup().addTo(mapInstance);
  renderSpanLines();

  // GPS button already created above as white OLT-57 style at top:60px

  let gpsMarker=null, gpsCircle=null, gpsTracking=false, gpsWatchId=null;
  document.addEventListener('click',function(e){
    if(!e.target.closest('#gpsLocateBtn')) return;
    const btn=document.getElementById('gpsLocateBtn');
    if(gpsTracking){
      gpsTracking=false;
      if(gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId=null;
      if(gpsMarker){mapInstance.removeLayer(gpsMarker);gpsMarker=null;}
      if(gpsCircle){mapInstance.removeLayer(gpsCircle);gpsCircle=null;}
      btn.style.background='white';
      btn.style.borderColor='transparent';
      btn.querySelector('svg').querySelectorAll('circle,line').forEach(el=>{el.setAttribute('stroke','#333');});
      return;
    }
    gpsTracking=true;
    btn.style.background='#3b82f6';
    btn.style.borderColor='#3b82f6';
    btn.querySelector('svg').querySelectorAll('circle,line').forEach(el=>{el.setAttribute('stroke','white');});
    function updatePos(pos){
      const lat=pos.coords.latitude,lon=pos.coords.longitude,acc=pos.coords.accuracy;
      if(gpsMarker){
        gpsMarker.setLatLng([lat,lon]);
        gpsCircle.setLatLng([lat,lon]).setRadius(acc);
      } else {
        gpsCircle=L.circle([lat,lon],{radius:acc,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.12,weight:1.5}).addTo(mapInstance);
        gpsMarker=L.marker([lat,lon],{icon:L.divIcon({
          className:'',
          html:'<div style="width:20px;height:20px;background:#3b82f6;border:3px solid white;border-radius:50%;box-shadow:0 0 14px rgba(59,130,246,0.7),0 2px 6px rgba(0,0,0,0.3);animation:gpsPulse 2s infinite;"></div>',
          iconSize:[20,20],iconAnchor:[10,10]
        }),zIndexOffset:9999}).addTo(mapInstance);
        mapInstance.setView([lat,lon],16);
      }
    }
    function onErr(err){
      gpsTracking=false;
      btn.style.background='white';
      btn.style.borderColor='transparent';
      btn.querySelector('svg').querySelectorAll('circle,line').forEach(el=>{el.setAttribute('stroke','#333');});
    }
    navigator.geolocation.getCurrentPosition(updatePos,onErr,{enableHighAccuracy:true,timeout:10000});
    gpsWatchId=navigator.geolocation.watchPosition(updatePos,onErr,{enableHighAccuracy:true,maximumAge:5000});
  });

  // ===== CREW LOCATION TRACKING (48px avatar + orange pulsing glow + 🚗 badge) =====
  const crewMarkers = {};
  const presenceRef = collection(db, 'charterPresence');
  
  // CSS for orange pulsing glow on crew pins
  if(!document.getElementById('crew-pin-style')){
    const sty=document.createElement('style');
    sty.id='crew-pin-style';
    sty.textContent=`
      @keyframes crewPulse{0%,100%{box-shadow:0 0 8px 2px rgba(249,115,22,0.6)}50%{box-shadow:0 0 16px 6px rgba(249,115,22,0.9)}}
      .crew-pin-photo{width:48px;height:48px;border-radius:50%;border:3px solid #f97316;object-fit:cover;animation:crewPulse 2s ease-in-out infinite}
      .crew-pin-letter{width:48px;height:48px;border-radius:50%;background:#3b82f6;border:3px solid #f97316;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;animation:crewPulse 2s ease-in-out infinite}
    `;
    document.head.appendChild(sty);
  }
  
  function buildCrewIcon(uid, d){
    const name = (d.displayName || 'Crew').split(' ')[0];
    const photo = d.photoURL || (window._memberPhotos && window._memberPhotos[uid]) || '';
    const photoHtml = photo
      ? '<img src="'+photo+'" class="crew-pin-photo" referrerpolicy="no-referrer">'
      : '<div class="crew-pin-letter">'+name[0]+'</div>';
    const html = '<div style="position:relative;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));">'+photoHtml+'<div style="position:absolute;bottom:-4px;right:-4px;font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5));">🚗</div></div>';
    return L.divIcon({className:'',html:html,iconSize:[54,54],iconAnchor:[27,27]});
  }
  
  onSnapshot(presenceRef, snap => {
    const now = Date.now();
    const activeUids = new Set();
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const uid = docSnap.id;
      const age = now - (d.updatedAt?.toMillis?.() || 0);
      if(age > 10*60*1000){ // stale > 10 min
        if(crewMarkers[uid]){ mapInstance.removeLayer(crewMarkers[uid]); delete crewMarkers[uid]; }
        return;
      }
      activeUids.add(uid);
      const name = (d.displayName || 'Crew').split(' ')[0];
      const icon = buildCrewIcon(uid, d);
      
      if(crewMarkers[uid]){
        crewMarkers[uid].setLatLng([d.lat, d.lon]);
        crewMarkers[uid].setIcon(icon);
      } else {
        crewMarkers[uid] = L.marker([d.lat, d.lon], {
          icon: icon,
          zIndexOffset: 8000
        }).bindPopup('<b>'+name+'</b><br>Last seen: '+ new Date(d.updatedAt?.toMillis?.() || now).toLocaleTimeString()).addTo(mapInstance);
      }
    });
    // Remove markers for users no longer in snapshot
    Object.keys(crewMarkers).forEach(uid=>{
      if(!activeUids.has(uid)){ mapInstance.removeLayer(crewMarkers[uid]); delete crewMarkers[uid]; }
    });
  });

  window._mapInited = true;
  }catch(mapErr){
    console.error('initMap error:',mapErr);
    var mc=document.getElementById('map-container');
    if(mc) mc.innerHTML='<div style="padding:40px;text-align:center;color:#f87171">Map failed to load: '+mapErr.message+'</div>';
  }
}

// ============ POLE DETAIL ============
window.openPole=function(poleId){
  const pole=GT30E_POLES.find(p=>p.id===poleId);
  if(!pole) return;
  vibrate();playSound('click');
  
  const done=completions[poleId];
  const enr=enroutes[poleId];
  const poleNotes=Object.entries(notes).filter(([k,n])=>n.poleId===poleId).sort((a,b)=>{
    const ta=a[1].createdAt?.toDate?.()?.getTime()||0;

// ============ TIMEMARK WATERMARK ============
function drawTimemarkWatermark(ctx,w,h,opts){
  var now=new Date();
  var hrs=now.getHours(),mins=now.getMinutes();
  var ampm=hrs>=12?'PM':'AM';
  var h12=hrs%12||12;
  var timeStr=(h12<10?'0':'')+h12+':'+(mins<10?'0':'')+mins;
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var dateStr=months[now.getMonth()]+' '+String(now.getDate()).padStart(2,'0')+', '+now.getFullYear();
  var dayStr=dayNames[now.getDay()];
  var tz='EST';
  try{tz=Intl.DateTimeFormat('en-US',{timeZoneName:'short'}).formatToParts(now).find(p=>p.type==='timeZoneName').value;}catch(e){}

  var baseFS=Math.max(18,Math.round(w*0.032));
  var timeFS=Math.round(baseFS*2.4);
  var ampmFS=Math.round(baseFS*0.9);
  var dateFS=Math.round(baseFS*1.1);
  var dayFS=Math.round(baseFS*0.85);
  var infoFS=Math.round(baseFS*0.85);
  var verifyFS=Math.round(baseFS*0.65);
  var pad=Math.round(baseFS*0.9);
  var lineH=infoFS+Math.round(pad*0.5);
  var cardH=Math.round(timeFS+pad*1.5+lineH*3+pad*1.5+verifyFS+pad);
  var cardW=w-pad*2,cardX=pad;
  var cardY=h-cardH-Math.round(pad*0.5);
  var cornerR=Math.round(baseFS*0.5);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cardX+cornerR,cardY);
  ctx.lineTo(cardX+cardW-cornerR,cardY);
  ctx.arcTo(cardX+cardW,cardY,cardX+cardW,cardY+cornerR,cornerR);
  ctx.lineTo(cardX+cardW,cardY+cardH-cornerR);
  ctx.arcTo(cardX+cardW,cardY+cardH,cardX+cardW-cornerR,cardY+cardH,cornerR);
  ctx.lineTo(cardX+cornerR,cardY+cardH);
  ctx.arcTo(cardX,cardY+cardH,cardX,cardY+cardH-cornerR,cornerR);
  ctx.lineTo(cardX,cardY+cornerR);
  ctx.arcTo(cardX,cardY,cardX+cornerR,cardY,cornerR);
  ctx.closePath();
  ctx.fillStyle='rgba(15,15,15,0.82)';
  ctx.fill();
  ctx.restore();

  var tx=cardX+pad,ty=cardY+pad;
  ctx.font='bold '+timeFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#FFFFFF';
  ctx.fillText(timeStr,tx,ty+timeFS*0.82);
  var timeW=ctx.measureText(timeStr).width;

  var ampmX=tx+timeW+Math.round(pad*0.5);
  ctx.font='bold '+ampmFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#FFFFFF';
  ctx.fillText(ampm,ampmX,ty+ampmFS);
  ctx.fillStyle='rgba(200,200,200,0.8)';
  ctx.fillText(tz,ampmX,ty+ampmFS*2.3);

  var divX=ampmX+ctx.measureText(tz.length>ampm.length?tz:ampm).width+Math.round(pad*0.7);
  ctx.fillStyle='#DAA520';
  ctx.fillRect(divX,ty+4,3,timeFS*0.78);

  var dateX=divX+Math.round(pad*0.7);
  ctx.font='bold '+dateFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#FFFFFF';
  ctx.fillText(dateStr,dateX,ty+dateFS);
  ctx.font=dayFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='rgba(200,200,200,0.8)';
  ctx.fillText(dayStr,dateX,ty+dateFS+dayFS+4);

  var infoY=ty+timeFS+Math.round(pad*1.2);
  var prefix=opts.prefix||'\u{1F4CD}';
  ctx.font='bold '+infoFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#DAA520';
  ctx.fillText(prefix+'  '+(opts.siteName||''),tx,infoY+infoFS);

  infoY+=lineH;
  if(opts.gps){
    ctx.font=infoFS+'px Inter,Arial,sans-serif';
    ctx.fillStyle='rgba(220,220,220,0.9)';
    var latDir=opts.gps.lat>=0?'N':'S';
    var lonDir=opts.gps.lon>=0?'E':'W';
    ctx.fillText(Math.abs(opts.gps.lat).toFixed(6)+'\u00B0'+latDir+', '+Math.abs(opts.gps.lon).toFixed(6)+'\u00B0'+lonDir,tx,infoY+infoFS);
  }

  infoY+=lineH;
  ctx.font=infoFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#FFFFFF';
  ctx.fillText('\u{1F477}  '+(opts.userName||''),tx,infoY+infoFS);

  infoY+=Math.round(lineH*0.9);
  ctx.fillStyle='#DAA520';
  ctx.fillRect(tx,infoY,cardW-pad*2,2);

  ctx.font='bold '+verifyFS+'px Inter,Arial,sans-serif';
  ctx.fillStyle='#DAA520';
  ctx.fillText('\u2713  Verified by Global Route',tx,infoY+verifyFS+8);
}

let watermarkedBlob=null;

window.handlePhotoFile=async function(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const status=document.getElementById('photo-upload-status');
  status.textContent='Processing photo...';

  // Get GPS
  let gps=null;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,enableHighAccuracy:true}));
    gps={lat:pos.coords.latitude,lon:pos.coords.longitude};
  }catch(e){
    // Fall back to pole GPS
    const pole=GT30E_POLES.find(p=>p.id===activePhotoTarget.poleId);
    if(pole)gps={lat:pole.lat,lon:pole.lon};
  }

  const img=new Image();
  img.onload=function(){
    const canvas=document.getElementById('watermark-canvas');
    const ctx=canvas.getContext('2d');
    // Cap at 1600px wide for mobile performance
    const maxW=1600;
    const scale=img.width>maxW?maxW/img.width:1;
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    // Get user info
    const userName=currentUser.displayName||currentUser.email||'Crew';
    const siteName=activePhotoTarget.name||'Unknown';
    const prefix=activePhotoTarget.type==='anchor'?'⚓':activePhotoTarget.type==='storage'?'∞':'📍';

    drawTimemarkWatermark(ctx,canvas.width,canvas.height,{
      siteName:siteName,
      userName:userName,
      gps:gps,
      prefix:prefix
    });

    // Show preview
    const preview=document.getElementById('photo-preview');
    preview.innerHTML='';
    const previewImg=document.createElement('img');
    previewImg.src=canvas.toDataURL('image/jpeg',0.85);
    previewImg.style.cssText='width:100%;border-radius:12px';
    preview.appendChild(previewImg);

    // Convert to blob for upload
    canvas.toBlob(function(blob){
      watermarkedBlob=blob;
      document.getElementById('photo-upload-btn').classList.remove('hidden');
      status.textContent='Photo ready — tap Upload';
    },'image/jpeg',0.85);
  };
  img.src=URL.createObjectURL(file);
};

window.uploadWatermarkedPhoto=async function(){
  if(!watermarkedBlob||!activePhotoTarget)return;
  const status=document.getElementById('photo-upload-status');
  const btn=document.getElementById('photo-upload-btn');
  btn.disabled=true;
  btn.textContent='⏳ Uploading...';
  status.textContent='Uploading to cloud...';

  try{
    // Get GPS
    let gps=null;
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000,enableHighAccuracy:true}));
      gps={lat:pos.coords.latitude,lon:pos.coords.longitude};
    }catch(e){
      const pole=GT30E_POLES.find(p=>p.id===activePhotoTarget.poleId);
      if(pole)gps={lat:pole.lat,lon:pole.lon};
    }

    // Convert blob to base64 data URL (stored in Firestore directly)
    const dataUrl=await new Promise((resolve)=>{
      const reader=new FileReader();
      reader.onloadend=()=>resolve(reader.result);
      reader.readAsDataURL(watermarkedBlob);
    });

    // Save to Firestore with embedded image
    await addDoc(collection(db,'charterPhotos'),{
      nodeId:currentNodeId,
      poleId:activePhotoTarget.poleId,
      type:activePhotoTarget.type,
      name:activePhotoTarget.name,
      url:dataUrl,
      gps:gps,
      uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email,
      createdAt:serverTimestamp()
    });

    vibrate();playSound('complete');
    status.textContent='✅ Photo uploaded!';
    btn.textContent='✅ Uploaded';
    setTimeout(()=>{
      closePhotoCapture();
      // Refresh modal if it was a pole
      if(activePhotoTarget&&activePhotoTarget.type==='pole'){
        const pid=activePhotoTarget.poleId;
        setTimeout(()=>openPole(pid),200);
      }
    },1000);
  }catch(e){
    console.error('Upload error:',e);
    status.textContent='❌ Upload failed: '+e.message;
    btn.disabled=false;
    btn.textContent='⬆️ Retry Upload';
  }
};

          <img src="${p.url}" style="width:100%;border-radius:12px;border:1px solid rgba(255,255,255,0.1)" loading="lazy">
          <div class="flex justify-between items-center mt-1 px-1">
            <span class="text-xs text-gray-400">${p.userName||'Unknown'}</span>
            <span class="text-xs text-gray-500">${p.createdAt?timeAgo(p.createdAt):''}</span>
          </div>
        </div>
      `).join(''):'<p class="text-center text-gray-500 py-8">No photos yet</p>'}
    </div>`;
  document.body.appendChild(modal);
};



// ===== SPAN STAGE RENDERING =====
const SPAN_COLORS = { none:'#94a3b8', strand:'#eab308', lashed:'#22c55e' };
const SPAN_LABELS = { none:'No Work', strand:'🟡 Strand Placed', lashed:'🟢 Fiber Lashed' };

function renderSpanLines(){
  if(!window._spanLayerGroup || !mapInstance) return;
  window._spanLayerGroup.clearLayers();
  spanLines = {};
  
  const poleMap = {};
  GT30E_POLES.forEach(p => { poleMap[p.id] = p; });
  
  SPAN_DATA.forEach((s, idx) => {
    const p1 = poleMap[s.f];
    const p2 = poleMap[s.t];
    if(!p1 || !p2) return;
    
    const spanKey = s.f + '_' + s.t;
    const stage = spanStages[spanKey] || 'none';
    const isStrandOnly = window._spanStrandOnly?.[spanKey];
    const coords = [[p1.lat, p1.lon], [p2.lat, p2.lon]];
    
    // Wide invisible tap target for easy mobile tapping
    const hitLine = L.polyline(coords, {
      color: 'transparent', weight: 28, opacity: 0,
      interactive: true, bubblingMouseEvents: false
    }).addTo(window._spanLayerGroup);
    hitLine.on('click', function(e){
      L.DomEvent.stopPropagation(e);
      showSpanModal(s, spanKey, p1, p2);
    });

    if(stage === 'lashed' && !isStrandOnly){
      // Lashed = green + yellow dual line (strand underneath, fiber on top)
      const yellowLine = L.polyline(coords, {
        color: '#eab308', weight: 8, opacity: 0.85,
        interactive: false, bubblingMouseEvents: false
      }).addTo(window._spanLayerGroup);
      const greenLine = L.polyline(coords, {
        color: '#22c55e', weight: 4, opacity: 0.9,
        interactive: false, bubblingMouseEvents: false
      }).addTo(window._spanLayerGroup);
      spanLines[spanKey] = { yellow: yellowLine, green: greenLine, hit: hitLine };
    } else {
      const color = isStrandOnly ? '#f97316' : (SPAN_COLORS[stage] || SPAN_COLORS.none);
      const weight = stage === 'none' ? 3 : 5;
      const opacity = stage === 'none' ? 0.4 : 0.85;
      const line = L.polyline(coords, {
        color: color, weight: weight, opacity: opacity,
        interactive: false, bubblingMouseEvents: false
      }).addTo(window._spanLayerGroup);
      spanLines[spanKey] = { line: line, hit: hitLine };
    }

    // ∞ Storage marker — show on any span with tic data
    const ticData = window._spanTicData?.[spanKey];
    if(ticData && ticData.ticIn != null && ticData.ticOut != null){
      const storageFt = Math.abs(ticData.storage ?? (ticData.ticOut - ticData.ticIn));
      const midLat = (p1.lat + p2.lat) / 2;
      const midLon = (p1.lon + p2.lon) / 2;
      const storageIcon = L.divIcon({
        className: '',
        html: `<div style="background:rgba(249,115,22,0.92);color:#fff;font-weight:900;font-size:14px;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);line-height:1">∞</div>`,
        iconSize: [26, 26],
        iconAnchor: [13, 13]
      });
      L.marker([midLat, midLon], { icon: storageIcon, interactive: false, zIndexOffset: 800 })
        .bindTooltip(`📦 ${storageFt.toLocaleString()} ft storage`, { direction: 'top', offset: [0, -14] })
        .addTo(window._spanLayerGroup);
    }
  });
}

if(!window._spanStrandOnly) window._spanStrandOnly = {};
if(!window._spanTicData) window._spanTicData = {};

window._calcSpanStorage = function(spanKey){
  const inEl = document.getElementById('span-tic-in');
  const outEl = document.getElementById('span-tic-out');
  const resultEl = document.getElementById('span-tic-result');
  if(!inEl||!outEl||!resultEl) return;
  const ticIn = parseInt(inEl.value);
  const ticOut = parseInt(outEl.value);
  if(!isNaN(ticIn)&&!isNaN(ticOut)){
    const diff = ticOut - ticIn;
    resultEl.textContent = '📦 Storage: ' + diff.toLocaleString() + ' ft';
    resultEl.style.color = diff >= 0 ? '#22c55e' : '#ef4444';
  } else {
    resultEl.textContent = '';
  }
};

window._saveSpanTic = async function(spanKey){
  if(!currentUser||!currentNodeId) return;
  const inEl = document.getElementById('span-tic-in');
  const outEl = document.getElementById('span-tic-out');
  if(!inEl||!outEl) return;
  const ticIn = parseInt(inEl.value);
  const ticOut = parseInt(outEl.value);
  if(isNaN(ticIn)||isNaN(ticOut)){ alert('Enter both In and Out readings'); return; }
  vibrate(); playSound('complete');
  const userName = currentUser.displayName || currentUser.email.split('@')[0];
  const docId = currentNodeId + '_span_' + spanKey;
  const data = {
    nodeId: currentNodeId, spanKey,
    ticIn, ticOut, storage: ticOut - ticIn,
    userId: currentUser.uid, savedBy: userName,
    updatedAt: serverTimestamp()
  };
  await setDoc(doc(db, 'charterTicMarks', docId), data, { merge: true });
  window._spanTicData[spanKey] = data;
  const statusEl = document.getElementById('span-tic-status');
  if(statusEl){ statusEl.textContent='✅ Saved!'; setTimeout(()=>{if(statusEl)statusEl.textContent='';},2000); }
  const resultEl = document.getElementById('span-tic-result');
  if(resultEl){
    const diff = ticOut - ticIn;
    resultEl.textContent = '📦 Storage: ' + diff.toLocaleString() + ' ft • by ' + userName;
    resultEl.style.color = diff >= 0 ? '#22c55e' : '#ef4444';
  }
};

window.setSpanStage = async function(spanKey, stage){
  if(!currentUser || !currentNodeId) return;
  vibrate(50);
  
  const docRef = doc(db, 'charterSpanStages', currentNodeId + '_' + spanKey);
  const today = new Date().toISOString().slice(0,10);
  const spanInfo = SPAN_DATA.find(s => s.f+'_'+s.t === spanKey);
  const footage = spanInfo?.ft || 0;
  const userName = currentUser.displayName || currentUser.email.split('@')[0];
  // GT30E billing rates
  const crewRateStrand = 0.16;   // AC02-1 crew $0.16/ft
  const clientRateStrand = 0.48; // AC02-1 client $0.48/ft
  const crewRateComposite = 0.40;   // AC02 crew $0.40/ft
  const clientRateComposite = 1.20; // AC02 client $1.20/ft
  const crewRateLash = 0.24;    // AC02-2 crew $0.24/ft
  const clientRateLash = 0.72;  // AC02-2 client $0.72/ft
  const crewRateAS02 = 0.13;    // AS02 crew $0.13/ft
  const clientRateAS02 = 0.40;  // AS02 client $0.40/ft
  
  if(stage === 'none'){
    window._spanStrandOnly[spanKey] = false;
    try { await deleteDoc(docRef); } catch(e){}
    // Remove auto-billing entries (both strand + lash docs)
    try {
      const billingDocId = currentNodeId + '_span_' + spanKey;
      await deleteDoc(doc(db, 'charterBilling', billingDocId));
      const lashDocId = billingDocId + '_lash';
      await deleteDoc(doc(db, 'charterBilling', lashDocId));
    } catch(e){}
    showBanner('Span reset — billing removed','#6b7280');
  } else if(stage === 'strandOnly'){
    // AS02 — Strand only, no fiber will be placed
    await setDoc(docRef, {
      nodeId: currentNodeId,
      spanKey: spanKey,
      stage: 'strand',
      strandOnly: true,
      footage: footage,
      strandAt: serverTimestamp(),
      strandDate: today,
      strandBy: currentUser.uid,
      strandByName: userName,
      billingMode: 'strandOnly',
      updatedBy: currentUser.uid,
      userName: userName,
      updatedAt: serverTimestamp()
    });
    // Bill AS02
    const billingDocId = currentNodeId + '_span_' + spanKey;
    await setDoc(doc(db, 'charterBilling', billingDocId), {
      nodeId: currentNodeId, spanKey, fromPole: poleName(spanInfo?.f||''), toPole: poleName(spanInfo?.t||''),
      code: 'AS02', name: 'Strand Only (No Fiber)',
      qty: footage, unit: 'ft',
      crewRate: crewRateAS02, clientRate: clientRateAS02,
      crewTotal: Math.round(footage * crewRateAS02 * 100) / 100,
      clientTotal: Math.round(footage * clientRateAS02 * 100) / 100,
      stage: 'strand', billingMode: 'strandOnly',
      billedBy: currentUser.uid, billedByName: userName,
      billedAt: serverTimestamp(), date: today,
      strandDate: today,
      type: 'auto-span'
    });
    // Remove any lash billing doc
    try { await deleteDoc(doc(db, 'charterBilling', billingDocId + '_lash')); } catch(e){}
    window._spanStrandOnly[spanKey] = true;
    const earn = (footage * crewRateAS02).toFixed(2);
    showBanner(`🔧 AS02 Strand Only — ${footage.toLocaleString()} ft → $${earn}`,'#d97706');
  } else if(stage === 'strand'){
    window._spanStrandOnly[spanKey] = false;
    await setDoc(docRef, {
      nodeId: currentNodeId,
      spanKey: spanKey,
      stage: 'strand',
      strandOnly: false,
      footage: footage,
      strandAt: serverTimestamp(),
      strandDate: today,
      strandBy: currentUser.uid,
      strandByName: userName,
      updatedBy: currentUser.uid,
      userName: userName,
      updatedAt: serverTimestamp()
    });
    // Auto-bill AC02-1 for strand placed
    const billingDocId = currentNodeId + '_span_' + spanKey;
    await setDoc(doc(db, 'charterBilling', billingDocId), {
      nodeId: currentNodeId,
      spanKey: spanKey,
      fromPole: poleName(spanInfo?.f || ''),
      toPole: poleName(spanInfo?.t || ''),
      code: 'AC02-1',
      name: 'Strand Portion',
      qty: footage,
      unit: 'ft',
      crewRate: crewRateStrand,
      clientRate: clientRateStrand,
      crewTotal: Math.round(footage * crewRateStrand * 100) / 100,
      clientTotal: Math.round(footage * clientRateStrand * 100) / 100,
      stage: 'strand',
      billedBy: currentUser.uid,
      billedByName: userName,
      billedAt: serverTimestamp(),
      date: today,
      strandDate: today,
      type: 'auto-span'
    });
    const earn = (footage * crewRateStrand).toFixed(2);
    showBanner(`🟡 Strand — ${footage.toLocaleString()} ft → AC02-1 → $${earn}`,'#d97706');
  } else if(stage === 'lashed'){
    let existingStrandDate = today;
    let existingStrandBy = currentUser.uid;
    let existingStrandByName = userName;
    try {
      const snap = await getDoc(docRef);
      if(snap.exists() && snap.data().strandDate){
        existingStrandDate = snap.data().strandDate;
        existingStrandBy = snap.data().strandBy || currentUser.uid;
        existingStrandByName = snap.data().strandByName || userName;
      }
    } catch(e){}
    
    await setDoc(docRef, {
      nodeId: currentNodeId,
      spanKey: spanKey,
      stage: 'lashed',
      footage: footage,
      strandDate: existingStrandDate,
      strandBy: existingStrandBy,
      strandByName: existingStrandByName,
      strandAt: serverTimestamp(),
      lashedAt: serverTimestamp(),
      lashDate: today,
      lashedBy: currentUser.uid,
      lashedByName: userName,
      billingMode: 'overlash',
      updatedBy: currentUser.uid,
      userName: userName,
      updatedAt: serverTimestamp()
    });
    // Billing week = Friday → Thursday (cutoff Thu 4 PM Central)
    // Same billing week → convert AC02-1 to AC02 (clean composite)
    // Different billing week → AC02-1 already submitted, just add AC02-2
    function getBillingWeekStart(dateStr){
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay(); // 0=Sun..6=Sat
      const offset = (day - 5 + 7) % 7; // days since Friday
      const fri = new Date(d);
      fri.setDate(fri.getDate() - offset);
      return fri.toISOString().slice(0,10);
    }
    const strandWeek = getBillingWeekStart(existingStrandDate);
    const todayWeek = getBillingWeekStart(today);
    const sameBillingWeek = (strandWeek === todayWeek);
    const billingDocId = currentNodeId + '_span_' + spanKey;
    
    if(sameBillingWeek){
      // Same billing week → convert to AC02 Composite ($1.20/ft client, $0.40/ft crew)
      await setDoc(doc(db, 'charterBilling', billingDocId), {
        nodeId: currentNodeId, spanKey, fromPole: poleName(spanInfo?.f||''), toPole: poleName(spanInfo?.t||''),
        code: 'AC02', name: 'Fiber Composite (Strand+Lash)',
        qty: footage, unit: 'ft',
        crewRate: crewRateComposite, clientRate: clientRateComposite,
        crewTotal: Math.round(footage * crewRateComposite * 100) / 100,
        clientTotal: Math.round(footage * clientRateComposite * 100) / 100,
        stage: 'lashed', billingMode: 'composite',
        billedBy: currentUser.uid, billedByName: userName,
        billedAt: serverTimestamp(), date: today,
        strandDate: existingStrandDate, lashDate: today,
        billingWeek: strandWeek,
        type: 'auto-span'
      });
      // Remove any orphaned AC02-2 doc from same week
      try { await deleteDoc(doc(db, 'charterBilling', billingDocId + '_lash')); } catch(e){}
      const earn = (footage * crewRateComposite).toFixed(2);
      showBanner(`🟢 AC02 — ${footage.toLocaleString()} ft → $${earn}`,'#16a34a');
    } else {
      // Different billing week → AC02-1 already billed, just add AC02-2 for fiber
      const lashDocId = currentNodeId + '_span_' + spanKey + '_lash';
      await setDoc(doc(db, 'charterBilling', lashDocId), {
        nodeId: currentNodeId, spanKey, fromPole: spanInfo?.f||'', toPole: spanInfo?.t||'',
        code: 'AC02-2', name: 'Fiber Lash Portion',
        qty: footage, unit: 'ft',
        crewRate: crewRateLash, clientRate: clientRateLash,
        crewTotal: Math.round(footage * crewRateLash * 100) / 100,
        clientTotal: Math.round(footage * clientRateLash * 100) / 100,
        stage: 'lashed', billingMode: 'split',
        billedBy: currentUser.uid, billedByName: userName,
        billedAt: serverTimestamp(), date: today,
        strandDate: existingStrandDate, lashDate: today,
        billingWeek: todayWeek,
        type: 'auto-span'
      });
      const earn = (footage * crewRateLash).toFixed(2);
      showBanner(`🟢 AC02-2 — ${footage.toLocaleString()} ft → $${earn}`,'#16a34a');
    }
  }
  
  // Close modal
  const m = document.getElementById('span-modal');
  if(m) m.remove();
};

window.toggleNotes=function(id){
  const el=$('notes-section-'+id);

window.toggleBilling=function(id){
  const el=$('billing-section-'+id);
  if(!el) return;
  const wasHidden = el.classList.contains('hidden');
  el.classList.toggle('hidden');
  if(wasHidden){
    // Scroll billing section into view inside the modal
    setTimeout(()=>{
      el.scrollIntoView({behavior:'smooth',block:'center'});
      // Also focus the qty input so keyboard opens
      const qtyInput=$('bill-qty-'+id);
      if(qtyInput) setTimeout(()=>qtyInput.focus(),400);
    },100);
  }
};

window.closePhotoFlow=function(){
  const m=document.getElementById('photo-flow-modal');
  if(m)m.remove();
  photoFlowTemp={};

window.handlePhotoFlowPhoto=async function(phase,input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const info=photoFlowTemp.info||{icon:'📷',title:photoFlowTemp.code};
  
  // Get GPS
  let gps=null;
  try{
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,enableHighAccuracy:true}));
    gps={lat:pos.coords.latitude,lon:pos.coords.longitude};
  }catch(e){
    const pole=GT30E_POLES.find(p=>p.id===photoFlowTemp.poleId);
    if(pole)gps={lat:pole.lat,lon:pole.lon};
  }
  
  const img=new Image();
  img.onload=function(){
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    const maxW=1600;
    const scale=img.width>maxW?maxW/img.width:1;
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    ctx.drawImage(img,0,0,canvas.width,canvas.height);
    
    const label=phase==='before'?`${info.icon} BEFORE — ${info.title}`:`✅ AFTER — ${info.title}`;
    drawTimemarkWatermark(ctx,canvas.width,canvas.height,{
      siteName:photoFlowTemp.poleName+' '+label,
      userName:currentUser.displayName||currentUser.email||'Crew',
      gps:gps,
      prefix:info.icon
    });
    
    const dataUrl=canvas.toDataURL('image/jpeg',0.75);
    photoFlowTemp[phase+'Photo']=dataUrl;
    photoFlowTemp[phase+'Gps']=gps;
    
    // Show preview
    const preview=document.getElementById('pf-'+phase+'-preview');
    preview.innerHTML=`<img src="${dataUrl}" style="width:100%;border-radius:12px">`;
    
    // Enable next step
    if(phase==='before'){
      const step2=document.getElementById('pf-step2');
      step2.style.opacity='1';
      step2.style.pointerEvents='auto';
    }
    if(photoFlowTemp.beforePhoto&&photoFlowTemp.afterPhoto){
      const btn=document.getElementById('pf-submit-btn');
      btn.style.opacity='1';
      btn.style.pointerEvents='auto';
    }
  };
  img.src=URL.createObjectURL(file);
};

window.submitPhotoFlow=async function(){
  if(!photoFlowTemp.beforePhoto||!photoFlowTemp.afterPhoto){
    alert('Both before and after photos are required');return;
  }
  const btn=document.getElementById('pf-submit-btn');
  const status=document.getElementById('pf-status');
  const info=photoFlowTemp.info;
  btn.disabled=true;
  btn.textContent='⏳ Submitting...';
  status.textContent=`Saving ${info.title} entry...`;
  
  try{
    // Save billing entry
    const billingRef=await addDoc(collection(db,'charterBilling'),{
      nodeId:currentNodeId,
      poleId:photoFlowTemp.poleId,
      code:photoFlowTemp.code,
      qty:photoFlowTemp.qty,
      uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email.split('@')[0],
      createdAt:serverTimestamp()
    });
    
    const photoTypePrefix=photoFlowTemp.code.toLowerCase();
    
    // Save before photo
    await addDoc(collection(db,'charterPhotos'),{
      nodeId:currentNodeId,
      poleId:photoFlowTemp.poleId,
      type:photoTypePrefix+'-before',
      name:photoFlowTemp.poleName+` — ${info.title} BEFORE`,
      url:photoFlowTemp.beforePhoto,
      gps:photoFlowTemp.beforeGps,
      billingId:billingRef.id,
      uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email,
      createdAt:serverTimestamp()
    });
    
    // Save after photo
    await addDoc(collection(db,'charterPhotos'),{
      nodeId:currentNodeId,
      poleId:photoFlowTemp.poleId,
      type:photoTypePrefix+'-after',
      name:photoFlowTemp.poleName+` — ${info.title} AFTER`,
      url:photoFlowTemp.afterPhoto,
      gps:photoFlowTemp.afterGps,
      billingId:billingRef.id,
      uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email,
      createdAt:serverTimestamp()
    });
    
    vibrate();playSound('complete');
    status.textContent=`✅ ${info.title} logged with photos!`;
    btn.textContent='✅ Submitted';
    setTimeout(()=>{
      closePhotoFlow();
      openPole(photoFlowTemp.poleId);
    },1000);
  }catch(e){
    console.error('Photo flow error:',e);
    status.textContent='❌ Error: '+e.message;
    btn.disabled=false;
    btn.textContent=`✅ Submit ${info.title}`;
  }
};

// ============ TEAM PRESENCE STRIP ============
let _teamStripTimer=null;
function renderTeamStripDebounced(){
  if(_teamStripTimer) clearTimeout(_teamStripTimer);
  _teamStripTimer=setTimeout(()=>{_teamStripTimer=null;renderTeamStrip();},500);
}
function renderTeamStrip(){
  const strip = document.getElementById('team-strip');
  if(!strip) return;
  const now = Date.now();
  const members = Object.values(teamPresence).filter(m => {
    const age = now - (m.updatedAt?.toMillis?.() || 0);
    return age < 30 * 60 * 1000; // active in last 30 min
  }).sort((a,b) => {
    // Current user first, then by recency
    if(a.uid === currentUser?.uid) return -1;
    if(b.uid === currentUser?.uid) return 1;
    return (b.updatedAt?.toMillis?.() || 0) - (a.updatedAt?.toMillis?.() || 0);
  });
  
  if(members.length === 0){
    strip.innerHTML = '<span style="color:#6b7280;font-size:12px">No crew online</span>';
    return;
  }
  strip.style.display = 'flex';
  const onlineCount = members.filter(m => (now - (m.updatedAt?.toMillis?.() || 0)) < 10*60*1000).length;
  
  let html = '<div style="display:inline-flex;align-items:center;gap:12px">';
  html += '<div style="display:flex;flex-direction:column;margin-right:4px"><span style="font-size:11px;font-weight:700;color:#d4a843">CREW</span><span style="font-size:10px;color:#22c55e;font-weight:600">' + onlineCount + ' online</span></div>';
  
  members.forEach(m => {
    const isMe = m.uid === currentUser?.uid;
    const isOnline = (now - (m.updatedAt?.toMillis?.() || 0)) < 10*60*1000;
    const name = (m.displayName || 'Crew').split(' ')[0];
    const photo = m.photoURL || (window._memberPhotos && window._memberPhotos[m.uid]) || '';
    const borderColor = isMe ? '#f0c040' : '#3b82f6';
    const dotColor = isOnline ? '#22c55e' : '#94a3b8';
    
    html += '<div style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;position:relative">';
    if(photo){
      html += '<img src="' + photo + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid ' + borderColor + ';box-shadow:0 0 8px ' + (isMe ? 'rgba(240,192,64,0.3)' : 'rgba(59,130,246,0.3)') + '">';
    } else {
      html += '<div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:2px solid ' + borderColor + ';box-shadow:0 0 8px ' + (isMe ? 'rgba(240,192,64,0.3)' : 'rgba(59,130,246,0.3)') + '">' + name[0].toUpperCase() + '</div>';
    }
    html += '<div style="position:absolute;top:0;right:-1px;width:10px;height:10px;background:' + dotColor + ';border-radius:50%;border:2px solid #0f0f1a;' + (isOnline ? 'box-shadow:0 0 6px ' + dotColor : '') + '"></div>';
    html += '<span style="font-size:9px;color:' + (isMe ? '#f0c040' : '#94a3b8') + ';font-weight:' + (isMe ? '700' : '500') + ';max-width:48px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (isMe ? 'You' : name) + '</span>';
    html += '</div>';
  });
  
  html += '</div>';
  strip.innerHTML = html;
}

// ============ FIRESTORE SUBSCRIPTIONS ============
function subscribeToData(){
  // Clear old subs
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  
  // Completions
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterCompletions'),where('nodeId','==',currentNodeId)),
    snap=>{
      completions={};
      snap.forEach(d=>{const data=d.data();completions[data.poleId]=data;});
      renderPoleList();
    },
    err=>console.error('completions sub error:',err)
  ));
  
  // Enroutes
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterEnroute'),where('nodeId','==',currentNodeId)),
    snap=>{
      enroutes={};
      snap.forEach(d=>{const data=d.data();enroutes[data.poleId]=data;});
      renderPoleList();
    },
    err=>console.error('enroute sub error:',err)
  ));
  
  // Notes
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterNotes'),where('nodeId','==',currentNodeId)),
    snap=>{
      notes={};
      snap.forEach(d=>{notes[d.id]={...d.data(),id:d.id};});
    },
    err=>console.error('notes sub error:',err)
  ));
  
  // Billing
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterBilling'),where('nodeId','==',currentNodeId)),
    snap=>{
      billingEntries={};
      snap.forEach(d=>{billingEntries[d.id]={...d.data(),id:d.id};});
    },
    err=>console.error('billing sub error:',err)
  ));
  
  // Photos
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterPhotos'),where('nodeId','==',currentNodeId)),
    snap=>{
      polePhotos={};
      snap.forEach(d=>{polePhotos[d.id]={...d.data(),id:d.id};});
      renderPoleListDebounced();
    },
    err=>console.error('photos sub error:',err)
  ));

  // Tic Marks (pole-level + span-level)
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterTicMarks'),where('nodeId','==',currentNodeId)),
    snap=>{
      ticMarks={};
      if(!window._spanTicData) window._spanTicData={};
      snap.forEach(d=>{
        const data=d.data();
        if(data.spanKey){
          window._spanTicData[data.spanKey]=data;
        } else if(data.poleId){
          ticMarks[data.poleId]=data;
        }
      });
      renderSpanLines();
      renderPoleListDebounced();
    },
    err=>console.error('ticMarks sub error:',err)
  ));

  // Team Presence
  unsubscribers.push(onSnapshot(
    collection(db,'charterPresence'),
    snap=>{
      teamPresence={};
      snap.forEach(d=>{teamPresence[d.id]={...d.data(),uid:d.id};});
      renderTeamStripDebounced();
    },
    err=>console.error('presence sub error:',err)
  ));

  // Span Stages
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterSpanStages'),where('nodeId','==',currentNodeId)),
    snap=>{
      spanStages={};
      if(!window._spanStrandOnly) window._spanStrandOnly={};
      snap.forEach(d=>{
        const data=d.data();
        if(data.spanKey && data.stage) spanStages[data.spanKey]=data.stage;
        if(data.spanKey && data.strandOnly) window._spanStrandOnly[data.spanKey]=true;
        else if(data.spanKey) window._spanStrandOnly[data.spanKey]=false;
      });
      renderSpanLines();
      renderPoleListDebounced();
    },
    err=>console.error('spanStages sub error:',err)
  ));

  // Member photos cache (for crew markers)
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterNodeMembers'),where('nodeId','==',currentNodeId)),
    snap=>{
      window._memberPhotos={};
      snap.forEach(d=>{
        const data=d.data();
        if(data.uid && (data.photoURL||data.avatarURL)){
          window._memberPhotos[data.uid]=data.photoURL||data.avatarURL;
        }
      });
    },
    err=>console.error('memberPhotos sub error:',err)
  ));

  // Broadcast own location to charterPresence — throttled to every 30s
  if(currentUser && !window._presenceWatchStarted){
    window._presenceWatchStarted = true;
    const myPresenceRef = doc(db, 'charterPresence', currentUser.uid);
    // Write presence immediately at login (photo + name, even before GPS)
    setDoc(myPresenceRef, {
      uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email,
      photoURL: userAvatarURL || currentUser.photoURL || '',
      updatedAt: serverTimestamp()
    }, {merge:true}).catch(()=>{});
    let lastPresenceWrite = 0;
    navigator.geolocation.watchPosition(pos => {
      const now = Date.now();
      if(now - lastPresenceWrite < 30000) return;
      lastPresenceWrite = now;
      setDoc(myPresenceRef, {
        uid: currentUser.uid,
        lat: pos.coords.latitude,
        lon: pos.coords.longitude,
        displayName: currentUser.displayName || currentUser.email,
        photoURL: userAvatarURL || currentUser.photoURL || '',
        updatedAt: serverTimestamp()
      }, {merge:true});
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:10000, timeout:15000});
  }
}

// ============ GPS CHECK — MANDATORY GATE ============
let gpsGranted=false;
let userLat=null,userLon=null;
function checkGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(false);return;}
    navigator.geolocation.getCurrentPosition(
      (pos)=>{userLat=pos.coords.latitude;userLon=pos.coords.longitude;gpsGranted=true;resolve(true);},
      ()=>resolve(false),
      {timeout:10000,enableHighAccuracy:true}
    );
  });
}

var gpsGateAttempts=0;

function showGPSGate(){
  var existing=document.getElementById('gps-gate');
  if(existing) return; // Don't recreate if already showing
  var gate=document.createElement('div');
  gate.id='gps-gate';
  gate.style.cssText='position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#0f0f1a,#1a1a2e,#16213e);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:32px;text-align:center;';

  var pin=document.createElement('div');
  pin.style.cssText='font-size:72px;margin-bottom:24px;';
  pin.textContent='\u{1F4CD}';

  var h1=document.createElement('h1');
  h1.style.cssText='color:white;font-size:28px;font-weight:800;margin:0 0 12px;';
  h1.textContent='Location Required';

  var p1=document.createElement('p');
  p1.style.cssText='color:rgba(255,255,255,0.7);font-size:15px;max-width:320px;line-height:1.5;margin:0 0 32px;';
  p1.innerHTML='GPS location is <strong style="color:#f59e0b">mandatory</strong> to use this app. We need your position for field work tracking, crew safety, and billing verification.';

  var btn=document.createElement('button');
  btn.type='button';
  btn.id='gps-allow-btn';
  btn.style.cssText='background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;padding:16px 48px;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,0.5);touch-action:manipulation;-webkit-tap-highlight-color:rgba(59,130,246,0.3);user-select:none;';
  btn.textContent='\u2705 Allow Location Access';

  // Skip link (always visible)
  var skipLink=document.createElement('a');
  skipLink.href='#';
  skipLink.id='gps-skip-link';
  skipLink.style.cssText='color:#f59e0b;font-size:14px;margin-top:24px;display:block;text-decoration:underline;';
  skipLink.textContent='Continue without GPS (limited features)';
  skipLink.addEventListener('click',function(e){
    e.preventDefault();
    removeGPSGate();
  });

  function doGPSRequest(){
    btn.textContent='\u23F3 Requesting GPS...';
    btn.style.opacity='0.7';
    navigator.geolocation.getCurrentPosition(
      function(pos){
        userLat=pos.coords.latitude;userLon=pos.coords.longitude;gpsGranted=true;
        removeGPSGate();
      },
      function(err){
        gpsGateAttempts++;
        btn.textContent='\u2705 Tap to Retry';
        btn.style.opacity='1';
        // Show skip link after first denial
        skipLink.style.display='block';
        var p2El=document.getElementById('gps-help-text');
        if(p2El) p2El.textContent='GPS denied (error '+err.code+'). Tap the \u22ee menu in Chrome \u2192 Settings \u2192 Site Settings \u2192 Location \u2192 Allow for this site, then refresh.';
      },
      {timeout:10000,enableHighAccuracy:true}
    );
  }

  // Click handler
  btn.addEventListener('click', doGPSRequest);
  // Backup: ontouchstart for stubborn mobile browsers
  btn.ontouchstart=function(e){ e.preventDefault(); doGPSRequest(); };

  var p2=document.createElement('p');
  p2.id='gps-help-text';
  p2.style.cssText='color:rgba(255,255,255,0.4);font-size:12px;margin-top:20px;max-width:280px;';
  p2.textContent='If you denied GPS, open your browser settings \u2192 Site Settings \u2192 Location \u2192 Allow for this site, then refresh.';

  gate.appendChild(pin);
  gate.appendChild(h1);
  gate.appendChild(p1);
  gate.appendChild(btn);
  gate.appendChild(skipLink);
  gate.appendChild(p2);
  document.body.appendChild(gate);

  // Auto-try GPS 500ms after gate appears
  setTimeout(doGPSRequest, 500);
}

function removeGPSGate(){
  var gate=document.getElementById('gps-gate');
  if(gate)gate.remove();
}

// ============ AUTH STATE ============
onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    // Request GPS silently in background — no blocking gate
    checkGPS().then(function(ok){ if(ok){ console.log('GPS granted'); } else { console.log('GPS denied'); } });
    
    // Check if biometric lock screen is needed
    if(hasBiometricRegistered() && !biometricUnlocked && localStorage.getItem(BIO_UID)===user.uid){
      showBiometricLockScreen();
      return; // Don't load app until biometric verified
    }
    
    try{
      await loadUserNode();
      // After successful load, prompt to enable biometric if not set up
      promptEnableBiometric();
    }catch(e){
      console.error('loadUserNode error:',e);
      var d=document.createElement('div');
      d.style.cssText='position:fixed;top:0;left:0;right:0;z-index:999999;background:red;color:white;padding:12px;font-size:12px;font-family:monospace;word-break:break-all;';
      d.textContent='LOAD ERROR: '+e.message;
      document.body.appendChild(d);
    }
  }else{
    currentUser=null;currentNode=null;currentNodeId=null;
    unsubscribers.forEach(u=>u());unsubscribers=[];
    renderLogin();
  }
});

// Team Activity view
window.showTeamActivity=function(){
  var html='<div style="position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)this.remove()">';
  html+='<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:20px;padding:24px;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid rgba(255,255,255,0.1)">';
  html+='<h2 style="color:white;font-size:20px;font-weight:800;margin:0 0 16px;text-align:center">👥 Team Activity</h2>';
  
  var byUser={};
  Object.keys(completions).forEach(function(pid){
    var c=completions[pid];
    var name=c.userName||'Unknown';
    var uid=c.uid||'unknown';
    if(!byUser[uid])byUser[uid]={name:name,avatar:c.userAvatar||'',count:0,poles:[]};
    byUser[uid].count++;
    var pole=GT30E_POLES.find(function(p){return p.id===pid;});
    byUser[uid].poles.push(pole?pole.name:pid);
  });
  
  var uids=Object.keys(byUser);
  if(uids.length===0){
    html+='<p style="color:rgba(255,255,255,0.5);text-align:center">No completions yet</p>';
  }else{
    uids.sort(function(a,b){return byUser[b].count-byUser[a].count;});
    uids.forEach(function(uid){
      var u=byUser[uid];
      var isMe=currentUser&&uid===currentUser.uid;
      var border=isMe?'border:2px solid #22c55e':'border:2px solid #3b82f6';
      html+='<div style="background:rgba(255,255,255,0.05);border-radius:14px;padding:14px;margin-bottom:10px;'+border+'">';
      html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      if(u.avatar)html+='<img src="'+u.avatar+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover">';
      html+='<div><div style="color:white;font-weight:700">'+u.name+(isMe?' (You)':'')+'</div>';
      html+='<div style="color:rgba(255,255,255,0.5);font-size:12px">'+u.count+' poles completed</div></div></div>';
      html+='<div style="display:flex;flex-wrap:wrap;gap:4px">';
      u.poles.forEach(function(p){html+='<span style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);padding:2px 8px;border-radius:8px;font-size:11px">'+p+'</span>';});
      html+='</div></div>';
    });
  }
  
  html+='<button onclick="downloadCSV()" style="width:100%;margin-top:12px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:white;border:none;padding:12px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer">📥 DOWNLOAD CSV</button>';
  html+='</div></div>';
  
  var div=document.createElement('div');
  div.innerHTML=html;
  document.body.appendChild(div.firstChild);
};

window.downloadCSV=function(){
  var rows=[['Pole','Section','Status','Completed By','Latitude','Longitude']];
  GT30E_POLES.forEach(function(p){
    var c=completions[p.id];
    rows.push([p.name,p.section||'',c?'Done':'Pending',c?(c.userName||''):'',p.lat,p.lon]);
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='charter-production-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};

// ============ PWA INSTALL PROMPT ============
let _deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner(){
  if(document.getElementById('pwa-install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwa-install-banner';
  banner.innerHTML = `
    <div style="position:fixed;bottom:0;left:0;right:0;z-index:99999;
      background:linear-gradient(135deg,#1a1035,#2d1b69);
      border-top:2px solid #d4af37;padding:16px 20px;
      display:flex;align-items:center;gap:14px;
      box-shadow:0 -4px 20px rgba(0,0,0,0.5);animation:slideUp .3s ease">
      <div style="width:48px;height:48px;border-radius:12px;background:#0f0a1a;
        border:2px solid #d4af37;display:flex;align-items:center;justify-content:center;
        font-size:28px;flex-shrink:0">🧭</div>
      <div style="flex:1;min-width:0">
        <div style="color:#d4af37;font-weight:700;font-size:15px">Install Global Route</div>
        <div style="color:#ccc;font-size:12px;margin-top:2px">Add to home screen for quick access</div>
      </div>
      <button id="pwa-install-btn" style="background:linear-gradient(135deg,#d4af37,#b8962e);
        color:#0f0a1a;border:none;padding:10px 20px;border-radius:10px;
        font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap">INSTALL</button>
      <button id="pwa-install-dismiss" style="background:none;border:none;color:#888;
        font-size:22px;cursor:pointer;padding:4px 8px">✕</button>
    </div>
    <style>@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}</style>
  `;
  document.body.appendChild(banner);
  document.getElementById('pwa-install-btn').onclick = async () => {
    if(_deferredInstallPrompt){
      _deferredInstallPrompt.prompt();
      const result = await _deferredInstallPrompt.userChoice;
      console.log('Install result:', result.outcome);
      _deferredInstallPrompt = null;
    }
    banner.remove();
  };
  document.getElementById('pwa-install-dismiss').onclick = () => banner.remove();
}

window.addEventListener('appinstalled', () => {
  console.log('PWA installed');
  const banner = document.getElementById('pwa-install-banner');
  if(banner) banner.remove();
  _deferredInstallPrompt = null;
});
</script>
