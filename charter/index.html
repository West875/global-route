.site-card{transition:all .2s;cursor:pointer}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3)}
.badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.badge-indigo{background:rgba(99,102,241,0.15);color:#818cf8;border:1px solid rgba(99,102,241,0.3)}
#map{height:100%;width:100%;border-radius:0}
.leaflet-control-zoom{display:none}
.pulse-ring{animation:pulse-ring 2s ease-out infinite}

.progress-ring{transform:rotate(-90deg)}
.slide-up{animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.completion-banner{animation:bannerIn .4s ease-out}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center}

function $(id){ return document.getElementById(id); }
function vibrate(ms=50){ if(navigator.vibrate) navigator.vibrate(ms); }

function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='done'){osc.frequency.value=880;gain.gain.value=0.1;osc.start();osc.stop(ctx.currentTime+0.15);}
    else if(type==='click'){osc.frequency.value=600;gain.gain.value=0.05;osc.start();osc.stop(ctx.currentTime+0.08);}
  }catch(e){}
}

function directionsUrl(lat,lon){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  return isIOS?`maps://maps.apple.com/?daddr=${lat},${lon}&dirflg=d`:`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
}

function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff/60000);
  if(mins<1) return 'just now';
  if(mins<60) return `${mins}m ago`;
  const hrs=Math.floor(mins/60);
  if(hrs<24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

function showAuthError(msg){
  const clean=msg.replace('Firebase:','').replace(/\(auth\/.*\)/,'').trim();
  const el=$('auth-error');
  if(el){el.textContent=clean;el.classList.remove('hidden');}
  alert(clean);
}

window.doLogin=async function(){
  const email=$('auth-email')?.value?.trim();
  const pass=$('auth-pass')?.value;
  if(!email||!pass) return showAuthError('Enter email and password');
  const btn=$('btn-login');if(btn)btn.textContent='Signing in...';
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){if(btn)btn.textContent='Sign In';showAuthError(e.message);}
};

window.doSignup=async function(){
  const email=$('auth-email')?.value?.trim();
  const pass=$('auth-pass')?.value;
  if(!email||!pass) return showAuthError('Enter email and password');
  if(pass.length<6) return showAuthError('Password must be 6+ characters');
  const btn=$('btn-signup');if(btn)btn.textContent='Creating account...';
  try{await createUserWithEmailAndPassword(auth,email,pass);}
  catch(e){if(btn)btn.textContent='Create Account';showAuthError(e.message);}
};

window.doGoogle=async function(){
  const provider=new GoogleAuthProvider();
  try{await signInWithPopup(auth,provider);}
  catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/cancelled-popup-request'){
      try{await signInWithRedirect(auth,provider);}catch(e2){showAuthError(e2.message);}
    }else if(e.code!=='auth/popup-closed-by-user'){showAuthError(e.message.replace('Firebase:',''));}
  }
}

window.submitInviteCode=async function(){
  const code=$('invite-input').value.trim().toUpperCase();
  if(code.length!==6){$('invite-error').textContent='Enter 6-character code';$('invite-error').classList.remove('hidden');return;}
  
  // Look up code in charterNodes
  try{
    const snap=await getDocs(query(collection(db,'charterNodes'),where('inviteCode','==',code)));
    if(snap.empty){$('invite-error').textContent='Invalid code. Check with your supervisor.';$('invite-error').classList.remove('hidden');return;}
    
    const nodeDoc=snap.docs[0];
    const nodeId=nodeDoc.id;
    
    // Add user to node
    await setDoc(doc(db,'charterNodeMembers',`${nodeId}_${currentUser.uid}`),{
      nodeId,uid:currentUser.uid,
      name:currentUser.displayName||currentUser.email.split('@')[0],
      email:currentUser.email,
      photoURL:currentUser.photoURL||'',
      joinedAt:serverTimestamp()
    });
    
    vibrate(100);playSound('done');
    loadUserNode();
  }catch(e){
    $('invite-error').textContent='Error joining. Try again.';$('invite-error').classList.remove('hidden');
    console.error(e);
  }
};

// ============ LOAD USER NODE ============
async function loadUserNode(){
  // Check if user belongs to any node
  const snap=await getDocs(query(collection(db,'charterNodeMembers'),where('uid','==',currentUser.uid)));
  if(snap.empty){renderInviteCode();return;}
  
  // Use first node found (can add multi-node picker later)
  const membership=snap.docs[0].data();
  currentNodeId=membership.nodeId;
  
  // Get node details
  const nodeDoc=await getDoc(doc(db,'charterNodes',currentNodeId));
  if(!nodeDoc.exists()){renderInviteCode();return;}
  currentNode=nodeDoc.data();
  
  renderMainApp();
  subscribeToData();
}

// ============ MAIN APP ============
let currentView='list'; // list | map
let searchTerm='';
let filterMode='all'; // all | pending | completed | enroute

function getFilteredPoles(){
  let poles=GT30E_POLES;
  if(searchTerm){
    const s=searchTerm.toLowerCase();
    poles=poles.filter(p=>p.name.toLowerCase().includes(s));
  }
  if(filterMode==='completed') poles=poles.filter(p=>completions[p.id]);
  if(filterMode==='pending') poles=poles.filter(p=>!completions[p.id]);
  if(filterMode==='enroute') poles=poles.filter(p=>enroutes[p.id]);
  return poles;
}

function completedCount(){ return GT30E_POLES.filter(p=>completions[p.id]).length; }
function progressPct(){ return Math.round((completedCount()/GT30E_POLES.length)*100); }

function renderMainApp(){
  const pct=progressPct();
  const completed=completedCount();
  const total=GT30E_POLES.length;
  
  $('app').innerHTML = `
  <div class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="glass sticky top-0 z-50 px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="relative" style="width:44px;height:44px">
            <svg class="progress-ring" width="44" height="44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="#f0c040" stroke-width="3" stroke-linecap="round"
                stroke-dasharray="${2*Math.PI*18}" stroke-dashoffset="${2*Math.PI*18*(1-pct/100)}"/>
            </svg>
            <span class="absolute inset-0 flex items-center justify-center text-xs font-bold gold-text">${pct}%</span>
          </div>
          <div>
            <h1 class="gold-text text-lg leading-tight">${currentNode?.name||'Charter'}</h1>
            <p class="text-xs text-gray-400">${completed}/${total} poles</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="toggleView()" class="glass p-2 rounded-xl text-lg" title="Toggle view">${currentView==='list'?'🗺️':'📋'}</button>
          <button onclick="showMenu()" class="glass p-2 rounded-xl">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);border:2px solid #f0c040;box-shadow:0 0 12px rgba(240,192,64,0.3)">
              ${(currentUser?.displayName||currentUser?.email||'?')[0].toUpperCase()}
            </div>
          </button>
        </div>
      </div>
      
      <!-- Search & Filters -->
      <div class="mt-3 flex gap-2">
        <input class="input-field flex-1 text-sm py-2" placeholder="🔍 Search poles..." value="${searchTerm}" oninput="searchTerm=this.value;renderPoleList()">
        <select class="input-field text-sm py-2" style="width:auto" onchange="filterMode=this.value;renderPoleList()">
          <option value="all"${filterMode==='all'?' selected':''}>All</option>
          <option value="pending"${filterMode==='pending'?' selected':''}>Pending</option>
          <option value="completed"${filterMode==='completed'?' selected':''}>Done</option>
          <option value="enroute"${filterMode==='enroute'?' selected':''}>En Route</option>
        </select>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 relative">
      <div id="list-view" class="${currentView==='list'?'':'hidden'} p-4 pb-20"></div>
      <div id="map-container" class="${currentView==='map'?'':'hidden'}" style="position:absolute;inset:0"></div>
    </main>
  </div>
  
  <!-- Menu Modal -->
  <div id="menu-modal" class="hidden modal-backdrop" onclick="if(event.target===this)closeMenu()">
    <div class="modal-content"></div>
  </div>
  
  <!-- Pole Detail Modal -->

  </div>
  `;
  
  renderPoleList();

function renderPoleList(){
  const poles=getFilteredPoles();
  const container=$('list-view');
  if(!container) return;
  
  container.innerHTML=poles.map(p=>{
    const done=completions[p.id];
    const enr=enroutes[p.id];
    const noteCount=Object.values(notes).filter(n=>n.poleId===p.id).length;
    
    let statusBadge='';
    if(done){
      const isMe=done.uid===currentUser.uid;
      statusBadge=`<span class="badge badge-green">✅ ${done.userName||'Done'}</span>`;
    }else if(enr){
      statusBadge=`<span class="badge badge-amber">🚗 ${enr.userName||'En Route'}</span>`;
    }
    
    return `
    <div class="glass-card p-4 mb-3 site-card slide-up" onclick="openPole('${p.id}')">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${done?'bg-gray-700':'bg-purple-900/50'}">
            ${done?'✅':'📍'}
          </div>
          <div>
            <p class="font-semibold ${done?'text-gray-500 line-through':''}">${p.name}</p>
            <p class="text-xs text-gray-500">${p.lat.toFixed(5)}, ${p.lon.toFixed(5)}</p>
          </div>
        </div>
        <div class="flex flex-col items-end gap-1">
          ${statusBadge}
          ${noteCount?`<span class="text-xs text-gray-500">💬 ${noteCount}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  
  if(!poles.length){
    container.innerHTML=`<div class="text-center text-gray-500 py-12">No poles found</div>`;
  }
}

// ============ MAP ============
function initMap(){
  const container=$('map-container');
  if(!container) return;
  
  // Create map div if needed
  if(!container.querySelector('#map')){
    container.innerHTML='<div id="map" style="height:100%;width:100%"></div>';
  }
  
  if(mapInstance){mapInstance.remove();mapInstance=null;}
  
  const lats=GT30E_POLES.map(p=>p.lat);
  const lons=GT30E_POLES.map(p=>p.lon);
  const bounds=[[Math.min(...lats)-0.002,Math.min(...lons)-0.003],[Math.max(...lats)+0.002,Math.max(...lons)+0.003]];
  
  mapInstance=L.map('map',{zoomControl:false,attributionControl:false}).fitBounds(bounds);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20}).addTo(mapInstance);
  
  // Add markers
  GT30E_POLES.forEach(p=>{
    const done=completions[p.id];
    const enr=enroutes[p.id];
    
    let color='#ef4444'; // red
    if(done) color='#6b7280'; // gray
    else if(enr) color='#f59e0b'; // amber
    
    const icon=L.divIcon({
      className:'',
      html:`<svg width="24" height="36" viewBox="0 0 24 36"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="${color}" stroke="#fff" stroke-width="1.5"/><circle cx="12" cy="12" r="5" fill="#fff"/></svg>`,
      iconSize:[24,36],iconAnchor:[12,36]
    });
    
    const m=L.marker([p.lat,p.lon],{icon}).addTo(mapInstance);
    m.bindPopup(`
      <div style="min-width:200px;font-family:Inter,sans-serif">
        <b>${p.name}</b>${done?'<br><span style="color:green">✅ Complete</span>':''}${enr?`<br><span style="color:orange">🚗 ${enr.userName}</span>`:''}
        <br><br>
        <a href="${directionsUrl(p.lat,p.lon)}" target="_blank" style="color:#7c3aed;font-weight:600">🧭 Get Directions</a>
        &nbsp;|&nbsp;
        <a href="#" onclick="event.preventDefault();closePoleModal();openPole('${p.id}')" style="color:#7c3aed;font-weight:600">📋 Details</a>
      </div>
    `);
    markers[p.id]=m;
  });
}

// ============ POLE DETAIL ============
window.openPole=function(poleId){
  const pole=GT30E_POLES.find(p=>p.id===poleId);
  if(!pole) return;
  vibrate();playSound('click');
  
  const done=completions[poleId];
  const enr=enroutes[poleId];
  const poleNotes=Object.entries(notes).filter(([k,n])=>n.poleId===poleId).sort((a,b)=>{
    const ta=a[1].createdAt?.toDate?.()?.getTime()||0;
    const tb=b[1].createdAt?.toDate?.()?.getTime()||0;
    return tb-ta;
  });
  const poleBilling=Object.entries(billingEntries).filter(([k,b])=>b.poleId===poleId);
  
  const content=$('pole-modal-content');
  content.innerHTML=`
  <div class="slide-up">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold">${pole.name}</h2>
      <button onclick="closePoleModal()" class="text-gray-400 text-2xl">&times;</button>
    </div>
    
    ${done?`<div class="completion-banner rounded-xl p-3 mb-4" style="background:${done.uid===currentUser.uid?'rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3)':'rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.3)'}">
      <div class="flex items-center gap-2">
        <span>✅</span>
        <div><span class="font-semibold">${done.userName||'Unknown'}</span><br><span class="text-xs text-gray-400">${timeAgo(done.completedAt)}</span></div>
      </div>
    </div>`:''}
    
    ${enr&&!done?`<div class="rounded-xl p-3 mb-4" style="background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3)">
      <div class="flex items-center gap-2">
        <span>🚗</span><span class="font-semibold">${enr.userName}</span><span class="text-xs text-gray-400">${timeAgo(enr.startedAt)}</span>
      </div>
    </div>`:''}
    
    <!-- Directions Button -->
    <a href="${directionsUrl(pole.lat,pole.lon)}" target="_blank" class="btn-gold w-full p-3 rounded-xl flex items-center justify-center gap-2 mb-3 block text-center no-underline" onclick="claimEnroute('${poleId}')">
      🧭 Get Directions
    </a>
    
    <!-- Action Buttons -->
    <div class="grid grid-cols-3 gap-2 mb-4">
      <button onclick="toggleNotes('${poleId}')" class="btn-primary p-3 rounded-xl text-sm">💬 Notes</button>
      <button onclick="${done?`undoComplete('${poleId}')`:`markComplete('${poleId}')`}" class="btn-primary p-3 rounded-xl text-sm ${done?'btn-amber':'btn-green'}">${done?'↩️ Undo':'✅ Done'}</button>
      <button onclick="toggleBilling('${poleId}')" class="btn-primary p-3 rounded-xl text-sm" style="background:linear-gradient(135deg,#8b5cf6,#7c3aed)">💰 Bill</button>
    </div>
    
    <!-- Billing Entries -->
    <div id="billing-section-${poleId}" class="hidden mb-4">
      <h3 class="font-semibold text-sm mb-2 text-gray-400">LOG BILLING</h3>
      <select id="bill-code-${poleId}" class="input-field text-sm mb-2">
        ${CHARTER_CODES.map(c=>`<option value="${c.code}">${c.code} — ${c.name} (${c.unit})</option>`).join('')}
      </select>
      <div class="flex gap-2 mb-2">
        <input id="bill-qty-${poleId}" class="input-field text-sm flex-1" type="number" placeholder="Quantity" min="0" step="1">
        <button onclick="logBilling('${poleId}')" class="btn-green p-2 rounded-xl text-sm px-4">💾 Log</button>
      </div>
      ${poleBilling.length?`<div class="space-y-1">${poleBilling.map(([id,b])=>{
        const code=CHARTER_CODES.find(c=>c.code===b.code);
        return `<div class="glass p-2 rounded-lg flex justify-between items-center text-sm">
          <span>${b.code} — ${b.qty} ${code?.unit||''}</span>
          <span class="text-gray-400">${b.qty} ${code?.unit||''}</span>
        </div>`;
      }).join('')}</div>`:''}
    </div>
    
    <!-- Notes Section -->
    <div id="notes-section-${poleId}" class="hidden mb-4">
      <h3 class="font-semibold text-sm mb-2 text-gray-400">NOTES</h3>
      <div class="flex gap-2 mb-3">
        <input id="note-input-${poleId}" class="input-field text-sm flex-1" placeholder="Add a note...">
        <button onclick="addNote('${poleId}')" class="btn-primary p-2 rounded-xl text-sm px-4">Send</button>
      </div>
      ${poleNotes.length?`<div class="space-y-2">${poleNotes.map(([id,n])=>`
        <div class="glass p-3 rounded-xl">
          <div class="flex justify-between items-start">

window.closePoleModal=function(){ $('pole-modal').classList.add('hidden'); };

window.toggleNotes=function(id){
  const el=$('notes-section-'+id);
  if(el) el.classList.toggle('hidden');
};

window.toggleBilling=function(id){
  const el=$('billing-section-'+id);
  if(el) el.classList.toggle('hidden');
};

// ============ ACTIONS ============
window.markComplete=async function(poleId){
  vibrate(100);playSound('done');
  await setDoc(doc(db,'charterCompletions',`${currentNodeId}_${poleId}`),{
    nodeId:currentNodeId,poleId,uid:currentUser.uid,
    userName:currentUser.displayName||currentUser.email.split('@')[0],
    completedAt:serverTimestamp()
  });
  // Clear enroute if exists
  try{await deleteDoc(doc(db,'charterEnroute',`${currentNodeId}_${poleId}`));}catch(e){}
  openPole(poleId);
};

window.undoComplete=async function(poleId){
  if(!confirm('Undo completion?')) return;
  vibrate();
  await deleteDoc(doc(db,'charterCompletions',`${currentNodeId}_${poleId}`));
  openPole(poleId);
};

window.claimEnroute=async function(poleId){
  try{
    await setDoc(doc(db,'charterEnroute',`${currentNodeId}_${poleId}`),{
      nodeId:currentNodeId,poleId,uid:currentUser.uid,
      userName:currentUser.displayName||currentUser.email.split('@')[0],
      startedAt:serverTimestamp()
    });
  }catch(e){console.error(e);}
};

window.addNote=async function(poleId){
  const input=$('note-input-'+poleId);
  const text=input?.value?.trim();
  if(!text) return;
  vibrate();
  await addDoc(collection(db,'charterNotes'),{
    nodeId:currentNodeId,poleId,text,uid:currentUser.uid,
    userName:currentUser.displayName||currentUser.email.split('@')[0],
    createdAt:serverTimestamp()
  });
  input.value='';
  openPole(poleId);
};

window.deleteNote=async function(noteId){
  if(!confirm('Delete note?')) return;
  await deleteDoc(doc(db,'charterNotes',noteId));
  vibrate();
};

window.logBilling=async function(poleId){
  const code=$('bill-code-'+poleId)?.value;
  const qty=parseFloat($('bill-qty-'+poleId)?.value);
  if(!code||!qty||qty<=0){alert('Enter a valid quantity');return;}
  vibrate();playSound('done');
  
  await addDoc(collection(db,'charterBilling'),{
    nodeId:currentNodeId,poleId,code,qty,uid:currentUser.uid,
    userName:currentUser.displayName||currentUser.email.split('@')[0],
    createdAt:serverTimestamp()
  });
  $('bill-qty-'+poleId).value='';
  openPole(poleId);
};

  <div class="slide-up">
    <div class="flex items-center gap-3 mb-6">
      <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-bold" style="background:linear-gradient(135deg,#7c3aed,#6d28d9);border:2px solid #f0c040">
        ${(currentUser?.displayName||currentUser?.email||'?')[0].toUpperCase()}
      </div>
      <div>
        <p class="font-semibold">${currentUser?.displayName||'User'}</p>
        <p class="text-xs text-gray-400">${currentUser?.email}</p>
      </div>
    </div>
    <div class="space-y-2">
      <div class="glass p-3 rounded-xl text-sm">
        <span class="text-gray-400">Node:</span> <span class="font-semibold">${currentNode?.name||'—'}</span>
      </div>
      <div class="glass p-3 rounded-xl text-sm">
        <span class="text-gray-400">Invite Code:</span> <span class="font-mono font-bold gold-text">${currentNode?.inviteCode||'—'}</span>
      </div>
      <div class="glass p-3 rounded-xl text-sm">

    </div>
  </div>`;

window.closeMenu=function(){ $('menu-modal').classList.add('hidden'); };

window.downloadCSV=function(){
  let csv='Pole,Status,Completed By,Date,Billing\n';
  GT30E_POLES.forEach(p=>{
    const done=completions[p.id];
    const bills=Object.values(billingEntries).filter(b=>b.poleId===p.id).map(b=>`${b.code}:${b.qty}`).join('; ');
    csv+=`"${p.name}",${done?'Complete':'Pending'},"${done?.userName||''}","${done?.completedAt?.toDate?.()?.toLocaleDateString()||''}","${bills}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`charter-${currentNode?.name||'report'}-${new Date().toISOString().split('T')[0]}.csv`;a.click();
};

// ============ VIEW TOGGLE ============
window.toggleView=function(){
  currentView=currentView==='list'?'map':'list';
  renderMainApp();
};

// ============ FIRESTORE SUBSCRIPTIONS ============
function subscribeToData(){
  // Clear old subs
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  
  // Completions
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterCompletions'),where('nodeId','==',currentNodeId)),
    snap=>{
      completions={};
      snap.forEach(d=>{const data=d.data();completions[data.poleId]=data;});
      renderPoleList();
    }
  ));
  
  // Enroutes
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterEnroute'),where('nodeId','==',currentNodeId)),
    snap=>{
      enroutes={};
      snap.forEach(d=>{const data=d.data();enroutes[data.poleId]=data;});
      renderPoleList();
    }
  ));
  
  // Notes
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterNotes'),where('nodeId','==',currentNodeId)),
    snap=>{
      notes={};
      snap.forEach(d=>{notes[d.id]={...d.data(),id:d.id};});
    }
  ));
  
  // Billing
  unsubscribers.push(onSnapshot(
    query(collection(db,'charterBilling'),where('nodeId','==',currentNodeId)),
    snap=>{
      billingEntries={};
      snap.forEach(d=>{billingEntries[d.id]={...d.data(),id:d.id};});
    }
  ));
}

// ============ GPS CHECK ============
function checkGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){resolve(false);return;}
    navigator.geolocation.getCurrentPosition(()=>resolve(true),()=>resolve(false),{timeout:5000});
  });
}

// ============ AUTH STATE ============
onAuthStateChanged(auth,async(user)=>{
  if(user){
    currentUser=user;
    // Check GPS
    const hasGPS=await checkGPS();
    if(!hasGPS){
      $('app').innerHTML=`
      <div class="min-h-screen flex items-center justify-center p-4" style="background:#0f0a1a">
        <div class="glass-card p-8 text-center max-w-sm">
          <div class="text-5xl mb-4">📍</div>
          <h2 class="text-xl font-bold mb-2">Location Required</h2>
          <p class="text-gray-400 mb-4">Global Route needs GPS access to track your work locations.</p>
          <button onclick="location.reload()" class="btn-primary w-full">Try Again</button>
        </div>
      </div>`;
      return;
    }
    loadUserNode();
  }else{
    currentUser=null;currentNode=null;currentNodeId=null;
    unsubscribers.forEach(u=>u());unsubscribers=[];
    renderLogin();
  }
});
</script>
