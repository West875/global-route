:root{

.btn-green{background:linear-gradient(135deg,#10b981,#059669)}

.btn-amber{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}

.input-field:focus{border-color:#7c3aed}
.input-field::placeholder{color:rgba(255,255,255,0.3)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3)}
.badge-amber{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.badge-blue{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
.badge-red{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.badge-purple{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.3)}
#map{height:100%;width:100%;border-radius:0}
.leaflet-control-zoom{display:none}
.pulse-ring{animation:pulse-ring 2s ease-out infinite}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(245,158,11,0.4)}70%{box-shadow:0 0 0 10px rgba(245,158,11,0)}100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}}
@keyframes gpsPulse{0%,100%{box-shadow:0 0 0 0 rgba(59,130,246,0.5)}50%{box-shadow:0 0 0 12px rgba(59,130,246,0)}}
.slide-up{animation:slideUp .3s ease-out forwards}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center}
.modal-content{background:#1e1b2e;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:24px;max-width:420px;width:92%;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch}

.status-offline{background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(245,158,11,0.1));border-bottom:1px solid rgba(239,68,68,0.2);color:#f87171}
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:7000;background:rgba(10,8,20,0.95);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.08);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom))}

.nav-btn svg{width:22px;height:22px}

// ─── GPS Mandatory ───
function initGPS() {
  if (!navigator.geolocation) { showGPSBlock("GPS not available"); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { gpsOK = true; userLat = pos.coords.latitude; userLon = pos.coords.longitude; startApp(); },
    err => { showGPSBlock("Location access is required to use Global Route."); },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function showGPSBlock(msg) {
  document.getElementById('app').innerHTML = `
    <div style="position:fixed;inset:0;background:#0a0814;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;z-index:99999">
      <div style="font-size:64px;margin-bottom:24px">📍</div>
      <h1 class="gold-text" style="font-size:28px;margin-bottom:8px">Global Route</h1>
      <p style="font-size:11px;letter-spacing:3px;color:var(--text-muted);margin-bottom:32px">ROUTE • TRACK • MANAGE</p>
      <p style="color:var(--text-secondary);margin-bottom:24px;max-width:320px">${msg}</p>
      <button class="btn-primary" onclick="location.reload()" style="padding:14px 32px;font-size:16px">Enable Location & Retry</button>
    </div>`;
}

// ─── Auth ───
function checkInvite() {
  const saved = localStorage.getItem('gr-shentel-invite');
  if (saved === INVITE_CODE) return true;
  return false;
}

function showInviteScreen() {
  document.getElementById('app').innerHTML = `
    <div style="position:fixed;inset:0;background:#0a0814;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">🧭</div>
      <h1 class="gold-text" style="font-size:32px;margin-bottom:4px">Global Route</h1>
      <p style="font-size:11px;letter-spacing:3px;color:var(--text-muted);margin-bottom:8px">ROUTE • TRACK • MANAGE</p>
      <p style="color:var(--gold);font-size:14px;margin-bottom:32px">${PROJECT_TITLE}</p>
      <p style="color:var(--text-secondary);margin-bottom:16px">Enter invite code</p>
      <input id="inviteInput" class="input-field invite-input" maxlength="6" placeholder="------" autocomplete="off" autocapitalize="characters">
      <button class="btn-gold" style="margin-top:16px;padding:14px 48px;font-size:16px;border-radius:12px" onclick="submitInvite()">Enter</button>
      <p id="inviteErr" style="color:#ef4444;margin-top:12px;font-size:13px;display:none"></p>
    </div>`;
  document.getElementById('inviteInput').focus();
  document.getElementById('inviteInput').addEventListener('keyup', e => { if (e.key === 'Enter') submitInvite(); });
}

function submitInvite() {
  const v = document.getElementById('inviteInput').value.trim().toUpperCase();
  if (v === INVITE_CODE) {
    localStorage.setItem('gr-shentel-invite', v);
    renderApp();
  } else {
    const err = document.getElementById('inviteErr');
    err.textContent = 'Invalid code'; err.style.display = 'block';
  }
}

// ─── Start App ───
function startApp() {
  // Sign in anonymously to Firebase
  signInAnonymously(auth).catch(e => console.warn('Auth error:', e));
  onAuthStateChanged(auth, user => {
    if (user) { authed = true; loadFirestoreData(); }
  });

  if (!checkInvite()) { showInviteScreen(); return; }
  renderApp();
}

// ─── Firestore Data ───
async function loadFirestoreData() {
  try {
    // Load span stages
    const stagesSnap = await getDocs(collection(db, 'shentelSpanStages'));
    stagesSnap.forEach(d => { spanStages[d.id] = d.data(); });

    // Load make ready stages
    const mrSnap = await getDocs(collection(db, 'shentelMakeReady'));
    mrSnap.forEach(d => { mrStages[d.id] = d.data(); });

    // Load billing
    const billSnap = await getDocs(collection(db, 'shentelBilling'));
    billSnap.forEach(d => { billingEntries[d.id] = d.data(); });

    if (currentView === 'home') renderHome();
    if (currentView === 'map') refreshMap();
  } catch(e) { console.warn('Firestore load:', e); }
}

// ─── Render App ───
function renderApp() {
  renderStatusBar();
  renderNav();
  showView('home');

  // Online/offline
  window.addEventListener('online', () => { isOnline = true; renderStatusBar(); });
  window.addEventListener('offline', () => { isOnline = false; renderStatusBar(); });

  // GPS watch
  navigator.geolocation.watchPosition(
    pos => { userLat = pos.coords.latitude; userLon = pos.coords.longitude; },

  );
}

// ─── MAP ───
function renderMapView() {
  document.getElementById('mainContent').innerHTML = `<div id="mapWrap" style="position:fixed;top:40px;bottom:64px;left:0;right:0"><div id="map"></div></div>`;
  setTimeout(initMap, 100);

function initMap() {
  if (mapObj) { mapObj.remove(); mapObj = null; }
  mapObj = L.map('map', { zoomControl: false, attributionControl: false }).setView(MAP_CENTER, 14);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 20
  }).addTo(mapObj);

  // Draw spans
  SPANS.forEach(s => {
    const fp = poleMap[s.f], tp = poleMap[s.t];
    if (!fp || !tp || !fp.lat || !tp.lat) return;
    const stage = spanStages[s.id];
    let color = '#666';  // not started
    let weight = 3;
    if (stage) {
      if (stage.stage === 'complete') { color = '#10b981'; weight = 4; }
      else if (stage.stage === 'strand') { color = '#f59e0b'; weight = 4; }
    }
    const line = L.polyline([[fp.lat, fp.lon], [tp.lat, tp.lon]], {
      color, weight, opacity: 0.8
    }).addTo(mapObj);
    line.on('click', () => openSpanModal(s));
  });

  // Draw poles
  POLES.forEach(p => {
    if (!p.lat || !p.lon) return;
    const isMR = p.mr;
    const mrDone = mrStages[p.id];
    let fillColor = '#4a90d9';  // default
    if (isMR && !mrDone) fillColor = '#f59e0b';  // MR needed
    if (isMR && mrDone) fillColor = '#10b981';  // MR done

    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 6, fillColor, fillOpacity: 0.9,
      color: '#fff', weight: 1.5
    }).addTo(mapObj);

    const label = p.num;
    marker.bindTooltip(label, {
      permanent: false, direction: 'top', offset: [0, -8],
      className: 'pole-tooltip'
    });
    marker.on('click', () => openPoleModal(p));
  });

  // GPS marker
  if (userLat && userLon) {
    L.circleMarker([userLat, userLon], {
      radius: 8, fillColor: '#3b82f6', fillOpacity: 1,
      color: '#fff', weight: 3
    }).addTo(mapObj).bindTooltip('You', { permanent: true, direction: 'top', offset: [0, -10] });
  }

  setTimeout(() => mapObj.invalidateSize(), 200);
}

function refreshMap() { if (mapObj && currentView === 'map') { initMap(); } }

// ─── Stage/Billing Actions ───
window.setSpanStage = async function(spanId, stage) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { timeZone: 'America/New_York' });
  if (stage === 'none') {
    spanStages[spanId] && delete spanStages[spanId];
    if (authed) { try { await deleteDoc(doc(db, 'shentelSpanStages', spanId)); } catch(e) { console.warn(e); } }
  } else {
    spanStages[spanId] = { stage, date: dateStr, updatedAt: now.toISOString() };
    if (authed) { try { await setDoc(doc(db, 'shentelSpanStages', spanId), spanStages[spanId]); } catch(e) { console.warn(e); } }
  }
  // Close modal & refresh
  document.querySelector('.modal-backdrop')?.remove();
  if (currentView === 'map') refreshMap();
  if (currentView === 'home') renderHome();
  if (currentView === 'spans') renderSpans();
};

window.completeMR = async function(poleId, poleNum) {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { timeZone: 'America/New_York' });
  mrStages[poleId] = { done: true, date: dateStr, poleNum, updatedAt: now.toISOString() };
  if (authed) { try { await setDoc(doc(db, 'shentelMakeReady', poleId), mrStages[poleId]); } catch(e) { console.warn(e); } }
  document.querySelector('.modal-backdrop')?.remove();
  if (currentView === 'map') refreshMap();
  if (currentView === 'home') renderHome();
};

window.undoMR = async function(poleId) {
  delete mrStages[poleId];
  if (authed) { try { await deleteDoc(doc(db, 'shentelMakeReady', poleId)); } catch(e) { console.warn(e); } }
  document.querySelector('.modal-backdrop')?.remove();
  if (currentView === 'map') refreshMap();
  if (currentView === 'home') renderHome();
};

window.logBilling = async function(spanId, fromNum, toNum) {
  const code = document.getElementById('billingCodeSelect').value;
  const qty = parseFloat(document.getElementById('billingQty').value);
  if (!code || !qty) { alert('Select code and enter quantity'); return; }
  const bc = BILLING_CODES.find(b => b.code === code);
  const now = new Date();
  const id = `${spanId}_${code}_${now.getTime()}`;
  const entry = {
    spanId, fromPole: fromNum, toPole: toNum,
    code, description: bc.desc, unit: bc.unit,
    qty, crewRate: bc.crewRate, crewTotal: Math.round(qty * bc.crewRate * 100) / 100,
    date: now.toLocaleDateString('en-US', { timeZone: 'America/New_York' }),
    updatedAt: now.toISOString()
  };
  billingEntries[id] = entry;
  if (authed) { try { await setDoc(doc(db, 'shentelBilling', id), entry); } catch(e) { console.warn(e); } }
  document.querySelector('.modal-backdrop')?.remove();
  alert('Billing logged: ' + bc.desc + ' — $' + entry.crewTotal.toFixed(2));
};

window.logPoleBilling = async function(poleId, poleNum) {
  const code = document.getElementById('poleBillingCode').value;
  const qty = parseInt(document.getElementById('poleBillingQty').value) || 1;
  if (!code) { alert('Select a billing code'); return; }
  const bc = BILLING_CODES.find(b => b.code === code);
  const now = new Date();
  const id = `${poleId}_${code}_${now.getTime()}`;
  const entry = {
    poleId, poleNum,
    code, description: bc.desc, unit: bc.unit,
    qty, crewRate: bc.crewRate, crewTotal: Math.round(qty * bc.crewRate * 100) / 100,
    date: now.toLocaleDateString('en-US', { timeZone: 'America/New_York' }),
    updatedAt: now.toISOString()
  };
  billingEntries[id] = entry;
  if (authed) { try { await setDoc(doc(db, 'shentelBilling', id), entry); } catch(e) { console.warn(e); } }
  document.querySelector('.modal-backdrop')?.remove();
  alert('Billing logged: ' + bc.desc + ' x' + qty + ' — $' + entry.crewTotal.toFixed(2));
};

        <div class="glass-card" data-stage="${stage}" style="padding:14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px" onclick="openSpanModal(SPANS.find(s=>s.id==='${s.id}'))">
          <div style="width:8px;height:40px;border-radius:4px;background:${stageColor};flex-shrink:0"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600">${fp.num} → ${tp.num}</div>

          <span class="badge" style="background:${stageColor}22;color:${stageColor};border:1px solid ${stageColor}44;font-size:10px">${stageLabel}</span>
        </div>`;
  });

  html += '</div></div>';
  document.getElementById('mainContent').innerHTML = html;
}

window.filterSpans = function(filter) {
  const cards = document.querySelectorAll('#spanList .glass-card');
  cards.forEach(c => {
    const stage = c.dataset.stage;
    if (filter === 'all') c.style.display = '';
    else if (filter === 'none') c.style.display = stage === 'none' ? '' : 'none';
    else c.style.display = stage === filter ? '' : 'none';
  });
};

// ─── BILLING ───
function renderBilling() {
  const entries = Object.entries(billingEntries).sort((a, b) => b[1].updatedAt?.localeCompare(a[1].updatedAt || '') || 0);
  let totalCrew = entries.reduce((a, [, e]) => a + (e.crewTotal || 0), 0);

  let html = `
    <div style="padding:16px">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:4px">Billing</h2>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:16px">${entries.length} entries • Crew total: $${totalCrew.toFixed(2)}</p>`;

  if (entries.length === 0) {
    html += '<div class="glass-card" style="padding:24px;text-align:center;color:var(--text-muted)">No billing entries yet.<br>Tap a span or pole on the map to log work.</div>';
  } else {
    // Group by date
    const byDate = {};
    entries.forEach(([id, e]) => {
      const d = e.date || 'Unknown';
      if (!byDate[d]) byDate[d] = [];
      byDate[d].push({ id, ...e });
    });

    Object.entries(byDate).forEach(([date, items]) => {
      const dayTotal = items.reduce((a, e) => a + (e.crewTotal || 0), 0);
      html += `
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px;font-weight:700;color:var(--gold-light)">${date}</span>
            <span style="font-size:13px;font-weight:700;color:#10b981">$${dayTotal.toFixed(2)}</span>
          </div>`;
      items.forEach(e => {
        html += `
          <div class="glass-card" style="padding:12px;margin-bottom:6px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <div style="font-size:13px;font-weight:600">${e.description}</div>
                <div style="font-size:11px;color:var(--text-muted)">${e.fromPole ? e.fromPole + ' → ' + e.toPole : 'Pole ' + e.poleNum} • ${e.qty} ${e.unit?.toLowerCase() || 'units'}</div>
              </div>
              <div style="font-size:15px;font-weight:700;color:#10b981">$${e.crewTotal.toFixed(2)}</div>
            </div>
          </div>`;
      });
      html += '</div>';
    });
  }

  html += '</div>';
  document.getElementById('mainContent').innerHTML = html;
}

// ─── MORE ───
function renderMore() {
  const mrTotal = POLES.filter(p => p.mr).length;
  const mrDone = Object.keys(mrStages).length;
  const gaCount = POLES.filter(p => p.placeGA).length;

  document.getElementById('mainContent').innerHTML = `
    <div style="padding:16px">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">More</h2>

      <div class="glass-card" style="padding:16px;margin-bottom:12px">
        <h3 style="font-size:14px;font-weight:700;color:var(--gold-light);margin-bottom:12px">PROJECT INFO</h3>
        <div style="font-size:13px;color:var(--text-secondary);display:grid;gap:8px">
          <div><strong>Project:</strong> ${PROJECT_NAME}</div>
          <div><strong>Client:</strong> Shentel Cable Television</div>
          <div><strong>Location:</strong> Frederick County, MD</div>
          <div><strong>Poles:</strong> ${POLES.length}</div>
          <div><strong>Spans:</strong> ${SPANS.length}</div>
          <div><strong>Total Footage:</strong> ${SPANS.reduce((a,s)=>a+s.ft,0).toLocaleString()} ft</div>
          <div><strong>Make Ready:</strong> ${mrDone}/${mrTotal} complete</div>
          <div><strong>Guy/Anchors:</strong> ${gaCount} poles</div>
        </div>
      </div>

      <div class="glass-card" style="padding:16px;margin-bottom:12px">
        <h3 style="font-size:14px;font-weight:700;color:var(--gold-light);margin-bottom:12px">RATE CARD (Crew)</h3>
        <div style="font-size:12px;color:var(--text-secondary)">
          ${BILLING_CODES.map(bc => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)"><span>${bc.num}. ${bc.desc}</span><span style="color:#10b981;font-weight:600">$${bc.crewRate}/${bc.unit === 'FT' ? 'ft' : 'ea'}</span></div>`).join('')}
        </div>
      </div>

      <div class="glass-card" style="padding:16px;margin-bottom:12px">
        <h3 style="font-size:14px;font-weight:700;color:var(--gold-light);margin-bottom:12px">MAKE READY LIST</h3>
        <div style="max-height:300px;overflow-y:auto">
          ${POLES.filter(p => p.mr).map(p => {
            const done = mrStages[p.id];
            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">
              <div><strong style="color:var(--text-primary)">Pole ${p.num}</strong> <span style="color:var(--text-muted)">${p.st||''}</span></div>
              ${done ? '<span class="badge badge-green" style="font-size:10px">Done</span>' : '<span class="badge badge-amber" style="font-size:10px">Pending</span>'}
            </div>`;
          }).join('')}
        </div>
      </div>

      <button class="btn-red" style="width:100%;padding:14px;border-radius:12px;margin-top:16px" onclick="if(confirm('Sign out?')){localStorage.removeItem('gr-shentel-invite');location.reload()}">Sign Out</button>
    </div>`;
}

</script>
